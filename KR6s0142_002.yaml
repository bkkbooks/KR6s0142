body:
  text: 東京法雲禪寺住持傳法佛國禪師惟白集岡劍號巨闕珠稱夜光果珍李奈菜重芥薑海鹹河淡麟潛羽翔龍師火帝鳥官人皇始制文字乃服衣裳已上總四十一函鷲峯山第三會般若經五十九卷計三十一品三藏玄奘重譯舊號單譯岡二卷大般若經四百七十九緣起品如來入三昧及放光現瑞悉如前也四百八十不見空與諸法相應是修般若波羅蜜多劒十卷大般若經四百八十一我於法界若速現等覺若不速現等覺何以故四百八十二修行般若引發六神通等法義四百八十三善現品欲滿諸善法當學般若波羅蜜多於一切法應如實覺知四百八十四欲滿布施安忍等法應學般若四百八十五於一切法無所取著則能從於此岸而得到彼岸四百八十六無句義名為菩薩句義等四百八十七修行精進與智相應以無所得回向菩提四百八十八不被功德鎧是名菩薩被大乘鎧等四百八十九普超三界有情諸法名為普超一切三摩地決判有情也四百九十大乘相者義無礙解法無礙解詞無礙解辨無礙解於四法中悉無所得號十卷大般若經四百九十一常應遠離我執乃至見者等執四百九十二當知如是大乘都無所住四百九十三言大乘者普超一切世間天人等法四百九十四我我所生者乃至見者命者等無所有四百九十五虛空前後中際皆不可得大乘亦復如是四百九十六前後中際不可得色蘊無邊當知菩薩亦無其邊四百九十七何緣故說菩薩但有假名唯客所攝等義四百九十八如實觀察一切法相悉不可得乃名實相四百九十九天帝品諸天共集帝釋請問行般若時作如是觀五百尊者善現承佛神力為諸菩薩雨大法雨巨十卷大般若經五百一見窣堵波品甚深般若至心聽受如理思惟廣令流布所獲現法當來勝利五百二不離一切智智心以無所得為方便五百三獲楊功德品以何驗知三千世界天龍歡喜護念悉讚其妙法五百四設利羅品此云舍利佛設利羅由此出生不如受持般若福聚品等教有情住預流果所得功德不如受持般若妙法五百五隨喜回向品所修善根回向無上菩提隨喜俱行五百六地獄品般若於色不作大不作小五百七歎淨品安住大乘無方便善巧起般若想等讚德品受持此經身體無病常有龍天守護五百八陀羅尼品此云總持天帝作念得聞般若已曾親近諸佛五百九佛滅度後於東北方有幾許安住大乘等魔事品修諸行時留難魔事說聽因緣俱不和合等五百一十現世間品母若有難子當求治守護般若亦復如是當須求學闕十卷大般若經五百十一不思議等品般若出現世間為不思議譬喻品般若出現世間成就布施等諸法也五百十二善友品新學大乘應云何學一切法相皆是菩提善友等五百十三真如品若五蘊真如若一切智真如五百十四自成熟一切有情亦勸他成就一切有情五百十五不退相品一切不退轉是名轉轉為大乘不退相也五百十六空相品若離般若雖經多劫行布施等法不成佛果五百十七具修六度見有情惡業高下不平殑伽天品如前散花授記成佛五百十八巧便品諸有情類無善巧方便於長夜中行有所得五百十九甚深般若用何為相五百二十阿難作念天帝為自辨才讚說般若佛神力故而自如是學時品平等性於中學是為平等學由平等學成佛菩提珠十卷大般若經五百二十一見不動品天帝作念修行布施淨戒等法尚超一切有情何況求佛菩提五百二十二其心堅固逾於金剛一切諸魔不能留難五百二十三方便善巧品如是般若最為甚深如虛空故說為無盡等五百二十四成就如是方便善巧發趣無上正等覺心五百二十五略攝般若於中修學能多所作得如是名等五百二十六依何義故名為般若到一切法究竟彼岸五百二十七慧到彼岸品具勝覺慧習行深法於自性中而不能動五百二十八妙相品住有想者若無順忍住無相者豈有順忍等法也五百二十九知一切法無相無得云何圓滿布施等法五百三十行般若時安住夢幻五取蘊中圓滿諸法稱十卷大般若經五百三十一菩薩亦能得一切智與如來有何差別其相云何五百三十二世俗施設因果分位差別不依勝義故五百三十三施等品有情施設皆不可得菩薩為誰故行布施等善法五百三十四若一切法皆本性空本性空中都無差別五百三十五修行布施等法乃至究竟無上佛菩提皆無二相等五百三十六佛國品菩薩種種願行修布施等法為作如是嚴淨佛土謂彼土中無三惡道乃真佛國五百三十七宣化品觀一切法無不皆空是為覺知諸法實相如是宣說化利有情右鷲峯第三會所說般若與前二會品目多同則略摽録照前後義也鷲峯山第四會般若經十八卷共二十九品即舊小品道行明度三經三藏玄奘重譯五百三十八妙行品善現舍利子承佛神力為人天衆宣說開示甚深般若五百三十九菩薩皆實無生法亦無生一切智智亦實無生天帝品諸天集會帝釋請問般若五百四十窣堵波品此云方墳如是般若甚奇希有佛言云何甚奇云云夜十卷大般若經五百四十一應正等覺於深般若功德勝利量無邊際稱揚功德品滿贍部淵佛設利羅所獲福聚不如受持般若等五百四十二福門品教贍部有情令住預流等果不如書寫此般若福五百四十三隨喜回向品慈氏謂善現所起隨喜回向不可思議等義五百四十四殑伽沙界有情皆發等覺心於此般若所起回向福聚不及少分地獄品信受般若成佛菩提不信此法墮地獄等惡趣五百四十五清淨品諸愚癡人不勤精進不事善友於此般若難信難解若信解者其心清淨讚歎品有此般若經處諸天歡喜讚歎受持五百四十六總持品應正等覺善分別說此妙法哀愍世間利多衆生故也五百四十七魔事品樂說辨才不生兩不和合皆為魔事現世間品有此般若一切善法出現世間故不思議等品甚深般若出現世間為無等等不可思議也五百四十八譬喻品甚深般若現世成辦一切諸佛法故難譬喻天讚品諸天讚歎甚深般若希有奇特出現五百四十九真如品般若真如最為甚深極難信解正等菩提亦難證得不退相品菩薩轉不退轉為不退轉等義五百五十空相品說諸行法皆是分別從妄想生都非實有深功德品心心數法前後進退推徵無和合義如何得積集善根成佛果也殑伽天品以花散佛即記佛果也光十卷大般若經五百五十一覺魔事品如何修習一切菩提分法引發何心令習空無相無願無作無生無滅無起五百五十二善友品即般若能行般若即空即離若能如是行般若是真善友天主品帝釋白佛般若最為甚深難信難解無雜無異品思惟習學修行如是三昧於此般若為趣無上等覺乃成佛果也五百五十三迅速品譬喻大地出生金銀等實若學般若速成無上等覺幻喻品若有來問幻人能修布施等法云云五百五十四堅固品住深般若現在如來前後圍繞宣說般若自然歡喜散花品諸天聞說般若歡喜各持妙寶天花奉散佛上及衆五百五十五隨順品應觀諸法不和合隨順般若諸法無分別亦隨順般若無雜壞無變異無表示等後亦復如是右鷲峯山第四會所說般若品目亦與前三會多同則略順機緣亦簡標義相以照前後耳鷲峯山第五會般若經十卷共二十四品唐三藏玄奘法師號新譯五百五十六善現品汝以辨才宣示般若天帝品四萬天子俱來集會五百五十七窣堵波品諸天同時高聲唱言甚深般若法性深妙神呪品諸天白帝釋般若是大神呪五百五十八設利羅品佛設利羅因般若生經典品教得道果福利不如受持此經典回向品所有善根回向菩提不如修習般若五百五十九地獄品如是隨喜無倒回向若生差別墮惡趣故清淨品如是清淨最為甚深等五百六十不思議品於諸菩薩善能付囑魔事品師資說聽俱不和合真如品諸法真如不離般若波羅蜜多果十卷大般若經五百六十一甚深相品諸法甚深以何為相般等喻品乘此般若到于彼岸五百六十二如來品如是般若極難信解不退品退與不退是菩薩輪五百六十三貪行品能如是行都無行處姊妹品天女散花慶喜問如是姊妹種幾善根佛言燃燈佛時同我獻花我記成佛授賢天女也夢行品夢行般若與日中乃無別五百六十四勝意樂品以勝意樂欲證等覺常應讚歎真淨善友修學品修學般若晝夜精勤五百六十五根栽品行甚深義猶如根栽付囑品付囑阿難廣宣流布不動品受持般若四衆圍繞如大海水不能傾動故右鷲峯山第五會所說般若十卷共二十四品亦與前四會品目多同故略標耳鷲峯山第六會般若經八卷共十七品勝天王般若舊本唐三藏玄奘法師重譯五百六十六緣起品如來放光照十方界通達品最勝天王問世尊言云何修學一法通達一切佛法佛云所言一法謂之般若能修學者則能通達布施等一切諸善法故五百六十七顯相品天王復問般若以何為相猶如天地出生物相五百六十八法界品天王復問行深般若為度有情示現諸相佛云俱不可得念住品天王復問路非路者心緣何住佛云身受心法而可安住等五百六十九法性品天王復問諸佛何緣得此微妙功德佛云所行甚深般若波羅蜜多不可思議法性也五百七十平等品天王復問法性平等何謂平等等何法故名為平等佛言諸法自性不生不滅等故名平等現相品舍利子問天王曰方便善巧通達法性何緣六年苦行降伏天魔天王答言佛為伏諸外道故示現耳珍十卷大般若經五百七十一無所得品善思菩薩問曰佛授天王菩提記耶答曰我雖蒙記猶如夢等無所得也證勸品無數劫前有佛出現名曰寶王如來是時輪王與千子詣佛所聽是般若記其千子於賢劫中次第作佛也五百七十二顯德品曼殊問佛菩薩經幾劫事幾佛得如天王對如來所說般若佛云經百千大劫事百千諸佛乃能如是也現化品善思問言佛所化身更能化不天王曰對佛證明佛所化身作無量化佛五百七十三勸誡品佛告曼殊碎大千界悉為微塵一一為窣堵波淨心盡身供養不如受持此之般若二行品佛告文殊有二種行成就般若從初發心至前際中後際悉無間乃至三十二相八十種好讚歎品曼殊即升虛空說偈讚佛云一切有情類唯佛最為尊尚無有等者況復當有勝乃至諸天說偈耳右鷲峯山第六會所說天王般若品目與前五會或同或異其義意大旨無別逝多林中第七會曼殊室利分般若二卷唐三藏玄奘法師譯五百七十四此云妙吉祥也佛所住處吉祥先至為利有情故佛諸弟子在門外立我先來此專為一切有情非謂證佛菩提非為樂觀如來身相何以故如來即真如相本無動無作等法然佛與曼殊一一問答五百七十五舍利子白佛曼殊所說法相不可思議佛言如汝所說曼殊白我所說法但有音聲俱無所有何見法相逝多林第八會那伽室利分一卷三藏玄奘法師譯玄則序云妙祥資舍衛之稟龍祥叩分衛之節五百七十六妙吉祥著衣持鉢入城時龍吉祥見問尊者何所往答云巡行乞食利樂衆生問云今於食想由未破耶答言吾於食想都不見有知何所破何以故一切法本性空寂猶如虛空我何能破二大士往復徵詰時無能勝菩薩來至讚言善哉大士能共辨說妙吉祥復與龍吉祥談深妙法龍吉祥入海喻定善思觸動其身令速出定逝多林第九會五百七十七能斷金剛般若分前後六朝譯唐三藏玄奘玉華宮重譯此經他化自在天宮第十會般若理趣一卷三藏玄奘法師譯玄則序云核諸會之旨歸綰積篇之宗緒五百七十八自在天宮如來為諸菩薩說甚深微妙般若理趣清淨法門即是句義自清淨妙樂句義是菩薩句義乃至般若一百餘句義如來復依遍照如來之相空說般若一切惡法復依清淨三界勝主如來智印無戲論法如來輪攝真淨器由能善調伏性平等法住持法藏無邊法際復依遍照已上一一如來之相一一說般若甚深理趣皆如來大慈開示祕密也逝多林第十一會布施般若經五卷三藏玄奘法師譯玄則序云萬行相資都之六度蓋以度門為首也五百七十九如來為舍利子滿慈子廣談布施行引發一切善法諸善根功成般若利智五百八十佛言欲證無上佛果應行無染布施然諸法若無布施不能圓滿若無般若不能勝妙也李十卷大般若經五百八十一若一切法皆非實有行布施時為誰所捨佛云都無所捨等也五百八十二云何初發心第二發心住不退地坐菩提座佛言初心超羅漢二心超獨覺平等法界超不退位坐菩提時成一切智智也五百八十三頗有初心勝後心不佛言羅漢諸無漏心離一切煩惱不能化度有情若初發大菩提心便能超過苦海為一切有情津梁故勝也逝多林第十二會淨戒般若五卷三藏玄奘法師譯玄則序云欲儲淨法先滌身器持戒波羅蜜多也五百八十四舍利子承佛神力先以淨戒教諸菩薩滿慈子問云何應知菩薩持戒犯戒所應行處非所行處舍利子云安住聲聞獨覺作意是非所行處安住此處名為犯戒行於非處決定不能攝受淨戒一一廣問廣答行相五百八十五如實了知等無間緣所緣緣增上緣及從諸緣名為緣起善巧然問一切諸緣一一如實了知其義五百八十六如實了知等無間緣所緣緣增上緣及從諸緣名為緣起善巧然問一切諸緣一一如實了知其義五百八十七有方便善巧疾證菩提無方便善巧遲證菩提五百八十八佛言舍利子汝能如是安住妙智謂如實知取著淨戒有所毀犯不取著淨戒無所毀犯答言我信如來所說妙法如是之智逝多林第十三會安忍般若一卷三藏玄奘法師譯玄則序云等覺之靈根廣慈之奧主謂之忍也五百八十九滿慈子白佛言若種種訶罵毀謗悉能忍受乃起慈悲心報彼恩德是名安忍之心成一切智智舍利子問滿慈子菩薩聲聞所修安忍有何差別答云聲聞少分行相非極圓滿菩薩具分行相所緣一極圓滿所住安忍若受他人毀罵其心不動如妙高山疾證菩提若見鬪諍忿嗔來為分別一切諸法皆空乃畢竟無有諍競彼聞是說鬪諍心息亦令修學內空等法一一法例之逝多林第十四會精進般若一卷三藏玄奘法師譯玄則序云至運無動動之愈勤妙警伊寂寂之愈照也五百九十滿慈子白佛欲證菩提如何安住精進佛言初發心時我諸所有若身若心先為他作饒益事當令一切所願滿足譬如僮僕行住坐臥皆當住主不應自在然佛為稱揚令修行人於諸法中精勤修習如有人來謂言汝為我析須彌山一日之中便為微塵當須歡喜精勤奉教不生一念懈怠之想為他作如是事也鷲峯山第十五會靜慮般若二卷三藏玄奘法師譯玄則序云動之則舛競聿興靜之則衆變幾息奈十卷大般若經五百九十一舍利弗白佛欲證菩提如何安住靜慮佛言入初靜慮常作是念我無際生死已來數數曾入如是靜慮所作應作身心寂靜次第入諸禪定作所應作為一切功德所依一一念其無際生死也五百九十二舍利子白佛云何靜慮攝受般若等法佛言菩薩於諸法中發起無著無常想等善根回向一切智智於一切定境不生味著諸有所作常在定心如行布施淨戒安忍等法常在定心廣談四靜慮四無色等定境問答斯旨使後世修習者不錯亂定心速成妙行妙定白鷺池側第十六會般若波羅蜜多經八卷唐三藏玄奘法師譯西明寺譯經證義僧玄則序五百九十三善勇菩薩問佛何謂般若云何修行般若佛言汝觀何義請問是法答云我哀有情故為作利益佛言為何等有情答云不為下劣有情請問我為樂一切智智無著智自然智無等等智無上智等有情請問無上等覺甚深般若佛云般若不可施設不可宣說不可示現如是知者名如實知非知非不知非此處非餘處故名般若也然智所行非智所行非非智境亦非智以智遠離一切境故若智是境即應非智不從非智而得有智亦不從智而得有智乃至廣說智智相出世通達般若五百九十四若能於法如實覺知名為真實菩薩何以故一切法性無實無生無所執著無所得故五百九十五復次善勇猛色蘊非色蘊所行故無知無見是為般若受想行識眼耳鼻舌身意等法亦復如是例五百九十六五蘊不可施設有去有來有住有不住乃至諸法依例五百九十七舍利子白佛云何菩薩依如是法行諸境相佛言菩薩衆尚不可得法何況非法尚不可得道何況非道故一切境相皆空也五百九十八菩薩能如是行則不緣色清淨而行亦不緣受想行識清淨而行諸法亦如是五百九十九如是學時不於色學若常若無常若苦若樂若空若不空若我若無我諸法亦然也六百於色不說開顯不開顯寂靜不寂靜遠離不遠離無著無縛無解脫不執著乃至佛菩提依如是例然如來最後殷勤勸誘令學般若早證菩提敕諸菩薩廣宣流布令佛眼不斷也右四處十六會所說般若六百卷今逐會標辨品目逐函分列卷次逐卷録略義例然卷帙雖多研其義例始自色心終乎種智止于八十餘科耳所録者固不能全其義意使開一卷看一例照于前後卷帙貫通八十科之起復則八部般若照然可見矣若或纍朝法匠譯梵為華繼有傳授不無其人唯唐三藏玄奘法師自竺國而還詔居玉華宮或創出梵文或重譯舊本四更星序八部方周般若智日圓明至理義天普覆爰是或講或誦或注或持代勝一代日盛一日殊應有徵利益無量也今撮略綱目欲廣見聞以龍樹尊者所造大智度論摘其義意注于科例俾看般若者披閲其