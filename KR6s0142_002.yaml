三摩地門正心正受四果預流果須陀洹也一來果斯陀含也不來果阿那含也無生果阿羅漢也獨覺菩提自悟本智一切菩薩摩訶薩行自覺覺他諸佛無上正等菩提因圓果滿我者起我我所生者如父有子壽者命根成就命者能舉事故有情者蘊和合生養育者因緣故長衆數者諸法有數作者手足能所使作者力能役他起者作後世業使起者亦令他作受者苦樂果現使受者厭苦厭樂見者目覩色像知者五識知名放光般若經二十卷共九十品與前大般若同本西晉于闐國三藏無羅叉譯也菜十卷放光般若經一放光品如來入等持三昧放光照十方世界故立品題無見品行般若不見有菩薩不見字不見生不見滅等法假名品菩薩者但有字佛亦字耳般若亦字耳五蘊者亦字耳吾我亦字二五眼品肉眼天眼慧眼法眼佛眼廣說行相五通品天眼通徹視天耳通徹聽他心通遍知夙命通明了神境通自在授決品三萬比丘六萬天子生阿閦如來國中授記成佛妙度品大度上度妙度無上尊度辨才之度無等度空度無相度等也舌相光品如來舌上放光普覆三千大千蒙光者獲利行品一切法從久遠劫來但行其字行般若等法亦不具行學品欲成一切善法當學般若欲成一切惡法當學般若本無品一切法終始不得其名字故云本無三空行品般若五蘊等法行相空無問幻品人問幻人行布施等法我云何答也了本品無句義是句義了般若空摩訶品於諸妄見悉斷故名摩訶僧那品普為衆生作諸苦行行布施等行成僧那僧涅也摩訶衍品乘於大乘能為有情轉妙法輪成一切智僧那僧涅品何等菩薩名僧那僧涅能行布施等諸法空名也四問摩訶衍品此云大行布施等法回向菩提與衆生共成百千三昧陀鄰尼品行四意止觀身觀他身觀內外身已亦無身亦無所倚然四十二字密語云耳治地品從一地至一地但治住地事亦不見地一一地中一一成就事相問出衍品所出衍中當住何所當出三界住無所倚也五歎衍品摩訶衍者出諸天上衍與空等不見來去衍與空等品如是如是實與空等猶如虛空亦不知東西南北四維上下等也合聚品衍與一切善法佛法共合集於般若中不可得三際品無有端緒無有邊際亦無有底諸法皆然問觀品行般若時何等觀諸法觀色等法皆空六無住品佛無所住一切法亦無所住如幻品說者聽者皆如夢幻雨法雨品為雨法雨我作花散佛上歎品諸天歎言所說快哉佛現神力能演是教降衆生品受持般若教授衆生成就一切諸善法故七守行品於深般若習行守者諸難不侵供養品習行守者更能供養疾證菩提持品受持般若諸餘惡法悉當消滅遣異道士品外道來至求佛過失天念般若便即順去無二品何以獨稱般若不歎諸法以無二故耳八功德品贍部有情皆修十善不如般若勸助品勸助福佑共證菩提不如般若功力大也九照明品般若作照明至清淨無點污故等泥犁品拒逆般若永墮泥犁斷善法罪故明淨品淨為甚深五陰等淨故常淨故無作品般若為何所作答云無有作者十等品般若與諸法等以無際故真知識品般若過耳已遇佛與真知識相何況受授覺魔品辨不即生兩不和合等相也重十卷放光般若經十一不和合品樂聽無說樂說無聽大明品般若為世間大明佛眼常在無相品般若以何為相空即是相無相無願是相大事興品甚深般若為大事興無與等者譬喻品大海中船能濟度人般若亦復如是十二隨真知識品若學般若隨真知識解深品解深般若當至何趣當至薩婆若歎深品諸天歎言般若甚深難曉難了難知阿惟越致品以何相貌知是此也於諸果位盡是一如一無有二等故得名十三堅固品魔說空等法如何可辨若聞是言便當覺知甚深品深奧之處說甚深空無相無願夢中行品夢中行空無相等與日中亦無異無別恆加調品以花散佛結成寶臺授記為金花如來時說是般若也十四問相行願品以云何行云何入行般若時觀五蘊等空阿惟越致相品夢中不近諸賢聖不視諸法如夢幻等是名相也釋提桓因品聞是般若書持學者已具足功德佛言如是如是十五親近品已發意者使其願滿未發意者當親近之牢固品行般若者為行不堅固何以故無牢固故亦無不牢固囑纍品廣作佛事不如流通般若其福無等無盡品般若不可盡而陰等法亦不可盡相攝品布施等六行相攝引成菩薩行問等學品等所應學者當學等十六漚惒品行漚惒拘舍羅此云善巧方便不可計劫具足諸行成無上道種樹品空中種樹不為難為衆生發菩提心最為難菩薩行品為在何處行於五陰行內空外空行一切法處行當得真善知識品欲成就逮薩云若及諸善法須得真善知識十七教化衆生品從初發意行諸善法皆為教化一切有情無堅要品佛形無有堅要故無堅要者為無所有無倚相品有倚相者不得逮覺無倚相者速成菩提則無所倚無有相品五蘊無相一切法皆無有相無所有相者則一相也故無相也十八住二品行於般若住於二空廣行諸行而無所著超越法相品譬如幻化無五陰行一切無漏無礙無道無是也信本際品信真際故念般若真際故及衆生際等無有異建立真際亦不分別等也十九無形品五陰等一切法無形無有可習建立品修種種行得成菩提甫當建立三乘妙法不隨惡趣畢竟品為畢竟為不畢竟佛言不畢竟於二乘畢竟亦不畢竟分別品菩薩法佛法以一相應慧一切慧而得正覺以是分別有無品諸法所有無所有非佛所作亦非菩薩羅漢等所作耳二十諸法等品以諸法等故我言斷有佛無佛如及爾法性諸法妙化品是諸法化誰所化耶佛所化耶菩薩聲聞所化耶薩陀波崙品此云常啼不惜身命為求般若現在雷音佛所法上品法上云如來者如如無所起不去不來不動不生囑纍品佛敕阿難流布般若妙法摩訶般若經二十七卷計九十品與放光般若及前第二會同本姚秦羅什法師譯芥九卷摩訶般若經一序品如來放光照十方界奉鉢品天王奉鉢佛即受之習應品一切諸法但乃有名有字也二往生品何處沒來生此間五眼品肉眼天眼等也歎度品行六度等度有情衆舌相品舌放光照一切世界三假品諸法名字悉假施設三勸學品成就諸法當學般若乃得圓滿集散品不得色集散不得受想等法集散行相品若行色等行相無方便善巧但不作行相四幻學品幻人能學般若等法其義如何句義品無句義是為菩薩句義金剛品發大心如金剛不可壞為有情上首樂說品說其所以便說知者見者辨才品我亦樂說乘於大乘為利有情乘乘品乘大乘時乘般若乘布施乘於諸法乘等也五莊嚴品大莊嚴者行於般若布施等法皆大莊嚴問乘品趣大乘是乘發何處至何處在何處誰乘之此大乘廣乘品摩訶衍內身中循身觀亦無身覺以不可得等六發趣品大乘發趣一地至一切地出到品是乘從三界中至薩婆若中住勝出品超勝一切天人等法如虛空等含容包遍等空品摩訶衍與虛空等無有邊量涯際也七會宗品摩訶衍皆隨般若布施等行十無品一切諸法畢竟無故如色無色性無前際無後際無中際法無佛無等義無生品何等是菩薩何等是般若作如是觀畢竟無生問住品諸天人問般若畢竟當於何住無所住也八幻聽品諸天子言如幻化聽說般若無說無聽三歎品諸天云快哉快哉快說是法滅淨品學般若故滅諸諍法成就一切善法故耳九大明品受持般若能除一切刀箭是大明呪述成品一切智智一切善法般若中生勸持品天帝勸諸天受持般若增益天衆損減修羅遣異品外道至會求佛過失諸天誦念般若外道自歸依而去也尊導品不稱諸法唯讚般若為尊為導為妙為上也薑九卷摩訶般若經十法稱品供養舍利福聚不如般若法施品教贍部洲住十善道不如般若十一隨喜品隨喜般若福與一切衆生共回向菩提利樂有情照明品般若為一切世間光明照了諸法信毀品信受般若何處沒來生此間等十二歎淨品是淨甚深佛言畢竟淨故不可得故無作品般若無邊無等無作空故離故十三聞持品名字過耳者曾經佛所作大功德何況受持魔事品求於佛道生於留難說聽師資各不和合十四兩過品說者勤樂聽者懈怠二心不和多為魔事佛母品如母生子般若生育我等問相品般若何相空相是相十五成辦品般若能成辦世間出世間法故譬喻猶如海中有船能得渡故知識品新學菩薩如何學般若當於空處學趣智品解深般若當趣一切種智一切智智也十六大如品色如智如相如一如無二無別不退品修行般若於諸法無行無相無願名不退十七堅固品魔為說法其心不動故云堅固深奧品般若深奧處者空是其義夢行品夢行空等與晝無異無別十八河天品天女散花授記作佛不證品學般若時觀色空觀受想行識空夢誓品夢中亦不習聲聞緣覺等法海九卷摩訶般若經十九魔愁品若持般若魔復大愁猶如毒箭入心等學品菩薩等法內空等是等法也淨願品學般若等法已出有情上何況得正等覺度空品無真實不可得何況真實法耶二十纍教品如汝所說實皆隨順等無盡品虛空不可盡般若不可盡色亦不可盡攝五品般若能攝布施淨戒安忍等五行故得成就也二十一方便品能成就者發意已來經無量劫聞般若經三慧品云何生云何修又云何行般若等不堅實故應行二十二道樹品空中種樹甚為難為衆生求正覺又復甚難道行品行何等行為菩提行行色空行受等空三善品供養於佛種諸善根須得真知識遍學品智慧成就行是甚深法色性中不動故受等性空不動故二十三三次品修漸次學作漸次業行漸次行得忍得道得證一念品種種惱亂學般若人不生一念嗔心六喻品六度中六種行相廣利有情喻所不及何以故皆與空等二十四四攝品布施攝取之愛語利行同事攝化善達品達諸法相如化人不行色等有為無為等不生分別也二十五實際品般若際衆生際菩薩際畢竟無異故具足品以方便故行布施等諸法是為具足菩薩道二十六淨土品行布施等是大莊嚴以淨佛土畢定品畢定非不畢定亦畢定亦不畢定聲聞辟支畢定佛畢定差別品菩薩佛亦無差別何以故空相中無差別之異七譬品非佛非辟支佛非羅漢非阿含等非向道人非得果人非菩薩等所作皆如夢幻平等品無所有中無垢無淨有所有中亦無垢無淨如化品若化人作化人是化有實否諸法平等故如化耶二十七常啼品求般若當如薩波崘也法尚品為說般若佛無所來無所去無所住囑纍品佛敕阿難廣為流布般若無令斷絶光讚般若經十卷計一十七品與大般若第二會同本西晉三藏竺法護譯也鹹七卷光讚般若經一光讚品如來入定意王三昧放光十方諸佛各伸讚歎順空品天王奉鉢願聞般若二行空品行般若時了諸法空歎品讚歎般若太度無極微妙第一授決品如來舌相放光蒙照者乃授記分別空品須菩提為諸菩薩演說般若耶三了空品了知諸法當學般若波羅蜜假號品一切諸佛法但有名有字耳四行品行般若時行色等法行受想等法幻品幻人來問幻人修布施等我云何答五摩訶薩品無句義是菩薩句義等無等品不見一切法是菩薩無與等大乘品被大乘鎧能利有情成等正覺六乘大乘品誰是能乘大乘者無縛品行於諸行俱無縛解三昧品衍何所住衍從何生誰成衍者也七觀品觀身觀法觀色等法十住品宣說十地行法而令安住河八卷光讚般若經三卷八所因出衍品從三界出薩婆若住而住無去來品摩訶衍不見來不見去不見住衍與空等品衍與空等與色等與受想行識等與內空等九分曼陀尼弗品舍利子問佛衍與般若如何佛云悉皆隨順等三世品不念過去未來現在諸法不可得觀行品觀諸法行悉能曉了十問品諸天集問般若妙法法師如幻品說者聽者皆如幻化雨法寶品為雨法寶利益人天等摩訶般若鈔經五卷共十三品與小品道行二般若同本竺佛念譯也一道行品成菩薩道行諸法空問品諸天來集共問般若妙法也二功德品所說般若佛從中生若有受持我等恭敬護助等三善權品勸助為福而作功德地獄品不信般若當墮地獄甚深般若是諸佛眼清淨品色清淨受想等法清淨故四本無品諸法無相如空等耳恆架調優婆夷品佛為說法令悟般若即以天花散佛蒙授記五守空品云何為空所作不貪遠離品諸法與般若不相遠離知識品若學般若迎真知識釋提桓因品天帝釋稱讚般若願欲流通道行般若經十卷三十品與前大般若第四會同本後漢月支國三藏支婁迦讖譯也淡十卷道行般若經一道行品從般若中學行菩薩道難問品諸天共集同問般若為難故二功德品受持此經諸天及人咸恭敬故三漚惒俱舍羅勸助品勸助為福乃至成佛不如般若以佛從中生故泥犁品不信般若墮諸惡趣清淨品諸法清淨故色清淨受想行識等清淨一切法亦然矣四歎品彌勒成佛當如何說持品持是般若事無量佛覺品若有魔來為留難者當須自覺魔自然消滅也五照明品般若出現為世照明也不可計品般若極大究竟不可量不可計喻品如大巨海有船可渡六分別品學般若人當從知識速成正覺本無品諸法悉皆無所著故阿惟越致品此云不退何以知其行相狀貌了諸法空恆竭優婆夷品何等為深空為深無相無願七守空品何等為守空三昧當觀一心不見法不作證遠離品夢中亦不近修聲聞等法知識品教學般若是真知識八釋提桓因品此云能作甚深般若難解難了貢高品學行般若弊魔愁毒學品學般若學無常守行品守行般若天人來敬強弱品佛所聞事為無有高下九纍教品作是立者無有能過為如佛立當隨般若隨品隨般若教當如虛空薩陀波崘品如求般若當學常啼也十曇無竭品或云法涌或云法尚或云法上為常啼說般若囑纍品如來付授阿難宣傳此經令佛眼照明世間不斷小品般若經十卷二十九品如來異時適化廣略之說天竺謂之中品般若也羅什法師譯僧睿作序鱗十卷小品般若經一序品佛令善現為說般若釋提桓因品諸天集會同共問法以宿願故聞甚深義二塔品有此經處如佛塔故明呪品是大明呪是無上呪舍利品供養舍利不如般若福聚三佐助品諸天護持學般若人回向品菩薩所有善根共有情向佛菩提泥犁品不信般若當墮惡趣也四歎淨品般若諸法畢竟淨故不可思議品甚深般若不可思議也五魔事品說聽魔事卒生俱不和合小如品少智少信不樂大法為魔所攝相無相品諸法無相即是一相船喻品海中有船可以得渡也六大如品如來如一切法如皆如也阿惟越致品不著一切法本來空寂故也七深功德品甚深般若成就廣大功德恆伽提婆品天女以花散佛即蒙授記阿毗跋致覺魔品深持般若魔不得便八深心求菩提品行深般若求佛正覺恭敬菩薩品學般若人天龍恭敬無慳煩惱品不生慳心不生煩惱心不生破戒心生智慧心九稱楊菩薩品入深般若諸天稱讚囑纍品聞般若人皆當成佛各授記已見阿閦佛品會中比丘皆生佛國隨知品法無差別般若如是法無可得般若如是十薩陀波崘品曇無竭品付囑品皆如前義也大明度經六卷共三十品與前第二會同本吳月支優婆塞支謙譯潛十三卷大明度經六卷一行品善業即善現也大明度即大般若智度諸有情也無極則般若無上也欲行大道即行大智慧為成佛正因二天帝品諸天來問甚深般若即明度也持品受持明度無極我等恭敬功德品若持明度成就功德超勝一切變謀明慧品行布施等法得明度方得圓滿三地獄品自歸明度無度布施等法若無明度如盲入地獄清淨品少曉明度無極即五陰清淨悉持品聞明度者見百千佛覺邪品欲學明度心不喜者覺其魔生照明十方品明度無極出現世間為大照明作佛眼故利益有情故四不可計品明度無等不可計量等譬喻品明度如船能渡海故分別品明度與一切法悉無異別本無品明度本空與空等也不退轉品能行明度亦無所著為不退轉恆伽清信女品聞說明度以花散佛也五遠離品學明度遠離聲聞等地也善友品欲學明度當得善友天帝品聞是明度不能曉了貢高品修行明度魔即愁苦學品成就善法須學明度守行品若能守行明度速成正覺強弱品於此明度不見高下不盡品諸法不盡明度亦不盡纍教品作是明度無有過者隨品諸法無異明度如是明度亦能隨諸法成就諸善法六曾慈闓士品即常啼也法來闓士品即法涌是也勝天王般若經七卷與前第六會般若同本陳優尼禪國王子月婆首那譯一通達品如來面門放光天王問通達般若顯相品般若以何為相無相是相空是相等二法界品如何通達甚深法界念度品念身受心法觀照也三法性品如來法性不思議四平等品法性平等何為平等不生不滅故現相品通達法性示現降魔等相也五無所得品我昔授記皆如夢如幻等證勸品過去寶王佛所曾聞是般若六述德品文殊問天王事幾佛能如是對揚般若現化品如來所造化佛更能化不陀羅尼品如來所說不入陀羅尼等一切妙法七勸誡品文殊云頗有衆生來世信此法不天王一一答之二行品佛告天王從初發心至成正覺無二心故付囑品佛敕慶喜流布般若羽十一經十五卷文殊般若經兩譯共三卷與前第十會般若同本金剛般若經六代譯為六卷皆同本唯什法師所譯者盛行天下也般若心經大明呪經兩譯二卷同本唯唐奘法師譯盛行世也實相般若經一卷與前第十會同本唐天后朝菩提流志譯如來為金剛手菩薩說十四段經每一段說一神呪其呪曰唅唵憾咭唎恆纜阿阿嚂唵荷頡唎底唎驃莎訶其餘可知耳仁王般若經二卷計七品姚秦三藏羅什法師譯一序品如來在王舍城大衆集時入大寂三昧光照十方十六國王俱來波斯匿王作樂供佛觀空品波斯匿王此云勝軍問佛云何護佛果云何護十地行佛言不觀色如受想行識如常樂我淨如六度四攝如二諦如教化品王問云何行可行以化衆生何相可化佛言五忍是菩薩法伏忍信忍順忍無生忍寂滅忍是修般若也二諦品王問第一義中有世諦不若言無者智不應二若言有者智不應一一二之義其事云何佛云汝過去七佛時已問此一義二義汝今無聽我今無說無聽無說即為一義二義汝今諦聽善思念之而說偈然於第一義中常照二諦以佛及衆生一而無二以本空故而乃為妙義也二護國品佛言國有災難供百佛僧百菩薩像百羅漢像百比丘衆請百法師講般若作百師子吼燃百燈燭燒百和香排百種花供三寶四衆共會災害自然消滅如班足王遇普明王誦般若九百九十九王悉免害悟法出家得道散花品王聞法歡喜以寶花散佛結成花臺佛以神力一化入無量花無量花入一花一佛土入無量佛土無量佛土乃至無量世界入一毛孔等妙義受持品王見神變思念受持般若佛一一為王說諸法妙理至趣開悟濡首菩薩經二卷與前第八會般若同本沙門翔公譯也一濡首謂英首曰法身煩乎答曰法身無處無像英首曰仁者了法身乎曰無了不了曰有內外中間乎曰本無處所都無法身曰無上無比佛言善哉清淨法身耶二龍首謂濡首曰可東行分衛曰幻化野馬寧有東西南北乎曰人前不能言況有所說以其諸辨妙義從尊所問右八部般若謂大品小品則般若廣略之說也光讚放光則般若緣起之相也摩訶道行則般若義趣之稱也實相理趣則般若智行之要也文殊濡首則般若分衛之道也金剛心經則般若要樞之體也仁王天王則般若楊義之宗也明度明呪則般若祕密之功也若總而言不出八十科之旨也旦所録者於第一會四百卷七十九品則卷卷撮例品品標義其餘別部別會或名同品異或名異品同不一一録例止於逐部逐卷中品下注一句兩句分辨義意照於前後品會通乎廣例廣義也如要見具足緣起行相則看所標卷次義例關對函帙則可知也大寶積經唐先天中南天竺三藏菩薩流志譯二十六會前後法師譯二十三會流志勘同梵本依次編成一百二十卷共四十九會其所標題者以如來坐大妙寶蓮花座十億摩尼寶及無量寶以為莊嚴所說法要亦如摩尼大寶瑩淨圓明又聚其多會成此一部聖典故約義約喻立題耳大簡小為義寶衆愛為義積廣多為義經貫穿為義翔十卷大寶積經三律儀會三卷一如來在耆闍崛山聲聞菩薩龍天集會迦葉問力無畏法何法而修諸如來道何法增長無上佛果何法而證佛言無有少法為其可得種諸善根而證菩提何以故若執著一切法無由得道及離一切惡法惡律儀也二佛為迦葉言不修實行不攝律儀諸有所為與俗無別於佛法律而生違背遠離此等當求一法所謂一切法悉無所有我說此法今尚不信我滅度後諸惡比丘住三法中所謂醫道販易近女人由此退失諸善法故佛一一為說出家破律等惡三佛告迦葉於一切法心無所住若執著蘊等想者皆非比丘修無漏者出家菩薩有三種修求一切智不墮本業堅持五戒復有三法障母障妻障己不聞正法不見僧皆獲罪報復有三法速成正覺乃勸父母生信心持戒捨施佛乃一一為說在家三法略此例之也無邊莊嚴會四卷四無上陀羅尼菩薩問清淨願力方便善巧佛言知佛祕語受持思惟如理觀察無不清淨陀羅尼者阿字為初荷字為後此第一義句即是如來非句之句句清淨句無有少法可證可入廣演法門檢而乃可見也五佛言了眼耳鼻舌身意等法皆陀羅尼如來行無所得亦非不行亦應不說行如實行何以故無有少法說名如來耶六佛說出離陀羅尼云何出離佛言一切法悉入其中云何名入以平等故一切諸法皆入平等亦不見法入於平等入清淨法門能成一切諸善法故七佛說清淨陀羅尼令諸說者六根清淨助其語業然前後卷中皆說清淨陀羅尼神呪密跡金剛會七卷八佛稱菩薩清淨名號密跡讚歎寂意菩薩問曰所云二事業得如來慧默然不答佛敕宣楊密跡曰有菩薩密如來祕要何謂有身密語密意密身密者寂然淡薄律儀禮節利樂有情昔浮提國衆生饑餓大帝化為仁良蟲以身肉濟饑衆生更為說法語密者其言清淨隨衆生類所說真實無有虛誑言行相應九神仙梵志計其樹葉根枝皆知其數何謂心密心行清淨不失神通行四意止無念無意一心無二深達法忍說此法時人天歡喜皆作是念修幾劫來得如是辨佛說過去佛所輪王千子願弘諸兄成道最後成佛我當第四密跡最後樓至如來十密跡說如來身密於斯無所思想普現一切威儀禮節自喜經行現諸相好思夷華佛所應持菩薩來觀佛身相上至百億恆沙界蓮花佛土不見頂相如來口密講演布散無限義理常在定中無所思念出六十四種清淨妙音隨一切機宣布法化目連過西方九十九億恆沙界光明佛土聞如來音亦如對面彼聖衆觀目連如小蟲兒行鉢上也龍十卷大寶積經十一何謂如來心密其業清淨以一識慧壽八萬四千劫又其神識不轉不變乃至定意心無合無散無遊無護次說如來苦行成道受乳受草登坐放光說法等義也十二佛轉妙法輪為說身無身語無語心無心種種演說乃授密跡記當來成佛名金剛步如來化王殊勝等也十三密跡授決請佛至宮廣陳供養四天王衆皆來集會佛為說諸法如萬物皆無常諸法皆無我有皆歸空受皆為苦毒天王等衆聞法各言護法護持國土佛亦再為宣揚法門也十四阿闍世王思念其杆重之幾何密跡即放地上令舉分毫不動帝釋亦不能舉目連盡其神力亦不能動佛敕自舉密跡持之虛空往返闍世讚其神力寂意賢王二菩薩各說法要因地已曾流通此之妙法如來復為王等一一稱揚祕要之法也淨居天子會二卷十五淨居天衆同到佛所欲問所行相貌會中金剛摧菩薩為請問佛說一百八夢境自夢見如來身如來默然背足語乃至自夢得滿瓶又為解說其應感自如來身至夢自病各說其相也十六自夢被縛解四十餘夢會中聞者皆得法眼淨無量壽如來會二卷十七阿難問佛入大寂定行如來行何故過去未來皆入斯義佛言過去定光佛前無數佛出現最初自在王如來是佛法中有法處比丘發菩提心求淨佛土即於佛前說四十八願如我土中有三惡道有雜穢有女人有淫欲有不發菩提心者我不取正覺也十八佛說佛土殊勝之相無量無邊及說觀音勢至殊勝妙德又為阿難彌勒看佛土中水鳥樹林皆演法音也不動如來會二卷十九舍利弗問清淨光明廣大甲胄如來說廣目佛時有一比丘發菩提心不被貪嗔等法之所搖動廣目佛記為不動如來國名妙喜現在東北方成等正覺為諸人天演說妙法作勝妙事等義也二十佛說不動佛界諸菩薩衆及彼人天并說涅槃相分布舍利及法住世願生彼佛國土因緣相分師十卷大寶積經被甲莊嚴會二卷二十一無邊慧問佛以偈答復問何等丈夫遠離怖畏一心正念為諸衆生被大甲胄佛言為無上等覺被大甲胄為諸衆生布施清淨被大甲胄持戒安忍等一切諸法清淨故被大甲胄乃至廣說二十二我念往昔修菩薩行時被如是甲胄乘於大乘不生分別平等知見於八正道等諸法如理觀察被此甲胄得出三界而證菩提如此甲胄皆以慧為先導二十三甲胄境界大乘境界道場境界有無量無邊甲胄過去有佛光明如來時有輪王詣佛所佛即告云大王應被無上甲胄乘於大乘證佛果位王聞是已捨位出家為一切義成比丘聞種種法修種種行蒙記成佛也二十四無邊慧如是觀察得法光明不於空中而見於空亦不離空中而見空不以無相見無相亦不以有相見有相不於盡中而見盡佛復為勝慧言無少修行無勝修行不隨修行不遍修行勇猛軍輪王於遍照佛所聞法光明法門被甲胄出家了諸法空成等正覺也二十五我念月燈佛所有雲音無邊音二菩薩得一切法善巧安立以無住而住無處而住授記次第成佛復說海印三昧一切法印無相印無緣印諸行印善巧印無名印無邊印無際印言說印自性印和合印虛空印止息印性空印乃至百千法門印等也法界體性會二卷二十六寶上天子作念佛可令文殊演說於法佛知其念即告文殊可說少法白佛云當說何法佛云說法界體性文殊曰一切諸法界法界體性出法界外無有所聞云何因法界演說於法佛言憍慢衆生若聞此法生於驚怖文殊曰法界體性無有驚怖是驚怖者即法界體性於是舍利弗與文殊辨論法界體性有二百比丘聞其所說若無解脫我等出家云何修道便即起去文殊化一比丘與諸比丘論說文殊所演法界各悟無漏各以衣施須菩提阿難復問法界文殊一一說其體性與一切法悉無差別寶上天子亦與辨說法界體性二十七文殊覺了身見之體性是佛出世示現無明有愛體性名佛出世覺了貪嗔癡體性示現顛倒體性覺了諸見示現陰界入等體性皆名佛出世天子一一問文殊一一答顯示一切諸法妙義佛記寶上成佛名寶莊嚴如來波旬至佛所文殊神力魔不能去即攝持令身相似如來坐師子座說法界體性文殊復以神力攝持舍利弗亦如如來身相與波旬辨記法界聞者皆得無生法忍付囑流通此法大乘十法會一卷二十八寶月光王問云何行大乘住大乘以何義名大乘佛言成就十法名行住大乘一信成就信佛法故二行成就戒清淨故三性成就慈悲喜故四樂菩提心廣益有情故五樂法者勤聞正法故六觀正法行了諸法空故七觀法順法順世出世故八除大慢不恃己勝故九了祕密教示現十過故十不修聲聞等地遙趣正覺故一一廣說行相也文殊普門會一卷二十九普花如來令無垢藏手持千葉蓮花上佛文殊請說普入不思議法門佛言欲學此法當修學諸三昧門所謂色根三昧聲香味觸意男女天龍夜叉乾闥阿修緊那迦樓摩睺地獄畜生貪嗔癡善不善等相三昧佛復於一一三昧各說一偈會中聞者皆悟得無生法忍波旬來至愁惱佛為說法即隱出現光明會五卷三十月光童子問如來昔修何業得如是決定光明攝取乃至色相光明佛以偈答謂此光明從布施持戒忍辱精進禪定智慧諸善法中出生種種行薰修所生復云我有光明名無表等偈一一聞其名得其法也火十卷大寶積經三十一佛以偈演昔持戒了眼耳等諸法六十四種善根得是光明月光以偈讚佛亦願行是行得是光佛即微笑人天大衆亦各瞻仰三十二彌勒以偈問佛微笑因緣佛以偈答復以金色手摩月光頂為說偈讚月光次日請佛入城大地震動受供養時空中出聲以偈讚佛三十三佛入城時無量衆生各了眼耳等一切諸法邊際無性性空如實了知成諸法智三十四佛入城中以神通力於虛空中出微妙音說陀羅尼令獲無量法眼佛即入月光宮受食訖為說八十種資糧行法遠離八十種惡法菩薩藏會二十卷三十五開化長者品賢守長者五百人等歲詣佛所值佛入城以偈讚佛欲求解脫佛說世間衆生有十苦事如生等十惱害事如不作饒益等十惡見稠林十污迫十愛纏十毒箭十邪命十不善十污染十纏縛我見是事為衆生故求菩提道復為長者等說其解脫不於眼耳鼻舌身意等諸法中求解脫三十六金毗羅天授記品以上妙供奉佛聞法記為醫王如來復以神力修治靈鷲山路諸聽者悉來唯迦葉在雪山未至佛敕目連去請令先來及目連至迦葉已先至佛所試驗菩薩品舍利弗問成就幾法得身口意業無失身口意業清淨幾法得身口意不動佛云成就一法何謂一法即菩提心也云何相狀答之也三十七如來十不思議品一如來身不思議能隨類故二如來音聲不思議能普遍故三如來智不思議如海故四如來光不思議映奪諸相故五如來戒不思議以淨奇故六如來神通不思議難敵故七如來力不思議不屈伏故八如來無畏不思議能說障道法故九如來大悲不思議以菩提心廣故十如來不共之法不思議不同諸聲聞故然廣說思議行相三十八廣說如來不思議力及十力因緣義也三十九廣說如來不思議無所畏法義四十廣說如來不思議不共法行相妙義帝十卷大寶積經四十一四無量品大蘊如來出現為輪王子多精進行聞說大慈大悲大喜大捨乃如說而行及說布施波羅蜜行四十二尸羅波羅蜜多所持行相四十三尸羅波羅蜜成就善根力四種廣勝處法等行相也四十四尸羅波羅蜜具足清淨發起諸善想等四十五羼提波羅蜜多諸行相法門成就忍辱妙行等義四十六毗梨耶波羅蜜安住大乘發起勇猛也四十七行精進行勇猛無倦成就五種精進妙行四十八精進行中於諸衆生起病者想等也四十九靜慮波羅蜜多滅諸惡法成諸善法五十行靜慮行得無退神通道力定境妙法也鳥十卷大寶積經五十一行般若波羅蜜多為求深妙善清白覺慧等義也五十二行般若行依四依趣諸法行相皆成就故五十三說般若行能成就世出世間一切諸善法如覺道根力等也五十四佛告舍利弗云我昔大蘊如來所聞四無量六度行財法二施等法如說而行不蒙授記又經僧祇劫寶性如來出世我為善慧長者亦如是聞法而行精勤供養親近亦不蒙授記復經僧祇劫放光如來出現我為儒童迷伽學外道法蓮花城中遇放光如來就女人買五花奉佛布髮掩泥佛履我髮授牟尼果記也佛為阿難說胎藏會一卷五十五入母胎藏有多因緣和合與不和合淨不淨隨所作業凡在胎中三十八箇七日而得出生一如生酪二如凝酥三如藥杵四如溫石五形體漸現六現肘膝七生手足相八現二十指九現眼耳等十如浮囊十一身孔通十二生腸胃十三生饑渴想十四生筋十五生諸脈十六諸孔出氣十七眼等明淨十八諸根長十九具三根二十生諸骨二十一生肉二十二生血二十三生皮二十四生皮膚二十五血肉增長二十六生髮毛爪甲二十七各隨善惡業苦相一一覺知二十八生顛倒想二十九現形色三十毛爪增長三十一至三十五人相具足三十六生厭離想三十七生五種惡想三十八出生生後七日身中生八萬戶蟲佛說入胎藏會二卷五十六佛化難陀出家取佛鉢盛飯出門而佛已去遂親將至佛所雖已出家心著世事佛化嶮路歸家不得又令掃地塵不能盡又復閉門閉即還開從小路去遇見如來去樹下藏身佛神力故又藏不得佛攝入香山看瞎獼猴又攝去天宮看天女復攝入地獄看一切苦相乃發心求無上道次為說入胎藏因緣耶五十七佛為難陀廣說入胎不淨諸相次說過去尸棄佛時施財浴佛及僧報得身相端嚴文殊授記會三卷五十八佛持鉢入城放百千光明無量寶花結成花臺化菩薩說偈讚佛功德城中人民皆發道意推過各菩薩問成就幾法得成正覺佛云成就一法所謂勝志樂菩提心聞此法已得道授決至王宮受供阿闍世王問忿嗔煩惱從何生愚癡無智從何滅佛云無生本無滅以本無來去故如來復現光明照十方界各有佛處各有菩薩詣佛請問光明因緣佛一一為說五十九佛敕彌勒嚴座為說往昔志樂所修為舍利弗等衆說菩提行法門聞其法衆佛與授記時雷音菩薩問佛常稱讚文殊久如得菩提記佛敕自問文殊文殊曰我不見有菩提當何可得佛說過去雷音如來所有輪王普覆出家發菩提心授決成佛名普見如來爾時有二十億衆生隨逐普覆王皆發正覺心也六十雷音白文殊仁者具足十地圓滿佛法耶文殊曰我不見一法為佛法如何圓滿我以無礙天眼普見十方佛說種種願如彌陀佛願佛乃說成佛名普見若有聞其名者皆得菩提復說其佛剎報土諸菩薩各說一相法門得無生法忍官十卷大寶積經菩薩見實會十六卷六十一淨飯王敕諸釋種不得見佛優陀夷比丘往現神變各相說偈顯佛功德王即歸依施食奉佛六十二淨飯王嚴駕同諸釋種詣佛禮足乃云此第三次禮佛足也各各聞法得果無量修羅王質多為首請佛供養現大神變化無量供器奏妙音樂授記成佛號曰善名佛也六十三迦葉見阿修羅供佛思念往昔作何善根有是果報佛言昔因陀幢王佛所發心一一佛所一一承事種一一善根行一一精進文殊高威德王佛所而至所說真實無異金翅鳥王衆龍女衆各各作無量妙供奉佛馬勝比丘一一發問如來一一為其授記六十四諸龍王難陀等衆鳩槃茶衆乾闥婆衆亦各陳妙供各說偈讚佛功德佛亦微笑馬勝為問佛為授記六十五夜叉衆緊那羅王衆各供養佛各說偈讚佛佛以妙偈演陀羅尼阿字法門各記將來成佛六十六八萬虛空行天四天王衆三十三大夜摩天等衆各如法供佛說偈稱揚如來亦各與授記佛果六十七兜率天化樂天他化自在天諸梵天等衆亦如是供佛亦如是讚佛馬勝亦如是問如來亦如是授記六十八光音天衆說阿字法門遍淨天等同授佛果記六十九廣果天衆施供說陀羅尼及說所修定境行相無量法門佛即與授記七十淨居天子二百一天子等衆各說一四句偈讚如來殊勝功德如云所愛妻子施并捨所重身乃至王位財我禮檀越者其餘偈各是一法門如淨戒安忍等妙義人十卷大寶積經七十一力生天子與三百天子衆各說一偈四句讚佛功德七十二婆羅闍迦外道八千人見諸天子蒙記聞法生信來詣佛所問我法中父母起貪入胎佛說三緣和合如何佛云貪從父起耶母起耶識起耶然後一一為說受生之相以現今所習驗知從何道中來以習氣故外道各各聞說歡喜佛即記之七十三佛為淨飯王說六界相內地界外地界相水火風空識皆有內外界廣演成住壞空現六界相周遍無體及六入等亦各空無入三解脫門也七十四佛為淨飯王說六界等相差別一一如夢中所見事畢竟無實了此六界六入六識體性本空入三解脫門也七十五佛說夢幻境界無有其實六根無滿無足無來無去夢識死生亦復如是為言過去輪王名無量稱上去天宮帝釋來迎心即起貪天宮住樂便即墜落以證不足心過失也七十六地天上頂生王彌尼王皆為輪王上天宮心意不足樂貪天宮即便墜落佛為淨飯王廣說是事令父王不生放逸不恃豪貴不生貪著不戀世樂於是王與釋種各各聞是法已得法忍住佛記當來各成正覺富樓那會三卷七十七富樓那問佛菩薩云何能集多聞修習多聞佛言猶如大海無有滿足一一為說四法能成就故乃云過去光明佛滅後法欲滅時那羅延比丘摩陀比丘皆樂多聞奉持教法汝亦過去退失菩薩心難障如此為近惡知識故不勤為人說法持佛法故七十八佛為富樓那說具足善根成一切功德須行慈悲喜捨樂聞正法過去樓馱健佛滅後出家比丘唯近白衣貪著利養及與名聞但為出家快活不事王役不慕經法王子出家名尸利比丘從牢固比丘聞法悟解力持正法利樂一切有情遂成法化也七十九佛為目連說昔為菩薩時行大悲一一行門演四法義荒時化獸為食病時化醫療民為大力王行施調達乞臂忍辱仙時調達將尿屎灌頭種種相惱不生一念嗔心授記調達為辟支佛又為地獄衆生代罪化百千類身為利有情成無上道象手比丘聞說難行事毛竪流淚若作如是度盡一切衆生今衆生未盡而取涅槃是義云何佛云汝以何法為衆生耶為陰入等為衆生耶云云護國菩薩會二卷八十喜王菩薩讚佛竟護國問佛修何等法增長功德到究竟處入一切智佛言有四法一真實心二行於平等三心念行空四如說而行一一說四法一一說偈廣偈中說因地百千種類現身受不能受能受事也如飼虎濟鷹等事皇十卷大寶積經八十一佛言我念無量僧祇劫前有佛出世名成利慧時有輪王名焰意王有子名福焰時有淨居天子報言有佛出世當往親近王子聞說問在何處報云不遠王子即詣佛所焰意王亦來佛所說偈讚佛王子請佛入城受供佛為說法出家行頭陀行弘持佛法王即無量壽王子我身是淨居天子阿閦佛是郁伽長者會一卷八十二郁伽同諸長者詣佛所問在家戒德住家地等法佛云行三歸依持五戒十戒行慧施慈於家宅眷屬生厭離想於己身生不淨想於妻生毒蛇等諸想於子生冤家諸想聞是法已各願出家遂問出家利益佛即說出家當處阿蘭若學無為等法又說在家地法郁伽長者願在家永護佛法使流通無盡伏藏會一卷八十三佛為電德菩薩云欲疾得菩提成就五種伏藏大伏藏無盡伏藏遍無盡伏藏無邊伏藏何謂五也佛云貪行伏藏嗔行伏藏癡行伏藏等分行伏藏諸法伏藏佛一一解說引因地修如是法為作證也八十四佛說寶聚如來滅後無垢比丘弘法廣授王被魔惑勝生如來時旃陀羅殺牛聞佛說法捨牛出家皆證如是伏藏也授幻師跋陀羅記會一卷八十五幻術法力無有過者以謂佛不來降自到佛所默念請佛以為妄試佛即受請幻師於不淨處以不淨物作於道場四天王帝釋諸天各來嚴辦妙供幻師已生奇特想佛與大衆入城受供化人問幻師此中施設如何謂言請佛或云佛在王宮或云在里巷乞食或云在天上或云在婆羅門家此乃佛化耳幻師遂發道意如來與記佛果大神變會二卷八十六商主天子白佛常以幾種神變調伏衆生佛云我以三種神變一者說法二者教誡三者神通說法者所謂無礙大智辨等教誡者應作不應作等神通者化無量身自在無礙等天子復有過此者不佛云有殊勝神變即敕文殊為說乃云眼耳鼻舌等一切諸法空悉大神變佛言過去等須彌如來所速疾菩薩文殊師利是淨莊嚴王商主天子是王子大悲念即我身是八十七文殊與商主舍利弗一一問答神變法門佛即記商主天子佛果也摩訶迦葉會二卷八十八迦葉問佛出家住正法中云何學云何行云何修觀佛言當持淨戒具足律儀具正法教遂說出家破戒諸惡律儀彌勒復為演說會中五百比丘聞說便起迦葉云汝等何處去報云若如是說難消信施不如還俗文殊謂曰汝等應速修行云何修行文殊曰汝等應如是觀無一法合無一法散無一法生無一法滅無一法受無一法捨無一法增無一法減如是行法無得無來無去無住無不住於是五百比丘聞如是說皆得無漏智性八十九佛說惡律儀乃云如花如來時輪王子達麼善法出家勤行苦行集出家善法光明如來時大精進菩薩亦復如是行於是行汝等當如是學我常為汝等言乍可吞熱鐵丸不食信心施主食乍可熱鐵纏身不以破戒身著信心施主衣等也優婆離會一卷九十彌勒與諸入菩薩各說護持如來法藏舍利弗見是事已亦以白佛現身護法教化優婆離作念寧可捨身命終不捨戒乃白佛云何聲聞戒云何菩薩戒及一切決定毗尼佛云聲聞戒於菩薩戒名大破戒若菩薩戒於聲聞戒名大破戒等異也佛一一說其戒法行相敕文殊為說決定毗尼文殊曰一切諸法畢竟寂滅心寂滅是決定毗尼等妙義也始十卷大寶積經發勝志樂會二卷九十一彌勒見諸菩薩多生懈怠不修善法將退失菩提心即往勸諭同往佛所佛言汝等過去世時謗說法比丘遂墮地獄經無量劫今當各各發露懺悔諸菩薩衆聞如是說啼泣同聲投誠懺悔九十二佛為說善法一一二十種彌勒復問出家欲令慧力增長云何修習佛云不貪利養不入憒鬧不說世言不著睡眠不營衆務不樂戲論速得無上智慧若也樂著一一法中有二十種過失佛廣說其行相令出家人應遠離利養等諸過失善臂長者會二卷九十三長者來至佛所佛云常當具足六波羅蜜長者問曰云何布施云何持戒云何安忍云何精進佛為長者一一廣說行相九十四佛為長者說禪定智慧一一度中修進法門也善順菩薩會一卷九十五久種善根修菩薩行天帝化身種種罵毀以寶為施又令夫人天女來壞戒體俱不動心即往舍衛國中高聲唱言我收得劫初時金鈴若有貧者我當施與乃告波斯匿王云大王最貧王曰汝言我貧誰當信者答云佛可證明遂與王俱往佛所佛言大王自恃威力自在恣貪嗔癡實是貧者王即發正等覺心也勒授長者會一卷九十七同諸長者至佛所佛云汝等何至此會長者云我等思惟佛世難值人身難得果證菩提又復為難故來至此願承教誨佛言汝等宜發大慈大悲大喜大捨心又當觀身內外中間不淨諸過五百長者聞已各悟法忍優陀延王會一卷九十七王大夫人舍摩於如來僧衆常生恭敬二夫人妬嫉謂王曰大夫人與僧作非法事王怒將箭射舍摩舍摩入慈心三昧射皆不入王驚怖自悔問其所以詣佛懺悔佛說親近女人多種大惡入無間獄王聞佛說歡喜奉行妙慧童女會半卷九十八前妙慧問佛云何得端正得富貴身眷屬不壞佛前化生從一佛土至一佛土修善不障處世無怨所言人信能離法障能離諸魔命終佛現前佛一一答四法妙慧聞佛所說遂與文殊辨論所得所證及不見女人相了不可得恆沙上優婆夷會半卷九十八後佛問汝從何來曰若化汝從何來當云何答佛云化人無有往來亦無生滅曰諸法豈不皆如化耶佛言如是曰若一切法皆如化者何故問我汝從何來佛答無畏德菩薩會一卷九十九居高樓上見諸聲聞默然不起阿闍世王問曰汝豈不知是佛弟子無畏女與父王論難佛十大弟子各來辨論皆不能勝佛即與授記無垢施菩薩應辨會一卷一百波斯匿王女也將出禱祠諸梵志見五百聲聞在門外立謂不吉祥無垢遂與諸梵志論其所以却與諸聲聞及諸菩薩各各談論佛法理趣不能超勝同詣佛所一一發問佛一一答之波斯匿王及諸王子聞法無垢轉女身為男授菩提記諸天龍鬼等衆各伸讚歎歡喜制十卷大寶積經功德寶華菩薩會半卷百一前十方世界頗有現在佛號令此稱念而獲利益佛答東西南北四維上下皆有現在佛一一說其名號令稱誦滅罪也善德天子會半卷百一後佛敕文殊汝為諸天子說諸佛甚深境界文殊曰非眼耳等是佛境界非聲香等是佛境界空無相等是平等境界善德天子請文殊去兜率宮即現神變魔來設難文殊又入三昧從定超直往兜率為諸天子說法皆乃悟得無生忍善住天子會四卷百二文殊入無垢光明三昧光照十方一一方佛所侍者各問其因緣一一佛說其所以一一佛所無量菩薩來如來前入隱身三昧迦葉問佛舍利子須菩提皆入三昧不見分毫住處如來為說此三昧殊勝之功力百三文殊與善住如實論句義及不退轉義即入破魔三昧一切魔王宮殿暗黑魔衆悉皆老瘦愁苦不可言來投誠於佛文殊從三昧起佛乃問云何得此三昧文殊曰我於曼陀羅花如來所得是三昧遂為魔衆說法發菩提心諸來十方菩薩各各現相令衆得見也百四如來文殊天子一一辨論初發心無生法忍超勝轉入一切菩薩行法俱無有實又破聲聞出家相以謂求出家者於法皆有所求非真出家若於一切法無所求亦不求出家不見染衣袈裟等相乃真出家者也百五善住問曰仁者得利智耶文殊曰我不得利智我不得陀羅尼我墮頑鈍位論字句義五百比丘不信是法退墮地獄破凡夫相問修梵行不念作求不思進趣許汝修梵行若能斷一切衆生命根許修梵行所謂當須殺害殺人相殺衆生想殺壽命等想利智慧刀以為殺具更能行十惡行破十善法許汝修梵行何以故可殺者誰何者是頭誰能行殺所謂殺貪瞋癡等若能違背諸佛毀謗法僧是修梵行亦不報恩我無所住真沙門義志若金剛入如幻三昧十方世界佛所現種種相五百菩薩已得四禪定成就五神通自見住昔所作惡業殺害父母等罪彼罪不忘不達法忍佛欲除彼疑心故以神力攝文殊手握利劍直趣世尊欲行逆害佛止云汝住不應作逆勿得害我我為善被害從本已來無有我人但內心見有五百菩薩忽悟一切法如化各各讚佛勝功德文殊忽提劍馳逼如來佛遽告云且住且住說殺罪無可得各獲無生忍踊身虛空說偈讚云文殊大智士深達法源底自手握利劍馳逼如來身如劍佛亦爾一相無有二無相無所生是中云何殺說此執劍妙法門十方佛界震動舍利弗難問逼佛罪報文殊為說如幻如化無受者等一切諸法門義阿闍世王子會半卷百六五百王子同到佛所問佛云何得端正得大力得三昧得神通等一一偈問佛一一偈答會中有無量衆各各聞法乃歡喜也大乘方便會二卷半百六半何等為方便云何行方便佛言菩薩施一摶食皆與有情共回向菩提是為方便說種種方便行尊王菩薩與女人一處坐阿難起謗佛說因地尊王現通作愛等緣皆方便百七阿難迦葉各讚譬喻爾時德增菩薩白佛過去迦葉佛時行菩薩行有樹提梵志云菩提之道實為難得何有禿人能辨斯事此義云何佛說授記在天宮下生入胎周行七步受樂出家苦行等事皆方便耳百八受乳受草登坐跏趺七月降魔說法受罵受謗頭痛背痛求藥水盂女馬麥刺足等因緣皆是佛方便願行示現也賢護長者會二卷百九阿難問佛長者種何善根有如是殊勝富貴果報佛說過去迦葉佛時修因長者乃問佛生時識從何來死時識從何去佛言如風著樹如風送香等一一分別解脫及答真月所問識之相狀一一辨其所以也百十月實童真問云何見色因欲因見因戒取因佛言智見智境愚見愚境種種宣說識心來往大藥王子問無形之識著有形生佛云隨善惡業相以受其質當識往時自見其境如見血見肉等相已著其味便隨所見境去或地獄等一切相者也文十卷大寶積經淨慧童女會半卷百十一以偈問佛如何得端正等佛於一問中答八法一偈凡十餘偈問十答義也彌勒八法會問成就幾法而速得正覺佛云成就八法所謂成就深心行心捨心方便心大慈心大悲心善知方便心般若心佛一一廣說八法行相彌勒所問會半卷百十一末問成就幾法離諸惡道遠惡知識速成佛道佛答以菩提心一法毗摩舍他三摩提二法漸漸增至十法一一解說其義及說因地或為王或為太子捨眼捨身等為求無上菩提也普明菩薩會一卷百十二佛為迦葉說出家四法及三十二法依如是修進是真佛子以形像比丘破諸律儀貪著名聞利養不能修持如來慈悲苦口為說普明白佛我亦願學此法門佛云亦當如是修學是經亦無定相但心悟妙義耳寶梁聚會二卷百十三何謂沙門佛言寂滅故調伏故受教故清淨故入禪定故得智慧故集一切善法故次說破戒沙門無量濁行何謂比丘破煩惱故破人我故破壽者衆生想修戒定慧度三有四流故行一切善法故次說破戒比丘種種惡欲何謂旃陀羅此云殺生人比丘常於冢間求乞死尸無慈悲心至施主家行不善心無量過惡等事何謂營事比丘有二事一者慚愧二者知業復有二事一者能持淨戒二者知有後世又有二事一者得果二者能修八解脫如是比丘可以為衆營事若不爾者增長一切諸惡業無有利益百十四佛說蘭若比丘乞食比丘糞掃衣比丘樹下比丘冢間比丘露處比丘佛一一說無量難行苦行各隨所樂利益有情如是比丘光揚法門能與衆生作寶梁寶聚寶取寶藏無盡慧菩薩會半卷百十五問菩提心何義幾法成菩提佛為十波羅蜜為初發心皆廣大無際次說十十法門方能成就光明天子等衆聞已得陀羅尼門成諸法行等義也文殊說般若會一卷半百十五後此會與大般若曼殊室利分同本異譯前已録略義例可知耳百十六所說般若非初學所知之也寶髻菩薩會二卷百十七東方淨住佛所寶髻持一寶蓋來覆忍界在梵天上說偈至佛所清淨行如來廣無極清淨四意止清淨六神通清淨乃至無量法門一一行相皆悉清淨可見也百十八佛說五根清淨五力七覺支八正道諸行法悉皆清淨乃說因地所修如是法行得成等正覺也勝鬘夫人會一卷百十九波斯匿王女也來詣佛所說偈云如來妙色身世間無與等無比不思議是故恭敬禮等諸偈佛授記為普光如來遂發十誓願聖衆作證夫人又說種種法門佛復為證明皆過去無量佛所修習一切善法因緣遂得如是廣博仙人會一卷百二十同大仙衆來詣佛所問云何施者何為施義何為行施於受施者佛為廣說施義及諸受者報施差別悉要清淨仙人復問云何識住身中有所愛著佛云猶如國王居在城中恐他軍來須得守護此城報盡走向他國又入母胎隨其福業云何見得或從六道諸天來或從六道諸天去及說相狀諸天勝樂果報等事然皆不如佛弟子遂說阿那律天眼憍梵波提禪定諸仙人聞見如是事各發菩提正覺心也右大寶積經一百二十卷則如來四十九會隨宣所說也然會會皆有序分正宗流通其緣起朝代譯主亦各不同如或品題多就會主所問而立或有依法或有從喻或人法雙標恐涉詞繁不欲具論今所録者則涯略而已蓋佛慈應機法門無量也若宗教眼目則文殊法界善住所問二會極談也比丘妙行則律儀迦葉二會深規也出家在家修習則郁伽長者會至詳也此其大要耳在通人自照撿而以驗平生所悟所見所行謂如何也字十一卷三戒經三卷大寶積經律儀會同平等覺經四卷阿彌陀經二卷無量壽經二卷已上三經與大寶積經無量壽會同本乃八卷阿閦佛國經二卷大寶積經不動如來會同本佛土嚴淨經二卷大寶積經文殊授記會同本法鏡經一卷大寶積經郁伽長者會同本法照於心心無不明鏡照於面面無不現喻義雙彰照然可見胞胎經一卷大寶積經胎藏會同大乘十法經一卷大寶積經大乘同會普門品經一卷大寶積經文殊普門會同服十卷郁伽羅越會經一卷大寶積經郁伽長者會同幻士仁賢經一卷大寶積經幻師跋陀羅授記會同本決定毗尼經一卷大寶積經優波離會同本發覺淨心經二卷大寶積經發勝志樂會同優填王經一卷大寶積經優陀延王會同異譯須摩提二經大寶積經妙慧童女會同阿闍世王女經一卷大寶積經無畏德會同本無垢施女經一卷大寶積經無垢施會同本衣十卷文殊境界經二卷大寶積經善德天子會同本如幻三昧經二卷善住意天子經三卷已上二經大寶積經善住天子會同本也太子刷護經一卷太子和休經一卷已上二經大寶積經阿闍世王子會同本裳十一卷慧上經二卷大寶積經方便會同大乘顯識經二卷大寶積經賢護長者會同大乘方等要慧經一卷大寶積經彌勒八法會同彌勒所問經一卷大寶積經彌勒所問會同摩尼寶經一卷摩尼衍經一卷已上二經大寶積經普明菩薩會同師子吼經一卷大寶積經勝鬘夫人會同本毗耶娑問經二卷大寶積經廣博仙人會同本各譯右五帙計五十卷皆出大寶積經以朝代法師隨意翻譯今不録義意但各標指俾見會同貫通前後及總録也三十四紙尾
