body:
  text: 東京法雲禪寺住持傳法佛國禪師帷白集臨深履薄夙與溫清似蘭斯馨如松之盛川流不息淵澄取映容止若思言詞安定篤初誠美慎終宜令榮業所基籍甚無音摩優登仕攝職從政存以甘棠去面益詠樂殊貴賤禮別尊卑上和下離夫唱婦隨已上總八十函阿含部有長有中有增一有雜有別也皆朝代法師各譯所云阿者無也所云含者有也多義具如別解臨十一卷長阿含經一如來為大衆説過去七佛示生出家修道降魔成道轉法輪涅槃此謂大本分説也二遊行分佛説跋祇國人民調順不可代及説七不退法從跋耆國遊行至拘利村等因緣三遊行分中佛或在講堂或在樹下或在婆拘城或在尸羅城或拘尸城隨處為阿難人天衆説法及説涅槃相四遊行分中佛告阿難過去六度吾於此城作輪王故來此涅槃阿難請問諸天諸神王悉來悲惱如來入滅定相也五典尊分如來因中為國大臣名曰典尊化七國王出家及梵志等衆也闍泥沙分此云結勝如來與授記生天也六小緣經分佛説二婆羅門出家衆嫌云最上種姓不合出家也輪王修行分如來因中為為輪王名曰堅固念出家修道而得果也七弊宿經分婆羅門名弊宿説言只有今世無後世果報人多從之迦葉童子為説佛功德及説因果遂即歸依八散陀那經分散陀那居士化俱尼陀梵志五百衆來歸依佛衆集經分舍利弗白言我今集如來所説法要以防諍競九十上經分一成法一修一覺一滅一退一增一難解一生一智一證此十上法具足五百五十法門增一經分自一修法二修法三修法乃至十法也十三聚經分佛告諸比丘一法趣要趣謂毒害心也一法趣善趣謂不以惡心也一法趣涅槃謂念處也乃至增十也大緣方便經分佛為阿難説十二因緣四諦八解也帝釋問經分天帝釋與忉利諸天詣佛所鼓琴讚佛問諸修羅多生冤結自何起也佛云從貪嫉生也十一阿䨲夾經佛入城化伽婆梵志謂善宿比丘先説佛過惡善生經分佛為善生長者説四結業六損財法義也深十一卷長阿含經十二清淨經分尼乾子終弟子分二諍罵不已阿難誘化佛為説修十二分經及諸善法諸禪定觀境阿難云微妙第一清淨也自歡喜經分佛為舍利弗等説禪定三昧大會經分修十二分經及諸善法諸禪定觀境阿難云微妙第一清淨也自難喜經分佛為舍利弗等説禪定三昧大會經分佛在迦濕林中諸天諸神等大集佛説諸神呪語十三阿摩晝經婆羅門令弟子阿薩盡往相佛實有三十二相否至佛所佛為説法復召師同衆俱來見佛十四梵動經善念梵志與弟子衆至佛所為説六反震動阿難白言云何名此經佛云義動法動見動魔動梵動等十五種德經大婆羅門名曰種德詣佛所問成就幾法而得真實言不虛妄佛即答之羅檀頭經佛説過去國祭祀不使牛羊及乎歸依佛法僧十六堅固經長者子堅固白佛當現神變顯上人法佛云我於靜處教弟子不得於婆羅門中現神變也裸形梵志經名曰迦葉來至佛所問曰故壞祭祀法罵苦行人佛為説法出家得道三明經佛説正法破三明婆羅門邪法令得佛法正見正趣也十七沙門果經佛為阿闍王壽命童子説因果法沙門修行便得果報也吒婆樓經佛破梵志説無因論也露迹經來請佛去後忽起要念佛知已去受供為説惡見惡念不可起不成沙門果也十八世説經閻浮洲北單洲佛説縱廣山川天地日月人民花果莊嚴草木等相也輪王出世治化七寶自然現也十九地獄品佛説閻羅王界一切地獄所現衆苦相狀也龍鳥品佛説四種龍王四種金翅鳥各各所報也二十阿須倫品佛説大海水中有阿修羅宮殿無量莊嚴也四天王品皆在世記分佛説須彌山東西南北有四天王宮莊嚴等相也忉利天品佛説須彌頂上有三十三天諸天宮殿莊嚴報境壽命及校量四大洲中所有餓鬼傍生等成陰陽事各各自有相勝法等一切相也二十一三災品佛説水火風三災成壞空劫中相狀也戰鬪品佛説修羅與帝釋諸天戰鬪相也二十二三中劫品佛説刀兵飢荒疾疫小三災緣也世本緣品佛説三災過已天成地成時光音天人命終展轉下生漸次世界成就乃有莊嚴國土人民初生人猶有身光久久生愛染心一切食用之物即漸隱沒漸起鬪諍由是立君立臣等也履十卷中阿含經一善法經七法品佛為比丘説知義知法知時知節知已知衆知人勝如七法也晝度樹經佛説三十三天有樹名晝度有時葉萎葉落葉還生復生綱如鳥喙開如鉢復盡開光所照色所映香所薰我弟子落髮修行得道亦復如是城喻經佛説國王城須得七具足方能守護出家弟子亦復如是也七水喻經佛説常河水或有常在水有沒還出有出還沒次有出水而住有出水而渡或有便渡彼岸喻出家修行不修行也木積喻經佛見大木積火洞燃告弟子云梵志衆著五欲樂自燒如此也二善人往經佛説七種善人所往處涅槃也世間福經佛説世間七種大福報功德也七日經佛説七日現已須彌壞海水竭令人天知無常也七車品佛見國王置七車速到他國告弟子云汝等乘淨戒車速至無上正等覺也漏盡品佛云已知已見而得無漏也何以故以正思惟或不思惟等三業相應品鹽喻經佛説修身修戒修福修慧與不修者喻投一兩鹽於多水少水中或苦或淡俱喫不得也恕破經與目連問答身口意業故名也度經佛説有三度處有云一切皆夙命造有云一切皆因尊祐造有云一切皆因無緣造我往度之羅雲經佛為説象水王戰及鏡喻等也思經佛説身口意三不善及善業宜自思之報也伽藍經佛遊伽藍國人民梵志或毀或讚佛平等化之也伽彌尼經佛為説十善業道報也四師子經婆羅門弟子名師子大臣來詣佛所聞法歡喜也尼乾子經佛破所説本因復説上斷上苦行中斷中苦行等義也波羅牢經佛為説法即生正信也五等心經佛攝等心天衆在錐頭無礙也成就戒經佛告人天云汝等當成就戒定慧也智經佛言舍利子自稱得智梵行已立也師子吼經舍利子遊行人間諸梵志各有相違法佛許懺悔也水喻經佛説身口意淨不淨業喻熱惱所逼遇池水牛迹水若何易解六瞿尼師經因事而還舍利弗告衆云無事比丘當行無事也舍利子化梵志陀然説梵天法也病品舍利子為給孤長者説教也七未曾有法經佛説天壽天色天譽及示生一切未曾有法也侍者經衆議各不同遂命阿難也薄拘羅經諸異學曾為友者來問仁者佛法中出家八十年想念事事修羅經佛説修羅宮八未曾有法故不衰也八拘絺羅經於佛法中得正見入不壞淨心也象迹喻佛云一切畜生迹象最大一切法中四聖諦為上也分別四聖經其義則苦集等也九地動經佛遊金剛國地大震動阿難問佛三因緣也瞻波國經佛遊彼國入定見一比丘行不淨不説解脫也郁伽長者經佛為手長者二人或説四法或説八未曾有法義也十何義經阿難白佛持戒何義佛云不悔義也不思經佛告阿難持戒者不應思念我不悔佛告比丘須得正念正智慚愧持戒恭敬了本際有食非無食涅槃盡智彌醯及比丘等諸經各是一緣看教者自見也薄十卷中阿含經十一佛説三十二大人相及説因中於四大洲作輪王頂生等緣及指抄少牛糞告喻比丘無一法常也婆羅王來迎佛入城佛為説法四緣經義也十二佛至拘薩羅國忽笑云迦葉如來在此説法時有一長者耆陵婆來供養聽法也佛以淨天眼觀衆生作善作惡隨業受報閻羅王遣五天使者來教誠訶責即追入地獄受苦毒也十三佛説烏鳥喻比丘持鉢不守根門不存正念亦復如是也佛説過去為貧人施辟支佛食復説彌勒出現時因緣十四佛在奈林中説過去為大天輪王及為善見王捨王位出家學道行難行忍等行今成等正覺十五佛為比丘説三十喻守護根門如守門閣人守心如泉池也及説為善念輪王出家求道也十六鳩摩羅迦葉往化拘薩羅國王問答因緣十七佛因中為長壽王子名長生父子遇貪王因緣十八長壽王因中願生長壽光明天行八正念不動道清淨因緣也佛遊行至郁伽支羅國為彼人民説法度三族子出家因緣也十九梵天經佛破常無常見請佛受供養佛為説法也復説迦絺那經佛弟子各説迦絺那法為梵行本致覺相應也二十念身經佛説觀身不淨也支離彌梨經佛説四禪定中不聞支離彌梨蟲聲也睡眠經大目連思惟是已即睡也夙十卷中阿含經二十一無刺經禪以聲為刺犯戒刺欲刺嗔刺也真人經佛弟子説真人法不真人法説處經佛為弟子説處及教處眼耳等處四諦因緣教處也二十二穢經佛説四種人或內有穢外無穢或內無穢外有穢或內外有穢或內外無穢也以説求法經佛云汝等當求法莫求餘食也二十三比丘請經請目連説法也知法經佛説所知法而無增也問見經佛告周那云世間諸見生而生計有神有我有人也蓮華喻經佛云人不被惡欲所染如蓮華出水淨梵志經佛為説諸穢諸惡也黑比丘經佛為説不鬪諍及鬪諍損益也住法經佛告大衆云汝等知我説住善法不退不增也二十四大因經佛説大業大苦果必作大因大善大報作大因也十二因緣四念處身受心法也二十五苦陰經佛為諸梵志説現法苦陰從因欲緣欲以欲為本成諸苦相也增上心經佛云汝等欲得增上心常善念應除不善念二十六師子吼經佛為師子吼比丘説四沙門果法念合外道也婆羅經佛弟子實意居士詣彼林中與梵志論議破邪見也願經佛云汝等當願三結俱盡成道也二十七林經佛在勝林園告大衆云若依此林住便得正念正定解脫證沙門果也自觀心經佛云未能觀他心且自觀心也乃説觀法達梵行經佛云法有妙中妙具足清白達梵行也阿奴波經佛在彼國説調達放逸入地獄二十八諸法本經佛云一切諸法以欲為本也優陀羅經佛云汝本不知不覺自稱知自稱覺也蜜丸喻經佛云若人於我法中得味如飢人行山得蜜丸食也曇彌經佛為曇彌説若女人堅信佛法出家捨諸飾好必得四沙門果也二十九柔軟經佛云我昔出家求道苦行從間逸柔軟中來也龍象經佛為鳥陀夷説波斯匿王大象如龍中龍王象中象王人亦如是説處經佛説過現未來三處也無常經説無常苦空無我也請佛夏坐滿十五日説請時梵志悉來也瞻波國經佛在彼國不説法有比丘行不淨也沙門二十一億經佛為説法令得果證也八難經佛説八難八時也貧窮經佛云欲人貧窮為大苦苦等也三十行欲經佛為給孤説十惡欲為貧名利等也婆塞經佛為五百人説法諸善男子各生正信也福田經佛為給孤説有學人無學人二種福田也教曇彌經善男子衆驅出曇彌佛即教之令不生惱也降魔經魔王入目連腹中即入定為説法而降興十卷中阿含經三十一賴吒惒羅經白佛云我為家鎖所鎖不得盡形行淨梵行佛為説法許出家遂得道果也三十二優波離經佛為苦行尼乾子優波離居士三百人説法令捨邪歸正於佛法中出家修道各得羅漢果三十三釋問經帝釋詣佛所問法佛為説往昔因緣也善生經佛為善生説禮六方非同汝法我六法勝妙也三十四求財經佛説過去商人入海採寶漸次到羅剎城為所食喻苦陰也世間經佛説自覺世間知世間斷世間也止息經佛説數息觀法也至邊經佛説比丘乞食不守六根忘失法樂沙門義二邊也喻經佛説不放逸為本如田生物無盡如象迹為大也三十五雨勢經未生怨王令大臣雨勢詣佛所言欲伐跋耆國緣也傷歌羅經佛為此梵志及算數梵志説法各正信出家也瞿點經與阿難論議乃歡喜奉行象迹經佛云一切獸迹象迹為大我法亦然也何苦經佛問諸梵志修何苦行也三十六梵志瞿點經阿難往化論議及與摩竭大臣論如來無與等者也象迹喻經世尊為梵志説象迹勝諸獸迹及四禪定境也聞德經生聞梵志問佛在家出家學道有何義也何苦經梵志問在家何苦何樂出家何苦何樂佛為説之三十七何欲經生聞梵志問云何欲何行何立何依何説耶佛即答之歌邏攝惒二梵志佛為説四種性法三十八梵志鸚鵡摩納須間提聞詣佛所聞法出家各得道果也三十九婆私吒波羅婆須達哆波羅延四梵志詣佛所聞法出家修梵行成道果也四十佛在黃蘆園耆年頭那阿伽那訶羅阿蘭那五梵志同詣佛所聞法各各心開悟解也溫十卷中阿含經四十一摩羅梵志來相佛三十二大人相未見舌相及馬陰藏相復來佛即現之四十二佛説六根十二處十八界分別諸不淨觀也四十三佛在溫泉林有一天來説婆地羅帝偈禪室阿難問二經義四十四佛説摩納提子白犬是汝父即以金狀臥為驗也分別大業經梵志來謂三彌提云如來身口意唯意業真諦四十五心維比丘思惟心誰將世間去誰染污耶佛浮浮彌比丘説法復為四衆説四種受法也四十六佛説四種禪行及四種説經因緣也四十七佛云獵師飼鹿近食不放逸比丘食我法味即隨於我亦復如是佛為五支物主説法曇彌來施上佛金色又為阿難大衆分別多界即十八界四大界四十八佛在馬邑馬林牛角婆羅門林説沙門法復有求解者佛為隨機開悟皆為比丘衆四十九佛云汝等所得智我生已盡梵行已立又為阿夾那説一切知一切見復説七覺支八正道大小空義相也五十佛為烏陀夷破群那二比丘説法及説夙世因緣令修四禪定不得起嗔心也凊十卷中阿含經五十一佛為跋陀和利阿濕貝二比丘説持一食利益或云持得或云持不得也五十二佛為沙彌周那説六不諍也為波離説律儀律業也復説調御象調御馬調御牛調御人此四法也五十三佛為比丘衆説愚癡法畢定輪回六道生死苦報也説智慧法畢定得四聖果至佛正覺菩提五十四阿利吒𠻬帝二比丘生惡見諸比丘嫌佛説法令生正知正見也五十五佛為長者婦説牛兒齋尼乾齋八聖齊此三齋法也復為晡利多居士説布施不得我慢行清淨施成利益也五十六佛在摩羅梵志家集會處説法復為比丘衆説五分下結則戒取等也若比丘不拔心中五結不解心中五縛不能得清淨梵行成沙門果五十七佛為箭毛摩那修二梵志論議除去邪見令於佛法中生正見也五十八法樂比丘為優婆夷毗佉説身法舍利弗為拘絺羅説入定法佛云是如是説依如是行也五十九佛為波斯匿王説一切智法莊嚴王即奉行王以鞞阿提衣止阿難云此衣第一諸比丘咸云王於諸王中無欲第一也六十佛謂梵志云若愛生時便生煩惱憂戚也復為八城居士説慈心俱得無漏也復破諸外道常無見乃告東西南北若知弓知箭可拔也復説四念處四正斷神足法耳似十卷增一阿含經一序品佛云過去佛所受此增一阿含法攝一切法也十念品念佛念法念僧念戒念施念天念休息念安般念身念死此十經也二佛説十念法門若能持者大得名譽果報也三佛説百聖弟子五十比丘尼四十清信士三十清信女阿須倫等十經各行一行隨行稱功也四一子品佛云如有一子一女如何教訓宜守護之護心品持一法行一行布一施當護心如一子一女也五不邏罪品佛云滅欲滅嗔滅貪得果也一入道品佛云專一心入八聖道及諸禪觀也六利養品佛云貪著利養世味五欲名勢榮華皆不能成道也七五戒品佛説持五戒得善果也有無品佛云不斷有無二見同外道也火滅品佛云禪定水澄貪欲火滅也安般品佛為羅云説安般三昧除去煩惱愁也八佛説安般三昧中修正見正知正解正定法門及説因中所修如是義也九慚愧品佛説此二法若知慚愧者知恩報恩得現果也若不知慚愧與畜生無異不別尊卑乃説知慚愧人耳十勸請品佛得道未久思惟所得法甚深微妙恐無信者諸天諸龍十方諸佛十方菩薩悉來勸請隨宜説法乃轉法輪蘭十卷增一阿含經十一善知識品佛云近善知識善法增長也近惡知識惡法增長也會中比丘聞説是已各修禪定觀行復説過去近善知識而得超度近惡知識而墮惡趣莫不驚怪此事十二三寶品佛説歸依佛德法德僧德也三供養品佛説供養三寶果報也會中各各自念過去事三寶功也十三地主品波斯匿王至佛所供養佛説燈光如來出現時為王名目地主供養彼如來太子於彼佛所成道其地主者我身是也十四高幢品佛云帝釋大戰場立高幢令望者自歸汝等瞻望於我一切我慢幢惡見幢自然推折十五高幢品中佛説在石室降惡龍手擎至迦葉遂往受別供因説北單國長粳米及淨愛王説法十六高幢品中佛説三齋八齋法及説因中為長壽王子長生也十七四諦品佛為人天説四諦法也十八四意斷品佛説此法門復為波斯匿王説法十九佛為弟子衆説四禪定平等趣回四聖諦而成道果各悟所修證之行也二十聲聞品佛云汝等五百比丘大聲聞是因緣也阿闍世王來問優婆塞法佛即為廣説其義門斯十卷增一阿含經二十一苦樂品佛云或先樂後苦或前苦後樂或先後俱苦或先後俱樂或身樂心不樂或身不樂心樂或身心俱樂或身心俱不樂也四梵福四不思議四辨四神足四愛起四大河四等心四食等十經二十二須陀品善説諸陰義多睡比丘前身作龍諸弟子各現神力至長者家與須摩提女論議二十三增上品佛化梵志受戒往四佛生處説四事法行四迹復化四梵志説修苦行時有不隨者謂言我錯亂修習等義二十四善聚品佛云我為汝等説善聚法所謂五根復説不善聚法所謂五蓋也復説五功德也地獄相皆緣不善聚法也天人下生出家得道為王除憂患等緣也二十五五王品波斯匿王優陀王惡生王毗沙王優填王同至佛所為説色妙聲妙香妙味細滑此五妙欲境因此沈淪月光長者尸羅婆二長者夙種因緣也二十六等見品舍利弗告衆云令各思惟五陰盛衰各各因此入道末利夫人生流離天華萎歸依佛法僧再獲天報二十七邪聚品佛云有五事知此人在邪聚中一應笑不笑二應喜不喜三應慈不慈四作惡不恥五聞善不著意若笑應笑喜應喜慈應慈恥作惡見善意喜此人為住正見聚中也二十八聽法品佛説聽法功德作浴堂施楊枝功德二惡龍化煙燒閻浮提惱佛目連神變化為大龍復為小龍降之也二十九六重品佛云一身行慈二口行慈三意得利與人俱四戒不缺犯五戒利人六正見聖賢以此可敬可貴目連神足也三十佛令穢行比丘於舍利弗前悔悔謂預起謗毀故佛復為比丘衆説最上第一空法門則觀諸陰空無故也馨十卷增一阿含經三十一力品佛説六凡常力一小兒以啼為力二女人以嗔為力沙門婆羅門以忍為力國王以憍慠為力羅羅漢以精專為力諸佛以大悲為力復説無常想也三十二佛説靈鷲諸山過去各有異其名不同今名佛辟支等於中成道三十三七知義盡度樹木喻長阿含經同也三十四七目品長阿含經同三十五莫畏品佛告摩訶男汝當取命終莫生恐畏必生善處如我昔行苦行也三十六八難品佛云佛出現地獄不見不聞一難也及在畜生中不見不聞二難也餓鬼中不見不聞三難也長壽天不見不聞四難也在邊地不見不聞五難也根不完具不見不聞六難得羅漢果自在遊樂七難也自修證羅漢果八難也此八非梵行所修復説八地獄閻羅王界所現苦狀三十七佛説涅槃相也三十八馬血天子八正品佛説八正道八關齋法義也三十九如來降魔因緣四十九衆生居品佛説人界欲界迦夷天光音遍淨空天識天非想天無所有天修道人離此九居也佛説嚫願九法九惡法孔雀九法女人九繫法上中下三善法瞻病比丘朱利槃特化王子等如十卷增一阿含經四十一馬王品佛説女人過去不受長者女意愛乃説因中為馬王曾免羅剎女或只此是緣也四十二結禁品佛説十事功德承事聖衆降伏惡人不令有惱使立信根倍令增長得盡有漏正法久住及為比丘衆説一切善法也四十三善惡品佛云行十善生善趣行十惡得惡報持十念得至涅槃為王説施破異論等緣四十四十不善品佛説十不善業復為阿難人天衆立禁戒馬宿比丘行不淨行佛説過去佛立戒禁各得聖果也四十五佛説過去佛因緣如長阿含經初分四十六放牛品佛説偈云牧牛不放逸其主獲其福六牛六年中展轉六十牛比丘戒成就於禪得自在六根而寂然六年成六通於此説十一法法法十一也如如色知相知摩刷知覆護瘡知煙起知良田知茂處知所愛知擇道行知食止足知度處知敬奉此十一法例此增一阿含本一法上增至十一法以此曉其説法立題之本意也四十七佛現舌相神變度陀羅梵志一切因緣四十八禮三寶品佛説禮如來有十一法當念十一事專一十一法等因緣也四十九非常品佛説衆生恩愛流轉生死淚多如恆河水汝等常作無常相復説因中為音響輪王悟無常捨位出家修道五十大愛道品聞佛將入滅乃云我今不忍見不如先取滅度乃往白佛遂入禪定而取涅槃也五十一佛弟子衆佛為説劫數長遠不可窮極乃隨宣兩事五法功德松十卷雜阿含經一佛令比丘觀色等無常也二佛令觀色等非是我等相三佛令觀五受陰生滅等相法門四佛為波斯匿王説施處大果報五佛令比丘衆問差摩比丘病也六佛為比丘説有流色集等法七佛説所有所起所繫所著所見等法也八佛令比丘觀眼等無常義九佛令觀眼觸識等苦樂不苦樂等也十佛説無明色受想生滅因緣等法門之十卷雜阿含經十一佛令觀眼識法當自思惟也十二佛説生緣老死憂悲苦惱純大苦聚也十三佛説內六入外六入等法十四佛説苦樂自作不作因起等法十五佛説見法涅槃法根法眼法依漏盡即是也十六佛説四聖諦道迹法門也十七佛説光音等天一切空界義十八佛説出家難善調伏一切法所修十九佛説諸天果報二十佛説四念處一切善法義也盛十卷雜阿含經二十一佛説眼耳等覺修四禪定二十二佛説法諸天各以偈讚答二十三佛持鉢二童子以沙上佛即記為阿育王也二十四佛説四念處所修法義也二十五佛云吾滅後百年此青林下有得道弟子二十六佛説三根五根法義也二十七佛令斷五蓋修七覺四念處法也二十八佛説八正所修法門二十九佛説正見正定斷三法證四果也三十佛説戒相應制戒法一切戒等相也川十卷雜阿含經三十一佛説人間歲數諸天展轉倍增修行莫入也獄三十二佛説有後生死無後生死破外道見無記也三十三佛説馬有捷疾具足非色具足非體具足比丘戒亦有三具足也三十四佛説無始時來轉輪生死不知苦之本際是故勤斷諸欲三十五佛化外道羅步住於佛法中住正見正知也三十六婆耆及諸天子詣佛所各説偈讚佛三十七佛往病比丘所説法令各捨命生天解脫也三十八佛説善生比丘出家非家及難陀著好衣等因緣三十九諸比丘在樹下坐不起正念多生惡想佛往教四十若能受持七種受生天帝釋住處及供養父母緣也流十卷雜阿含經四十一佛為諸釋種説受齋日次第法四十二佛為波斯匿王説人施得大果報力士為喻見意等也四十三佛説了了知所知了所了作苦邊內入處是一邊外入處是二邊也四十四四吒婆夷喪子發狂見佛即服本心遂即出家受三歸戒四十五諸比丘尼禪思魔來惱害不動即自隱沒也四十六佛説帝釋生慈心修羅自退是故佛弟子當修慈心三昧四十七給孤白佛云若有來我舍命終者得生天也四十八諸天子女來詣佛所聞法開悟也四十九諸天子來詣佛所以偈問佛佛復以偈答之聞者解脫五十長者子出家破八支齋鬼來所憢母為説法即得羅漢道果不八卷別譯阿含經一佛為新出家比丘説二十二經法也二佛降魔王阿修羅等十九經因緣法三佛説帝釋修羅波斯匿王等來至佛所問法十八經因緣也四阿闍世王與波斯匿王交戰佛説法解勸十九經因緣也五佛化諸婆羅門或出家或生正信十五經也六佛為阿難諸新出家比丘初具儀範慚愧分別生死等一十因緣也七佛為老伎人及聚落生説法復説因地所修等九經因緣八佛為諸天子諸王子諸弟子隨機説法二十六經因緣也息八卷別譯阿含經九諸天子以偈問佛以偈答優夷給孤等二十一經十佛為犢子梵志説八經因緣也十一優陟長瓜重巢三梵志至佛所論議生信一十三經緣十二諸魔惱比丘比丘尼諸天説偈等二十三經十三佛為耆奢諸天婆羅門摩納伽等説二十八經緣十四佛為諸天女天人及説地獄等説二十七經也十五佛為諸天子諸雪山王七嶽夜叉等説三十一經緣也十六佛為諸比丘説無常苦空無我等法各以偈讚佛二十經因緣右阿含經總五部計二百單三卷也若長阿含二十二卷為四分三十經則佛説緣起相長也中阿含經六十卷分十八品二百二十餘經則佛説緣起相中也增一阿含經五十一卷分五十品四百七十餘經則佛説緣起自一增至十也雜阿含經五十卷則佛應機雜説事不分品次也別譯阿含十六卷多出前部但撮要為別也略辨于此尋樞要者覽斯可見淵八卷佛般泥洹經三卷大般涅槃經三卷般泥涅經二卷已上三經出長阿含第二第四卷初遊行品同本各譯人本欲生經長阿含第十卷大方便品同本羅越六向拜經長阿含第十一卷善生經同阿經長阿含十三卷阿摩盡經同梵網六十二見經長阿含十四卷梵動經同本也寂志果經長阿含十四卷沙門果經同本異譯澄十卷起世經一閻浮洲品佛説千日月所照謂大千界諸山河海國土諸天人民草木香華莊嚴所生諸寶一一説之也究留洲品佛説無量寶樹寶華寶地人民形量殊好飲食美妙十善業所報二輪王出現品佛説出現時七寶自然涌出四兵具足天與寶輪住東西南北一切國王自然賓伏所有臣佐智謀自生其報盡也諸事退失乃無常也三地獄品佛説閻浮大鐵圍山問有大地獄閻羅王為主無量牛頭獄卒鬼將以為眷屬其中有十八大地獄一百二十小獄諸苦相四佛説地獄中衆生受無量苦相太黑繩大灰河大熱沙大阿毗脂呼呼吒吒地獄其中受罪衆生皆夙造惡業招報五龍鳥品佛説海龍王金翅鳥各各所生所報所食也阿修羅品佛説修羅宮殿莊嚴報土亦錯亂修習六四天王品佛説須彌山頂天王宮殿莊嚴威勢殊勝諸天每集善法堂中也七三十三天品佛説帝釋在歡喜園中與諸天集會天女來侍一切快樂果報殊勝超越人間百千萬倍及壽命長遠亦復如是八戰鬪品佛説帝釋與修羅戰得勝以五繫縛將至善法堂修羅忽念我今得同諸天歡娛其五縛即自解也九劫住品佛説刀杖飢餓疾疫三中劫十不善業所悟也住世品佛説世界成住不可量不可算轉成轉壞中間有火水風三大災故此世界能成能壞能住十最勝品佛説風化成世界光音天人下生漸有日月宮殿星辰出現安立諸山三四大洲天人生其中久即愛染遂成惡法起貪起嗔起諍乃立田主名曰輪王乃至頂生王等立十善法始取十卷起世因本經前經同本各譯文有廣略亦與起世經同也映三經大樓炭經六卷此云世也或云起世也長阿含世記經同本中本起經二卷上轉法輪品佛説四諦十二緣也神變品佛度諸弟子也迦葉品佛往火龍窟度迦葉三兄弟也瓶沙王品佛為説法令悟無常也舍利目連品見馬勝來佛所出家也還父王國品佛成道已將大衆歸見淨飯父王也下須達品為佛有金地也本記該容品王夫人名該容奉佛箭射不入也波斯匿王品佛説王子小火小蛇小僧小此四小不可欺也迦葉來學品僧分半座同坐也度奈品佛為説法出家為尼也尼乾問疑品佛為外道説法令於佛法中生正信也馬麥品佛三月食馬麥乃夙緣所報果也容三十卷七知經中阿含第一卷善法經同本鹹水喻經中阿含第一卷水喻經同本守因經中阿含第二卷漏盡經同本四諦經中阿含第七卷分別聖諦經同恆水喻經中阿含第九瞻波國經同本相倚致經一卷緣本致經二經中阿含第十卷本際經同頂生王故事經一卷文陀竭王經二經中阿含十一卷四洲經同本閻羅王五天使者經一卷鐵城泥犁經二經同出中阿含十二卷天使經古來世時經中阿含十三卷説本經同因地也阿那律八念經中阿含十八卷八念經同離睡經中阿含二十二卷穢經同是法非法經中阿含二十一卷真人經同求欲經中阿含二十二卷穢經同本受歲經中阿含二十三卷比丘請經同梵志計水淨經中阿含二十三卷水淨梵志經同也釋摩訶男本經一卷苦陰經一卷苦陰因本經三經中阿含二十五卷苦陰經同本樂想經中阿含二十六卷想經同漏分布經中阿含二十七卷達梵行經阿耨風經中阿含二十七卷阿恕波經同本諸法本經中阿含二十八卷諸法本經也瞿曇彌記異經中阿含二十八卷瞿曇彌經同瞻波比丘經中阿含二十九卷瞻波經同也伏淫經中阿含三十卷行欲經同魔嬈亂經一卷弊魔試目連經二經中阿含三十卷降魔經同止三十二經賴吒惒羅經中阿含二十二卷惒羅經同善生子經中阿含三十三卷善生經同數經中阿含三十五卷算數經同梵志問種尊經中阿含三十七卷阿攝惒經同須達經一卷三歸功德經二經中阿含三十九卷須達哆經同也竹園説學經中阿含四十卷黃蘆園經同梵摩喻經