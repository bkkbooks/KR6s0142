子習醫道昔日醫王妙也罪業地獄經信相菩薩問地獄受罪苦相佛云為臣不忠為子不孝出家破戒一切因造惡二十種相狀所報一一隨問答也得不思之龍王兄弟經一名難頭二名和難起大瞋恚目連神力化大身達須彌復現小身入二龍耳鼻中即自降之長者音悅經佛為説四種福報歡喜以金奉佛并化外道辭十五經禪祕要經三卷上佛令弟子作不淨觀白骨觀亦觀他身不淨白骨觀世界不淨白骨觀地水火風等諸觀法中觀空觀色觀天觀境觀佛三十二相八十種好對治成念佛觀也下觀自身我我所他身我我所觀數息觀毛孔觀微塵觀漸周遍觀所現境觀慈心觀定意等一切觀法也八師經一不殺生二不盜物三不邪淫四不飲酒五不惡口六念老七念病苦八念死是謂佛説八師作如是觀師也琉璃王經佛説王滅釋種皆夙世業報王生陷地獄也貧老翁經佛説夙世為王慳不布施得貧窮報護持戒沙門得長壽報分毫不差也三摩竭經佛説難國王不信佛法為大子聚婦名三摩竭罵難國中一切民如狗畜族外道裸形即來請佛至難國説法化無量人天等衆也瓶沙王五願經一願少年作王二願國有佛三願常到佛所四願常聽佛説經五願開悟無生王既五願如意因化十六國王信佛法也五苦章句經佛説三界五道生死不絶有其五苦一諸天苦二人道苦三畜生苦四餓鬼苦五地獄苦天有三災五衰相餘可知也淨飯王經王將逝時願見如來阿難羅云難陀等佛以神力同至為王説法王即歡喜長逝諸弟子各欲舉棺佛云恐世間有不孝子即自舉越難經佛説越難長者豪富不布施死復生為盲貧乞兒還本家妻兒不識遣出打撲損受其苦毒痛所欲致患經佛説世間人所欲所愛所貪染所聚財物所樂者皆致患害是故觀無常求道阿闍世王五逆經王殺父害母已耆域大臣與王同至佛所聞法已頓悟無生也進學經佛説有二法一靜處點定二博學講議復有二法一財施二法施汝等比丘當勤修習錫杖經經云三世佛共所受持一名智杖二名德杖以此依倚助持成智成德錫者明也杖者輕也易持以明智慧二鈷者迦葉如來所制令繫念二諦也四鈷十二環今日所置令知四諦十二緣也然有持此錫表盡佛所修一切善法也佛説堅意經佛説汝等當慈心正心一心堅意對治世間一切不善法修習出世一切善法也七女經長者有七女端正無比國中人無敢説其不好將至佛所佛云不好所言好者不貪世間色聲香味觸為好此女何好也復説迦葉佛時國王有七女不著歡娛同入尸陀林觀死尸各各説其所以帝釋來詣讚言諸女若有所願我當與之女曰我要無根樹子一株二要無陰陽地一片三要無音響山一座帝釋曰諸物皆有若此三願我即無之迦葉佛以天眼觀見神力攝來會中為天帝言我此會中諸大聲聞尚不曉此也佛言國王女如此汝女何者好也安二經生經五卷一佛説那賴仙人為王説法除淫欲心也淫女夙緣見比丘分衛不如意也和難比丘邪業自活我所野雞淨女墮珠木盂女鱉獼猴五仙人等十一經皆如來因地緣也二舅甥間居舍利弗入滅子命過各言志迦旃延無常長者問事心總持比丘呪吉祥呪已上十經各是一因緣流通也三和難持國王五人蠱狐烏疾病裸形亍腹使弟子過命已上八經四水牛兔王無懼五百幻童毒草鱉喻鱉王毒喻海子負為牛光華梵志毒海喻馬喻比丘尼神變已上十四經各一緣也五梵志君臣鳥王密具雜讚驢馳孔雀仙人撥劫夫婦譬喻已上十經通前五卷中計五十五經皆如來現生過去生所作故謂生經義足經二卷上佛説過去貪王聞説解義優填王須陀利梵志鏡面王老少俱死彌勒難𭟵辭梵因提女異學角飛已上十經因緣下猛觀梵志法觀兜勤蓮華色父子共會維樓勤王已上六經通前兩卷中十六經佛説此經聞甚深妙義悟入義趣故名義足也定十卷正法念處經一十善業道品佛為人天衆説十善業所修習如何用成就果報殊勝二佛令從內心思惟修習此十善業道也三生死品佛告人天衆宜隨順正法觀生死根本無始輪回無有休息四佛令內心思惟生死觀察法行受陰地分思量分別所作業行五佛説生死如是觀察種種形種種色種種心等法也六地獄品佛説惡業無量皆因於心相續流轉汝等比丘隨順觀察業果報法思惟非法善與不善招報地獄無量苦果觀活地獄名不喜處衆生受苦也七佛説知業報果觀合大地獄復有異處名為朱誅殺生偷盜邪行樂行隨入其中受其苦報也八佛告比丘觀叫喚大地獄受苦果報賣酒益水等惡入此獄九佛告比丘苦報受苦苦不可忍皆由心造也十佛告比丘觀大叫喚地獄有異處有金剛喙鳥金剛爪先食罪人足上血流自入其口常令不死受其苦報前身作業相續也篤十卷正法念處經十一佛説燋熱大地獄有異處名終沒其中衆生受苦苦相也十二佛説偷盜業相自見己物被人劫奪閻羅王使以利鐵刀斫割脈脈皆斷斷已復生也十三佛説姦淫邪行犯比丘尼及童子等一切惡業受苦相也十四佛説衆生貪心不捨貪火所燒在地獄受苦無量十五佛説阿鼻大地獄衆生受苦皆是取佛財物僧物等報苦十六餓鬼品佛言餓鬼道嶮惡之業由心貪嫉欺誑於人貪惜積聚衆惡所覆不行布施不持禁戒不作功德墮在其中受苦十七佛告比丘汝等觀諸餓鬼過去所作惡業便受如是惡報更無差別由心觀也十八畜生品佛言五道中畜生種類其數最多行食不同群飛各異隨所作業生彼畜中觀其形色狀貌不可窮極報也十九佛言汝等各以天眼智慧觀察修羅住處一切畜類名數異狀二十佛告比丘汝等知業果報觀修羅地現有畜生所住之處初十卷正法念處經二十一佛説修羅宮畜生所住報形體二十二觀天品佛説四天王報土業果也二十三佛説四天王天一切業果報相二十四佛説四天王以聞慧喜樂殊勝二十五佛説三十三天持戒業果受諸快樂相二十六佛説帝釋為諸天説業果因緣生在此中二十七佛説三十三天雜殿處業因所生等相也二十八佛説三十三天住嶮岸衆生何等業果來此中生受報二十九佛説天界柔軟衆生何業生此天三十佛説天界一切有為法從因緣生誠十卷正法念處經三十一佛説帝釋復示諸天布施果報思心具足福田具足財物具足功德具足等相三十二佛説諸天生邪見論身壞命終墮落地獄三十三佛説帝釋告諸天子以放逸行不如實知不行正法報盡還墮也三十四佛説諸天聽帝釋所説法要各各心得清淨也三十五佛説須法修行以正直心常樂持戒業果清淨生曼陀羅天中三十六佛説夜摩天業果報精進不壞光明勝妙力命自在也三十七佛令聲聞為樂見天人説云佛常為一切天人説法也三十八佛説始生天子在夜大天作思惟云彼天大勝妙樂三十九佛説積負天人何業所生以不殺偷淫三法具足生此天四十佛説夜摩天王訶責已與百千天衆從赤優鉢羅相隨而出向一切山峯而取快樂等相也美十卷正法念處經四十一佛説天王與無量天子天女往一切山樹地處而取快樂四十二佛説天王天衆次第行上彼峯無垢如鏡地處取樂四十三佛説天王若歌若舞喜戲共受勝妙果報四十四佛説不曾布施唯持淨戒得生天中唯有一種功德具足四十五佛説比丘比丘尼有何功德有何等行云何持戒求涅槃行四十六佛説比丘比丘天中可愛境界根和合生四十七佛説天王示其天衆佛塔經文令彼天衆心純熟故示其生死無常也四十八佛説天衆見業果報已於彼佛塔內覓希有法行不放逸行覺生死四十九佛説惡比丘因根境界生死繫縛可愛不可愛等相五十佛説持戒比丘以諂曲心説其過惡説其破戒説其無聞説其行相等因緣慎十卷正法念處經五十一佛説夜摩廣博行天業果生此天五十二佛説若心有念欲下虛空即隨心念而下五十三佛説天宮鳥形銜華耳聽音樂周回而行雄雌相隨五十四佛説鵝王讚彼天衆此最放逸之處能不放逸希有也五十五佛説如樹多根堅牢善住長而深入風不能壞王亦如是五十六佛説常樂衆生作何業果生此天中見盡女説女不起欲想也五十七佛説天王知諸天衆心生厭離復為化現於華葉中遊戲取樂五十八佛説天王云汝今何故不於園林華池寶山山峯遊戲也五十九佛説鵝王以正心念觀諸鵝衆心受快樂獨在一窟思惟念法也六十佛説善時鵝王及説法鳥現前令魔王大臣得調伏故也終十卷正法念處經六十一佛説一切布施尊中聞法最勝能斷一切憍慢根本安樂利益一切人天也六十二佛説孔雀王菩薩為諸天衆説於善法能制放逸也六十三佛説鵝王告諸天衆常宜聽法勿行放逸近善友聞正法也六十四身念處品佛説比丘衆説觀身法也六十五佛説身念處循身循心法門六十六佛説身念處有何等夙住我身中也六十七佛説身念處觀內身循身何等風於身中成壞等相六十八佛説身念處外身觀青水海有何等山海渚耶以天眼見之也六十九佛説觀身外十大山中有何等河池流水華果等相七十佛説身念處觀外身山海四大洲境界諸天妙樂地獄極苦畜生餓鬼水陸沈浮一切種類皆從身口意三業善與不善為本從心所生輪回長劫無有休息宜佛正法在念求出離解脫右正法念處經七十卷十善業道品生死品地獄品餓鬼品四天王天品三十三天夜摩天品身念處品已上計七品其間談天獄報應相狀微細靡不周悉也然皆從十善業道修習差別以成業果若真淨界中本無是事其或正法在念得解脫身則無可無不可宜十卷佛本行集經六十卷一發心供養品佛云我昔為輪王值釋迦佛燃燈明佛等悉皆承事供養也二佛言我昔為輪王見普賢如來月如來等佛次第授記我不得記三佛言我昔供養最上行佛弗沙佛等佛皆不得授記也四決定記品佛言我昔為儒童以五花奉佛布髮掩泥即蒙授記五燃燈如來為我説法令我出家記我住天宮及供無量佛賢劫王種品佛言自地主王為祖至淨飯王計八萬四千王皆輪王位也六上託兜率品佛説為護明時金團天子來選如來生處也七俯降王宮品佛現入胎一切瑞相占夢等相八樹下誕生品如來右脅誕生一切吉祥應瑞殊勝相也九從園還城品佛生已王與群臣同護入城之相也十相師占相品王召阿私陀仙來相説三十二相八十種好當成無上道仙人却問王太子胎中所現瑞相也令十卷佛本行集經十一姨母養育品習學伎首品此二品説如來生育已來一切相十二遊戲觀膽品捔力諍婚品十三捔力諍婚品分餘相常飾納妃品儀相十四空聲勸厭品出逢老人品皆佛夙願力故現是相十五淨飯王夢品見病人品路逢死尸品耶輸夢品悉召相師占夢皆云吉祥十六捨宮出家品現解脫之相十七剃髮深夜品去飾好之相十八車匿還宮品示已離俗之相十九王與釋種觀髮及珠等相二十王願神靈祐助我子觀諸異道品王使還品示苦行相也榮十卷佛本行集經二十一問阿羅羅品學非非想定二十二羅摩子品學不用處定也二十三勸世利品示世間一切相也二十四精進苦行品示同外道相二十五向菩提樹品示成道相也二十六示食乳糜之相成就利益等事二十七魔怖菩薩品示其怕怖之相也二十八婦女妖幼一切魔相二十九示現異形等相皆悉摧滅之相三十菩薩降魔品魔王徒衆悉皆降伏成無上道品如來諸事已辨示現成等正覺之相業十卷佛本行集經三十一昔與魔競品二商奉食品此二品示相三十二梵天勸請品請佛説法相三十三轉法輪品十二行相門也三十四耶輸因緣品夙世所修因三十五善覺長者因緣相分前世所作三十六耶輸夙世同佛所修善業三十七富樓那出家品因緣三十八那羅陀毗耶二出家品及龍王因緣三十九婆羅耶出家品教化兵將品四十迦葉三兄弟品佛往火龍窟化之出家修道也所十卷佛本行集經四十一如來化迦葉火堂之相也四十二迦葉漸次至如來所之相四十三優婆那斯品國王大臣相四十四布施竹園品至象頭山相四十五大迦葉因緣品夙世出家等相四十六迦葉行道見蛇拈金色比丘尼手因緣相四十七舍利弗目連因緣品出家也四十八舍利弗及目連夙世所修及出家得道也四十九五百比丘因緣品皆出家得道果五十説法儀式品佛為人天衆説諸法義各有儀式相也基十卷佛本行集經五十一尸棄本生品出家因地相也五十二優陀夷因緣品歸本生處一切應現相也五十三優陀夷養育之相因緣五十四優波離夙世所修習之相五十五優波離夙世所修習之相五十六羅睺羅難陀二品出家因緣也五十七婆提利迦等出家因緣相五十八婆提利迦等夙世所修習善根五十九婆提利迦等同詣如來所聞法等相六十摩尼婁陀阿難等因緣皆夙世共所修習令出家也右佛本行集經六十卷計六十品隋笈多所譯也其間演如來因中歷事諸佛授記天上下生王宮受樂出家苦行降魔成道轉妙法輪度諸弟子各各夙世緣起然諸經諸論皆有此緣唯此廣談行相詳備故今止標品目以照前後經論中所指也籍三經本事經一一法品佛説一無明一繫縛一劫一污染一心意一善一不善一僧和皆一法所弊所明以成善成惡招果報也二佛説一貪一嗔一癡一惱一忿一恨一嫉一慳一耽一慢一嗜一害等法皆是惡業生死輪回根本除去即成道也三二法品佛説有二法謂心意業果皆由二法造作種種善與不善不成利益四佛説減省睡眠勤念正知內心修靜勤集善法聽説靜慮尋求非聖慚愧等一二法令比丘修習也五佛説財施法施則祠祀法祠祀法言宴安思擇力修習力所緣行相作意行相業壽調伏死不調伏死等皆二法門六三法品佛説無明未斷愛未棄業未息貪欲耽著受用三天三惡比丘三增上三學三圓滿所謂戒定慧也善惡對治七佛説一等子二勝子三劣子一重正法二樂正法三欣正法一親里尋思二利養尋思三妬勝尋思已次一一三法門佛慈悲隨宜興起行經二卷上孫陀羅奢毗跋頭痛骨節痛背痛木槍刺腳此六因緣法下調達擲石婆羅門女謗佛食馬麥佛説此十種緣皆夙世所造定業不逃其報也業報差別經佛為首迦長者説業報各有差別由其善惡業依止隨自業轉或得長命或短命或有病無病或好或醜或有勢力或無勢力或上族或下族或正智或邪智或畜生或餓鬼或地獄或生天或邊地或苦樂煩惱皆由修習善惡業報也甚二十二經大安般守意經二卷上佛説一彈指間人心九百六十轉一日一夕十二億意意有一身心自不知於是大安般守意也安為身般為息守意為道也安為生般為滅意為因緣守為道也安為數般為相守意為止或清淨無為也下佛説出息入息自覺自知知長知短知麁知細知遲知疾以此安般守意修成四禪八定根力覺道一切佛道所修妙法也陰入持經二卷安世高譯也普見菩薩示現為安息國王太子避位為僧傳法來此土然此經與前大安般守意經義意略同但此分別五陰六入十二處行相及有注義等因緣罵意經佛説此意作業皆由不知慚不知愧不知羞恥任意作惡今罵之令習道業不令習淫姪作畜生入地獄若能轉諸惡業成其善業佛道可期分別善惡所起經佛説生死之類善惡所起有五道人能作是業天人畜生餓鬼地獄皆由心造五不善十惡業隨此五處隨業受報無有休息處處經佛説道人行道若貪嗔等念起即當制之制已生善念不得食肉我為不食故得三十二相八十種好一自知令他知二教人無厭三心無所藏四為人説法以此四事行菩薩行成佛也猘狗經佛説過去佛時有猘狗嚙主佛呼之狗即喜也今墮地獄我滅後方出得人身以嚙主故墮地獄佛呼喜故得人身佛言佛法中弟子多有如是從師學戒學定學慧了却不敬師自云我是亦如獅狗嚙主人也分別經佛言人有六惡眼為色欺耳為聲欺鼻為香欺舌為味欺身為細滑欺意為邪念欺由此入於地獄也八關齋經佛説不殺不盜不淫不妄不酒不坐高狀不習歌舞不著香薰文飾衣是為八也阿鳩留經佛説長者阿鳩留出商失道遇樹下人説夙因乃歸家布施信有後世得天福報孝子經佛告比丘人生皆親所生所養宜念報深恩若父母作惡勸不為惡若為善宜進之若不如此非為孝子也禪行法想經佛言彈指間思惟死想念有身皆死是為精進行禪何況多行也不淨想苦想無常想等也懊惱三處經長者子死佛説此子從忉利天死來生今死去生龍中為金翅所食三處皆悲惱也犍陀王經佛説犍陀國王本不信佛法稻主打折牛角牛訴於王王詣佛所問其所以因聞佛法得須陀含果過去曾持一日齋須摩提長者經長者喪子悲惱佛為説生老病死無常苦空生滅法門聞已悟子死生出家功德經佛説自出家受人出家勸人出家所得功德勝布施等一切功德以諸功德中此功德為上也阿含正行經佛説五陰為賊牽人入惡道中乃分別六根十二緣皆無明生死為本根十八泥犁經佛説十八泥犁地獄中罪人受苦壽命劫數相狀皆從十不善業心所造起也法受塵經佛言凡人一法受塵自污迷惑愁憂沒無邊除不得無上道也所為丈夫見女色為貪為污阿難四事經佛告阿難説四事一慈心行二濟貧窮三救苦難説四事求道復廣説其行相也四不如願經佛告純陀長者云一願身常安却病不如願也二願官爵財寶不如願也三願父母妻兒常在不如願也四願天下人任意五欲求樂墮惡道不如願也梵志黑氏經佛説梵志得四禪定具五神通善能説法閻羅王來聽法不覺啼泣梵志云仁者何悲王曰仁者善能説義如此爭奈七日後捨命來生我界志曰我得四禪定王曰亦不能免惡業志曰如何可免王曰可問佛梵志即兩手持梧桐華上佛佛云放下著乃放一手華佛復云放下著乃放一手中華佛復云放下著梵志云我兩手華俱放下更令我放下什麼佛云令汝放下中間底梵志即悟無生法忍免業無三十經阿難七夢經一陂池波起二日月星沒三比丘墮不淨處四豬觸栴檀林五頭戴須彌六大象棄小象七師子死頭上毫毛在地佛即解之今已見是事也阿那鋡經佛説呵雕阿那鋡常行我所説四法一布施二説善法三給足同學四不計同學所用所得福德勝四天王也燈指因緣經佛説長者家生一子指上光出因立名燈指乃説過去所作因緣所招也祇耶經佛為祇耶説淨戒相即志心受持便得道迹也正見經佛為正見比丘説因緣法如一小核種成大樹雖枝葉萬狀不離當時一小核為根本也今世後世識亦如是耳弟子死復生經佛説優婆塞奉戒死經七日復生説見閻王地獄中罪人受苦相狀懈怠耕者經一耕人見佛行過心雖喜不去禮佛乃云田耕未竟種又未下若要見佛須待間暇佛即難值懈怠如此佛説已過六佛不得度者謂此非今世也佛大僧大經佛説長者有二子一名佛大一名僧大佛大在家僧大出家欲姦其婦令賊去山中殺僧大已得羅漢果佛大即生入地獄也五百弟子自説本起經迦葉舍利弗等各説偈明本因所修所種善根五恐怖世經佛誡諸比丘有五法恐怖後世一無戒二有戒破戒三無慧四不求明師五不知因緣此五法可恐畏後世苦果業報罪福報應經佛説觀人意行相將即知來處富貴布施中來端正忍辱中來嗔毒蛇中來佷虎狼中來餘可知佛為年少比丘説正事經佛教誡諸比丘令行正事比丘即禮上座足次第攝受諸宿德一一如佛教指教授年少比丘令各精進道業修持梵行也沙曷比丘功德經佛令往須耶國降毒龍飲酒醉臥樹下佛即笑之諸弟子問既得羅漢果因何醉酒佛説其功德酒不能醉聞者歡喜奉行無垢優婆夷經佛為説掃佛塔地五種功德一自心清淨二為他所愛三天心歡喜四集端正業五命終生天以此五利益也婦人遇辜經佛説一女人與失并二男中路毒蛇咬牛夫救俱死婦將二子走大兒狼食小兒落水過父母家火燒盡夫家賊劫並無歸處狂走見佛心定佛為説夙世所作因緣四天王經佛説每月有十日巡察閻浮若見修十善淨業善簿録之奏帝釋作不善惡簿録也度貧母經佛説貧窮老母迦葉往度施臭米汁即為現神變食已命終生天也十二品生死經一無餘死羅漢果也二度於死不還果也三有餘死往還果也四學度死須陀含也五無欺死八等人也六歡喜死行一心也七數數死惡戒也八悔死凡夫也九橫死獨孤苦也十縛著死畜生也十一燒爛死地獄也十二飢渴死餓鬼也佛如是説耳末羅王經佛説國中有大石當道歷年用工掘不能動人民疲乏佛化為小僧往將指挑去衆問有何等力能除此石佛云我有四力一精進力二忍辱力三布施力四父母力王及國人皆大歡喜摩達國王經佛説王令比丘養馬王出征比丘得果即現神變説其夙緣王即悔過歸依三寶得須陀含果旃陀越國王經佛説王聽外道言將小夫人埋却腹中兒活佛往度為比丘名須陀得道往化父王同至佛所佛説夙因及今報也忠心經佛説邊有大國不聞佛法令目連往現神力國王大臣梵志人民悉生歸敬同至佛所為説五陰十二因緣五無變復經佛説梵志見耕田者兒遭蛇螫死父亦不顧去報其母亦不憶説向其姊亦説譬喻言與其婦喻如宿鳥報其奴亦喻如犢子五人俱了生死梵志詣問佛佛即為説生死本空奉行也時非時經佛為比丘説十二月分四季中時非時令悟光陰達無常理羅云忍辱經佛説羅云持鉢被惡心者打頭流血舍利弗云佛弟子不得起毒心當生慈念羅云報云我以忍辱為寶也辨意長者經長者至佛所問罪福因緣佛一一答之作善善來作惡惡來隨所作業自愛經佛為國王説自愛法門一切人民皆云自愛若行三歸即自愛也若持五戒即自愛也但行一切善法皆自愛也大迦葉本經佛告迦葉云出家與比丘持淨梵行以制心修行為本若不如是不成道業枉受輪回也四自侵經佛言夙夜不學老不止淫得財不施不受佛言是四出心還自侵身愚人不了智者知焉大魚事經佛説小魚不受大魚教悉遭網捕之比丘不受宿德教即墮地獄竟三十經僧護因緣經佛為龍比丘説法五百商人入海請僧護同去至海畔見諸地獄餓鬼受苦報一一問一一答皆是比丘寺舍及為龍王説法鬼子母經佛神力取其兒愛奴來佛所母即至佛為説法起悲心誓不食人世人子也無常經佛説世間有三法是不可愛不可念即自至也所謂老病死也凡夫愚迷不修梵行不能逃也八無暇有暇經佛説地獄餓鬼畜生長壽天邊地盲聾邪見不受後有此八種人雖如來出世説法他無暇修習聖行變是成八有暇修習聖行也新歲經佛説受斯新歲汝等比丘當大衆前各自陳白身口意業所造善與不善發露懺悔罪也九橫經一不應飯飯二不量飯三不習飯四不出生五生熟六不持戒七近惡知識八入里不時九可避不避佛説如是譬喻經佛為勝光説喻昔有人在野被象所逐見一空井傍有樹尋根下井潛身黑白二鼠牙齧樹根井四毒蛇欲螫其人下有毒龍畏其龍蛇恐樹根斷蜂蜜五滴墮口樹搖蜂散下螫斯人野火復來燒樹人喻生曠野喻無明象喻無常井喻生死樹根喻命黑白鼠喻晝夜齧根喻念念滅四蛇喻四大蜜喻五欲蜂喻邪思火喻老病龍喻死王聞佛説悟生死無常老病也禪行三十七品經佛説四念處四正斷四如意五根五力七覺支八正道及分別行相也比丘避女惡名欲自殺經佛説有一比丘在林中與女人習近惡聲遠聞欲自殺身天人化為女人來為説法得羅漢果也比丘聽施經此比丘多著睡眠不習經法不能堅持淨戒佛為説法開悟即得道迹也父母恩難報經佛言假使左肩擔父右肩擔母繞須彌山經百千劫亦不能報父母恩以此知恩重也頞多和多耆經佛説頞多和多經其中布施十種功德愚癡人不知是事不能成人天勝妙事梵摩難國王經王子出家王每供養比丘於中偏其子佛為説平等法子為現神力王即開悟群牛喻經佛説有群牛性調良有一驢入群中學牛作聲稱我是牛群牛踏殺而去喻不持戒比丘入持戒比丘中也無上處經佛言佛無上處法無上處僧無上處汝等須知是處身觀經佛令自一身作觀想境了生死苦也孫陀耶致經佛説此梵志餐果飲水不受人施自謂所行勝沙門行佛為説法即於佛法中悟解正知正見也普達王經佛説王每見沙門道人即頂禮大臣諫王令採一切畜生頭及死頭却令出賣唯人頭無人買王曰不須諫也滅度葬送經佛將滅度阿難問葬送法佛云如飛行皇帝法即轉輪王也及説棺槨造塔等一切儀則事也出家功德經佛説國王子七日當命終為貪五欲須墮地獄令阿難去化出家王子曰更五欲樂六日至七日當詣佛所如期至佛所出家受戒已命終即生天上因緣五福德經一長壽二財食足三端正四名譽遠聞五聰明大智佛言皆所修也天請問經有一天人至佛所以偈問佛佛以十偈答之其義味妙也護淨經佛説衆僧食須得淨如法莫令不淨也河中蟲食不淨皆前世奉衆僧食不淨報也略教誡經佛誡比丘莫起嗔心當行慈忍堅持淨戒不求名聞常行頭陀也盧至長者經佛説長者家中大富慳吝不使因節會時將五錢買少物去冢間自樂帝釋化形如長者相至家中開庫藏與妻兒其樂眷屬大喜長者至家俱不相認相狀一同更無分辨至於親里亦不能識認同詣佛所帝釋復形長者即出家修道五國王經佛説有五國王共相親厚一王正見四王邪見各言其志四王聞一王所説同請佛所聞法各悟妙法也木槵子經佛為國王説將木槵子一百八數手中常輪佛號繁務中利益也療痔病經佛為患一切痔人説祕密神呪檀樹經佛説有人失道遇一大樹依止三月樹神供食將還家乃問樹神此何樹也曰栴檀樹也後國王女病欲得旃樹香合藥其人慕常引使至連根皆伐樹神令殺此人以血塗之此香樹再生也長爪梵志經來至佛所問沙門習何法而能殊勝如此佛云持不殺不盜不淫不酒不妄而得如是也右聲聞小乘契經總二百四十部計六百一十八卷共四十八帙多談緣起事相然如來大慈悲心大切苦口而為有情説身病心病不妨中的故鮮有受持講唱唯經論疏鈔引據而已且此方人機器既大習菩薩大乘者多故於斯聲聞小乘而罕留意傳布不盛也或習多聞者亦可勉懷學十卷摩訶僧祇律四十卷一此云大衆部也佛滅後結集為正律制也舍利弗請佛制戒比丘以防未來衆云未有所犯何故立制佛説過去王王曰名稱大臣名陶利請王作制人民今國中豐樂恐將施逸作過王從其謀佛云爾時王者即我是陶利者舍利弗是非謂今世如此前世亦然於是漸有犯戒一一白佛立制為法也二佛制犯瓦女等皆波羅夷罪犯也三佛説瓶沙王七驅賊出境復來敕令截指復令莫截大臣云已截也王愁惱詣白佛佛告衆云王畏罪無罪也四佛説一比丘病久瞻侍比丘厭之欲去病者云汝可殺我即殺之白佛由此制戒比丘不可斷人命制比丘看病宜生護養心等緣也五佛制比丘持鉢不攝諸根見女人起欲想不止成病遂説五事法一恐著有為二恐著俗論三恐著睡眠四看病僧五令年少比丘見佛也六佛制迦羅比丘為作媒娉佛因制一切戒等也七六群比丘起無根謗以風吹尼衣落比丘膝上便為實罪佛因制戒不得妄也八長老難陀優波難陀遊聚落得衣物以車載歸佛因制比丘不得多求利也九優陀夷令大愛道尼浣衣佛因制戒比丘不得使淨行尼浣衣恐妨行道皆浣衣緣也十佛制比丘衆不得畜用金銀等寶國王大臣婆羅門人民聞之皆大歡喜優十卷摩訶僧祇律十一外道來見比丘房向大乃作念云沙門有如是樂乃投出家及令供給乃云我不能婢作脫僧衣而去佛因制戒十二尸利耶婆起妄語罪佛制比丘不得妄語戒十三迦盧比丘在三昧定中淫女被賊逃來將下定中不知不覺天曉既出人見成謗佛因制戒比丘等緣十四比丘衆赴檀那家坐有問坐高下有戲言佛因制戒比丘衆也十五六群比丘入諸房宿不守威儀諸比丘各自去不共一處佛因制戒顯六群比丘一切過惡也十六比丘過檀越家一食處住多且佛因制戒比丘不得過食緣十七比丘非時乞食人所識之佛因制戒比丘一食緣也十八佛制梵行比丘不得與惡事非法比丘同法食也十九兄弟比丘同入聚落乃云我若作威儀非法汝為覆藏佛因制戒不得如是也二十摩訶男施僧藥六群比丘前去索未曾有藥故惱之佛制不得起意惱施主也登十卷摩訶僧祇律二十一六群比丘謗陀驃比丘佛呼來問實爾不乃立戒比丘不得遞相毀謗也二十二六群比丘在長者家交腳坐人見譏嫌佛因立戒禁之二十三如來成道五年比丘悉清淨具足善來具足十衆具足處處度人隨事立木叉戒二十四比丘私度王臣出家官中治罪頻婆羅王見放奪治罪官祿許度僧佛因制不聽不得度也二十五吒利比丘謗契經説障道法佛因制比丘未解深義不得起謗心也二十六比丘作本罪覆藏罪佛因比丘戒宜陳露悔過也二十七瞻波比丘諍訟相言不和合住佛令優波離羯磨而立制戒也二十八睒彌國王夫人以五百白㲲上佛佛令阿難散與僧衆因制受長衣也二十九比丘將衣鉢聚坐俟師來至佛因制令捨離依止也三十畢陵伽婆蹉比丘日日度恆河水去持鉢每至呼河神住流過後呼首陀羅流河神苦之即往投佛佛呼問實爾因集衆立戒比丘呼名亦須善巧方便梵云首陀羅此云婢也仕十卷摩訶僧祇律三十一比丘內宿內煮厨下惡水流出人見生嫌曰比丘住處有如是惡水佛因立制置內淨厨三十二六群比丘同食人賤曰沙門淫逸食佛呼來問因立戒比丘不得共食三十三七百集法藏者佛滅後比丘哀聲云世尊在日前食後食衣服具足佛滅後我等如孤兒耶舍呼來問因依法立戒三十四威儀七十事初上座法第一乃布薩也佛在舍衛作制三十五比丘著多羅履在坐禪比丘前行心不得定佛因立戒制三十六佛許信心比丘尼聞比丘四重墮罪戒等法大愛道啓情也三十七佛制不聽於漏心男子邊取衣鉢飲食湯藥等緣三十八父母在佛法中出家兒在外道中盛寒至母處裸形母脫新鬱多羅與之即被入酒店人見云此邪見噉酒糟驢佛因立戒制三十九有比丘尼曾因嫁歷苦事出家有黠慧大愛道問已嫁女出家得受具足戒不佛因説戒制之四十比丘尼安居僧將竟即出遊行因白佛佛因立戒已次廣有因緣攝十卷十誦律六十卷一梵云薩婆多此云十誦也以初誦二誦乃至十也須那提比丘出家母引令續種佛因制戒説十事利益一攝取僧故二令僧歡喜故三令樂住故四降伏破戒故五慚者得安故六不信令信故七已信增長故八斷現世有漏故九斷未來有漏故十令梵行得久住世故以此十事餘義可知也二佛制比丘修不淨觀必獲大果大利各各依佛所訓三迦留陀有別房安好將褥佛因制戒四比丘闡那多與國王大臣相識倚以伐樹造房外道起謗佛因立戒制之也五六群比丘多畜衣物一切處著畏衣取換佛因立戒制伏之六蓮花色比丘尼林中禪定遇賊恭敬得好衣六群比丘乞佛立戒制七佛在毗舍國彼土少綿比丘多乞衣乞綿乞絲務多佛因戒制八比丘同一估客行見好瓦鉢心起貪著買與之佛因戒制九佛在南天竺有大論師以銅鍱鍱腹上然火入法會中比丘問故云我智慧多恐裂破腹火即照暗也比丘云日照天下汝何言暗也佛言人無智慧謂之暗也因立戒比丘衆不得自炫宜晦默也十佛在維耶國遇荒年乞食難得制令比丘衆各自散乞或還鄉里或入聚落職十卷十誦律十一因二客比丘暮來與一床一房一草敷去不拈起蟲入食之長者入寺施食見之佛因戒制之十二六群比丘與比丘尼同船調笑作不淨業佛因立戒之十三比丘相引至施主家乞食無厭長者生惱佛因集僧立戒十四闡那比丘用有蟲水諸比丘言答云我用水不用蟲佛因立戒十五難陀引弟子入聚落乞食不與食為謗兄故佛因立戒之十六瓶沙王以浴池容比丘洗浴數數往不止妨王洗浴佛因立戒十七六群比丘嗔罵施藥人佛因立戒比丘不得惱人也十八波斯匿王日日至佛所聽法見一人不起王便生嗔佛云吾不為二心人説法十九華色比丘尼乞食分與衆比丘尼飢倒佛因立戒宜各知量二十六群比丘每隨波斯匿王或前或後為王説法言色無常受想行識無常見佛常如是説佛因集衆立戒比丘不得如是從十卷十誦律二十一佛在王舍城未聽比丘作和尚阿闍梨以袈裟未有制衣未有法未有看病者乃漸次立戒二十二佛制布薩羯磨等戒令比丘衆依而誦習也二十三佛制比丘安居自恣戒法令獨處一床不相問訊省緣修道二十四佛制比丘不得踐生草恐奪蟲命各行頭陀法二十五長者子入海遇鬼曾受迦旃延教佛法不能為害也二十六比丘瘦少色力以病故佛因立制醫藥法利益病者二十七佛身冷濕阿難知已往白與耆婆耆婆乃云佛身尊貴不進麁藥二十八佛制比丘安居受衣宜如法受立戒二十九比丘受迦絺那衣有故衣新衣而得受不佛因集衆立戒三十佛在迦彌國有一比丘知犯悔過所作罪衆比丘憐憫故白佛集僧衆令於衆前陳露懺悔重為羯磨也政十卷十誦律三十一那般茶盧伽二比丘喜鬪諍相言共諸比丘鬪諍已各執其事相助者取勝佛因集衆立戒三十二比丘出精犯僧伽婆尸沙罪不覆藏佛令為羯磨也三十三六群比丘犯罪同相似同未淨同未脫同未起同出果佛因立戒三十四諸比丘互相輕慢無恭敬行以是因緣佛呼來立制為戒三十五佛會中四衆各各惡言相諍佛即集衆為立制戒三十六調達於佛法中生敬信心清淨乘善象出家作比丘三十七調達非法説法法説非法非善説善非犯説犯佛因集衆立戒也三十八菩伽王子請佛入新造鳩摩羅堂求大利益三十九佛為比丘説五陰法有大牛來觸鉢多有心亂佛云魔來也各宜覺知也四十婆羅門女妙光及比丘患癰有八法因緣佛為一一立禁戒制之存十卷十誦律四十一有比丘不失男相而得女根有比丘尼不失女相而得男根佛令滅擯復因迦沙比丘尼立戒也四十二比丘尼於男女起欲心男子亦如是不已成病佛因為立戒之四十三須那比丘尼度賊女出家國王大臣不聽佛因立戒制之四十四比丘尼行乞欲為多人造房舍飢年自活佛因立戒四十五波斯匿王出軍遇比丘尼剝脫衣服王不為理佛制猥處宜避四十六助調達比丘尼常出入長者家長者婦云度我出家尼云與我衣即度報云客作度耶四十七比丘尼死衆比丘尼立塔有比丘至云凡大不當造塔即壞其塔佛因立戒之四十八優波離云若男作女相女衣女作男相男衣得戒不佛立戒不許也四十九佛説無根謗妄語邪見此三決定入地獄佛為立戒制五十佛云不群黨不惱不亂讀誦修多羅説戒此五事增長人天衆以十卷十誦律五十一意説佛過法過僧過戒過作非律儀此五事法已下皆五事法也佛皆立戒也五十二優波離問一一處行淫罪佛一一立戒制五十三優波離問有犯淫犯盜二不定罪佛説犯過立戒也五十四一和尚二衆僧三求受戒人四羯磨佛立此白四法戒也五十五優波離問若有比丘出精是罪不覆藏佛答立戒五十六佛為比丘説十種明具足戒自然無師得道自誓五十七佛戒若僧唱時打犍稚時須疾到坐坐已依次第坐不得失威儀也五十八比丘衆相言作賊去來有至中途悔心佛因立戒五十九父子為比丘宿空處虎來咬父比丘死子疑來白佛佛因立戒六十佛滅時有婆羅門梵志手執白華迦葉問云何處將來報云如來拘尸城外入滅我從彼將來迦葉聞已愁惱無量也甘十卷一切有部毗奈耶五十卷一梵云毗奈耶此云調伏也如來成道十二年弟子未有過失略説解脫戒如偈云一切惡莫作一切善應修遍調於息是名諸佛教自後年漸深比丘作一切有犯戒律罪也佛即集衆因所犯立戒制不淨行學處第一分中二不淨行學處難陀孫陀羅出家及未出家淫女賢首緣三不與取學處不與取而取比丘於戒中犯盜罪佛立戒也四比丘乞得佛法僧物過官務不稅悔心白佛因立戒五比丘有大小鉢佛因立戒不許六斷人命學處二比丘素相親厚一病一侍久之生惱取毒藥自害佛立戒七佛制比丘不得於病人前説無常令他樂死八作溫堂諸比丘共牽木落打匠人頭至死佛遂立戒也九妄説自得上人法學處因大綱取摩竭大魚佛云我説大教綱撈托大心衆生等一切因緣也十如來為説大教綱令比丘衆起種種想苦想樂想無常等想也棠十卷一切有部毗奈耶十一泄精學處塢陀夷聚落不護諸根不存正念歸至房中欲心不止執生支出精立戒也觸女學處鄙惡語學處索供養學處此四戒十二媒嫁學處造大房小房學處此三戒法十三無根謗學處壯力主太子出家名實力等緣十四謗實力比丘為不淨行及假根謗各有緣十五破僧違諫學處隨順破僧違諫學處汗家學處汗家法行惡行佛一一立戒制之也十六惡性違諫學處有長衣不分別學處各因事立戒十七離三衣學處一月衣受處使非親尼浣故衣學處佛各為立戒制之十八使非親尼浣故衣學處戒十九從非親尼取衣學處從非親居士乞食乞衣學處戒二十過量乞衣學處知俗人共許與衣就乞學處別許與衣就乞學處過量索衣學處已上佛各因其緣立戒此標指思而可見去十卷一切有部毗奈耶二十一用純黑羊毛作敷具過分作敷具作滅六年敷具作新敷具不為壞色自擔負羊毛使非親尼治羊毛捉金銀等學處各立戒制二十二出納求利敗買得長鉢過十日分別乞鉢自乞縷使非親族織師織作衣等學處戒法二十三勸織師奪衣急難施衣等學處戒法二十四預前求過後用雨浴衣回衆物入已服過七日藥等學處謂七日內自作守持不得食七日後食二十五故妄語學處佛因立妄言戒也二十六毀訾語離間語法舉獨與女人説法過也五六語與未圓具人同句讀誦等學處戒二十七向未圓具人説麁罪實得上人法向未圓具人説謗四衆利物輕呵戒壞生種等學處戒法制也二十八嫌毀輕賤違惱言教二學處戒法二十九不舉敷具不舉草敷具強牽比丘出僧房強惱他人等學處戒制之三十故放身坐臥脫腳床用蟲水造大寺過限不差教比丘尼等學處而十卷一切有部毗奈耶三十一佛告比丘宿德者次第往教比丘尼三十二衆不差輒往教授比丘尼至暮謗他為飲食故教授比丘尼與非親比丘尼衣等學處戒三十三與非親比丘尼作衣與比丘尼同道行與比丘尼同船與比丘尼屏處坐知比丘尼讚歎得飲食等學處三十四展轉食學處如來常觀六道三十五施一食過受過三鉢受食等學處三十六足食勸他足食別衆食非時食食曾觸食不受食等學處戒也三十七索美食受用蟲水知有食強坐知有食家強立與無衣外道男女食觀軍軍中過二宿據亂軍丘打比丘等學處戒也三十八擬手向比丘覆藏他罪共至俗家不與食觸火與欲已更遮等義也三十九與未圓具人同宿過二夜不捨惡見違諫隨捨置人攝授惡見不捨求著不壞色衣等學處戒四十捉寶非時洗浴殺傍生故惱比丘以指擊歷水中戲女人同室宿等戒制益十卷一切有部毗奈耶四十一恐怖比丘藏比丘衣鉢受他寄衣不問主以衆教罪清淨比丘與女人同道行與賊同行與減年者受近圓壞生地過四月索食遮無教等學處戒四十二不與欲默然起去不恭敬飲酒非時入聚落不囑比丘等學處戒法四十三食前食後行詣餘家不囑比丘等學處四十四入王宮門學處戒法四十五入王宮三長者緣四十六入王宮門勝音王緣四十七入王宮門大將士因緣也四十八入王宮門馬王等緣四十九詐言不知作針筒作過量床用草木綿貯床過量作尼師壇那作覆瘡衣作雨浴衣同佛衣量作衣從非親尼授食尼指授食等學處一切戒制法等也五十學家授食阿蘭若住處外受食已上計五十卷其間成法佛欲令比丘比丘尼依如是學戒出家細行乃戒律中微妙也詠十卷苾芻尼毗奈耶二十卷一不淨行學處迦葉夫婦出家也二迦葉出家餘分三不與取學處戒四斷人命妄説自得上人法戒制五摩觸八事成犯覆藏他罪被舉人媒嫁無根謗假根謗共染心男子交易等學處六自言無過無過獨向俗家宿獨在道行獨渡河度他婦女索亡人物輒作解舉不捨惡見等學處戒法七污家惡性違諫等學處戒法也八一月衣與非親比丘浣故衣等學處戒九從非親比丘取衣等戒也十捉寶出納求利敗賣乞鉢自乞縷使非親織師織衣等戒也樂十卷苾芻尼毗奈耶十一不著五衣非時捨衣等戒十二毀訾語離間語發學等學處一切戒制也十三壞生種嫌毀輕賤等戒法十四別衆食非時食等一切戒法也十五與欲更遮與未圓具人同宿二夜也十六與賊同行壞生地過四月索食戒也十七敢蒜剃隱處毛等戒十八知尼先在白衣家後令他去等戒法十九經宿與欲求故授無比丘作長淨等戒也二十以胡麻澤揩身先未容許輒問著俗人莊嚴具等戒法佛慈悲為物未見有行者也殊十卷根本雜事四十卷一佛制比丘洗浴用甎揩石白土等緣二火生長者緣乃外道藥下胎等一切行相戒法制三未生怨王入長者家取財寶四友地比丘教長者賢善謗實力比丘佛説夙世怨也五佛制割截㲲褥等戒六佛制洗足濯足盆熱須扇等戒制也七年少比丘白老比丘不須多畜衣鉢佛制三衣外戒法也八勝光王信佛惡生王誅滅釋種等緣九惡生王入城不得來白母求謀等緣也十魔女來撓坐禪入定比丘佛因立一切戒禁因緣也貴十卷根本雜事十一難陀出家因緣十二佛為難陀説胎分苦相或男或女皆受辛酸楚毒也十三佛制三衣衣袈河邊造寺拭身拭面巾等戒十四長者不入寺掃地佛起世俗心帝釋將來若起出世心古地聖人亦不知也思之十五龍母令龍子聽法比丘以繩繫項樣出為不辨本形故也十六佛制牆柵尼具著打光衣乞食平分洗淨等戒十七荒年比丘偷豬去林中殺食尋見蹤佛因立戒也十八長者子出家身亡棄路見者生惱佛因制戒供養如法焚化十九佛為五比丘説四諦法令如理作意修習二十佛制不得用象馬師子虎狼五獸皮筋六群比丘却用犯戒佛呼來立戒賤十卷根本雜事二十一猛光王睡不得求醫治佛為説戒二十二猛光王與商人婦通有子名福兒佛説緣二十三牛護太子治國因緣乃光王子二十四大臣增養每因事諫猛光王作非事因緣二十五佛為大衆去婆羅門長者家受供也二十六佛弟子與外道魔王捔其神力變現無量二十七如來現大神力降伏外道國王大臣人民皆大歡喜也二十八大藥大臣往他國求親緣二十九如來攝授一切人出家為弟子不令畜工巧之物戒也三十佛制比丘尼於大比丘生八敬法各宜遵行令正法住世故禮十卷根本雜事三十一佛制比丘尼不得在比丘前行乞食見起敬心戒也三十二佛制比丘尼不住蘭若不居城外寺不得門外望不得窗中視也三十三佛制尼不得於寺外求懺悔獨自不得剃髮一切人不得賃尼寺屋住佛戒之三十四佛制尼不得共女人浴不得於逆流浴鉢底須安替不得畜琉璃鉢戒三十五摩納婆外道來觀如來相好等緣也三十六佛往吒難國為國王大臣人民説法令不放逸修習佛法也三十七佛告難陀人八等云汝等今日已去當依經教不依人也三十八佛至拘尸城外度外道出家等緣也三十九國王大臣共諍如來舍利等緣四十大迦攝波共塢波離與五百七百阿羅漢結集如來三藏聖教等別十卷一切有部尼陀那五卷一優波離近圓人分亡人物圓壇戶鉤菩薩像等佛為説之成戒也二門不割截衣得守持不佛因制不得著往俗舍外道處也三佛制受學人難人不得受羯磨戒也四佛制許比丘畜煙筒針筒等物除不許五摩竭國王憍薩國王皆聞佛説法得慈忍力目得迦六小比丘呵嘖大比丘生嗔為毒蛇佛往化之生天也七六群比丘乞狗肉馬頭尾獼猴煮喫佛呼來立戒為制八梵志詐請佛置火坑緣也九佛許為國王大臣有清淨心者説戒法令於佛法中生尊重心十佛制舊住比丘相識接遠來比丘前後多失衣鉢故立戒許度七歲者為驅烏沙彌外道問何因無對佛制許比丘學星曆防外道所問也尊十卷五分律三十卷一梵云彌沙塞此云五分乃戒法分為五分説故也初分波羅夷法食馬麥等緣皆夙所招定業報也二佛制比丘作不淨觀莫使三尸嬰加頸膿血逼身蟲流滿體也三蘭陀比丘造房伐木一切樹神人民不喜謂沙門無慈悲心佛因立戒法四佛制比丘不得與女人屏處坐唯畜三衣不許餘畜等戒也五跋難陀比丘於施主家巧便乞餘衣鉢佛因集衆立戒制之六沙蘭比丘聽明才智勝人自知其非恥為隨負佛因立戒制七般陀比丘為教授比丘尼衆令知八敬法於勝法中增長義利八佛制比丘乞非時食無有利益立戒令不被嫌譏也九六群比丘數數犯戒諸比丘衆同來白佛佛即呼來問實因立戒禁止也十比丘尼乞得食比丘隨後就乞日日空鉢而還以至三日不得食遂飢倒地佛因立戒比丘不許如是卑十卷五分律十一第二分尼律波羅夷法優波離問比丘同戒同學不捨行淫比丘尼亦然及不與取等得同住不佛戒不得同十二佛制三衣外捨衣等戒法十三比丘尼不依比丘衆安居應度不應度與受戒不與受戒佛説之十四比丘尼持蓋白衣家又如淫女行詣大衆所佛因立戒法十五第三受戒法佛説過去鬱摩王擯四太子出國也十六如來宿火龍窟降火龍也十七舍利弗與外道論議七日為期國王大臣人民皆集作證結舌而退也十八布薩法八日十四日十五日共集和合一處十九佛制比丘安居春夏恐踏生草蟲蟻等也二十耆域乳母云我子身相如此但恨未見佛問佛法耳耆域聞云教我如此即詣見佛觀佛相好於佛法中即生正信正見也上十卷五分律二十一琉璃王殺釋種有逃得者以被剝脫來詣比丘所乞衣白佛與之因為説戒二十二佛許比丘病時食藥蘚油蜜石蜜等戒也二十三第四分滅諍法比丘比丘尼各有諍訟各有助伴佛立戒二十四比丘犯戒負人信施佛制須羯磨懺二十五第五分破僧法調達作念云我今破沙門大僧謂我能者我得大名佛因立戒二十六比丘與白衣共器食佛因制戒也二十七佛制比丘四威儀法不得好淨大過不得裸形上廁立戒二十八有邪見人在會佛不説戒法令舍利弗觀察驅出也二十九阿難白佛令瞿曇彌五百釋種女出家佛許與説戒法也三十佛滅後迦葉五百聖衆共結集教法和十卷四分律六十卷一梵云曇無德此云四分也此中戒法分為四分説也初分偈云稽首禮諸佛及法比丘僧今演毗尼法令正法久住後分偈云如來立禁戒半月半月説已説戒利益稽首禮諸佛其如舍利弗請佛立戒與前部中同二比丘衆從定覺起厭患身命愁憂不樂作死蛇死狗死人等想三迦留陀比丘尼引諸婦人入房中出麁惡諸説淫欲法佛因立戒四慈地比丘謗婆羅摩子佛制不得無根謗梵行人立戒制也五佛呵提婆達比丘破和合僧罪漸止即集僧衆羯磨六佛制比丘受畜衣物當須如儀不得違犯成戒制也七跋陀羅比丘為長者説法即索身上衣佛即集衆立戒令如法行八六群比丘純新白羊毛作臥具長者見云道修正法如此佛呼來立戒也九六群比丘畜衣鉢多長者入房見云貧之如此佛制一鉢也十佛觀比丘衆有冷病有惡瘡者乃許服食五種藥物因立戒也下十卷四分律十一釋子象力論議不勝便違前語數數如此成其妄語外道譏笑佛立戒制十二比丘伐木造房佛呼呵云汝所為非法非沙門行非威儀立戒制也十三比丘尼聽難陀説法歸晚入城不得宿城壕中佛因立戒十四調達使人害佛教阿闍世王殺父自作新王新佛也十五比丘行頭陀法乞食見供養亡人食亦食遭嫌佛立禁戒十六比丘宿軍中觀見戰鬪非沙門立戒十七十七群比丘問六群比丘修四禪定報云已犯戒也故相疑惱佛立戒也十八比丘衆問闡陀比丘持律行報云我不持此戒可問餘智慧立戒十九難陀比丘非時入村佛集衆立戒也二十六群比丘剕行入白衣舍婆羅門居士長者譏云沙門作如是威儀稱為學正法佛呼來立戒制也睦十卷四分律二十一六群比丘同大比丘赴施主食乃頰食居士云沙門食如獼猴佛立戒不鼓口也二十二佛告衆云我今為比丘尼説十事法令得勝法二十三佛戒比丘尼不得受染心人食兩無利益俱墮地獄也二十四比丘尼至一家乞食索油又須酥食立戒二十五第二分佛制比丘尼新衣當壞色青黑木蘭二十六師教取衣鉢聽不審謂師令偷衣鉢佛因集衆立戒也二十七施主欲施衣施食比丘尼告衆云只可施食佛呼來立戒也二十八比丘尼往比丘所求戒當須威儀具足專心誠意二十九比丘尼不往比丘所受戒法及教授佛制戒令精進修行三十六群比丘尼衆共在道而行長者居士見譏云稱我行正法如淫女行如賊女行立戒夫十卷四分律三十一如來上祖輪王相承繼統天下三十二諸梵天來詣佛所請佛説法也三十三梵天夜來供佛光明迦葉見來請佛三十四新受戒比丘威儀未具不識細行舉止乞食皆不如法立戒也三十五有黃門人來出家却與放牛羊人行不淨佛因立戒也三十六佛云説戒曰比丘當集一處和合住以聽教誡也三十七第三分六群比丘於一切時遊行人間佛呼來立戒三十八佛制自恣日有異處比丘來應往説戒處掃灑等因緣也三十九億耳長者謂在家難修梵行志求出家迦旃延與度未久得果也四十瓶沙王患血疾侍女笑云王如我等女人也王召耆婆醫即差王敕云汝止醫我疾不得醫餘人也唱十卷四分律四十一佛制比丘死所有衣物園果等物衆可分之四十二有五比丘白佛我等當食何食佛云乞食食五種食四十三有比丘吐下令煮城門未開即死佛因求地羯磨四十四婆沙羅聚落有舊住比丘接新來比丘猶如涌泉久乃退心立戒也四十五闡陀比丘作罪於衆諱不作罪犯佛知呼來呵責立戒也四十六六群比丘覆藏己所犯戒罪又為他覆藏佛呵責之立戒也四十七比丘河中浴土岸誤著他衣謂是偷衣佛知立戒法也四十八佛教比丘令學滅諍法門當得無諍三昧於是會中各各修習四十九比丘尼有餘食白佛受比丘得不為淨不佛即許之受五十第四分説比丘或林間或樹下或石室或節草中或聚落或冢間行道思惟禪定多得患佛因制令置房舍床席枕被等也婦十卷四分律五十一佛制僧地中作私房客比丘來應起係僧地故五十二天帝化惠化王令修十善業道得天報緣五十三慈地比丘令長者謗梵行比丘因緣五十四拘尸城中未梨子以五百張白㲲裹如來真身舍利五十五優波離問犯戒佛云未制不為犯制後犯為犯因立是戒五十六施主將胡麻子與比丘尼弟子自食師不知謂偷白佛以親厚意不為犯戒五十七優波離問若比丘比丘尼男子女人以身相觸犯何罪佛一一依所問立戒也五十八佛説三羯磨攝一切羯磨所謂單白羯磨白二羯磨白四羯磨也五十九佛呵責云破戒破見破威儀破正見若如是者佛法中四大賊也六十佛告比丘至僧中先有五法應以慈心應自卑下如拭塵巾善知坐起若見上座不應安坐若見下坐應起立至彼僧中不為雜説論世俗事若自説法若請人説法宜專心誠若見不可事應作默然云云隨七經彌沙塞五分戒本唐梵雙標為題也佛誡諸比丘汝等應精進修集戒法諸佛謂一心精進得無上道根本説一切有部戒經梵云薩婆多此云一切有也佛告衆云老死既侵命根漸減應須精持戒法莫令放逸十誦比丘波羅提木叉戒本薩婆多部中初誦二誦乃至十誦中有比丘別解脫戒法佛制五和合衆六淨衆宜聚一處受此戒法日夜精進修習求實智慧日月不停死生侵逼當勤精進持如是戒求佛菩提以此為本根摩訶僧祇律大比丘戒本摩訶大也僧祇衆也律者梵云毗尼也大者久修習也比丘者乞士也戒本者防非止惡也然此戒法令久受戒比丘每月十五日集僧衆共六和合一處重重受之欲令時時警策出家學道人使佛法久住各成道果摩訶僧祇比丘尼戒本佛聽比丘尼每遇布薩日當一心清淨住詣大僧所求受別解脫戒除女業習氣成就如來淨戒得勝妙法根本説一切有部比丘尼戒經佛制女人既得出家為尼宜精修梵行深樂佛法若有所犯當發露懺悔一心受如是戒依如是持作如是行成就佛法僧清淨勝業也比丘尼波羅提木叉戒本此戒本有説法章教誡章會坐章供養章此四章中佛制比丘尼宜往布薩所有罪犯發露無罪犯默然若一一有問當一一答清淨一心聽受此解脫戒此乃如來最上第一法修持得成聖道右諸律部標指事相於後卷中總判所緣此略辨意照于前後見其部類也三十九尾
