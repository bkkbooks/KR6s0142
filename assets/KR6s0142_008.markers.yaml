  - {type: variant, offset: 21578, length: 0, content: 《大正藏法寶總目錄》（第2冊p0771a12）, 中華: 持。中國則僧護惠猷僧業僧祐諸高僧。洎澄照}
  - {type: variant, offset: 21578, length: 0, content: 《大正藏法寶總目錄》（第2冊p0771a12）, 中華: 宣師恢弘細行。以之今日諸律師共所持守者。}
  - {type: variant, offset: 21578, length: 0, content: 《大正藏法寶總目錄》（第2冊p0771a12）, 中華: 謂之行事防非止惡宗。乃曰南山教也}
  - {type: variant, offset: 21578, length: 0, content: 《大正藏法寶總目錄》（第2冊p0771a12）, 中華: 如來滅後五百年。龍樹祖師傳正法眼。外述中}
  - {type: variant, offset: 21578, length: 0, content: 《大正藏法寶總目錄》（第2冊p0771a12）, 中華: 論頌。而後青目尊者分別明菩薩條暢妙義。中}
  - {type: variant, offset: 21578, length: 0, content: 《大正藏法寶總目錄》（第2冊p0771a12）, 中華: 國則惠文禪師思大和尚智者國師。洎灌頂左}
  - {type: variant, offset: 21578, length: 0, content: 《大正藏法寶總目錄》（第2冊p0771a12）, 中華: 溪朗荊溪然三尊者。續大玄旨。以之今日諸講}
  - {type: variant, offset: 21578, length: 0, content: 《大正藏法寶總目錄》（第2冊p0771a12）, 中華: 師共所發揮者。謂之四教法性觀行宗。乃曰天}
