  - {type: variant, offset: 817, length: 104, content: 五音樂發悟品　天龍八部謂。太子久樂深宮。恐不出家。爾時宮中器具及諸女樂絃管。自然出妙音聲。說偈勸請出家　夢品　淨飯王得夢。覺是太子出家之相。遂遊四門。見生老病死相。遂逢出家相。王得十夢。淨居天人來為原之。耶輸得二十夢。太子亦自夢。皆是出家相也《大正藏法寶總目錄》（第2冊p0639b18-0640a26）, 中華: ''}
