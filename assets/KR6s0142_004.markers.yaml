  - {type: variant, offset: 921, length: 100, content: 六出家品　太子思惟。不告父王便去出家。恐違於教。即放光明照于宮中。詣王所求請出家。王即不許。遂勅嚴衛守禁。淨居天來。化宮女醜狀。及念睡眠。不知不覺車匿牽馬。天王捧足逾城。諸天衛護而往雪山。即以寶刀落髮。易鹿皮衣。令車匿牽馬自還王宮也《大正藏法寶總目錄》（第2冊p0639b18-0640a26）, 中華: ''}
