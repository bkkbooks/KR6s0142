  - {type: variant, offset: 1404, length: 198, content: 十讚歎品　淨居天子及諸天子魔子。各來散花。說偈讚佛商人蒙記品　如來成道七日不起于座。但觀樹禪悅。諸天子各將澡瓶水來浴佛。魔波旬即來請佛入滅。佛即慈化已。即經行一樹下。二商人牛不行驚怪。即見如來成道。多日不食。遂辦食供佛。四天王各奉一鉢。受商人食已。即為授記勸請品　如來思惟。我所悟法甚深微妙。若為人說。多不信受。思惟是已。放光照明。諸梵天眾悉來。勸請轉於法輪。佛云。世間惡法增長。善法損減。諸天再三勸請。佛即以智眼觀諸眾生上中下根。我當以隨機分別解說妙法也《大正藏法寶總目錄》（第2冊p0639b18-0640a26）, 中華: ''}
