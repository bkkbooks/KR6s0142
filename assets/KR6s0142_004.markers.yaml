  - {type: variant, offset: 1113, length: 98, content: 八詣菩提場品　浴身食乳。氣力平全。欲降伏魔怨。徐徐而住菩提樹。將登座時。諸天衛護。放光照天上地獄龍宮。却思過去諸佛將成道時。悉皆坐草。吉祥天人漸將草近。受草已出無量聲嚴菩提場品　如來放光照十方界。十方佛所各有菩薩。來為莊嚴也《大正藏法寶總目錄》（第2冊p0639b18-0640a26）, 中華: ''}
