  - {type: variant, offset: 1602, length: 113, content: 十一轉法輪品　如來思惟。欲度二仙。七日前已死。悲其不遇。即思五跋陀羅。此云賢。漸次經行。至鹿野苑。十方佛所各有菩薩。來請轉于法輪。有一菩薩。名法輪。手執一寶輪奉上於佛。即為五跋陀羅。三轉十二行法輪。分別一切善法。復為彌勒菩薩說法輪。體性名字。及說三十二相。乃因中行三《大正藏法寶總目錄》（第2冊p0639b18-0640a26）, 中華: ''}
