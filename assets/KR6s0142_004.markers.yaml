  - {type: variant, offset: 1211, length: 193, content: 九降魔品　如來光明照入魔宮。魔王眷屬生大愁苦。各領兵眾來詣佛所。或現一身多身。或現雲雷山石蛇女等一切惡想。如來唯以慈心攝伏成正覺品　如來降魔已。即次第入四禪定。觀色等諸法相所因．十二緣因．苦集滅道因。應自知已。後夜明星現時。佛聖智所應知。所應得。所應悟所應見。所應證。彼一切一念相應慧證大菩提。成等正覺。具足三明。即踊身空中。說偈云。煩惱悉已斷。諸漏皆空竭。更不復受生。是名盡苦際。諸天子即以微妙天花而散佛上。十方如來見其成道。各以寶蓋而來覆之《大正藏法寶總目錄》（第2冊p0639b18-0640a26）, 中華: ''}
