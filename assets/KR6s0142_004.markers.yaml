  - {type: variant, offset: 1021, length: 92, content: 七勸受品　即受諸女人諸仙人所請。遂往阿邏羅仙所。學不用處定苦行品　又住摩羅勒伽仙處。學非非想處。皆非究竟。即自思惟。圓修定慧。乃示其苦行。食麥食麻。伏諸外道。已及六年往尼連河品　詣河洗衣。浴竟即往牧牛女處。受乳糜也《大正藏法寶總目錄》（第2冊p0639b18-0640a26）, 中華: ''}
