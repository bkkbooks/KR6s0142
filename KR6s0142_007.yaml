body:
  text: 東京法雲禪寺住持傳法佛國禪師惟白集外受傳訓入奉母儀諸姑伯叔猶子比兒孔懷兄弟同氣連枝交友投分切磨針規仁慈隱惻造次弗離節義廉退顛沛匪虧性靜情逸心動神疲守真志滿逐物意移堅持雅操好爵自縻都邑華夏東西二京背邙面洛浮渭已上八十六函外十經四分僧戒本曇無德部中出此本也如偈云世間王為最衆流海為最衆星月為最衆聖佛為尊一切衆律中戒經為上最餘義多同四分比丘戒本沙門懷素序云戒者定慧之宏基聖賢之妙趾窮八正之道盡七覺之源樹五制之良規揚六和之清訓龍城之要旨鹿苑之微言五道舟航三乘軌躅也其餘戒本中行相前後同也解脫戒經此戒法出迦葉毗部中也偈云有佛興世樂興世説法樂衆僧和合樂和合持戒樂餘則大同小異也沙彌十戒威儀經佛敕舍利弗去度羅睺羅出家乃白佛云我云何度佛令與受三歸五戒十戒盡形壽故不得犯及一切威儀沙彌威儀佛言既受十戒已當知戒知戒師名侍奉出家和尚出入持鉢赴請受施等戒法四分尼戒本一卷五分尼戒本前戒本文相大同止呼召異也意令勤奉淨戒勤聽法語不可放逸生難得出家想樂住佛法中求解脫故也舍利弗問經白佛云如來説法或親聞傳聞或行不行佛滅後戒律如何佛云吾滅後正法分付迦葉等聖衆讖阿育王孫滅佛塔寺教法彌勒化為五百童子來求佛法却復興盛遇王慈善弘護佛法從此比丘衆各隨所見分諸異部或盛或衰因人弘揚故如是受十卷根本説一切有部百一羯磨單白二十二也白二四十七也白四三十二也若成一百單一故云百一也佛説五種阿闍梨一受三歸十戒二屏處檢問障法三作白四羯磨四依止謂一宿住五教讀乃至一句四句也有二種師有一剃髮出家二受近圓餘義次第説二佛説太世主喬答彌愛樂八敬法出家及受近圓成苾芻尼性若先出家未受近圓可隨次第而受三佛制比丘滿十二夏可白二畜門人等緣四佛制有罪比丘十五日布薩可掃灑壇地陳露悔過作白五所造寺舍施主或因拘執可作白與五年同利養住六佛制比丘種種違犯悔衆教罪依此所説戒法羯磨懺之也七佛制有客比丘來當須告白如不白者得犯戒罪也八勝妙比丘數犯衆教罪遂令白四折伏羯磨更有餘類方便故九比丘有犯衆教罪令白四羯磨十給孤長者白佛弟子於戒定解脫知見圓滿者應受施主最上施利佛制可之傅七經大沙門百一羯磨法捨界結內界結外界等羯磨一住處一説戒及四方界相一切界相法禁戒也羯磨作法與前大同也其意令比丘作結界相𭹨地不得隔水等戒十誦羯磨比丘要用一卷前戒本同曇無德律部雜羯磨此云法鏡即四分律也然問答立界同前耳彌沙塞羯磨本即五分律也沙門愛同開為十門一作法緣起二諸界結界三諸戒受捨四衣藥受淨五布薩儀軌六安居法則七自恣清淨八受施分衣九懺悔諸犯十住持雜法也此戒文行相最詳審可撿行四分比丘尼羯磨律法中須知出家為比丘尼作法戒法儀範優波離問佛經佛告優波比丘成就五事盡命非不依止一不知布薩二不知布薩劍暮此云羯磨也三不知戒四不知説戒五減五歲反是亦為五也一一問佛一一答之皆是出家比丘奉持佛戒精妙要義也訓三經僧羯磨三卷尼羯磨三卷沙門懷素序略云鹿苑龍城啓尸羅之妙躅象巖鷲嶺開解脫之玄宗三千太千受清涼而出火宅天上天下乘戒筏而越迷津也然此六卷戒相同於前後戒本曇無德隨機羯磨二卷大唐西明寺宣律師於諸部律戒本中立意或刪或補成此戒文最為精要其間開説百一羯磨名數分列十門解説妙義令末世比丘勉懷斯典知如來方便慈智順情應機普利塵方使其出離不可思議也入九經一切有部毗奈耶頌三卷前大部中解此頌也為總攝事故如偈云開闡於調伏善間調伏義正住調伏中能捨非調伏欲令調伏者入斯調伏海不起大疲勞能生勝妙樂其餘頌義可知也毗奈耶雜事攝頌甎石及羊毛三衣并上座舍利猛獸筋笈多泥除塔餘頌義前律部中多解也尼陀那五十二頌目得迦四十八頌前律中以此頌為總攝一一標解或引證也目連問戒律中五百輕重事用三寶物當墮何處移佛物等事若佛物為佛用五百事可見優婆塞五戒相經淨飯王白言如來已為比丘比丘尼沙彌沙彌尼説制重輕戒唯願如來亦為我等分別五戒可悔不可悔令識戒相使無疑惑佛即為説優婆塞五戒相其有可悔有不可悔令其依行得於聖道大愛道比丘尼經二卷阿難白佛已度出家成比丘尼唯願如來為授學修習禪定法則此緣前已多説迦葉禁戒經禁比丘衆不得作非法宜勤修梵行犯戒罪報經舍利弗問犯戒得何罪報佛隨所犯經重不免俱入地獄受苦有間無間耳戒消災經印土一家奉佛戒一男子出外父母囑曰堅持五戒不得犯至外國遇親友再三勸飲酒歸家父母趨出以謂違教非孝子也復至他國宿噉人鬼婦家雖破一戒尚有四戒天神護祐鬼不能食遂與鬼婦父母説佛戒法即同來見佛佛云戒法能除一切災害奉七卷薩婆多部律攝一此云一切有也尊者勝友集出也分別別解脫戒法行相如偈云諸佛現世樂演微妙法樂一心同見樂和合進修樂然此一一先標頌次解釋其義明戒法也二明説戒緣起指陳學處能犯所犯有犯無犯等戒三明殺生戒相以聞佛説修不淨觀有厭患者自斷命四明廣造大寺妨修道業於施主益少遭譏嫌却多等戒五明與女人在屏處坐障法及有欲事不定法中等戒法也六明制畜衣物等一切戒法宜依佛所説所行法則不可越七佛制比丘不得貪好鉢於諸物不得多乞等戒母七卷薩婆多部律攝八佛弟子爰惡觸藥及餘食不知何者應捨不應捨等一切戒律法也九比丘與未近圓人齊聲讀誦如婆羅門喧雜佛戒之十比丘故在門外與人談説夜喚開門入房強臥令他比丘生惱佛制戒十一佛制一食比丘非時行乞非時敢食佛集衆立戒十二比丘衆聽佛説法已半夜與未近圓人説話佛因重集衆立戒法十三十七衆比丘受近圓已不能忍飢啼哭佛即立戒十四佛制比丘於非親尼處受食佛因立戒不許也儀十卷摩得勤伽經一犯戒罪作無作色非色可見不可見身作可見口作無對意作無漏等一切戒法也二犯出精等戒作方便如法依行三制比丘洗浴等一切戒法四俗士擔宍行烏所奪墮在乞食比丘鉢中佛因立戒五佛制種種不淨犯與不犯等戒六藥華果等物與病相應等戒法七佛制邊地人受戒得戒已否乃至受一切飲食戒八佛制術力藥力變現行淫等戒九佛制優婆夷謗比丘實見等戒也十逼惱非人等出家於法律中不如法立戒諸八卷鼻奈耶一鼻者此云去也奈耶者此云真也謂去其所犯之非而就能持真實也亦謂降伏此心也息此心成定忍智也無上戒則清淨持守莊嚴身也無上意戒則正思惟習禪定之無上智戒則明了四諦也此謂三戒為此戒本所宗也餘戒相可見二佛言有天人來問解脫得解脫受解脫而去三迦留陀比丘乞食還憶所見女人起淫想佛立戒四比丘與國王大臣相識乞食易得有女人來求為夫佛立戒五比丘與女人屏處坐見者生嫌佛因立戒六天色陰暗比丘乞食電光中入門有身妊女人見謂鬼驚墮胎立戒七佛制比丘不得宿軍中有緣故止一宿因立戒禁八六群比丘自恃王家子早便入宮又先至施受供家惱亂立戒姑十卷善見毗婆沙律十八卷一此律本佛滅度後迦葉阿難優波離結集三藏始終來歷無不詳備皆云見佛如是説也二佛差戒師有摩呬陀即受具足戒於壇中得三達智六神通漏盡成羅漢三佛在光明國中説無始戒經火聚經會中八千五百人聞已皆得道果四六萬比丘圍繞塔園説佛功德如來慈憫為説毗尼藏五佛告比丘於四禪定中棄去苦樂心即有超勝妙定六佛告婆羅門汝莫係心家業即為雨法令精進修習也七解律中文句如本所説人身修習生名性戒或長或短也八汝等當知起因作因不起不作於其中有識心以心得解脫等戒九於盜戒中分別隨色名色其處所其名號等一切戒法也十或眼現相或手現相或腳現相或搖頭現相或動身等教偷皆盜戒禁也伯二經善見毗婆沙律八卷十一佛令習數息觀境戒十二或知三藏教法為人解説不為利名飲食如是比丘光明佛法謂興隆也十三龍女迦留羅女一切畜生女皆不得捉亦不得與女人同渡橋看上樹十四馬師滿宿二比丘本作田人引作田者來出家佛立戒十五自恣曰比丘失衣給孤施衣令自恣取衣貪者不已立戒十六佛説般陀本名路邊生夙因地也十七佛詣迦毗羅國説根本因緣淨飯王諸釋種因聞各成道十八舍利弗設三十餘問問所犯戒得何罪佛依其所犯結罪立戒阿毗曇經二卷上一千阿僧祇世界衆生所有功德成佛一毛孔功德遍佛身毛孔功德成佛一相好如是成就八十種相好功德增為百倍成佛身一相成就三十二相功德增為千倍成佛額上一白毫相以千白毫相成佛一頂骨相一切飛天所不能見頂不思議清淨功德聚成佛身也及一切因緣下如來在給孤園為人天説法次第度諸弟子出家各令修習四諦十二緣叔二經毗尼母八卷一毗尼者滅也謂滅諸惡法起善法故母者出生決了定義也謂一切戒律由此出也廣攝諸戒故明智惠人受具足戒方能持守不犯也二佛在世時有得受具足戒者有不得受者亦觀其器耳三明中殘罪等一切戒相四集法藏時迦葉以手拍地震如銅鍾王舍城人悉聞之五佛在波羅奈國五比丘白佛我等有病無病畜何等藥治身也六比丘捨房欲至他處宜掃灑塗地可去七佛説犯戒罪有三因緣一初犯二因犯三重犯復説過去所犯戒因緣為證也八比丘畜長衣長鉢不作淨施等戒法大比丘三千威儀二卷上安息國三藏安世高所譯也謂佛弟子有二種一在家持五戒求天人勝妙果報也二出家先持十戒為本求佛菩提捨去執務具受八萬四千向道因緣然不出身口意此三清淨為根實若不能具清淨依佛戒律漸次修習近善知識以時策勵也下行十二種頭陀行及持錫二十五事等一切戒法行相然此二卷中具比丘三千威儀法門猶二經薩婆多毗尼毗婆沙九卷一佛弟子制戒集為律藏因果相生相緣諸法諸使為阿毗曇為諸天世人説法集為增一為利根説諸深義集為中阿含為修禪定者所説觀法集為雜阿含為坐禪所集破諸外道集為長阿含此是如來隨機適時説一切法但一切衆生不能盡受持如來所説妙法於中誦一四句偈佛亦印之也二如來得道初七日入喜法門二七日入樂法門三七日入諸解脫四七日遊入大捨五七日入逆順觀十二緣六七日重歷諸法門七七日觀應受化者此是四十九日內思惟如來是事也三佛制盜戒與優填王大臣人民共立此戒犯偷五錢為大賊罪也四污他家法謂不知羞耻作惡行得惡名成惡果五佛説蓮華色比丘尼因中曾供養辟支佛得端正出家也六佛制比丘比丘尼得畜雨浴衣或擔負難又不許七闡那造房即日成便墮倒以佛曾入施主亦得無量福以佛功德故八女人共行賊共行自想年未滿二十受具足戒等法戒九佛制受食等戒不得過貪但為濟飢又為證明成福故律二十二明了論多羅多法師造真諦三藏譯解釋律藏中二十二條須實要義令得正法人達其律義故稱明了也持佛戒人守護諸根令得相應修習三學成就不看他面以自得之也戒定惠三學也或依三業道立或依三藏教立或依三法身立也了正行心明了無礙於身口八明了戒中如法而修如説而行心自明了律中條制右聲聞小乘調伏藏總五十四部計四百四十六卷共四十五帙唯摩訶僧祇律乃如來在日弘闡大慈因一事立一制以為垂訓佛滅後大迦葉集五百聖衆命優波離結為大衆部其餘諸部或竺天聖者或華夏高僧各隨所見所聞集譯傳播然皆作謨萬世流布塵方教約有情為出家利自南山澄照三生示現弘持此道而後繼之者誰也修細行者得不傷懷阿毗曇此云無比法也亦云大法也八犍度此云聚也蘊也一雜跋渠二結使跋渠三智跋渠四行跋渠五四大跋渠六根跋渠七定跋渠八見跋渠所云跋渠者此云部也品也於此八中分四十四品論部判淵微研窮妙旨子十卷八犍度論三十卷一世第一法品諸心心數法次第越次取證為上為最無能及者捨凡夫事得聖法捨邪事得正法於正法中越次取證名世間第一也二跋渠品頗有智知一切法乎頗有一識識一切法乎此為智也愛恭敬品云何愛恭敬愛供養緣學法不殊勝也人跋渠品一人此生十二種緣幾過去幾現在幾未來及十一支因也無慚愧品云何無慚無愧謂諸蓋所纏觀境未明故須習學對治成行也三色品色法生死無常當言色耶非色耶無色可見不可見有對無對等也無義品謂空持戒人不得其法義故云無義思品云何為思云何為想思想何別云何為覺云何為觀覺觀何分別四結使品三結三不善根三有漏四流四振五蓋五結等皆名不善也五一行品愛結瞋恚結憍慢結無明結見結失願結疑結慳結嫉結以此九結為修行人心中病也六論過去未來三世中瞋恚結使興與未興所係也七度人品三界所修四諦四果人所證行相也八十門品十二入五陰五盛陰六大色法三界過現未苦智法智等一切觀行也九八道品八種學成就得十種漏盡阿羅漢過現未三世慧智八正道七覺支諸禪定境於此分辨修習十五種品謂邪見耶邪智耶學慧學智有學無學等五種法門行相他心品云何知他心謂得宿命智識及一切盡智即知他人心所起也比十卷阿毗曇八犍度論十一修智品法智未知智知他人心智等智苦智習智盡智道智也十二論八智中修習微細行相入滅盡三昧也十三相應品三三昧八八智三三世所修皆三三界行法等相應法義也十四相應品義中論諸法無願與覺意非無願相應也十五惡行品三惡行攝三不善相三妙行攝三善根一一對治也邪語品謂邪語邪業邪命三曲三穢三濁邪身口意具也十六害衆生品頗害衆生害亦不盡不害亦不盡報必入地獄十七有教無教品成就身教則無教也成就無教却有教也善與不善等亦然也十八淨根品四大所造幾可見幾不可見幾有漏無漏幾有對無對幾有為無為等一切法也十九二緣品幾緣緣四大造心心法幾緣緣心四大幾緣緣四大眼入幾緣緣一切緣二十見諦品如來弟子於身口意修三界四禪定覺意等法也內造品內四大幾緣緣內四大幾緣緣因相應等所造法義也兒十卷八犍度論二十一根品眼耳鼻舌身意男女命樂苦喜憂護信精進念定慧未知已知無知此二十二根也有品有幾根行欲界有幾根行色界行等也更樂品更增語更明更無明更非明更愛更瞋等一切法義行相二十二始心品一切衆生始心興始心住始心滅乎諸心有欲無欲諸心等也始發心品諸法心共一起一住一盡彼法心相應也魚子品論二十二根于為成就有幾數二十三緣品諸根緣過現事三世因見苦諦等也根緣學非學無學見諦斷緣思惟等一切行相法義也二十四復次諸根苦法智斷因習法智斷緣根習未知智斷緣見苦斷諸根苦未知智斷因習見習斷緣習無斷無緣二十五過去得品若得過去得過去設得過去彼得過去法也若未來現在世善不善無記三界係學無學見諦思惟斷等二十六法思惟無色生思惟斷心俱見諦斷心俱不斷心俱諸法彼心相應二十七解脫品由何三昧盡十想四禪四無色定八解脫八除入十一切入入智三三昧等也阿那含品中生行無行上流此五阿那含般涅槃也論彼等在三界所斷所學所證果法義二十八一行品修斷三昧越智禪二定起想俱律陀聚覺意眼徹聽有建凡夫果退生界五通苦最後等義也二十九意止品四意止身身觀意止痛心法法觀意止修身身等欲品若棄欲有受欲界有彼一切盡欲界係法故也三十想品無常想無常苦想苦無我想不淨想觀食想不可樂想怨想斷想無淫想盡想也智時品謂諸聚如彼聚設聚斷彼聚厭彼聚修厭聚諸智聚也見品謂此見無施無福無説無善惡行果報無今世後世邪見也偈品視者時時視不視時亦視不視者亦視不現視亦視視者視時視視謂之諸已見苦習盡道視時謂之餘見苦習盡道等一切法義右八犍度論佛滅後迦旃延子見大法之難受持蓋浩博也總為一部八蘊聚分四十四品耳傳入中國竺佛念譯為三藏中鼓舞所以安師序云其説智也周其説根也密其説禪也悉其説道也具以此可知其難孔十卷發智論二十卷一雜蘊世第一法納息偈云世第一法七頂二燸身見十一見攝斷此章願具説此下説此一偈也心心數法為等無間入正性離生謂世第一法也聞正法如理作意信佛菩提法樂修妙行謂頂也正法律中有少信受謂暖也智納息品一智生一切法我此智何所知也補特伽羅品偈云緣起緣息依心依無有愛心脫依界想等明十二支也此中納息前論跋渠也二愛敬納息品偈云愛養敬力滅涅槃蘊蘇究竟取遍知三歸等也無慚納息品無慚無所慚無羞無敬性無自在性等義也相品色法生住老無常也無義品修諸苦行不知佛法義味也思品諸思等思增思思性思類心行意業謂思也三不善品三根為根也一行品九結為本也四一行品義中論無明結繫等也五有情品三界見修所斷等十門品二十二根十八界十二處等也六十門品義中所斷無明隨眠欲界部等也七覺支品習學七覺支與定心相應不相應也五種品邪見邪智正見正智學惠智等也八他心智品智修所成能知他心心所法也修智品法智乃至道智等八智也九修智品義中論苦智集智入現觀苦法類智時學也十七聖品論八智七覺三界所修三世相應一一微細所斷期成妙定妙行得聖果也懷十卷發智論十一惡行品三不善根也邪語品邪語非邪語邪命非邪命也害生品殺生斷他命已滅未滅也十二表無表品若成就身表彼無表也現有身表不得此無表也自業品正受自業是得自果自等流自異熟義等也十三大造品大種所造幾有見幾無見等也緣品大種具幾緣成也具見品已具見諦未離欲染所成色界係身口意業何種造十四執受品有執受大種為幾緣也根品即論二十二根幾學無學也十五有品欲有相續幾業所生根卵胎濕化等也觸品有對觸增語觸明觸等也等心品等起等住等滅一切等也一心品諸法與心一起一住一滅所緣相應俱住俱滅不離心也十六魚品若成就眼根彼二十二眼根幾成就幾不成就也內緣緣品彼二十二根幾根過去幾根未來等義也十七得品諸得過去法彼得過去耶未來亦然也緣品有八定四禪等定義也十八攝品論十想相應不相應也不還品論五不還果行想等也十九一行品三三摩地空無願無相也念住品身受心法所修觀也三有品欲有色有無色有也想品無常等十想法義也二十智品苦集滅道智忍能通達遍知也見品邪斷見邪常見邪見無施福等也伽陀品已見者能見已見及不見不見者不見不見及已見者謂諸不見苦集滅道此與前論同本異譯也前云八犍度此云八蘊也前云跋渠此云納息也例此小差耳兄十二卷法蘊足論一佛在時大目連造偈云覺支淨果行聖種及正勝足念諦靜慮無量無色定覺支雜事根處蘊界緣起此總摽品名之偈也此論分別諸法及諸蘊如與人醫病足得無病足能行至彼岸也學處品説十善業道也二預流品有四法一近善友二聞正法三如理作意四法隨行證是果也證淨品佛證淨法證淨僧證淨聖所受戒此四法等義也三沙門果品一來預流不還阿羅漢果也通行品苦遲通行苦速通行樂遲通行樂速通行此四行也聖種品聖賢弟子求得喜足求不得無恨得則隨分用不輕蔑人此四聖種也正勝品一已生惡勤斷二未生惡不令起三未生善令生四已生善令增長此勝正也四神足品欲勝行神足勤勝行神足心勝行神足觀勝行神足此四皆云三摩地勝行所成就也五念住品觀身受心法義也六聖諦品苦集滅道也靜慮品四無色定相也七慈悲喜捨心俱謂四無量品也八四無色品空識無所有非非想處也修定品若修若習有證現法樂住有得殊勝智有證得分別慧有證得諸漏永盡修習定境有是四得成法身也九覺支品修七覺分與定相應也雜事品貪嗔癡慢疑等一切法十根品二十二根也處品十二處也蘊品謂五蘊法義也十一多界品欲界色界無色果嗔界恚界等十二緣起品三界所有法及自身一切因緣和合相應起相等法義弟十卷集異門足論二十卷一如來在力士生地告舍利弗言吾今背痛當暫偃息汝當代吾説法令比丘衆不空度日舍利弗承佛教旨為衆説法然衆中各各自謂我於佛法律中有解有見互有諍競舍利弗復告衆云汝等要知如來現在所説法教今為宣演令諸異門見趣同歸與佛所見所行無異如足能行也此緣起品耳一法品一切有情皆以食為命也然有四食段觸思識也二法品所謂名色無明有愛有見等也二二法品中善巧入定善巧出定及四禪諸定也三三法品三善根三不善根三惡行三妙行三善尋等四三法中電光喻心依是定心能斷五三法品中苦受樂受不苦不樂受等義六三法品中一天住二梵住三聖住等一切法義七四法品四念住四正斷四智集苦滅道等八四法品中有損害無損害身語意行等也九四法品中布施愛語利行同事等四義也十四法品中虛誑語離間語麁惡語雜穢語此四語一切有情習為常事也同十卷集異門足論十一五法品五蘊五取蘊五妙欲五慳五趣五蓋五心栽五心縛五順下分結五順上分結等十二五法品中分別五蓋等法義十三五法品中分別五能忍等法義十四五法品中言若無大師隨一有智梵行者習正法律十五六法品六內處六外處六識身六觸身六受身六想身六思身六愛身六順退法六順不退法如是等六法一一分別十六六法品中分別六想等法義十七七法品七覺支七補特伽羅七定具七財七力七非妙七妙法七識分別七非妙法等義十八八法品八道支八種施八懈怠事八精進事八福生八種衆八世法八解脫八勝處八補特伽羅如是等八法一一分別法義十九九法品九結九有情居愛嗔慢無明見取疑嫉慳此九結也九有情居者則三界九地中有情生者之謂也分別法義二十十法品所謂十遍處十無學地水火風青黃赤白空識為十遍處正見正思惟正語正業正命正勤正念正定正解脫正智等皆名無學已上二十卷從一法為初乃至十法此是舍利弗恐佛滅後比丘乖諍各稱己能故以集此法門為論使取信天上人間也氣十卷識身足論十六卷一天寂羅漢造奘法師譯所謂阿毗達摩大對法論蘊界識心與身聚相應具足法義令佛子如法而行故云耳如論總偈云初目乾連蘊次補特伽羅因所緣雜類四句最為後此偈為本也初品如目連説過去未來無現在無為已次明三不善相等二論三界九有情居乃契經中如來善語善詞善説等義三補特伽羅論者作如是言諦義勝義可得可證現有等有是故定有也四論六識身過去未來現在以何為因等義五論十心善心不善心記心無記心等於欲界所係六論六識身過去未來現在有緣在過去非過去在未來非未來等緣七所緣緣諸色界善心有能了別色界係法若麁若苦等八諸色界係善心或體未斷所緣未斷不可分別此心等義九重分別欲界係中十種心斷未斷義十所緣緣蘊中分別解説諸色界無色界善心等義連二經識身足論六卷十一論五識身起染不能離染等義十二諸斷善根如思害母害父却隨愧悔十三論十二心欲界善心不善心有覆無記心等法義十四若成就無色界善心亦成就無色界有覆無記心等法義十五若不成就色界係善心亦不成就色界係有覆無記心十六有十二心謂欲界係善心不善心有覆無記無覆心等義界身足論三卷上世友尊者造此論明蘊界識身名相悉具足故本事品偈云三地各十種五煩惱五見五觸五根法六六身相應有十大地法十大煩惱地法十小煩惱地法如十大地法者受想思觸作意欲勝解念三摩地惠等十也其餘法相可知分別品初門大地法受與五受根幾相應幾不相應也分別品第二門大地法與六識身幾相應等義分別品第三門大法受與慚愧無慚愧幾相應等義中分別品第四門十八界十二處五蘊受相應何所攝謂心心所法也分別品第五門想相應思不相應界處蘊想相應何所攝也分別品第六門思相應觸不相應界處蘊思相應何所攝也下分別品第七門觸相應作意不相應謂作意自性色無為也分別品第八門作意相應欲不相應界處蘊等相應也分別品第九門欲相應勝解不相應也分別品第十門勝解相應念不相應也分別品第十一門念相應三摩地不相應也分別品第十二門三摩地相應慧不相應也分別品十三門慧相應不信不相應也分別品十四門不信相應懈怠不相應也分別品十五門由斯理趣諸差別門應依前説一行方便如理當思此諸門中有差別者相似異位皆不應説枝十卷品類足論十八卷一世友尊者造此論將蘊處界等法成其品目流類無不足者也辨五事品一色二心三心所法四心不相應行五無為行辨諸智品法智類智他心智世俗智法苦智集智滅智道智等也二辨諸處品謂十二處法也辨七事品十八界十二處十大地法十大善法十大煩惱地法十小煩惱地法五蘊法等義相也三辨隨眠品九十八隨眠幾欲界係幾色界係幾無色界係三十六欲界三十一色界三十一無色界幾見所幾斷幾修所斷等也四辨隨眠品中謂見苦集滅道所斷法如不定係等五辨攝等品有所知法所識法所通達法所緣法增上法等六辨攝等品中九結九有情居等義七辨攝等品中身業身表無表語業語表無表意思善業等八辨攝等品中聖弟子於苦思惟苦於集思惟集等義九辨攝等品中異生法界處蘊智識隨眠等義十辨千問品如總偈云學處淨果行聖種正斷神足全住諦靜慮無量無色定覺分根處蘊界經以此偈標也交二經品類足論八卷十一辨千問品中論四證淨幾所色等義相十二千問品中論四念住幾斷遍知等義十三千問品中論四聖諦幾斷遍知等義十四千問品中論四無量幾所造等義十五千問品中論七覺支幾斷遍知等義十六千問品中論十二處與六善處相攝等義十七千問品中論幾有身見為因非有身見因等者一切應分別等義十八辨決擇品色法界處蘊智識欲色界遍行及修所斷隨眠隨增一切法相皆悉辨其所以決擇分段令成觀境友十二卷衆事分阿毗曇論此論與前奘法師所譯品類足論同本此宋求那所譯也品義俱同阿毗曇大毗婆沙論六十卷此涼道泰等譯佛滅後五百年五百應真造此論釋迦旃延子所造八犍度論與後大唐奘法師所譯二百卷者同本但廣略有備有不備也今此略標分義在後部投十卷婆沙論六十卷一世第一法義二世第一欲界義三世第一頂法義四世第一二十種身見我見等義五智品義分六智品一人前後二心俱生義七智品祭祀餓鬼等義八智品一眼見色義九智品名身句身等義十智品六因非佛經説四緣是佛經中所説以因解緣相應等分十卷婆沙論十一智品一切遍因前生見苦等十二智品云何所作因等義十三人品一人此生十二支緣幾現在等十四人品行緣無明不緣明等義十五人品無有中愛當言見道等義十六愛敬品云何為愛云何為敬等義相十七愛敬品數滅非數滅等義十八愛敬品無學成就戒身等十九無慚愧品云何無慚及無愧及解章義等二十無慚愧品佛説掉悔作一蓋掉外無悔悔外無掉等義切十卷婆沙論二十一無義品論優波提舍義等二十二無義品如來轉聖法輪等義二十三思品云何思云何憶等義二十四思品分餘分道品若成就見等義二十五不善品三法九十八使等義二十六不善品欲漏無明漏等義二十七不善品五結使等義二十八不善品三結幾不善等義二十九不善品三結幾是見幾非見等一切義相三十不善品五人堅信堅法解脫等一切義行相磨十卷婆沙論三十一一行品九結等義三十二一行品身見攝幾使等三十三一行品中三種退義三十四人品見道修道斷種欲等義三十五人品中四沙門果義等三十六人品中欲界死還生欲界盡等義三十七十門品二十二根等義三十八十門品十八界等義三十九十門品十二入眼入等四十十門品中二色法等一切義針十卷婆沙論四十一十門品如來何以故先説苦諦等四十二十門品中何者是欲何者是惡等義四十三十門品中入慈定火不能燒等四十四十門品中立解脫無色定等四十五十門品中若得此定修此定入此定等四十六十門品中三昧一住一緣等義四十七八道品五陰四陰為體性等四十八八道品中成就見智等一切義相法門四十九八道品中念覺支等一切義相五十他心智品念前世智體性等義規十卷婆沙論五十一他心智品自性念生智等義五十二他心智品我生已盡智體等一切法義五十三他心智品中六通義等五十四他心智品中佛告比丘衆生能信等五十五他心智品重解念前世智等義五十六修智品欲觀五陰如重簷過患等義五十七相應品堅信堅法信解脫等義五十八相應品中論他心智等義五十九相應品中論知老死集滅道智體等義六十相應品中他心智成就未來見在等法義阿毗達磨大毗婆沙論二百卷阿毗達磨者此云對法也議論也無上惠也阿毗者除棄也達磨者決擇也除棄結使煩惱故決擇蘊處界義故大毗婆沙者此云廣破也廣解也謂廣破諸有成觀定故廣解契經妙義顯無上心故論者問答部柝明研至理也然此論如來在日隨處應機而説或舍利弗問佛答或五百羅漢問佛答或天人問佛答或化比丘問佛答唯迦旃延子能誦持故以妙願力利諸有情集為八犍度發智論耳佛滅後四百年五百羅漢憶持此義於迦濕彌羅國廣釋此論成大毗婆沙也大唐三藏奘法師顯慶年初譯此論文義超勝前後所譯也仁十卷大毗婆沙論二百卷一序作論本意欲明顯如來所説十二分教指義受持者不生顛倒故又明阿毗達磨為無漏惠根體性破諸邪見邪論饒益惡行者便悟入甚深正法於暖頂忍世第一法能明了也二雜蘊世第一法納息第一論世第一法何以先説與過去未來心心所法一起一住一滅一等流暖頂忍異熟第一切諸法義相三世第一法論沙門果諸緣諸智諸行一切法義相四世第一法中正性離生性先現觀欲界苦為苦後合現觀等義五世第一中一心多心相應差別而未顯示現前多少唯一剎那等六世第一法中明頂於佛法僧生小量信謂如山頂人不久住過山至山等義也七世第一法中廣明暖位修習所因所緣所起以何為果等八世第一法中分別勝義中無我我所如人見繩是蛇見杭是人等義九世第一法中非我我見於五見何見攝有身見擇滅等義十智納息品頗有一智知一切法緣一切法非我行相惠為自體惠等慈十卷大婆沙論十一智品未來世中有等無間緣修正加行應成無用伏諸煩惱究竟解脫見蘊所説等十二智品補特伽羅既不可得又無前心往後心理何緣能憶十三智品一眼見色二眼見色耶為止他宗顯己義故或有執眼識見色十四智品佛身現在已斷盡故有盡非過去謂如佛言也十五智品欲界語欲界身欲界名所脫義或三界係不係等十六智品佛世尊受恚永斷拔諍論根滅憍慢本等十七智品身語業何等隨心何等不隨心色界戒無漏戒等十八智品此身非餘身相似為因非不相似如此身等法義十九智品欲界見苦集所斷邪見能緣三界苦集等二十智品一剎那業為但能引一衆同分為亦能多分同衆耶等隱十卷大婆沙論二十一智品能作因體即增上緣俱一切法為性故然義有異謂多勝義是增上緣二十二諸心由隨眠故名隨眠心彼隨眠於此心隨增等二十三智品頗有隨眠滅身作證而惠不見彼滅耶特伽羅品此補特伽羅此生十二支緣起幾過去幾現在幾未來等二十四伽羅品樂受及不苦不樂受與愛為緣等義二十五伽羅品無明緣行取緣有有何差別等義相二十六伽羅品入息出息依身轉耶依心轉耶令決定等二十七伽羅品有色有情心相續依身依心轉等義二十八伽羅品金剛喻定將滅解脫道盡智將生若無間等二十九伽羅品説有三界謂斷界離界滅界分別契經等三十愛敬品云何名愛名敬乃至供養恭敬自性於一境轉等惻十卷大婆沙論三十一愛敬品已説佛十力當説四無畏正等覺漏永盡説障法説出道等四義三十二愛敬品擇滅亦名涅槃亦名同類亦名非聚亦名非顯等三十三愛敬品涅槃當言學耶無學耶非學非無學耶三十四愛敬品謂智遍知及斷智等為廣分別契經義故有此遍知三十五無慚品云何慚云何愧契經説有慚有愧今廣辨故三十六無慚品云何欲界增上善根云何微俱行善根等三十七無慚品諸心過去彼心變壞為止他宗顯正義故等法三十八無慚品有五蓋為五蓋攝諸蓋為諸蓋攝五蓋等三十九相品三有為之有為相有為之起亦可了知等義四十無義品修觀行者繫念眉間或觀青遊膖腹等造十卷大婆沙論四十一無義品佛轉法輪憍陳如等見法地神舉聲遍告如來今在鹿園説法等四十二無義品何故作此論為欲分別契經難滿等義四十三思品云何思云何慮為有執思慮是心三摩地染污等四十四思品若起欲尋恚尋害尋或自害害他俱害等四十五思品云何異生性或有執欲見苦所斷十隨眠等義四十六不善品三結乃至九十八隨眠及解章義也四十七不善品貪嗔癡三不善根以何為自性以十五事為自性等四十八不善品欲有見無明此四瀑流以何為自性等四十九不善品貪嗔慢嫉慳等五結以何為自性等義五十不善品謂七隨眠以為自性欲色無色三界五部五十事也次十卷大婆沙論五十一不善品何故名善不善無記若法巧便所持能招愛果性安隱故名善巧也五十二隨眠幾見苦所斷幾修所斷何故作此論等五十三不善品有結在欲界彼結非墮欲界謂纏所纏等義五十四不善品隨信行隨法行信勝解見至身證義五十五不善品身見與有身見為幾緣與戒禁取修等義五十六一行品謂九結等章及解章義已次廣釋五十七一行品集智已生滅智未生於見苦集所斷法義五十八一行品過去未來亦有愛結自相共相等義五十九一行品過去愛結亦有過去見結係若未斷義六十一行品三結乃至九十八隨眠為前攝後後攝前等義弗十卷大婆沙論六十一一行品為煩惱現在故退為退已煩惱現在前設爾何失二俱有過等六十二一行品欲界有退非餘界人趣有退非餘趣等義六十三一行品如是九遍知誰捨幾誰得幾有諸有情無得無捨六十四有情品生欲界聖者有三事命終一全離染等義六十五有情品隨眠一一盡何果攝問何故作此論等義六十六有情品聖道是沙門性有為無漏及諸擇滅等義六十七有情品諸不還者所成就無漏法此法不還擇也六十八有情品已離無所有處染信解脫轉根作見義六十九有情品此中欲界異生聖者幾隨眠隨增幾結係耶七十有情品住中有位為經幾時經於少時速求生故於六處門遍求生緣往和合也離十卷大婆沙論七十一十門品二十二根九十八隨眠如是四十二章及解章義既領會已應廣分別等七十二十門品意及法為緣所生意識是名意識界等義七十三十門品眼見欲界色時於彼色起無覆無記義七十四十門品云何建立內處外處為依何法為依於我等義七十五十門品謂契經中説有五取蘊故分別其義等七十六十門品為欲遮遣補特伽羅及為顯示智殊勝等七十七十門品四大論師各別建立三世有異類相位待四也七十八十門品舍利弗云諸善法生皆四聖諦攝取等義七十九十門品苦聖諦應以惠遍知阿毗達磨智所遍知也八十十門品四靜慮欲令疑者得決定故品類足説初靜慮攝善五蘊等義節十卷大婆沙論八十一十門品離喜住捨正念正惠身受樂聖應説捨第三靜慮具足住等義八十二十門品四無量加行緣七有情而起分欲界等八十三十門品修慈定者刀毒水火皆不能害必無災橫而致命終八十四十門品空無邊處乃至非想非非想説等八十五十門品有比丘來詣佛所説有明界淨界空無邊處界等八十六十門品無色界修所斷無明隨眠一一有幾等義八十七十門品隨眠為所纏及相應縛寬狹不等應作四句八十八十門品意根通三界九地五部有漏及無漏法等義八十九十門品苦集諦緣識有漏緣識有為緣世欲智等九十十門品無色界修所斷無明隨眠一一所增隨眠當言有尋有伺等義十卷大婆沙論九十一十門品眼根乃至無色界修所斷無明隨眠滅緣識及緣識於九十八隨眠中等義九十二十門品眼界斷道緣識及緣緣識一切有情皆成就等義九十三學支品如世尊説學行迹成就學八支過現未幾等也九十四學支品諸異生位無得無捨此四誦行唯無漏故等義九十五學支品或有説諸有為法皆是見性行相猛利故等九十六學支品舍利子善知入出覺支定心隨心所欲能自在故等九十七學支品諸法念覺支相應彼法擇法覺支相應等義九十八五種品云何邪見謂無施與無愛樂無祠祀乃至云何正見等九十九五種品沙門婆羅門等捨惡見趣而不取者少中復少也一百他心智品云何他心智云何宿住隨念智諸有情類有流轉者有遠滅者流轉者等廉十卷大婆沙論一百一他心智品傍生趣亦有生處得智能知他心有虎將兒子乃云汝母五百生常害我等故一百二他心智品阿羅漢恆於此法殷勤守護寶愛執藏等一百三六通中幾是明非示道幾是示道非明隨念智證通等一百四他心智品預流於四顛倒幾已斷幾未斷一切已斷等義一百五他心智品於見道説無相聲者隨信行隨法行不可施設等一百六修智品謂八智或有一智攝一切智法智非如法智以智等一百七修智品八解脫道中現在唯修世俗智未來亦唯修等義一百八修智品諸結法智斷彼結滅法智作證為止他宗等義一百九七聖品隨信行乃至俱解脫於八智幾成就幾不成就等百一十七聖品諸法集智相應彼法滅智相應道智空無相三摩地非一心故等義也退十卷大婆沙論百十一七聖品若得此中得者已得名得謂苦類智現前以後後諸得言皆唯此釋義也百十二惡行品三惡行三不善相為前攝後後攝前等義百十三惡行品三惡行十不善業道為三攝十十攝三耶為分別契經等百十四惡行品身口意三業黑黑白白黑白非黑非白四業也百十五惡行品順樂受業順苦受業順不苦不樂受業等三業也百十六惡行品此業能取一劫壽果為是何劫大中小劫等百十七邪語品邪語邪命有律儀有不律儀有住律儀等義百十八邪語品諸法由業得彼法當言是善不善等義百十九害生品頗有害生殺生業不善順苦受異熟等義百二十害生品別解脫律儀為但從所能有情處得亦從非所處得耶則律儀有增減顛十卷大婆沙論百二十一害生品若業未離染彼業異熟未離染耶謂犢子部説五部業所得等義百二十二表無表品若成就身表彼成成就此無表耶如是等義百二十三表無表品頗有業有漏有漏果耶依三果作論等百二十四表無表品唯受三歸成近事不唯有律儀缺減義百二十五自業品若業是自業此業定當誰受不受等百二十六自業品云何比丘留多壽行作此論分別契經等義百二十七大造品大種所造處幾有見幾無見如是等章義百二十八大造品大種所造幾有色幾無色無無色故不同百二十九大造品諸四大種依何定滅欲顯佛出現世間有功德百三十大種品如是四食幾牽當有令現在前幾持今有令相續住有作是説段思觸識等四也沛十卷大婆沙論百三十一大造品如契經説有長者自手食空中有神為説四向四果自省平等心義百三十二緣品大種為幾緣若堅不堅物轉相作不捨自相等百三十三緣品欲界係大種為幾緣俱有同類俱生互相望等百三十四緣品已説成立風水金輪諸海山洲地居器次辨空居百三十五具見品未離欲染何大種所造生欲界作色界化等百三十六具見品心起住滅此增語所顯剎那此應半月等義百三十七具見品慧為自體若爾何故以想為名由此聚中想等百三十八執受品有執受大種為幾緣因相應法等義百三十九執受品身受心受止他宗顯己義説受即是心分位差別百四十執受品以無間緣證預流果修彼道時四念住幾現在修幾未來修有未修而已得匪十卷大婆沙論百四十一執受品四念住總説唯一謂心所中一慧自性根中惠根力中惠力覺中擇法道中正見也百四十二根品二十二根幾學幾無學幾非學非無學如是等章百四十三根品已見諦者已現觀者諸學惠惠根及所有根信百四十四根品二學一無學十非學非無學九應分別未知當知百四十五根品幾根見苦所斷遮説頓斷意由未遮頓現觀百四十六根品幾因相應欲止説因緣法非實有者等義百四十七有品欲有相續最初得幾業所生根如是等章百四十八有品諸根無漏緣欲界係此根法界相應耶等百四十九觸品有對觸增語觸明觸無明觸等十六觸百五十觸品若天眼現在前時生得眼為斷不若斷者云何不異熟生色等義虧十卷大婆沙論百五十一等心品一切有情心當言等起等住等滅耶如是等章及解章義廣分別百五十二等心品無想定自性云何不相應行蘊為性等義百五十三等心品此中何者是想何者是微細何者是微微百五十四等心品住滅定者不為火水毒刃等所害所殺等百五十五等心品欲界沒生欲界時幾根滅顯示多門故百五十六一心品諸法與心一起一住一滅無學正見相應正思惟等百五十七得品諸得過去法彼得過去耶如是等章百五十八得品問得非得何差別謂名得名非得無漏等百五十九得品諸法善無色起彼法善心俱耶等義百六十得品諸法無色界無色起彼法無色界心俱耶或無色界心俱或欲界心俱或色界心俱或不係心俱性十卷大婆沙論百六十一得品味相應初靜慮入當言味耶出當言味耶令疑者得決定故百六十二得品思性何等入慈定何等入悲入喜定等義百六十三緣品有等至八等至三淨初靜慮有四種順退等百六十四緣品有不修淨初靜慮亦非無漏謂已得智等百六十五緣品一入正性決定二得果三離染四轉根此中依等百六十六攝品無常想無常苦想苦無我想死想等百六十七攝品攝四靜慮四無色四解脫遮自性攝等百六十八攝品為止撥無成就不成就性意顯成就是實等百六十九攝品頗有成就味相應非淨非無漏等義百七十攝品若等至隨以何淨靜慮為因即以彼為所緣耶一一依淨靜慮等靜十卷大婆沙論百七十一攝品色愛盡起欲界梵世纏退時若無色界沒生欲界梵世等百七十二攝品五蘊五取五趣五妙欲五學處依何定滅百七十三攝品眼所識可愛可喜可樂如意能引欲可染等百七十四不還品有五不還中生有行無行上流般涅槃等百七十五不還品佛告比丘有七善士趣能進斷餘結得涅槃百七十六不還品五淨居無煩無熱善現善見色究竟百七十七不還品以何為自性為身業為語業為意業等百七十八不還品如菩薩經三阿僧祇修四波羅蜜而得圓成百七十九不還品願智為加行得為離染此中有説佛盡智百八十不還品尊者婆呬迦等心濡心調柔心和順名異義一如其次第以後釋前別顯無憍心情十卷大婆沙論百八十一不還品佛説我弟子中大迦葉少欲喜足具杜多行薄矩羅少病節儉具淨戒行百八十二不還品佛轉法輪一切天人魔梵無能如法輪者百八十三不還品轉法輪已地神唱聲展轉空告無有餘天神告言百八十四一行品三三摩地無空相若成就過去空過去無願百八十五一行品為止撥無去來二世及説無未來修者欲顯如是事等百八十六一行品諸不定彼一切罪聰惠無明趣耶等義百八十七念住品身受心法如是等章及解章義領會已廣分別百八十八念住品聞思修三種所成差別念住思惟分別百八十九念住品若入正性離生苦集現觀各四心頃道現念住百九十念住品受樂身受苦身受不苦不樂身受及苦心受時如實知此一智謂世俗一切身逸十卷大婆沙論百九十一念住品羅漢已斷不善法成就善法應住善心而般涅槃欲令此疑得決定故百九十二念住品如來入滅盡定時未是般涅槃等義百九十三三有品捨欲有則欲有相續欲界命終生初靜慮百九十四三有品諸有欲令此中通依得修習修無常百九十五三有品一切雜染無明為根本所有種種惡不善法百九十六想品諸法無常想見相應受幾隨眠增等百九十七智品若事通達則遍知也若法與彼法作所緣等義百九十八見品諸有此見無施於生死中起大執著等義百九十九見品諸有所受皆以自在變化為因此非因計因二百見品後際分別見中十六有想論者謂初四種依三見立如説一類補特伽羅起如是見右大婆沙論六十卷者北涼道泰等所譯也二百卷者大唐奘法師所譯也然皆釋八犍度發智二論其二論又亦同本異譯也推其源會其宗則一論八蘊聚分四十四品耳支為多部多卷也若北涼譯者遭魏兵戰爭侵奪之際故缺略而不完也唯唐譯者遇太平無為聖世尚於理實而治天下抑亦奘法師親從佛土而還故能精詣也其二百卷中備引如來所説緣起剖判要義廣解世第一法暖頂忍蘊處界諸禪定觀境妙理也如是則誠難撮略今止於逐卷之初標一義兩義以例餘義故卷卷標乎等義所以然者等其無窮之義見定境無涯矣俱舍論頌并釋計五十三卷真諦譯二十二卷奘法師譯三十一卷婆藪此云天親造也頌一卷天親菩薩造也説一切有部作八品一分別界品四十四頌二分別根品七十四頌三分別世界品九十九頌四分別業品一百三十一頌五分別隨眠品六十九頌六分別聖賢品八十三頌七分別智品六十一頌八分別定品三十九頌已上六百頌為論之本也心十卷阿毗達磨俱舍論釋二十二卷一此論對法淨慧了明定境也淨智為助伴也擇法顯無垢也分別界品具明十八界及論主作論本意宗如來所説三藏中法相深微名實要旨摧其異説顯正教妙趣成種智也二分別界品中十八界何法能斫所斫能燒所燒能稱所稱等義分別根品二十二根已根義云何最勝自在為義於自事用中三分別根品中應當思量是諸有為法如彼自相更互不同為如此彼生亦不同為有諸法決定俱生亦有以一切法等四分別根品中説二定以何法為命此藏中説何者為命根三界壽五分別根品中是因於他生有分皆是無常此無為法等六分別世間品諸天地獄修羅餓鬼一切諸趣所修所報業果差別現量善惡境界微細具明顯佛教所談不虛七分別世間品一切陰相續牽引不平等能感壽命業有差別故此相續隨能引勢如此次第等動八卷俱舍論八分別世間中行有於業諸惑如種子及龍如樹根種子芽業等生龍住處常不拈涸相續等義九分別世間品論三千大千界四大州夜摩天四天王天宮殿莊嚴壽命身形等量劫數長短大小等一一差別相十分別業品世間多種差別皆從業生云何因衆生業一意業二意所造業由此所造但意所作非身口所作若總成三業也十一分別業品中一切人於護不護及中住乃至造有教業未竟是時中與現世有教相應若有教或有覆或無覆等義十二分別業品業有五品不定受業分為二於報或定報或不定此中現法應受業者於此生造業於此生受等義十三分別業品中由分別安立業道此中是義應説幾種業道故意與彼相應俱起意與八惡業一惡業道俱等也十四分別惑品以説世間多種異從業生諸業由隨屬惑故至得生長若離隨眠惑於生諸有諸業無復功能等義十五分別惑品衆生惑已相離惑滅苦下惑同境惑九品惑遍行惑已滅未滅已斷未斷相應不相應由少功力不能頓除等神二經俱舍論七卷十六分別聖道果人品一由見道所滅二由修道所滅依世修及依出世修故見道一向治三界惑十七分別聖道果人品中二退以非至得為性違退必由罪過或捨退則不定已得暖後苦退隨必定以涅槃為法等義十八分別聖道果人品中如凡夫生初定地以上由捨欲界惑滅離至得與彼惑更不相應乃至一切解脫道一切地等義十九分別慧品已説諸忍及諸智已説正見及正智諸忍為非智正智為非忍正見乃至盡智無生智非見非決度等義二十分別慧品中一切凡夫及聖人由通於一切智修諸德已十八不共法得佛法謂力等此法唯佛世尊一人於盡智生等義二十一分別三摩跋提品依止智慧一切功德謂智惠種類分別説已別性類功德今當分別解脫等二十二中破説我品非如我見誑於心故彼人不於五陰相續中立我由彼分別有別實物名我一切惑以我執為生本故等俱舍論本頌前已標分疲十卷俱舍論三十卷一天親菩薩造奘法師譯也欲造此論先明佛德尊高超諸聖衆也分別界品自有漏無漏三無為四聖諦五蘊五根色法中形色顯色各別了別如遠觀察軍衆山林等二分別界品十八界中幾有見幾無見幾有對幾無對幾善幾不善幾無記色界有見以可示現此彼差別等義三分別根品如是因界已列諸根即於此中根是何義最勝自在光顯名根由此總成根增上義誰望於誰等四分別根品今應思擇一切有為如相不同生亦各異為有諸法決定俱生色聚極細立微聚名顯無細也等義五分別根品如是已辨得非得相同分者有別實物名為同分謂諸有情展轉類等有差別無差別等義六分別根品不相應行前言生相生所生時非離所餘因緣和合此中何法説名因緣能作俱有同類相應遍行異熟六因七分別根品契經中説四緣性因緣性等無間緣性所緣緣性增上緣性此中性者是緣種類於六因內除能作因等八分別世品已依三界分別心等今次當説三界是何各於其中處別有幾謂地獄等四及六欲天并器世間色界無色等九分別世品當往何趣所起中有形狀如何若業能引當所往趣彼業即招能往中陰若往彼趣即如所趣當本有形也十分別世品無明何義謂體非明如諸親友所對怨敵親友相違名非親友非異親友繫縛瀑流觸緣等一切義守十卷俱舍論十一分別世品三千大千世界安立形量風輪水輪金輪諸有情業增上力依止虛空等處十二分別世品諸器界中壽量劫數時分長短國土山川轉王出現治化有佛無佛一切有情所作業報等十三分別業品前説有情器二種世間各多差別由誰而生偈云世間由業生思及思所作思即是意業所作謂身語等義十四分別業品應辨前表無表相律儀不律儀非律儀非不律儀能遮能滅惡戒相續別解脫靜慮生道生三律儀等十五分別業品三種律儀欲界中別解脫此從一切根本業道及從加行後起而得即情非情性罪遮罪從現得等十六分別業品佛依業果性類不同所治能治説四種業欲界善名白不善名黑善有雜染名黑白善染超勝非黑非白十七分別業品十業道中唯後三道業之道故立業道名彼相應思説名為業彼轉故轉彼行故行如彼勢力也十八分別業品五無間為業障體其體是何四是身業一是語業三是殺生一虛誑證根本業道一是殺生業道加行十九分別隨眠品前言世別皆由業生業由隨眠方得生長由此隨眠是諸有本故業離此無感有能一切法相等二十分別隨眠品諸有情類隨眠隨增名係有其二種一者自相謂貪嗔慢二者共相謂見疑癡事過現未三世遍行等真十卷俱舍論二十一分別隨眠品即諸煩惱結縛隨眠隨煩惱纏義差別九結三界三見二取如是等義二十二分別聖賢品已説煩惱斷於九勝位得遍知名然斷必由道力由見諦道及修道故道唯無漏非世間道等義二十三分別聖賢品已説入修心便得定復何所修依己所修成滿勝止幻四念自相共相各別自性一切有為皆非常住二十四分別聖賢品已辨住果未斷修惑名為預流生極七返今次應辨斷位衆聖且應建立一來向果進斷修惑等二十五分別聖賢品如前所説不動應果初盡智後起無生智諸阿羅漢如預流等有差別不由種性異有六法也二十六分別智品前説諸忍諸智後説正見正智聖惠忍非智有漏無漏二慧無漏立聖名盡智無生智二智也二十七分別智品已辨諸智差別佛盡智十力智一切所知境中智由諸智性成就佛身一切功德殊勝妙法智性二十八分別定品已説諸智所成功德餘性功德今次當辨所依止定且諸定內修四靜慮攝心一境專一所緣等定二十九分別定品所依止定當辨依定所起功德諸功德中有四無量定無量有情為所緣故引無量福感無量果故三十破執我品豈無解脫理必無有虛妄我執所迷亂故此法外諸所執我非即於蘊相續假立若唯五取蘊名補特伽羅何故世尊説云吾今為汝説諸重簷可説無常非實有性不可説常住實有等義右俱舍論三十卷釋六百餘偈分別界根世隨眠聖賢智定破執我等九品乃微細解其名相顯大乘對法淨惠宗旨觀境次第禪定相應離諸煩惱繫縛以成聖果矣順正理論西竺衆賢尊者造此論本名俱舍雹破天親所造頌論也後見理勝己義遂改名順正理謂順其契經聖者所製論頌正實妙理又復依顯宗論明其撮要也皆唐三藏奘法師譯也志十卷順正理論八十卷一辨本事品辨蘊處界等法及作論本意與前論同釋俱舍六百偈此為初也二本事品中亂心無心等三本事品中自性處界等四本事品中顯根境識等五本事品中火界少不增強即名冷等六本事品中十八界中幾內幾外六根六識等七本事品中已説三根取非至境等八本事品中眼若是見不言能見以眼為門等九辨差別品已列諸根更應思擇法義等十差別品中因分別界已廣辨根諸行俱生為遣邪宗顯正理故滿十卷順正理論十一差別品中作意別有亦如經説心由意引發故生故此定應是大地法無別一法名作意也十二差別品中無色法中已辨心心所法等十三差別品中思擇滅盡定中滅一切心心所法十四差別品中爾時此法為名安住名壞滅等十五差別品中前言生相生所生時非離等十六差別品中能養能生或遠或近等流果十七差別品中已辨六因相別世定必應對果十八差別品中前説六因此辨五果何果何因等十九差別品中等無間緣何法為性非後已生心心所法乃至為簡未來無為法故二十差別品中如是因緣有何差別此就實體差別都無應説因緣如何相攝己前已説因緣五因性等逐十卷順正理論二十一辨緣起品已依三界辨得心等念思擇三界是何各於其中處別有幾等相二十二緣起品中已説諸界趣中如其次第識住有七生處等二十三緣起品中前説地獄諸天唯大化生此中何法説名中有二十四緣起品中如無色界沒中無連續欲色界色生等二十五緣起品中已説內外羯剌蘊等種等道理因果等二十六緣起品中結生識後六處生前中間諸位總稱名色云二十七緣起品中如是所成取為緣故馳求可意境時等二十八緣起品應知如是所説三際唯有情數緣起義中十二支等二十九緣起品中已辨無明當辨名色何故名名能表招故三十緣起品中已辨緣起即於此中就位差別分成四有中生死本如前已説今辨三界有無善等差別一切煩惱物十卷順正理論三十一緣起品中有情世間器世間風輪水輪金輪四大洲山川境物諸天時分數劫住異壞空等三十二緣起品中以勝覺惠分析諸色至極微故色少等三十三辨業品此中一類隨順造惡性難論者作如是言非業等三十四辨業品於正法內有作是言身及山等久住不滅等三十五業品中已辨二表業相無表業相初品已辨等三十六業品中已辨業門謂思思已業差別故等三十七業品中如是建立表與無表於中律儀三種差別云何而得三十八業品中諸有歸依佛法僧者為歸何等者三十九業品中別解脫律儀從何而得復從何而得餘二律儀等四十業品中因辨諸業性相不同經中所標諸業所謂善惡無記三種業也其相云何安隱為善不安隱為惡也意十卷順正理論四十一業品中如經中説有四種白白黑黑白黑非白非黑無異熟業能盡諸業等四十二業品中今應思擇成業道相謂齊何量名自殺生四十三業品中道能證斷及能斷惑得斷道名即無間道此道等四十四業品中住定菩薩為從何位得住定名為何説名為定四十五辨隨眠品此隨眠是諸有本故業離此無感有能等義四十六隨眠品中如前所説六種隨眠復約異門建立為十等四十七隨眠品中由因教力有諸愚夫五取蘊中執我我所此見名等四十八隨眠品中唯見苦集所斷隨眠力能遍行不共無明等四十九隨眠品中為顯上義復應思擇九十八中隨眠幾由所緣五十隨眠品中因辨隨眠不善無記傍論已了今因思等何等隨眠於何事係何名為事事雖非一於此中等移十卷順正理論五十一隨眠品中實有過去未來現在了教正理俱極成故若爾三世由何有別等義五十二隨眠品中如是所許一切有宗自古師承差別有幾五十三隨眠品中因辨隨眠於如是位係如是事傍論五十四隨眠品中即隨煩惱結縛隨眠隨煩惱纏義有別五十五隨眠品中所辨隨眠及隨煩惱於中有幾唯依意地五十六隨眠品中已辨諸惑對治修能對治勝進位中所斷五十七辨賢聖品如是已辨隨眠等性雖有無量建立五十八賢聖品中此中餘部有作是言定無實樂受唯是五十九賢聖品中今應思擇於聖諦中求真見者六十賢聖品中言息念者即契經中如來所説阿那阿波那言阿那者為持息入等堅十卷順正理論六十一賢聖品中所修偈云彼居法念住總觀四所緣修無常及苦空無我行相等義六十二賢聖品中順解脫分入觀次第是正所論於中已明等六十三賢聖品中已破所宗唯執八心名諦現觀等義六十四賢聖品中見修二道當依此道分位差別建立衆聖六十五賢聖品中依不還位以種種門建立差別等六十六賢聖品中修道有二一者有漏二者無漏思擇六十七賢聖品中沙門果沙門性此果體是何果位差別六十八賢聖品中不動種性必無退理唯前五動性有退義六十九賢聖品中所有解脫必無退理是無漏道所得果故七十賢聖品中復以何緣諸阿羅漢等離有頂染同不受後生然於其中有於煩惱證不生法等義持十卷順正理論七十一賢聖品中思擇一切道唯有四種加行道無間道解脫道勝進道由此有得果義七十二賢聖品中修覺分時必獲證淨此有幾種依何位得七十三辨智品正見正智名無學支非智非見建立見智二支等七十四智品中所言行相為但名別實亦有異行相乃能行所行七十五智品中已辨諸智差別智所成德顯示於中佛不共德七十六智品中已辨智無礙解次説法義詞辨四義也七十七辨定品今辨智所依定唯諸靜慮能具為依故此中先説七十八定品中我宗許正在定位由勝定六起順樂受妙經七十九定品中已辨等至云何等持有尋有伺無尋唯伺等四也八十定品中已辨無量以辨八解脫中微細差別行相無貪性滅受想自地淨心無間無漏等顯宗論衆賢尊者造前順正理論以謂文義結縛鈍者難究以成真觀又撮其要義成於此論顯其契經正理以暢對法淨惠宗由者也雅十卷顯宗論四十卷一序品相作論因由弘讚佛德及顯宗旨以述俱舍正理妙義也本事品初章二本事品五蘊等三本事品界處等四本事品修斷也五辨差別品説根名等六差別品中説大善地法等七差別品中性差別等八差別品中離所相等九差別品中俱有因相十差別品中已辨因果相果有差別等操十卷顯宗論十一差別品中緣與因義十二辨緣起品説三界相等十三緣起品中説三界化生中有等相十四緣起品中無明名色等十五緣起品中因果相續十六緣起品中有情器世等十七緣起品中外器量別身量等十八辨業品世別因業等十九業品中謂身語等也二十業品中起殷淨心發誠諦語等義也好十卷顯宗論二十一業品中得律儀捨於律儀二十二業品中身語意三清淨等二十三業品中業道善惡得果等二十四業品中住定菩薩等義也二十五辨隨眠品業感由隨眠故等二十六隨眠品中幾由所緣二十七隨眠品中次第生時誰前誰後二十八隨眠品中隨煩惱等二十九辨聖賢品初而就勝位立九遍知等義三十賢聖品中入修二門心便得定心得定已復何所修爵十卷顯宗論三十一賢聖品中分位差別建立衆聖三十二賢聖品中三向四果等三十三賢聖品中退法思法護法等三十四賢聖品中菩提分法三十五辨智品初正見正智等三十六智品中頓修幾智等三十七智品中佛無量功德等義三十八辨定品初智所依定等三十九定品中諸等至隨無應等四十定品中所依止定依定所起諸功德慈悲喜捨等右顯宗論與前順正理論并俱舍論及俱舍釋論共四部總一百七十二卷皆釋天親菩薩所造俱舍六百餘偈分為八品或九品增減在乎取意也偈本則同釋義各異其間亦或同或異然皆稱揚如來所説對法藏詮明淨惠妙理深辨觀定境趣與婆沙諸論通貫義意故此止標品類以照前後不多撮義緣者恐煩定心智者知焉自二論阿毗曇心論四卷一法勝尊者見諸大論師造婆沙俱舍等論或太廣或有太略習學弟子難為究覽遂取中之制作於此論也如大般若六百卷而有十四行般若心經耳此中義亦然撮略諸部之要故云心也界品明地水火風四大界相十八界中所緣觀覺行相體性執受取捨一界一陰一入所攝一切法也行品一切法不能自立由一切心也一切心同一緣行不相離故行與心俱諸行相應行不相應行所作行等也業品身口意善業惡業由諸行諸界所作也二使品貪嗔癡慢疑身見邊見邪見戒取戒禁取此十為根本三界九地四觀行觀四諦見修所斷九十八使心為煩惱主賢聖品不停心者無由起正見觀不淨相身受心法於四諦中一一觀之成十六行於暖法中生無漏智火能燒一切行薪成立頂位於頂增長善根名為忍也若忍已成立一切世俗中功德中最勝善根名世間第一法開涅槃門立賢聖位四果四向以次起進三智品法智未如智世俗智有漏智無漏智苦智集智滅智道智盡智無生智以此智行決定行無漏心中建立他心智等也定品以知諸智依智成定依諸定行求其真實如燈依油離風光焰明微智依定故離亂心智光甚明然不出四禪八定也四契經品依如來契經中所説諸天諸世界諸禪定境建立四沙門果聲聞辟支佛地三十七品四諦十二支二十二根等一切義趣雜品心及心數此名差別一切行一切緣是故説有緣更五相應故有有為法三界善惡雜染雜業雜報雜果一切心所現也論品威儀不威儀等十偈是作論之本旨漸次明其修習定境斷煩惱從初無漏心得餘無漏功德捨凡夫事得佛法事阿毗曇心論扇多尊者造此論六卷釋前法勝尊者所作心論也亦謂解此論旨令習定者易成觀行一此卷解界品行品二義也二此卷解業品使品初二義也三此卷解使品之餘及賢聖品二義也四此卷解智品及定品初五此卷解定品之餘及修多羅品之初二義六此卷解修多羅品之餘及雜品論品二義以此六卷中品名照前四卷中義也縻七卷雜阿毗曇心論十一卷法救尊者造此論釋前法勝所造心論也謂諸師所作廣略不同或六千偈或八千偈或一萬二千偈此為廣也法勝論本四卷又略也今博約取中成於此論俾其修習易覽其文易曉觀智也一序品界品二義論文也二行品論文義也三業品論文義也四使品論文義也五賢聖品論文義等也六智品文義七定品論文義也都三經雜阿毗曇心論八修多羅品論文義也九雜品論文義也已上九品與上同前論品今此云擇品上擇品下二分義也十擇品上説五阿那含利根及軟煩惱作中陰業等十一擇品下如法識法明法謂知一切識一切明一切法等甘露味論二卷上尊者瞿沙造此論二卷十六品若依修習禪定去除煩惱得法喜禪悅之食如飱甘露味成聖果也布施持戒品財法二施也善惡三律儀也界道品三界諸天六道十八界也住食品段觸思識四種有情住也業品一切諸善惡從身口意三業所起也陰持入品五陰十二入持其有情生死也行品相應行不相應為煩惱業係也因緣種品十二因緣二種業行七種苦識也淨根品明二十二根所緣有漏無漏煩惱等也結使禪智品九十八使二種斷見三界所修斷得盡即成禪智也三十七無漏人品坐禪先繫心一處若頂上若額端若眉間若鼻頭若心中令心一處住若念走攝來處處是心如繫獼猴在柱雖繞柱走去不得漸漸成其定境於中隨其根利鈍證四向四果聲聞辟支及諸天所修差別成三十七人也下智品則法智未知智等十智也禪定品得禪定一心心不分散智慧清淨八禪諸定也雜定品入智解脫禪三三昧空無相無願五受陰十想六通一切三昧定隨意所入也三十七品四念住四正勤四如意五根五力七覺八正也四諦苦集滅道三界所斷也雜品四沙門果五陰入一切凡夫法四無色四顛倒六十二見五邪見三界係相應法不相應法自地煩惱心心數法等義隨相論德慧法師作此論解四諦所係成十六諦謂無常苦空無我各有四兼本四諦成十六也隨其苦集滅道相分而解其義謂隨相論也然其間所論三界見修所斷欲令修習人生正見正信近正師求正教得正聞如正修成正定得正道證正果然後起大悲心入鄽垂手利有情也邑七卷婆須密菩薩集論十卷一師子月如來示現於佛會中先為長者子後出家名婆須密也集佛所説偈而作此論十一品十四犍度分別蘊聚成就定境耳聚犍度首一明色相四大所聚現此相也聚二口是口行者身非身行口與口行無異也聚三心心法因緣不思惟緣心心法也聚四過去未來受亦不樂不苦也云何得知我苦我樂等二聚五佛説四事攝人更相共攝也聚六不可食彼食以何等故佛説不可食也聚七我以佛眼觀彼衆生利根鈍根也已上聚犍度中七品義也三心犍度首心意執持不去乎手心自然持也一心一一心緣心境界心相應心顛倒不顛倒心一切諸心等也四三昧犍度賢聖來集佛會有二緣或論經或默然也天犍度論三十三天快哉善生處也此二度皆修定境也五四大犍度論地水火風四大相生相因相緣造作成物也契經犍度佛經中説四沙門果等聖賢修進有自利利他六更樂犍度欲中染著樂現世無事樂此二樂不應學也更樂為二嵎更樂習為二嵎痛癢處中其義云何七結使犍度垢穢隨顛倒不顛倒及六十二見乃至一生一住一滅九結十使義等華三經婆須密集論八行犍度不以究竟盡諸行不得羅漢及一切行也智犍度修四禪四果四諦諸行相定也九見犍度諸法因緣一切諸行各各自因自果也根犍度五識身境界四意止而回轉及諸根也偈犍度盡形壽愚癡謂無勢力知善語惡語盡形壽智慧近善人聞善法也偈犍度革囊盛糞義愚所樂也十偈犍度不能渡生死流復不能渡有想無想一切有犍度謂十二入十二因緣是一切有也集偈度等覺一切智十力四無畏等也三法度論尊者山賢造釋僧伽先所撰本也德惡依三法為標一法中作三真度成九也其論三卷上德品覺德則善勝法也三施三歸三相三根三修三種契經三種師弟子三功德三衣三種伏根三假名具説三真度中惡品惡者惡愛無明當知是惡行善行故身口意惡行三種為惡根惡人所行也殺盜淫又為三根本惡也云云下依品已説德及惡云何為依所謂依者陰界入此三是依可依説依可依者是立義作依行德及惡知此是德惡所依也入阿毗達磨論上犍度阿羅漢造斯論謂聰慧者於如來聖教具足聞持劣慧者聞對法藏中名義稠林便生怖心今於法相海中作此論令其易入也自色心而起解其根境所偶一切名相令了成定下欲取見取戒禁取我語取此四為種一切諸煩惱海自此而波浪無邊汩沒有情隨死生流無有休息也成實論十六卷訶梨跋摩尊者造斯論明佛三藏中真實妙義成就一切正見破諸邪妄夏八卷一佛五具足品戒定惠解脫知見具足也十力品是處非處智力等也四無畏品漏盡説障法諸苦盡道等也十號品如來善逝佛世尊等也三不護品身口意佛無不淨故不護也已上佛寶也法寶三善品入時行時出時於佛法無不善也衆法品我法能滅能到涅槃及一切法也十二部經品修多羅乃至提舍等也清淨品戒定慧解脫知見五品皆淨也賢聖品四果人是也福田品斷盡煩惱能為福田也吉祥品佛法僧為天上人間最吉祥也二立論品廣造斯論以論佛語佛不自論也論門品一世界門二第一義門也讚論品習此論者得智人法也四法品愛語布施利行同事也四諦品苦集滅道也聚品習此論通達一切心心法聚等也有想品有言二世無一切有有云一切無心不相應等也無相品若謂陰界入有相即是無相也二世有品實有過去未來也二世無品若實有過去未來法即是無也一切有無品有云一切法有或云一切法無有無二法即一切法而中也三有中陰品或説有説無和合時見有也無中陰品若計有即顯無也次第品有説次第見四諦有云一時見也一時品四諦一時見非次第也退品有云阿羅漢退也不退品有云不退也心性品人心性本淨以客塵故不淨也相應不相應品諸心使有云相應有云不相應也過去業品有云過去未受也辨三寶品有云佛在僧數在四衆也無我品實無我法人謂有也有我無我品實言有即無若言無即有也色相品實論實名四諦也色明品色四大所成也四大假名品無實體故名假也四大實有品謂堅濕熱動為性也非彼證品四大性非有情證也明本宗品四大性與色法非一非異也無堅相品四大體無故性空故有堅相品能成一切物故四大相品各有其相也火有焰水有波風有動也四根假名品六根等皆假也分別根品各有功用也根等大品從五大所生也根無知品塵非根能知也根塵合離品識生其中明合離也聞聲品小語則不聞也聞香品香物相續生香也覺觸品不到可知遠住也意品念念生滅法則無去相無住相也五根不定品諸根定耶不定耶色入相品青黃等色名為色入也聲相品不説因聲成大也香相品衆香合故其香異本也味相品甜酸鹹辛苦淡也觸相品堅軟輕重強弱冷熱澀滑等也立無數品心意識體一而異名也立有數品心異心數法異等也非無數品心心差別名數也非有數品以相應故有心數法也明無數品若識若覺是諸相等也無相應品心與誰相應也有相應品受是神識心依之以相應故非相應品此識依止是受也多心品心為一為多心是一隨生故多也一心品知心於五根窟中動也非多心品為種種業取色聲也非一心品心一為貪等長污等也明多心品心一用為多業也識暫住品心為念念滅為少時住也識無住品念念不停也識俱生品諸識為一時生為次第生也識俱不生品念念諸識眼識等俱不見生也六想陰品取假法相名想也受相品苦樂不苦不樂也行苦品衣食等物皆是苦因也壞苦品無常壞時生苦也辨三受品苦受樂受不苦不樂受也問受品是人受樂受時如實知我受此樂受否五受根品樂根喜根憂根捨根等也思品何等為思願求為思也觸品識在緣中是名為觸也念品心作發名念此念是作發相也欲品心有所須是名欲也喜品心有好樂是名喜也信品未自見法隨聖賢語心得清淨是名信也勤品心行動發是名勤也憶品知先所更是名憶也覺觀品心散行數數生起是名為覺散心小微則名為觀也餘心數品若不行善或邪行善名放逸也七不相應行品得不得無想定滅盡定也業相品身口意業善惡也無作品因心生罪福睡眠悶等也故不故品故作業有不故作業也輕重罪品地獄業重餘輕也大小利業品成正覺大業也四沙門果小利業也三業品善不善無記三業也邪行品身口意三邪行也正行品身口意三正行也繫業品三界各有繫業也所繫各各不同也八三報業品生報現報後報也三受報業品樂報苦報不苦不樂報也三障品業障煩惱障報障也四業品黑業白業黑黑白白業不黑不白業也五逆品殺父害母殺阿羅漢破和合僧出佛身血也五戒品殺盜淫妄酒也六業品六道報果業也七不善律儀品則五戒中增口惡口兩舌七善律儀品改惡為善業也八戒齋品則八關也八種語品四種不淨四種淨見言不見也九業品三界各三種繫業身口意所造成九也十不善道品則十惡業也一切有情所習也東八卷成實論九十善業道品轉十惡成十善也過患品以不善業受地獄苦也三業輕重品身口意何為重也明業因品因生業生因滅業滅也煩惱相品心行名為煩惱也貪相品欲貪有貪也貪因品邪憶念中生色等欲也貪過品凡夫顛倒受欲無厭也斷貪品習不淨觀也嗔恚品若嗔此人欲令朱滅也無明品我心生即無明也由無明故一切惡法起也十憍慢品邪心自高名慢也疑品於實法中心不決定也身見品於五陰中生見名身見也邊見品或斷或常名邊見也邪見品於實有法而生無心名邪見也二取品於非實事餘皆妄語名見取隨煩惱品心重欲眠名睡心攝離覺名眠等也不善根品貪嗔等也雜煩惱品有漏欲漏無明漏也九結品貪嗔癡慢疑等法也十一雜問品一切煩惱十使所攝也斷過品無量心斷諸煩惱也明因品煩惱為身因也立假名品假名心法心空心也假名相品假名中示相真實也破一品此一等四論色等一一不名為地也破異品異論中離色等法也破不可説品不可説論中無有於一異也破無品若無則無罪福等報也立無品諸法實無不可得故破聲品心念念滅聲亦隨滅也破香味觸品香不可取味觸何有也破意識品亦不能取法也破因果品於因於果了不可得世諦品一切諸法以世諦故有也十二滅法心品何謂法心云何當滅也滅盡品泥洹是名空心也定因品入正道三昧智也定相品心住一處是三昧相也三三昧品分修三昧共分修三昧聖正三昧也四修定品四禪天所修定也四無量定品慈悲喜捨也五聖三昧品初智二智三智四智五智乃四禪定修成也六三昧品則神通境也七三昧品七依七處得聖智也八解脫品觀內有色等八也八勝處品八解中超勝也初禪品定生喜樂也三界九地中漸次修習所斷而至也十三二禪品妙生喜樂地也三禪品離喜妙樂地也四禪品捨念清淨地也無邊虛品則空無邊處定也三無色定品識無邊處定也滅盡定品非非想處定也十一切處品無所有處定也無常想品苦想無我等十想也苦想品若法侵惱是名為苦是苦也無我想品破壞一切法何處見有我也十四食厭想品一切苦生皆由貪食也不可樂品一切世間皆苦心無所樂也不淨想品觀身七不淨也死想品於壽命中心不決定也後三想品已生惡不善已善不生惡等也五定具品定具及定次説定定具若有定具則定可成也惡覺品具足善覺則惡覺不起惡覺者貪覺等也善覺品惡覺既除唯善覺也後五定具品具善信解行者好樂泥洹也出入息品十六行中念出入息數也定難品是空離障諸難能成大利也損減善根增長不善皆名定難勤求捨離也十五止觀品則定慧因也修定品是定中念念生滅也智相品真慧名智也見一諦品但見滅諦餘諦可知也一切緣品若智行界入等名一切緣也十六聖行品空行無我行也見智品正見正智即是一體也三慧品聞思修也四無礙品法詞義語也五智品法住智泥洹智無諍智願智邊際智也六通智品天眼天耳他心等也忍智品智能破假名是名忍也九智品盡智得世俗九智也十智品法智比智他心智名字智四諦智盡智無生智等也四十四智品老死智老死集智老死滅智老死道智等一切智也七十七智品生緣老死過去現在未來中亦如是是法住智觀無常有為作起等也右什法師所譯成實論十六卷以佛法僧苦集滅道七法為惣別開自如來五具足至七十七智計二百單二品也小乘教中一切名言法相無不具列若或提唱講授此可易檢為證貴談一事剖判一法有稽古耳西十卷立世阿毗曇論此論若經之文義也立世則建立世間一切有為之事如起世經耳一地動品水輪動即動大威德天比丘神力令動亦動此二因也南剡浮提品佛説此樹名也因斯立洲形量華果生處等也六大國品佛説南洲因樹立六大國土國中立王統領一切人民也夜叉神品佛説洲中立山建何遂有諸神夜叉八部等衆也二象王品佛説漏闍耆利國中有八千象王出現為國吉祥四天下品須彌頂四天王世界也數量品四大洲闊狹形量也天住處品帝釋諸天所居莊嚴也三歡喜園品諸天遊樂之處也衆車園品惡口園品雜園品波利夜多園品已上皆天人所修業果歡娛之處也四賴吒城品勒叉城品溥叉城品毗沙門城品此四天所居四城園林華果宮殿莊嚴等也五天非天鬪戰品諸天修羅鬪戰也日月行品日宮月宮所居周行也六云何品日月運行分晝夜四時由旬刻秒等也七受生品衆生造十惡業隨業六道中受苦果業報事也八地獄品佛説更生獄中受苦一切獄中惡相苦處事也九小三災疾疫品佛説所受劫數增減成住壞空等十大三災品火水風能壞一切世界有為相物等歸於空也二十二卷解脫道論大光羅漢造此論欲令樂離縛者修解脫道聞解脫義得涅槃樂也一因緣品偈云戒定智慧無上解脫隨覺此法有稱瞿曇戒者威儀義定者不亂義慧者知覺義解脫者離縛義無上者無漏義隨覺者知得義此法者四聖法義有稱者世尊義瞿曇者姓義以此解脫殊勝功德乃至廣説解脫分別戒品戒何相何味何起何足處何功德何戒義戒行戒差別戒道戒因云何令戒清淨謂思戒威儀戒不越戒及一切戒相行也二頭陀品坐禪人成就頭陀功德少欲知足無疑滅愛精進少求也分別定品清淨心不亂正住定根定力寂然不動如燈無風也三分別行品當觀其行欲行嗔恚行癡行信行意行覺行等分別行處品依止明師觀其所行授其觀行則三十八禪行等義四行門品説一切入則修地遍處定門境趣義也五行門品中四禪諸定相所修習也六行門品中虛空處定行相義七行門品中修習大安般定心所趣等八行門品中所修慈心等諸定也九五通品坐禪人定已成就得五神通勝力也分別慧品智慧劍慧根力慧光慧明慧等十五方便品陰方便入方便界方便因緣方便聖諦方便此為五也十一五方便品中分別四聖諦義相等也十二分別諦品坐禪人觀三有五趣七識住九衆生居成畏常現作意等也京七卷阿毗曇論如來在日舍利弗以佛所説義造此論三十卷以顯無比法義令後代佛子無乖諍也一問分入品辨內六入外六入成十二入義相二問分界品則十八界眼界等所造所攝等三問分陰品則五陰相所造義也四問分四聖諦品乃苦集滅道義也五問分根品則二十二根云何用等義六問分七覺品念擇法喜進除定捨等覺義也七非問分界品色東非色界可見界不可見界有對界無對界聖界非聖界有漏界無漏界有愛界等一切界背七卷阿毗曇論八非問分人品凡夫人非凡夫人性人聲聞人菩薩人緣覺人正覺人四果人一切等人義九非問分智品正見正智解脫智正覺智邪智聖智等一切智十非問分智品中退分智住分智增長分智解分智等十一非問分智中辨六道輪王所生非處是處及一切處十二非問分緣品善緣方便善緣解有緣方便聖忍聖智十二緣也十三非問分念處品獨在間靜修四念處除五盡成一道也正勤品謂四精進修習斷惡生善也神足也欲定精進定心定慧定悉成就也十四非問分禪品因緣具足則能得定愛護解脫戒成就威儀行勇猛修習成四禪定一一分別義相也邙八卷阿毗曇論十五非問分道品如來出世説種種道種種向道身念處道定慧道有覺有觀道等十六非問分道品中淨信一心無覺無觀成禪定也十七非問分道品中比丘心知分別食不淨相想於揣食心退沒不進等也十八非問分煩惱品斷惡法得善法斷苦法得樂法廣説不善法十九煩惱品中內集內法中欲染悲怖望難滿難足貪等也二十煩惱品中十煩惱十煩惱結一一分別其相分義趣等二十一攝相應分攝品一切攝非攝法若立攝門攝一切法也二十二分攝品中色苦諦係法幾陰界入攝集滅道諦於陰界入幾攝非不攝面二經阿毗曇論七卷二十三攝相應分相應品七十一相應門五識界各十二二識界各六十身觸十三心觸名觸等一切相應法義二十四緒分遍品十緣正法門遍緒七轉十行解一切法等入十緣謂因無間境界依業報起異相續增上已此緣次第分別二十五緒分遍品義中分別相續緣業緣等二十六緒分假結品若人眠沒見疑戒道結中一切結也二十七行品觸品分別心品十惡品十善分定品已上諸品則見品名其義可知蓋前大部中無不標顯也二十八分定品義中學除心行出息入息麁心細心等二十九分定品中共明想定謂火光日月星光珠光取諸光明相成定五事婆沙論二卷上法救聖者造斯論一自性事二所緣事三繫縛事四所因事五攝受事此五事也事者法也以此如縷繫華莊嚴身首貫此義華莊嚴心惠故分別色品謂色法是麁相就此令易習破麁入細戒定也下分別心品分別心所法品此二卷止三品前論色法此二論心及心所法一切法皆色心為首若了此二則心所有法亦不可得洛八卷鞞婆沙論十四卷一與前大婆沙論同本此略也皆立八犍度謂種種不相似立雜犍度也説結立結説智立智説四大立四大説根立根説定立定説見立見等八犍度也甚深智微妙法性一切智境界誰有此界無餘唯佛也三結品身見戒盜疑此三為邪根二三不善品三有漏處品四流處品四受處品四縛處品此卷五品見品名可見其義前大部已標也三五蓋處五結處五下結處五上結處五見處六身愛處七使處九結處等品可見義分也四解十門大章初二十二根品義五十八界處義門等也六十二處五陰處五盛陰六界等七色無色法處可見不見法處有對無對處有漏無漏處有為無為處三世處善不善無記處學無學非學非無學處見斷思惟斷不斷法處八四聖諦處已上品自思之照前見義也浮二經鞞沙論九四聖諦處餘品義也十四禪處定境義十一四等處定境法十二四無色處八解脫處八除入處十一切處等定義十三八智處三三昧處定等十四中陰處四生處已上四十二品義同前大部也三彌底部論三卷上三彌底者此云正量也於佛法正量部中而作是論明生死報業受生義也人臨欲死時成無記心以何業往生有業記心或業往惡道無惑記心白業往善道若眠若悶若無心死行制故往業道中若我定異陰者陰懷時人不滅應憶過去世時事只應此人不應有異人而輪轉生死無有絶時除得涅槃也下生陰處捨五陰受中陰佛語舍利弗我知人往地獄亦知往地獄道如記調達應入地獄記都提婆羅門生畜生記姑羅柯生餓鬼記給孤獨生天記護法王生人處佛記如是故知人死隨善惡業受生也渭六經分別功德論五卷一此論分別如來所説教法功德及佛滅後結集功德也迦葉思惟經法言教甚多八萬四千香象載之比阿難所聞所知粗可略分耳即名犍稚集聖衆命阿難等結集也結為三藏其法甚深如佛説十二因緣阿難云此義何深佛云過去修羅王立海到膝兒見乃云海淺也即求下乃沒王即出之王者我也兒者汝也前世如是乃論生世龍佛四不思議也二善哉彌勒稱其六度大法集為菩薩藏阿難但云我聞不云我見等義三佛令弟子具知念佛觀佛形相目不暫捨心念無已四念佛念法等十念佛弟子各各第一者佛為四衆説其義令各歡喜五自難陀比丘端正第一已次諸弟子各稱第一論本起也四諦論四卷一論佛説四聖諦因緣義乃初苦諦入義也二集諦義品分義也三滅諦行相義品分也四道諦行相義品分也辟支佛因緣二卷上波羅國王輔相蘇摩月愛大比此三皆悟辟支佛緣夙因下王舍城長者波羅國王月出舍彌國王大帝波羅奈國親軍輪王小子已上六緣皆夙世佛所種善根悟辟支佛為説之異部宗論一卷部執異論一卷十八部異執論已上三論皆天友尊者造各譯成三也明佛滅後教法異執各成其部如大衆部上座部一一説部出世説部灰山住部多聞部分別説部支提山部北山部一切有部雪山部可住弟子部法上部賢乘部正量部密林部等也然雖各執其部所宗至旨皆讚佛乘亦殊途同歸一致摸象義在右聲聞小乘對法藏論總三十六部計六百九十八卷共七十三帙其間重譯者多今逐一指其根實俾閲藏者易見先賢用心弘如來教道有如此者也三十八尾受景星院比丘尼志真志堯志義志共捨斯經半卷奉為在堂二親祈保平安者比丘尼志宗志誠法遍覺尚資應義和資性資先志妙資敏資光捨開經板共二千二片又比丘尼德忠志常志隨資喜尼童以守法堅各捨經板一片普符遂人願心功德圓滿者
