body:
  text: 東京法雲禪寺住持傳法佛國禪師惟白集據涇宮殿盤欝樓觀飛驚圖寫禽獸畫彩仙靈丙舍傍啟甲帳對楹肆筵設席鼓瑟吹笙陞階納陛辨轉疑星右通廣內左達承明既集墳典亦聚群英已上五十八函聖賢傳記如來滅後西天此土聖賢弟子所操集也於中或有譯者乃竺國傳來然皆稱讚佛德助揚玄化明法至理顯正摧邪高僧行實王臣弘護靡不書之乃千載玄鑒耳據十二卷佛所行讚五卷一馬鳴菩薩作此讚從佛生至入滅一一成頌讚之楊佛聖德也生品讚佛生吉祥相也處宮品讚佛王宮受樂也厭患品讚佛厭離生死慕出家也離欲品讚佛不受五欲樂出成品讚佛逾城出家向雪山之相也二車匿還品讚佛令馬衣髮還王宮也苦行林品讚佛食麥食麻修苦行也合宮憂悲品讚佛已出家王宮人悲惱也推求太子品讚王求太子今在何處也三王詣太子品讚王聞佛成道將詣佛所也答王品讚佛答王問訊恭敬也二仙品讚見佛來歡喜也破魔品讚佛降伏眾魔也菩提品讚佛已成等正覺也轉法輪品讚佛轉正法輪度人也四弟子品讚佛度諸聖弟子也大弟子品讚佛已度瓶沙王及大弟子出家得道也給孤獨品讚佛化長者布黃金地也父子相見品讚佛與淨飯王相見也祇洹品讚佛於此度無量眾也醉象調伏品讚佛慈行調伏醉象也摩羅女品讚佛為說法不起欲愛心而厭女身也五神力住壽品讚佛以神通智力慧命而常住世離車辭別品讚佛入滅三月後却來也涅槃品讚佛示涅槃相也大涅槃品讚佛最後受純陀供度跋陀羅也歎涅槃品佛入滅時有一天人讚歎為諸天說無常偈也分舍利品讚佛聖自火焚諸天諸龍諸神諸王各分舍利供養佛本行經與前同本異譯今略標品照前也一因緣品歎如來品降胎品佛生品占相品決疑品入譽論品二遊宮品憂懼品樹蔭品出家品車匿品王問品三為瓶沙王說法品不然阿藍品降魔品四度五比丘品度寶稱品廣度品大神變品一一成讚五為母說法品憶光品維耶離品歎定光佛品降象品勸捨壽品六調達入地獄品現乳哺品七大滅品歎無為品八王分舍利品已上諸品皆是同前部頌小異也涇十一卷百緣經一滿賢婆羅門遙諸佛名稱女請佛難陀見佛五百商人入海採寶貧人須摩持線上佛婆持加困病王家守地人華散佛二梵志各諍勝如來度二王出家長者七日作王已上十種因緣佛現在事二舡師請佛度水觀頂王請佛法護王請佛洗俗佛救濟度病天帝釋供養佛現帝釋形化婆羅門乾闥婆王此云尋香行作樂讚佛殺生人如願當死求出家頻婆羅王此云影堅請佛帝釋變竹林園等三化生王子成辟支佛小兒散華供佛女人以金輪擲佛老母菩愛慳貪含香長者請佛舡師請佛僧過水婢使以旃檀香塗佛足貧人拔提施佛燋木作樂供佛成辟支佛劫賊惡奴緣四蓮華王捨身作赤魚梵豫王施婆羅門穀尸毘王剜眼施鷲善面王求法梵摩王太子求法婆羅門從佛索債度五百力士免燒身供仙人法護王子為母殺劫賊樓陀五富那奇墮餓鬼賢善長者婦墮餓鬼惡見不施水墮餓鬼盤頭羅墮鬼身臭目連入城見五百鬼優多羅母墮餓鬼生盲餓鬼長者若達多慳貪墮餓鬼鬼自生還噉五百子閻婆羅似餓鬼已上十緣皆餓鬼業報因緣也六長者賢面慳貪受毒蛇身月光兒生天緣採華供佛生天功德意供塔生天須達多乘象勸化鸚鵡子王請佛王遣使請佛命終生天佛度水生天二梵志同受齋五百鴈聞佛說法等緣七身作金色身有旃檀香有大威德有大力為人所敬頂上有寶蓋長者子妙聲百子同產頂上有珠布施佛幡皆前緣所修今生出生現相出家八寶珠比丘尼生時光照城內善愛比丘尼生有自然食白淨比丘尼衣裹身生須漫比丘尼辯才舞師女作比丘尼伽尸比丘尼生時身被袈裟比丘尼額有珠鬘荖摩比丘尼生時二王和解波斯匿王醜女盜賊人緣九海生商主須摩華衣隨身寶手比丘三藏比丘耶舍密多化生比丘眾寶莊嚴罽賓寧主拔提國王作比丘佛度王子護國出家等緣十須菩提惡性長老比丘在母胎六十年兀手比丘梨軍支比丘唱言生死極苦長者身體生瘡醜陋比丘恒伽達長爪梵志孫陀羅端正等因緣也宮十卷出曜經三十卷一此經因緣如阿含經亦多出彼部中所云出曜者以一切有情在生死長夜昏沈睡眠不覺不知佛憫此眾生出現為作光明以曜眾生心自令其覺悟故首標無常品令國王大臣人民外道悟一切有為法皆歸無常也佛說彌勒成佛讓佉王治化迦葉阿難等受囑結集等緣二無常品中偈云如何決流往而不返人命如是遊者不還三無常品中一切長者外道人來至佛所悟無常法四欲品佛說一切婬欲因緣一切所貪欲人死入地獄等五愛品佛說貪愛人若不修止觀從此便沈染無休一切愛緣六無放逸品佛說正念常興起所欲事不成則清淨七放逸品佛二仙處學定超勝彼放逸人尚如此我定得成佛八念品念喜生憂生畏生若無所念何憂何畏對治也九戒品慧人護戒持戒者安慧為人寶遂說一切戒法能持人也十學品護身惡行自正身行護身惡者修身善行佛說人若自知內心過身外惡而能修習善法也殿十卷出曜經十一誹謗品佛在祇園有異比丘呵制如來佛言此非但呵制我已曾呵制過去佛十二信品信戒信慚信佛信法信僧信一切善法十三沙門品偈云截流而度無欲如梵知行已盡逮無量德乃所證也十四道品吾已說道除愛固刺宜以自勗受如來言十五利養品佛誡比丘不得貪著名聞利養妨修進道學十六忿怒品佛戒比丘不得諍竟鬪罵六和義聚十七惟念品出息入息安般不淨觀比丘當善觀察修習十八雜品佛令比丘常自悔昔所造過惡增長善法十九華品佛說欲種德華須得擇地若無好地花不生也二十恚品佛言除恚及憍慢起度諸結使一切貪癡諸惡邪見自然不生也盤十卷出曜經二十一如來品佛出現世間說法利樂有情諸有不信者因說商人入海念佛免羅剎難二十二廣演品雖誦千章不義何益寧解一句聞可得道二十三泥洹品佛言比丘攝意如龜藏六若不如是被打首也二十四親品親善不親惡也觀品觀己過惡莫見他過也二十五惡行品諸惡莫作諸善奉行佛誡去惡修善也二十六雙要品夜虫光更在幽冥如來出現千日光照及大千界二十七樂品佛說人無勝負心自然快樂安樂無惱也二十八心意品佛出世令人降伏心意去其穢惡心意招致眾禍本也二十九沙門品佛說比丘乞求自足而已不須畜積也三十梵志品若見侵欺但念守誡端身自調是謂梵志已次佛說梵志所修所行然此部經是高僧在外國誦歸流布鬱十三卷賢愚經高僧惠覺等八僧遊方同道至于闐國遇大會五年在彼歸至高昌國各隨所聞所記集成此一部十三卷以佛出世清淨正眼分別賢愚善惡過去因地修行遇賢遇愚故此云也賢即眾善愚即眾惡一夜叉說偈王身挂千燈濟鷹飼虎為王太子求法入火等緣二醜女念財華天寶天波梨慈力王降六師已上七因緣三鋸陀身微妙比丘尼阿輸伽陀施上七瓶金施差摩現報貧女難陀四摩訶斯陀優夷尸尸利毘提此二種因緣五沙彌守戒自殺長者無眼耳舌貧人夫婦施㲲現報迦旃延教老母賣貧金天緣重姓緣散檀寧已上七因緣六月光王施頭緣七大劫賓寧梨耆彌七子設頭羅健寧三十二子等四緣八蓋事因緣大施抒海緣此二緣起也九淨居天請佛洗浴善事太子入海及如來因地修菩薩緣起也十阿難總持優婆斯兄所殺緣兒誤殺父給孤造寺六師與舍利弗闘勝發上心緣勒那舍耶迦毘梨百頭等緣十一無惱指鬘檀膩䩭緣十二摩頭羅世質檀彌離象護波婆離鸚鵡聞四諦十三鴈聞說法生天堅誓師子梵志施佛衲授記佛說起慈心緣頂生王曼女十子緣婆世躓優波毱提注水中虫沙彌均提已上共五十緣其緣如百緣經出曜經前諸部大小乘經律論中亦多出引證詳之樓三經修行道地經七卷一佛滅後七百年中尊者眾護作此經謂十善可修十善可行若能修能行至無為之道證其大士地位也集散品攝散亂生死心歸清淨性也五陰本品五陰相品分別五陰品五陰成敗品此四品皆談五陰也是知為生死之根本耳二慈品若無慈心不能修行也離恐怖品若戒行清潔自無畏也分別相品分別一切善惡相須當智火燒苦惱薪也三勸意品修行人自正其心也離顛倒品若離此即正見也曉了食品雖百味麁細乃一飽也伏勝諸根品調攝根境也忍辱品若不忍辱不能修行棄加惡品雖加惡言不起嗔也天眼品天耳品念住品知人心念品地獄品已上諸品見品則見其義也四歡悅品修行人心自念我得善利脫八難苦生欣悅也行空品修行者有吾我想不入於空非真修行須入真空也五神足品修行成定得神力也數息品消有漏得無漏也六觀品修行人入深觀境破其根塵也學地品修行人須學世間一切呪術法破邪見也無學地品無學品二品義可思而知七三品弟子品喻如一父而有三子各自性行不同父須教約令其孝順成其家業三子喻心意誠令成定智慧也緣覺品菩薩品謂修行人始自集散亂心觀五陰攝六情破千惡修十善成觀行得定智神力或為緣覺或為菩薩也道地經安息國三藏譯前大部中出同本僧伽羅剎所集三卷上梵云僧伽羅剎此云眾護也尊者既集修行道地復集此稱揚如來為菩薩時修慈悲喜護四心弘濟有情遂得成佛也中說佛夙願力故欲利眾故成道已來隨處轉大法輪利樂人天有無量眾見佛聞法聞佛知佛皆獲益也下說佛演其道跡如王大道行者必至佛法涅槃路有能修行者必至鴦掘遇惡作惡遇佛成佛可知也觀三經菩薩本緣經三卷上如來因地為轉相子摩羅拏為國王一切施為太子一切持緣中太子一切持善吉王月光王皆如來因中行菩薩行下如來因中為兔為鹿為龍三因緣等義百喻經四卷一僧伽斯那撰此百種喻外道邪見比丘破戒俗不布施不習大乘不求小果俱失也愚人食鹽愚人集牛乳婦詐語稱死渴見水子死停家中認人為兄歎父德行等二十一喻二入海取沈水水火為婦𧵍鼻牧羊人雇借瓦師等二十喻也三估客駝死磨大石飲食羊餅等二十四喻四口誦舡師法而不解用婦夫食餅共為要共相怨害喻乃至小兒得大龜等三十五喻最為密喻也菩薩行門諸經要集三卷上象腋經決定業障經維摩經如來智經義諦品經般若經法界品經寶髻所問經法師品經決定毘尼經清淨毘尼經中海慧所問經樂嚴經巧方便經勝積經如來藏經上勝毘尼經伏魔經富那問經寶童子經寶積經下虛空藏經如來境界經阿闍世王經離垢所問經文殊所問經遍照經菩提經寶聚經那羅延經一切功德經密嚴經梵網經佛所念經法集經阿差末經集會經郁伽長者經具戒品經深密經勝鬘經無邊門經已上四十二經節要辨明如來因中行菩薩行廣行六度妙行集出令人依此修習成佛果也飛十一經付法藏傳六卷一如來迦葉二因緣等二阿難尊者商那和修二因緣也三優波毱多弘道行法四耶舍尊者化阿育王等緣五提多迦彌遮迦婆須密難提伏馱脇尊者富那馬鳴迦毘摩羅龍樹等緣六提婆羅睺羅僧伽難提伽耶舍多鳩摩羅多闍夜多婆修盤頭摩拏羅鶴勒那師子尊者等緣坐禪三昧經二卷上坐禪人先至師所師問一一於戒法無所犯絕諸過惡然後授與禪法先對治貪嗔癡妄想惡覺作五停心等觀除邪念故下坐禪人雖得一心而未成定力猶為欲界煩惱所亂當作方便呵除漸以修習四禪八定消滅三界苦本成道惟曰雜難經說如來為菩薩所修三十四意調四諦十六意十八行不共一一分別解脫其義自因地至出現示諸因緣利生等事法也四品學法德學真學為上品具戒學承法為中品卑戒依福學為下品不持戒但行三歸為外品故云四品也呵色欲法經女色者世間枷鎖世間重惡世間衰禍凡夫戀著不捨女人其言如蜜其心如毒一切過惡因此而生唯智士不被其惑也治意經佛言安般守意立身立意意己正意行戒行禪行空定意時時以法觀得入正念成禪定也治身經獨坐一處但當正意一坐一臥一行得能勝身已勝身為身身自在身無有過身受戒身隨法行身等義迦葉赴佛涅槃經在山中說法集諸弟子六比丘同夕得夢不祥即下山逢外道已將華來云佛滅度即詣棺所悲惱也力士哀戀經金剛力士見佛滅度悲哀懊惱作如是言如來捨我我今日後無歸依處毒箭深入我心無量言詞無量哀惱至誠哀切如來圓寂也佛說醫經佛言人身有四病地水火風以此四大四時不調貪染世間一切惡欲無有休止乃成病惱若能持戒修行精進為道修習禪定其病自無耳佛使迦旃延說法沒盡偈人年纔壽百正法之光明在世不久沒正法已滅盡比丘眾迷惑常捨諸經法聖賢之所講反受雜文章癈損佛所說更互相求短等一百二十偈義意苦切誠也驚二經雜寶藏經十卷一十奢王王子肉濟父母鸚鵡供育父母棄老國忉利天六緣二六牙白象兔自燒身善惡獮猴智水滅三火長者子迦尸國王弟諫兄孝行聞天子梵摩達夫人已上八因緣三兄弟二人俱出家仇伽離謗舍利弗龍王偈提婆達毀傷佛共命鳥白鵝王大龜二輔相讒構山鷄王吉利鳥老仙二估客八天次第問法等十二緣四貧人團施佛貧女兩錢施乾陀為畫師設食夫婦自賣救蟻子長命國王治塔寺補寺壁孔見佛求長命客作設會施佛鉢食愛道施衣五供迦葉佛塔八戒齋生天燃燈供佛華散成蓋供養佛塔作浮圖禮佛作齋施㲲金錢雇持五戒掃地見佛甘蔗施羅漢香塗佛足造佛講堂賈客造舍等二十四因緣現獲報六帝釋問事陳如等說往日因緣七珠施佛出家止佛足血波旬來惱利養災患賊見佛生天刖手足人念佛波斯匿王遣人請佛兄勸弟奉佛父逼子出家驅毒龍入海等緣八夫婦惡心向佛難陀佛逼出家力士化賊輔相聞法離欲外道投火聚鴈聽法醉象緣九解王八夢金猫緣惡生王得五百鉢緣十優陀羨王羅睺羅老婆羅門諂偽婆羅門婦欲㚲鳥梟報冤婢闘羊等因緣那先比丘經二卷上象王聞法其前世同修行各發願後一為彌蘭王一為出家比丘名那先其比丘與象同日生父母安名那先以天竺象名也彌蘭初不信佛法那先往化王問佛法又問世法比丘曰請王先問王曰我以問了那先曰已答王了王曰汝何語言答也那先曰王何所語言問王曰朕無所問那先曰臣無所答也下王復問曰人欲作善當前作之當後作之那先曰當居前作之在後作之不益人如渴時掘地作井求水種種說法也圖十一經禪法要解二卷上學禪人先持淨戒然後作不淨觀停心觀種種觀察成其定境下坐禪人求虛空定時當念色為一切眾苦具本觀其五陰如病如癰如瘡如刺若空無我一切觀想達摩多羅禪經二卷上佛陀三藏譯謂三業之興禪智為宗禪非智無以窮其寂智非禪無以深其照也得其道者自迦葉阿難以降達摩多羅佛大先二聖師也佛陀親傳故標名耳安那般那分修行有方便道勝道故故此二門甚深微妙也安般勝道念住升進決定等分各是偈言無長文也下不淨觀分住分陞進分決定分觀界分皆偈言也四無三昧觀陰觀入觀十二因緣皆長文說義也五門禪經要用法坐禪之法要有五法一安般二不淨三慈心四觀緣五念佛前三內境界後二緣外境界也觀佛觀白骨觀身觀他身觀地水火風空識一切境皆成三昧入其定相自然得解脫身禪要經呵欲為先坐禪若不呵欲一切世間愛染虛妄自身不淨不實之法無由入得禪定也思惟略要法身有三病風寒熱也世藥可治心有三病貪嗔癡也唯佛法藥可治若要治此病如將軍入陣須得勇健方能破賊若除此病須專注一心勇猛精進修諸觀定然後乃除其病得安樂法十二遊經從佛上祖輪王至淨飯王生佛修行得道十二年中遊十四國說法利樂一切眾生法觀經四無量觀不淨觀白骨觀生身觀法身觀十方佛觀念佛觀無量壽佛觀實相觀法華觀內身觀章句經一切一其心身非人非命以身即敗亡非身身非我身非常亦苦非彼應為身身都無可有雜譬喻經如有比丘垂死弟子問得果報云未何故未云欲待彌勒云彌勒說法與今佛異耶云無異也云既法不異何棄今佛而待彼佛即點然思之即得應真其餘一切緣起不可具錄皆是因緣也十八部論文殊白佛言世尊入涅槃後未來弟子云何諸部分別佛告文殊未來弟子有二十部能令諸法住二十部並得四果三藏平等無下中上譬如海水無有異味一僧祇部此云大眾二體毘履此云老宿於此二部分出十八部共二十部云舊雜譬喻經二卷唐僧會譯其緣起與前多同百緣等寫四經阿育王經十卷一生因緣品為戲沙兒以沙為上佛記為鐵輪王後生頻婆羅宮為王南浮提造生地獄而比丘得道化之二既壞地獄造八萬四千佛舍利塔詣寺見優婆笈多及耶舍等眾聽法三王將十萬金供養佛生處菩提樹及轉輪處各十萬四王一日中造八萬四千塔已即生一兒名鳩那羅詣寺受記失目五阿育王以半菴摩勒果施眾僧因緣六佛記優婆笈多吾滅後一百年乃無相佛出現作佛事因緣七佛記迦葉阿難末田地舍那婆私優波笈多也八優波笈多因緣則記五人傳正法九虎子牛味南天竺出家人皆優波笈多化度弟子眾亦各有夙因十樹慳鬼虫食骨想箭刷食等因緣皆笈多化度得道眾因雜譬喻經昔有比丘令一沙彌擔衣物隨行三發菩薩行心三退師三令在前行自將衣物却三令退後令擔衣物乃大乘小乘心不易得也乃至聖王九百九十九子等四十因緣亦多與前同天尊說阿育王經為王天下悉皆歸順唯有龍王未伏乃將兵取佛舍利與龍王戰勝雜譬喻經上佛慈悲度人常以四事一正法水洗心垢二經法飲食令飽三禪定三昧隨時興建四以四恩饒益一切常令歡喜乳母養子亦如是下安息國商人至罽賓國見比丘得五通六通者眾遂出家得五通未斷苦本即歸本國現神變其後欲心既動退失五通無惡不作師往度之禽三經阿育王傳七卷與前同本各譯略也阿育王息壞目因緣經前部已出此皆長頌四阿鋡暮抄解二卷阿鋡暮者此云趣無也羅漢素跋陀撰說三法門謂德惡依三也與前三法度論大同小異此付法師所譯曲裁聖意尤同羔獸十二經法句喻經四卷一梵志護戒多聞篤信戒慎惟念慈仁言語雙要放逸心意花香十二品二愚暗明哲羅漢述千惡行刀杖等六品緣也三老耄愛身世俗述佛安寧好喜忿怒塵垢奉持道行廣衍地獄喻象愛欲等十四品四利養沙門梵志泥洹生死道利等六品通前共三十八品各品中一緣兩緣乃至五也法句經二卷法救尊者將前三十八品中文述成偈各品分章見其義意然智人見品名知其義耳佛涅槃後撰集三藏經以佛說十二分教三藏之文撮要要成一卷長偈頌俾其易解也阿含口解十二因緣經分別無明行識名色六入觸受愛有取生老病死憂悲苦惱等也文殊發願經身口意清淨除滅諸垢穢一心恭敬禮十方三世佛普賢願力故悉覩諸佛相等偈阿毘曇五法行經苦法習法盡法道法一色二意三所念四別意五無為是五行也一一廣說也迦葉結經佛滅後集眾聖結集佛三藏教三慧經佛言一信二問三行是三者得佛法分乃至一一說三法因緣一百五十讚佛偈尊者摩咥里造讚如來殊勝功德如初偈云世尊最殊勝善斷諸惑種無量勝功德總集如來身其餘偈義則可見六菩薩當誦持師子遊戲師子奮迅師子幡師子作堅勇精進金剛慧等六大菩薩觀音讚唐慧智譯進上皆七言長頌讚德也小道地經喘息生死一切因緣宜常消息修習戒行不能者多為善云小道畫十五經無明羅剎經或云集論也然以折吒王為喻為生死害盡人民王即尋其根本遂降伏諸羅剎眾至羅剎無明窟宅宮殿盡皆破除捉其無明羅剎王然後一切羅剎不與人民為害也設此為喻菩薩觀十二因緣從死逆推至無明處一一問一一觀察盡其根源也金七十論迦毘羅仙為婆羅門阿修利說七十偈因又解之明三苦為本一依內苦二依外苦三依天苦及自性大我慢聲觸色味香乃五唯也耳皮眼舌鼻五知根也舌手足男女大遺五作根也及心根也於此中生五大謂聲生空大觸生風大色生火大味生水大香生地大是唯二十五諦真實之境從自性變異中生昔中印天親菩薩至罽賓國為王解說其義王曰師說此七十偈義義義如金遂賜金七十斤因立名耳勸戒王頌一卷說法要偈一卷勸發諸王偈已上三偈同本各譯也皆中印土龍樹尊者作此偈代書寄南印土國王禪陀令厭離五欲奉重三寶行慈行仁養育人民求脫生死證解脫樂迦下比丘說當來變經告眾云當來之世去聖時遠比丘眾不持淨戒不習禪定不求悟道唯求利義貪染世俗親近白衣輕毀己眾遞相妬嫉壞滅佛法聖教也十句義論勝者慧月造也一實二德三業四同五異六和合七能八無能九俱分十無說實句有九地水火風空時方我意此九皆實也例此一義餘十義一一分別解說說法經賓頭盧為優陀延王說欲樂味甚少憂苦患甚多是以智者應修方便大王當知國土猶如羅綱當知此身終是敗壞覺悟無常死生求其出離先行智忍為本不可縱己自在等也婆藪盤豆法師傳此云天親也其中所載名氏出處出家弘法得道與兄無著請彌勒說法及破外道金七十論偈國王賜金分為三分先習小乘後通大乘分別業報略經大勇菩薩說此一長偈誡一切人修善業善報惡業惡報千萬劫自受馬鳴菩薩傳述菩薩得道降伏外道及脇尊者摧破邪宗顯揚佛宗正法眼藏也提婆菩薩傳才辯絕倫名震天竺諸國投針傳龍樹心印化度廣破外道利益國王大臣彩三經釋迦譜五卷一始祖相承姓劫初姓瞿曇世祖姓釋迦降生成佛七佛種姓同異同三千佛內外族姓弟子姓釋四部名聞弟子此卷九譜皆大小乘經中也二大愛道出家淨飯王泥洹摩耶夫人受道泥洹滅夙業等譜也三竹林園祇洹精舍髮爪塔天上四塔檀像金像石像留影在石等八譜四雙林涅槃八國分舍利天上龍宮舍利塔龍宮佛髭塔等四譜五育王八萬四千塔夙緣感此八萬四千之塔因法滅盡及盡相等四譜僧祐撰釋迦氏譜一所依賢劫二氏旅根源三所託方士四法王化相五聖凡後胤此五譜中事述與前同其中小異也釋迦方志二卷上封疆篇謂娑婆世界也統攝篇化三千大千中邊篇出現中印天地之中也遺跡篇處處說法利人也加以五天竺國顯相事下遊履篇教至此土流通也通局篇教歷朝代有信者不信者也時住篇佛法在世劫量也教相篇教至一千年入于中華前後帝王見其佛法相也皆宣律師作仙上卷經律異相五十卷一天部諸天成壞劫修短日月星雷電雲風雨三界諸天劫數壽量三災等也二天帝從野干受戒修羅五縛天墮驢胎還身鞞梨天子布施天命終見佛生人中手出甘水猪中生人道天女化生物天女口密天女聞鹿牛彈琴已上十一因緣經中錄三地部閻浮提欝單國界所產精舍山樹河海寶珠人飲乳多及壽量同異四佛部得道師宗託生王宮現跡成道阿難問葬法現涅槃摩耶五衰相現五益物部萬字光三密食馬麥鐵槍掩耳不及各聞一句度象王化盧志度五比丘化屠兒及無信人五百賊出家吹藥入賊眼化貪慳夫婦姓女指現師子足散石等六舍利起塔及壞塔髮爪石塔人間塔天上塔舍利骨塔迦葉佛塔五百塔金剛塔造形像法滅盡已上多是造塔因緣七釋氏緣起淨飯捨壽摩耶生天受道出家羅睺羅處胎出家佛戒得道難陀調達阿那律跋堤等出家琉璃滅釋種五百釋女投佛車匿前緣八聞法賣心捨臂淨藏淨眼化父割截身得四禪定求半偈賣身發心一切世間皆為女人致苦退家業九文殊令醜女取鉢普賢護五法師久忍眾苦手出龍象降伏海神阿難所譏殺身濟眾鳥巢頂上入海求珠現長舌相等十如來因中為帝釋為婬女為尸毘王為睒子為仙人度估客為國王布施捨眼治梵志捨國城妻子救危厄出髓出血濟病靈十卷經律異相十一如來因中為伯叔為肉山大理家師子白象龍熊鹿鹿王九色鹿雁鸚鵡雀大魚鼈等十二山居女人慧王上首恒伽須摩提摩訶盧解夢女人在樓見佛女人在胎中聞法轉男身慈狗轉身立不退地十三迦葉金色結集化貧母入鷄山賓頭入定取鉢陳如等得道三迦葉須菩提阿那律端正化婬女前挑燈化跋提等十四舍利弗退大乘出家請佛制戒受浴化蛇入金剛定性難求捔神力目連作橋救母魔嬈勸弟化梵志鬼神降龍鳥心實等緣十五優波離為佛剃頭入四禪迦旃延教賣貧難陀奈女三十相化牧女二長者分物先世為友阿難奉佛七夢呪禁乞乳化王試山等十六末田地變火為天華舍那變雷為華優波笈多出家付法藏化虎子羅旬乞食八歲成道伏惡龍涼風細雷化餓鬼等緣十七僧大金天阿私陀修羅差摩拘提摩訶盧盤特鴦掘摩和吒羅漢兄弟諍財見羅剎避哭五百音兒獵師等十八魚吞不死耳億精進賴吒為父所要金財花天寶天知足二巧賊作貪食乞兒拔母從師白骨等三十一緣皆比丘也十九伊利沙毘羅斯耶舍難提闡陀摩訶羅持戒滿願遇劫王難誦經居山失志入海煮草行乞遇鬼度獵皆比丘也二十選擇遇佛婦病從事自誓入定坐禪蛇害國王聽法修不淨觀盲比丘聞法著弊衣族子出家旃陀羅七子死丙十卷經律異相二十一調達與佛結怨害佛博學讚歎索眾為野狐入地獄達多為野干獼猴殺金師子四比丘受罪善星謗佛二十二沙彌遇佛須陀遇佛均提出家救蟻推師倒地分別四諦降鬼沙彌得通護戒生龍中受虫身等二十三跋陀遇佛叔離出家為王所逼花色得道蓮華聞法五百女聞法慢不聞法脫根獲免慳貪從化發狂得道謗佛等緣二十四劫初人王大王致輪王化四方王捨臂王有大利王身挂千燈王捨國學道王請佛僧王出家遊四天下頂生育王乃王緣也二十五王聞一偈王捨頭王割肉王捨血肉大力王好施王刺血施五夜叉鹿足王難薩檀王為奴王聞偈捨妻兒令鬼王移信二十六王因母疾悟道二王袈裟上佛和達王布施讓國王棄國學道王護法普明王免班足王難闍世王解疑大光王等緣二十七王得辟支佛王造塔成果王遇佛得道王弘護法師王請佛王遇目連安王化四王婆羅門王布施王聞法王捨外習王遇佛二十八為姦臣所害王聞法得須陀舍波斯匿王園生粳米請佛解夢求贖女命得末利夫人王發願灌佛耆域瓶沙王等因緣二十九王造殿王請佛解夢王遶塔王兒婦得解王從佛生信王求治化方法王射后不傷王城蛇遶王臨死藏珠等因緣三十育王末人受八歲沙彌化王后生肉棄水生二子王后悟法末利夫人持齊王后學道生天國王大夫人與賢者造寺等舍十卷經律異相三十一投身飼虎燒身成化為父殺身血肉施僧月光血髓救病割肉濟父母白象捨國等三十二王子入海採寶求珠求眼長生報父形醜失妃暮魄不言被理王子捨身藥王子救疾王子聞夙宿王孫學醫三十三均隣得果帝須得果祇陀捨五戒行十善得道太子失目得天眼諸太子聞佛已等悉悟道最勝王子堅固三十四金色女求佛為夫醜女改顏王女喪夫安悉王女從狗女來王七女與天帝語王女為火燒王女見水泡生無常想等因緣也三十五寶稱守籠最勝福增須達申日辯意曇摩慳長者毘陀羅婆世躓新生子阿那邠十五長者等因緣三十六流水樹提伽迦羅越忽起經無耳眼舌音悅鳩留日難發水先貧香身婦娠生叫地獄擣衣等十九長者因緣三十七沙門億耳入海見地獄持戒鬼代取花指現師子魔試事為生為婦中虫五不死報鬼不能害等優婆塞十四因緣三十八割肉救病諸佛自然足產印成男喪子喪夫遇佛得果無子自焚許子出家願不遂施燈神力不滅天帝相試等三十九外道立異六師欲降佛與佛弟子捔力鐵鍱腹鳥雀捔道不如自盡文仙造書失通聞女聲通虎獨角仙等也四十超術師寶海須項摩因提乞活兒說一偈奉佛密遠學兄弟四人同月命終棄婦就婢採花殺女等皆梵志緣傍十卷經律異相四十一檀膩䩭阿耆尼鷄頭老乞散若納施餅施瞋生龍中入定兒婦信向從佛生為樹神夫婦吞金錢生女端正佛不言好投火等皆婆羅門因緣四十二曼茶聞法悟道郁伽見佛持戒因魚得富以法獲財大意求明珠已上皆居士因緣等也四十三瓔珞上佛樹出所須免羅剎難彌蓮持齋兄射弟濟怙客共鵠生子八味水得金奉親羅剎所縛救將死人貪者死廉者全命害侶值摩竭魚念佛飲酒犯戒鬼畏已商賈因緣四十四陀以化城請佛升出珍寶五百童戲沙為塔童子施佛豆牧牛兒取華上佛小兒先身三錢施為王已上三十八庶男緣也四十五捨髮供佛生百兒以兒為道覩有天宮于出眾物婦化夫念佛火中生子謗佛入地獄火氣入女人身生兒多智等皆女緣四十六阿修羅王乾闥婆王緊那羅王雜鬼與諸天大戰為女興兵見帝釋㢠車有女天帝所強為所漂求長身等緣四十七師子象馬牛驢狗鹿駱駝狐狼獼猴兔猫兒師子王捨命食象二子為