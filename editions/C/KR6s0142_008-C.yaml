大藏此二卷錄為準也十三別錄中所載有譯無譯或有本無本等經目錄階七卷開元釋教錄十四有譯無本經目錄等十五小乘有譯無本目錄十六支派別行經等目錄十七同本異名廣出略出重譯等經目錄也十八疑惑再詳經目十九現入藏經目錄上卷二十小乘經現入藏目錄於此兩卷中分其次第卷軸部帙等納七卷一切經音義二十五卷一譯經沙門玄應撰華嚴大集日藏月藏大威德法矩等經音義也二大涅槃經音義訓釋三摩訶放光道行光讚小品明度長安天王仁王金剛音義也四見實賢劫灌頂華手瓔珞佛名月燈十住佛三昧佛名十輪報恩寶雲金光明大雲密跡處胎賢護等經音義五海龍王首意等八十餘經音義六妙法蓮華經音義七正法華至文殊現寶藏等四十二經音義訓釋陛七卷一切經音義八維摩經至無畏德女等六十經音義九大智度論音義訓解十般若燈論莊嚴大乘婆沙十地善戒地持緣糧寶性毘曇百論菩提心三具足十二門緣生等論音義十一正法念阿含增一等經音義十二賢愚起世寶藏普曜道地生經那先陰入本起與起禪經義足等經音義十三泥洹罪業至馬八態等七十六經音義十四四分律音義律者常也法也詮也毘尼鼻那耶毘奈耶皆同也此云離行也滅也調伏也化度也弁六卷一切經音義十五十誦律僧祇律五分律音義十六善現摩德勒伽諸戒本諸羯磨本等二十二律部音義所云摩德勒伽此云母也羯磨此云作法也辨事也其餘義可見也十七婆沙毘曇俱舍出曜等五論音義十八成實鞞沙解脫曇心四諦功德甘露三法度明了隨相等論音義十九佛本行集百緣經音義二十陀羅尼六度經一切聖賢傳記等音義此二十七本中訓釋義轉二經一切經音義二十一菩薩藏十輪無垢深密緣起金剛戒本淨土佛地勝軍法住六門等經音義二十二瑜伽師地論音義梵云瑜伽此云相應也謂一切所緣境與心相應故師為習行調化有道之稱也地謂三乘行境界所依止或所攝義故名地也定也二十三顯揚聖教對法攝大乘廣百佛地掌珍正理成業五蘊等論音義二十四俱舍論音義梵云俱舍此云藏也如庫倉等之總名舍舍藏義一也二十五順正理論音義已上訓解訖新譯華嚴經音義二卷上則天序及世主妙嚴品至十地品一切字音訓解義下十定品至法品一切字音訓解義譯此經罷慧苑法師用心訓釋也疑十卷西域記十二卷一大唐三藏奘法師自西域而還奉詔旨而譯此記也竊謂南贍部洲東則人為主也西則寶為主也北則馬為主也南則象為主實風土古今之異儀也然此中國以人為主之方仁義道德文軌之尊也沿古雖通四夷入貢然於天竺寶主之國實未同化也蓋地相遠故因奘師往還遂大歸化耳阿耆尼等三十四國風俗之儀也二濫波那揭羅健陀邏三國風土境物之儀也三烏仗那鉢露羅咀叉始羅乃至闇補羅等八國風境異儀也四磔迦國乃至劫比他國等十五國風境人物異境也五羯若鞠闍乃至鞞索迦國等六國中風俗境物六室羅代劫比羅藍摩拘尸那等四國人境風物七婆羅痆斯國戰王國吠舍弗栗恃尼波羅等五國風俗八摩竭他國中上卷所說風物九摩竭陀國下卷此國中遍見如來成道菩提樹等遺跡也十伊蘭拏瞻波乃至秣羅矩吒等十七國遍見佛遺跡聖境及人物風土好惡也星三經西域記十一僧伽羅國乃至伐剌拏等三十三國佛所化處人物風土十二漕矩吒國乃至瞿薩且那等二十二國中佛化境土人物等集古今佛道論衡一卷唐僧智昇於後漢書列傳七十八卷中略出及漢法內傳述天竺國佛出現事及佛教至此方摩騰竺法蘭與褚菩信論法事緣集古今佛道論衡甲漢帝夢金人吳王信佛立塔寺陳思三曹植辨道論晉孫盛老子非大賢論元魏雙信有興廢事宋文帝會群臣論佛理坐致太平魏明帝召沙門道士對論梁武帝捨老奉佛北齊文宣帝勅廢道教等十因緣乙周高祖世安法師上論遠法師抗論任道林請興佛法周天元帝開佛法事隋高祖下詔述絳州天火燒老君像隋兩朝皇帝宗尚佛理受三歸戒丙今上召佛道二宗入內詳述名理西明寺成召佛道論義冬雪未降內齋祀召佛道二宗論義幸東都召西京僧論義在東都召僧靜泰與道士李榮對論又在司成宣范義頵宅難莊易義皆唐太宗皇帝朝佛道中事緣等丁西華觀道士朝散大夫郭行真歸依佛法僧三寶願文及所造佛像或鑄或塑或畫并供養等緣右二經三寶感通錄三卷上宣律師戒行修潔道心純明以故感天人侍奉遂問佛法中事及此靈跡之處前後顯應有此錄中雒陽畫像建業金像吳中石像七國金像楊都襄陽荊州吳興等金像旃檀瑞像文殊金像等像也下天台石梁蓬萊聖寺鼓山竹林寺林慮靈隱五臺山石窟終南竹林等處及高僧俗士感通事緣也沙門不拜俗六卷一僧彥悰集自晉至唐前後沿革事蓋佛法因時信毀交貨理越常情紛絃之人恓知攸措奏詔書難答又書皆晉朝事緣二遠法師沙門不敬王者論五篇并詔啟事又論等緣三唐朝勅表啟狀并議不拜等事緣四議不拜篇二十三章文五議兼拜并議令拜篇六議拜篇并狀奏詔表啟宣師秀師等弘護通十卷三藏法師傳一奘法師姓氏出生出家勵業及求法離神州至西屆高昌國也二三藏自阿耆尼國乃至羯若鞠闍國中間所到三三藏自阿踰陀國乃至伊爛拏國四三藏自瞻波國至迦摩縷波國國王請師禮敬五三藏令尼乾子占歸國因離西天歸至帝城之西也六三藏貞觀十九年正月到西京至二十二年夏六月謝太宗皇帝御製聖教序七三藏貞觀二十二年六月高宗皇帝述聖記永徽年中答書等緣八三藏六年譯理門論至顯慶元年三月百官謝示高宗御製寺碑文等九三藏顯慶元年謝慈恩等碑成正月隨皇帝聖駕還西京十三藏顯慶三年五月勅詔法師居西明寺至麟德元年二月玉華宮捨化此僧惠立彥悰成其傳也八卷初尚藥呂才難因明論有立破義等廣三經高僧法顯傳東晉時往天竺求佛經教法歸此飜譯遂述西竺所見聞佛法事大唐求法高僧傳二卷上義淨三藏西國還記前後高僧求法等緣此玄照法師等五十六人也下此卷自荊州道琳法師傳起若觀此五十六高僧往天竺求法歷十萬里程無量嶮岨或在或亡良可憫也高僧傳十四卷一譯經科上摩騰法蘭安清支讖曇柯僧會維祇竺曇帛遠尸梨跋澄難提僧伽佛念耶舍等十五高僧行傳二譯經科中羅什弗若流支摩羅叉佛陀耶舍跋陀羅曇無讖七傳三譯經科下法顯無竭佛陀什浮陀智嚴寶雲求那跋僧伽跋曇摩密智猛良耶跋陀羅毘地等十三傳四義解科一朱士行孝龍僧淵法雅法朗法乘潛深支道林法蘭法開道邃法崇法義法義僧等一十四僧傳五義解科二道安法和僧朗法汰僧先僧輔僧敷曇翼法遇曇徽道立曇戒法曠道壹惠處等十五傳六義解科三慧遠慧持慧永僧濟法安曇邑道祖僧䂮道融曇影僧叡道恒僧肇等十三僧傳內八卷高僧傳七義解科四道生慧叡惠嚴惠觀慧義道淵僧弼慧靜僧苞僧詮等三十二僧傳八義解五僧淵曇度道慧僧鍾道盛弘充智林法瑗玄暢僧遠僧慧僧柔慧基慧次慧隆等二十七僧傳九神異科上佛圖澄單道開竺佛調耆域等四高僧傳十神異科下犍陀勒訶羅竭法惠惠則涉公曇霍史宗杯度曇始法朗邵碩慧安法匱僧慧慧通保志等十六傳十一習禪科僧顯僧光曇猷惠㟴賢護曇蘭法緒玄高僧周慧通淨度僧從法成慧覽法期道法普恒法晤僧審曇超慧明等二十一傳明律科慧猷僧業慧詢僧璩道儼僧隱道房道營志道法頴法琳智稱僧祐等傳十二亡身科僧群曇稱法進僧富法羽慧紹僧瑜慧益僧慶法光曇弘等誦經科曇邃法相法純僧生法宗道冏慧慶普明法莊慧果法恭僧覆慧進等二十一傳十三興福科慧遠慧元慧力慧受僧慧曇翼僧洪僧亮法意慧鏡法獻僧護法悅等傳經師科法橋曇籥法平僧饒道慧智宗曇遷曇智僧辨等僧傳道師道照曇穎曇宗曇光慧芬法願法鏡等傳十四梁沙門惠皎撰此高僧傳作序具論諸家得失更名僧傳為高也東山嵩師稱云釋氏之良史也左八卷續高僧傳三十卷一譯經科上伽婆羅寶唱曇曜菩提流支拘那羅法泰等及附者傳二譯經科二那連耶舍崛多笈多彥琮等并附傳三譯經科沙門波頗惠𧷤惠淨等三傳四譯經科三奘法師那提二傳五義解科上法申僧韶法護智欣僧若法寵僧遷僧旻法雲慧澄法令智藏并附見傳二十三僧等傳六義解科二慧超慧約曇巒慧韶慧皎曇永道登僧密曇准道超等正傳二十一人附見十六人七義解科三洪偃法朗法勇寶瓊警詔安廩慧布亡名道寵惠嵩等并附傳八義解科四僧範曇遵惠順道憑靈詢法上道慎僧妙惠善寶曇衍惠榮曇延慧遠等并附見二傳達八卷續高僧傳九義解科五寶海智方羅雲法安慧哲慧暅慧弼靈裕慧藏智脫法澄道莊法論僧粲等傳十義解科六淨嵩淨玄智閏智聚慧曠智琳淨願智疑法彥法總僧曇靈璨法瓚寶儒惠最僧朗惠暢等并附傳十一義解科七志念智炬惠海辨義明舜智梵靜淵道宗普曠保恭法偘吉藏等傳十二義解科八慧隆慧海慧覺道判淨業童真靈幹敬脫善曹辨相寶襲慧遷智琚道慶等傳十三義解篇九惠因惠暠法祥淨藏圓光神素海順曇藏神逈僧鳳道岳道傑等并附傳十四義解科十智琰道基道愻慧頵道宗三慧法恭智正慧稜智拔慧瑜慧持智凱等傳十五義解科十一法敏惠璿惠眺靈睿僧辨法常智徽玄鑒玄會行等志寬惠休靈閏道洪等傳十六習禪科上僧副慧勝道珍佛陀達摩僧可僧達僧稠法聰智達僧實僧瑋曇相道正曇詢法充信行慧意等并附見傳承七卷續高僧傳十七習禪科二慧命慧思智顗曇崇慧越僧善玄景智舜智鍇智越十八習禪科三曇遷僧淵真慧覺瓚法純洪林法海淨端道舜慧歡智通本濟僧照等傳十九習禪科四僧定道林法應智周法藏慧超智晞智滿僧邕灌頂智璨普明智藏法喜傳二十習禪科五道昂道哲曇榮淨琳慧斌志超曇韻慧思世瑜道綽明淨慧熈智聰僧徹等傳二十一明律科上法超道禪慧光曇影曇瑗智文法願靈藏通幽道成洪遵覺朗智保等傳二十二明律科下智首慧璡法勵玄琬慧肅慧滿慧進道亮慧旻傳二十三護法科上無最曇顯淨靄道安僧勔僧猛等并附傳明七卷續高僧傳二十四護法科下明瞻慧乘智實法琳慈藏等并附見傳也二十五感通科上勒那超達慧達道泰道融法力植相僧林惠簡僧朗僧意僧照道豐圓通寶傳僧雲僧遠慧瑱等三十三僧傳二十六感通科下道密智隱斯那明誕明璨惠重寶積道端道璨明芬僧蓋曇瑎道貴僧順法顯等四十五傳二十七遺身科僧崖普圓普濟普安大志知命玄覽法曠會通道休等并附傳二十八讀誦科志湛慧超慧顯道積寶瓊善慧法誠空藏慧靈遺俗寶相等傳二十九興福科明達僧明慧達僧晃住力智興道積德美惠胄智通慧震慧雲等傳三十聲德科慧明道紀法稱真觀法韻立身善權智果慧常法琰智凱寶巖等傳然此傳三十卷乃大唐宣律師所集也續前皎法師所撰故云耳既二經辯正論八卷一唐琳法師所撰也八卷十二篇明三教出興因依姓氏宗稟也三教治道篇上卷二三教治道篇卷下明經書所出實偽三十代奉佛篇卷上自漢晉宋齊梁陳隋帝王宰輔官庶等緣四十代奉佛下卷自高祖神堯皇帝太宗皇帝大臣官僚國族王親等五佛道先後篇明所生闡教利生年月出處六釋李師資篇明老子事佛也十喻篇答傳道士十界論也九箴篇誡其邪見也氣為道本篇明虛妄錯亂計執為是也七信毀交報篇明信正則善報毀則惡現報也品藻眾書篇明教法真偽辨其妄造也八出道偽謬篇靈文分散靈寶改佛經為道經偷佛法四果十地道經未出言出道士合氣天尊及化諸子為道書等也歷世相承篇明道家不本老子妄認太羅玄洞等神仙也歸心有地篇述梁戒捨道事佛歸心有地勅文及受戒也破邪論二卷太史令傳變上沙汰佛法論十一章琳法師一一辨其所以破其邪見免一切人墮無因果入三惡道受苦報也前辨正論中宮學士陳子良作序加以注解此論祕書監虞世南作序皆助佛揚化生正見也集三經十門辯惑論三卷上唐復禮法師作此論解人疑惑邪見歸佛法正見也一通力上感門二應形俯化門三淨穢土別門四迷悟見殊門五顯實得記門此五門上卷解說中六反經讚道門七觀業救捨門八隨教抑揚門下九化佛隱顯門十聖王興替門已上十門義答太子文學權無二釋典稽疑十二諦說也甄正論三卷上中下白馬寺僧玄嶷造此論設滯俗公子問於甄正先生謂時俗昧於正見多逐邪佞故甄別邪正使行正道也弘明集十四卷一僧祐律師集前後弘護佛法國王太臣官僚仕庶僧徒所述辯明之事也牟子理惑正誣論也二宗炳明佛論蓮社中客也三孫綽喻道論宗炳難何承天白黑論書也四顏延之光祿難何承天達性論墳十卷弘明集五更生論神不滅論沙門不敬王者論沙門祖服明報應論善惡現驗三報論也六恒法師釋駁論正二教論難融律謝鎮析夷夏論七難夷夏論𧫎夷夏論駁夷夏論戎華論等八辨惑論滅惑論順師析三破論等也九梁武立神成佛義記沈績作序并注蕭琛曹文思難范績神滅論二篇也十梁武勅答臣下神滅論雲法師與朝貴往還書十一何尚之答宋文帝問佛法事高明二師答李州書文宣王與孔中丞釋疑惑恒標二法師答姚主書僧䂮僧遷答姚王書遠師答桓玄書十二習鑿齒上安師書譙主論孔釋鄭道子與禪師書范伯倫書表義法師答何充奏沙門不應拜桓玄遠法師八坐等往還書道盛論檢試僧也十三郗喜賓奉法要顏延之庭誥二章王該日燭等十四撽太山文撽魔文破魔露布文祐師弘明集後序典十卷廣弘明集三十卷一宣律師集此廣前祐師所集也為十篇義歸正篇太宰問孔子聖人老子以佛為師漢法內傳後漢郊祀本志吳主論佛化三宗宋文帝集群臣論佛法事元魏孝明帝述佛先後也二歸正篇元魏書釋老志高齊書述佛志皆名臣作也三江淹遂古篇顏光祿歸心篇阮孝緒七錄序文四歸正篇梁武捨道事佛齊文宣帝捨道詔彥悰通極論五辯惑篇陳思王辯道論孫盛老子非大賢論沈約均聖論六辯惑篇宋世祖唐高祖王度顏延之蕭摹之周朗虞愿魏張普惠李瑒衛元嵩顧歡那子才高道讓盧思道也七辯惑篇梁荀濟章仇子陀衛元嵩顧歡劉惠林那子才唐傳變等此二滯惑也八辯惑篇魏大武擊像焚經坑僧周武帝廢立二教議道安法師作二教論以明也九辯惑篇舍人甄鸞作笑道論也十周武帝立通道觀惠遠法師抗對周武帝住道林對周武帝開陳佛法事王明廣對周天元辯衛元嵩事也亦八卷廣弘明集十一太史傳奕上省佛僧表法師法琳作箴彈及破邪論并表上秦王啟等十二辯惑篇振響寺明槩決對傳奕上表廢佛法僧事并表也十三辯惑篇琳法師作十喻篇破李道士十異也十四辯惑篇唐門下典儀李師政作內德論此論極精微十五佛德篇支道林佛讚遠法師佛影銘謝靈運佛法銘佛記序沈約作宣律師佛瑞像集梁武帝出育王舍利詔晉安王菩提頌唱導文王僧孺歸佛發願誓文十六佛德篇梁簡文帝謝述佛法事書啟十四首并奉阿育寺錢啟沈約等作寺剎像等銘一十首十七佛德篇隋高祖立舍利塔詔感應記感應表賀等隋文帝立舍利塔詔岐州雍州乃至蔣州等十六州塔十八法義篇戴安釋疑論與遠師書周道祖難釋疑論何承天報應論謝靈運辨宗論秦王述佛法說深義等也聚七卷廣弘明集十九沈約內典序皇太子發講解講二疏竟陵王與劉虬書梁太子請武帝講金字般若并般若序般若義并謝御講般若竟二十梁太子上大法頌并表上玄圃講頌武帝涅槃經疏序湘東王法實聯璧序簡文帝成實論序元帝內典集林序唐玄則禪林妙記序李大夫法苑序二十一法義篇梁朝太子諸王朝臣法師等作二諦義法身義謝講啟疏二十二沈約生佛不相異義六道相續作佛義因緣義形神義難神不滅義僧真觀因緣無性義魏收一切經發願文王褒願文隋煬帝願文太宗三藏聖教序中宗聖記褚亮般若心經序等也二十三僧行篇曇諦羅什法網道生曇隆慧遠玄敬玄運智稱玄景淨秀等二十四僧行篇魏孝文褒揚僧德詔沈約中食論設會論梁簡文上吊澄法師等十五書二十五僧行篇彥悰福田論唐高祖出家損益詔沙汰佛道詔令道士在僧前詔敬三大詔群五卷廣弘明集二十六慈濟篇沈約究竟慈悲論周顒止殺書梁武斷殺詔斷酒肉文顏之推誡殺家訓篇二十七誡功篇遠法師與劉遺民書梁元帝與蕭諮議等書簡文帝與湘東王書隋煬帝與智者禪師書受菩薩大戒智者上煬帝書宣律師統略齊文宣淨行法二十八啟福篇秦晉燕國王與太山朗師書沈約為太子作佛願跡郡王捨身疏梁武行懺悔文簡文帝度人出家願文八關齋序造寺疏勅齎袈裟願與諸寺作檀越與湘東王等書魏三臺寺詔隋為祖及戰場造寺詔唐太宗行陣處立七寺為陣亡設齋詔捨宅為寺詔度僧天下詔斷賣佛像詔為穆太后追福詔二十九滅罪篇梁簡文涅槃懺文六根懺文悔高慢文武帝悔文依經悔過文統歸篇梁武淨業賦孝思賦七山賦鹿苑賦大乘賦詳玄賦玄圃苑講賦夢賦傷弱子賦無為論伐魔詔撽文奏平心露布三十統歸篇晉宋齊梁陳周隋唐已來帝王大臣親王官僚名賢法師等三十七家詩頌英六經南海寄歸內法傳四卷上義淨三藏在南海見律部中出家人合行儀法集成四十條例寄歸中國令僧依行故云耳一破夏非小二對尊之儀三食坐小床四飡分淨觸五食罷去穢六水有二瓶七晨旦觀虫八朝嚼齒木九受齋赴請等緣二十衣食所須十一著衣法式十二尼衣喪制十三結淨地法十四五眾安居十五隨意成規十六匙筋合否十七知時而禮十八便利之事三十九受戒軌則二十洗浴隨時二十一坐具襯身二十二臥息方法二十三經行少病二十四禮不相扶二十五師資之道二十六客舊相遇二十七先體病源二十八進藥有方二十九除其弊藥三十旋右觀時四三十一灌沐尊儀三十二讚詠之禮三十三尊敬乖式三十四西方學儀三十五長髮有無三十六亡財僧現三十七受用僧衣三十八佛遮燒已三十九傍人獲罪四十古德不為三水要行法一時水知無虫用也二非時水澡荳土屑也三觸用水但得無虫不須分禮懺儀二卷上即一切恭敬等文則今之天下比丘為作佛事儀也下往生禮讚偈則六時佛事三業清淨進修淨土天宮之法門也尼傳四卷梁寶唱作名僧傳遂集此傳顯佛法中出家二眾各有人也自淨檢等七十五比丘尼出家修行實行緣右聖賢傳記有譯本者六十八部計一百七十三卷共五十帙天竺法師所述也無譯本者四十部計三百六十八卷共四十三帙華夏高人所撰集也若通前計大小乘經律論總五千四十餘卷四百八十帙以開元釋教錄為准則今撮略品目所集也其餘隨藏添賜經傳三十帙未入藏經二十七帙天下寺院藏中或有或無印經官印板却足故未錄略在知者可鑒耳禪門傳錄共一百卷寶林傳十卷西天勝持三藏同金陵沙門惠炬於韶州曹溪寶林山集靈徹師序其間唯後漢員外張成撰大迦葉碑文事跡詳美諸祖緣起如傳燈所錄也景德傳燈錄東吳傳道原集錄上進真宗皇帝勅翰林學士楊億作序入藏流通賜逐年聖節度僧一名今蘇州承天寺永安院恩澤是也三十卷一七佛迦葉初祖至十四祖龍樹尊者也二十五祖提婆尊者至二十七祖般若多羅等傳三達磨二祖道育道副尼總持三祖四祖五祖等傳也四牛頭融師北宗袖秀安國師三宗嗣法傳也五六祖及嗣法思禪師讓禪師等傳錄也六馬大師及百丈等傳七三角印宗禪師等傳嗣馬祖也八無業禪師等傳嗣馬祖也九溈山章敬西堂如會四宗嗣法等傳十趙州及鹽官嗣法兩宗等傳十一仰山大安嚴陽等嗣法諸傳也十二臨濟及嗣法并同派諸宗等傳十三風穴首山及神會一宗自圭峯禪師等傳十四清源思禪師嗣法石頭天皇丹霞藥山大顛等傳十五龍潭德山清平投子石霜洞山夾山等傳也十六雪峯巖頭瓦官九峯洛浦盤龍等諸傳十七雲居龍牙曹山疎山羅山白兆同安察等傳十八玄沙長慶長生鼓山保福等傳十九雲門大原孚等傳皆雪峯嗣法二十佛日報慈石門太平等傳二十一羅漢琛禪師及同派諸宗傳也二十二智門巴陵香林德山雙泉等傳二十三洞山初禪師奉先深清涼明等傳也二十四法眼進山主修山主明招梁山觀等傳二十五韶國師法燈禪師法眼禪師嗣法一宗傳二十六勳禪師柔禪師天平倚圓通道濟禪師太陽明安慧日智覺壽禪師等傳也二十七誌公傅大士思大天台智者僧伽萬回豐于寒山拾得布袋諸方徵拈代別二十八忠國師神會馬祖藥山大珠無業南泉趙州臨濟玄沙羅漢法眼等諸師廣語二十九大乘讚十二時十四科歸宗香嚴洞山羅漢勁頭陀玄沙龍牙法眼十玄談等頌德敷僧潤詩白太傳八漸偈三十心王銘信心銘心銘息心銘入道四行顯宗記參同契問心要坐禪箴證道歌了元歌懶瓚歌草庵歌樂道歌一鉢歌浮漚歌牧護歌古鏡歌遍參三昧歌心珠歌等也翫珠吟獲珠吟歸寂吟此但略標也蓋禪人日夕看讀耳天聖廣燈錄三十卷駙馬都尉李遵勗集錄上進仁宗皇帝御製序文勅隨大藏傳布然此錄當傳燈後二十年日月未遠機緣亦少以此語句大同小異今於二錄標其卷次宗派照於斯錄中所載宗師緣起語要昭然可見建中靖國續燈錄法雲禪寺佛國禪師帷白集錄同駙馬都尉張敦禮上進今上皇帝賜御製御書序文勅隨大藏經流布天下逐年聖節度僧一名今法雲禪寺奏守御書者是也三十卷一西竺二十八祖唐土六祖南岳清源石頭馬祖天皇百丈龍潭黃蘗德山臨濟雪峰興化雲門南院首山風穴汾陽等傳也二香林遠禪師薦福古禪師智門祚禪師蓮華峯庵主等傳也三雪竇明覺雲蓋鵬和尚九峰勤洞山寶上方岳金山新開先進禾山才諸禪師傳也四慈明禪師大愚芝琅瑘覺海會舉石霜永浮山遠金山頴杖錫已來山英等諸禪師傳也五天衣懷承天宗長蘆福龍興傳圓通訥雲居舜大為宥明教嵩等諸禪師傳六大覺璉禪師崇辨銑禪師佛印禪師正覺逸禪師等諸知識傳也七黃龍南道吾真楊岐會翠嚴真蕭山元淨慈遂泉大道𭰤潭月定慧信定山方等諸禪師傳并各派也八淨因淨照臻禪師西天竺岳雲峯悅金山賢禪師等傳九圓照禪師覺海冲長蘆夫棲賢遷三祖會鐵佛因報本存等傳十圓通禪佛日才天鉢元上藍達等諸禪師傳也十一蔣山泉慈雲惠歸宗通大中隆南豐因等禪師傳十二東林照覺禪師黃龍心黃蘗勝仰山偉𭰤潭英大溈秀福嚴感報本元承天琦圓通璣等諸禪師傳十三佛陀禪師歸宗文雲居祐隆慶閑三祖宗百丈肅等諸禪師傳十四真如禪師海會端保寧勇上藍晉等諸禪師傳十五大通禪師金山寧甘露宣天童齊香山泳等禪師傳十六投子顒佛日惠覺岳禪師定惠式隱靜儼永樂一等傳十七蔣山策普照英開先珣法雲白等諸禪師傳也十八夾山齡華嚴佛惠禪師元豐滿新羅頤等傳也十九𭰤潭乾開先瑛東林佛海禪師圓通僊等諸禪師傳二十雲蓋本福嚴演等諸禪師傳也二十一佛印清禪師系南師佛光無礙正禪師等傳二十二犬溈瑃開福演谷隱顯薦福英等禪師傳二十三兜率悅報慈英及同派下諸禪傳也二十四育王達大溈評惠力源四祖宣等師傳也二十五雙林昌淨慈明徑山悟金山仲雙林光二相果乾明因等傳二十六投子青和尚招提揩少林恩及諸宗嗣法傳二十七諸方拈古二十八諸方頌古二十九諸方偈頌三十諸方宗師述作宗教偈頌并劄子及上皇帝書天使宣取降賜御製序稱謝開板上進一宗勝事來歷並在此卷中式觀禪宗肇乎先佛數周塵劫曷紀歲時原自鷲峯授手鷄嶺笑顏花綻千枝源分萬派普傳竺國大播華夷繼代機緣集成傳錄然竺天祖師傳法偈頌讖語生緣飜譯在於何時流通載於何代謹桉禹門太守楊衒之銘系記云東魏靜帝興和四年庚申歲西魏文帝大統六年梁武帝大同六年也高僧雲啟往西竺求法至龜茲國遇天竺三藏那連耶舍欲來東土傳法雲啟曰佛法未興且同止此遂將梵本共譯為華言雲啟去遊印土那連耶舍親將至西魏值時多故乃入高齊文宣帝禮遇甚厚延居石窟寺以齊方受魏禪未暇翻譯別經迺將龜茲與雲啟所譯祖偈因緣傳播居士萬天懿殷勤叩問深悟玄旨遂將校對昭玄沙門曇曜同西天三藏吉迦夜所譯付法藏傳失於次序兼無偈讖乃寫本進去魏朝證其差謬付法藏傳當魏武真君年中信崔浩冠謙邪說毀滅佛法至文成帝和平中重興故缺也梁簡文帝聞魏有本遣使劉玄運往傳寫歸建康流布江表大唐貞元中金陵沙門惠炬將此祖偈往曹溪同西天勝持三藏重共參校并唐初已來傳法宗師機緣集成寶林傳光化中華嶽玄偉禪師集貞元已來出世宗師機緣將此祖偈作其基緒編為玄門聖胃集開平中南岳三生藏惟勁頭陀又錄光化已後出世宗匠機緣亦以祖偈為由致集成續寶林傳皇宋景德中吳僧道原集開平已來宗師機緣成傳燈錄上進真宗皇帝勅翰林學士楬億兵部員外即李維太常丞玉曙同議校勘備檢古今傳記證之尋具奉聞降詔作序編入大藏頒行天聖中駙馬都尉李遵勗參石門聰禪師發悟心地因聚禪學僧集景德已來出世宗師語要列此祖偈為根系多總事緣成廣燈錄上進仁宗皇帝御製序文勅隨大藏流通建中靖國元年秋惟白集天聖已來出世宗師機緣憑此祖偈以為標本成續燈錄上進今上皇帝御製御書序文勅入大藏傳布使百千萬世知佛祖妙道在吾炎宋特盛於天下得非佛菩薩示現為國王大臣者乎禪教五派宗源述夫出家作沙門者須悟佛心宗明見本性解佛教旨通暢精義則禪定戒慧了然圓證如說而行乃真佛子也若滯之一隅則偏而不通或二俱未習則名字比丘良可傷哉且佛心者祖祖密傳直指悟心證性乃雲門臨濟曹洞法眼諸禪門宗師之所提唱也佛語者則師師演說以論淨戒定慧乃賢首慈恩天台南山諸教門法師之所闡揚也然諸宗門下接踵傳持各代有其人不可備論矣子傳佛心外窮佛語旨常閱大藏經以其字號隨函卷軸考束部類品題撮義摭而錄之庶幾五千餘卷綱目頓現定境抑亦俾乎來者於此先明大旨然後披其經文則皎如鏡像其或踏著透脫一路無俟斯矣然傳道傳教宗源因而述之俾不滯偏局而通弘法道莊嚴聖世也且如來在多子塔前分半座而授手金色頭陀便傳正法眼令教外別行付上根輩而天竺繼之者二十七世達磨入于中國傳乎可祖至於六代曹溪門下分枝列派以之今日諸宗師共所提唱者謂之直指悟心見性宗乃曰禪門也如來在菩提場文殊普賢二大士當機啟悟而後馬鳴龍樹二祖師青目清辯二尊者洎智光法師次第傳演中國則帝心禪師智儼尊者賢首清涼二國師洎圭峯定惠廣而序述以之今日諸法師共所闡揚者謂之一念圓融具德宗乃曰賢首教也如來在鷲峯山慈氏菩薩啟蒙識智而後無著天親二大士護法難陀二尊者洎戒賢法師續明斯旨中國則三藏奘師慈恩基師大為嗣述以之今日諸論師共所傳講者謂之三乘法相顯理宗乃曰慈恩教也如來在給孤獨園優波離躬行性相戒法而後分諸部類鷄頭寺耶舍尊者以至諸派嗣續弘持中國則僧護惠猷僧業僧祐諸高僧洎澄照宣師恢弘細行以之今日諸律師共所持守者謂之行事防非止惡宗乃曰南山教也如來滅後五百年龍樹祖師傳正法眼外述中論頌而後青目尊者分別明菩薩條暢妙義中國則惠文禪師思大和尚智者國師洎灌頂左溪朗荊溪然三尊者續大玄旨以之今日諸講師共所發揮者謂之四教法性觀行宗乃曰天台教也然教分五宗實樞機如來所說經律論靡不該羅其道本一貫也竊嘗以塑佛者為喻喻之何謂也若慈恩教者如立佛骨上筋泥也南山教者如裹佛細泥緻密也天台教者如安佛五臟內備也賢首教者如裝佛金彩色澤也禪門宗者如著佛眼珠開光明也如是則闕一而不可也在乎智者以譬喻得解耳在大悟性者各宗本具大藏經綱目指要錄五利五報述崇寧二年癸未春得上旨游天台中秋後三日至婺州金華山智者禪寺閱大藏經仲冬一日丁丑援筆撮其要義次年甲申仲春三日丁未畢之計二十餘萬字因而述曰且寡聞比丘不足以為人師表者古今聖賢共所深誡之格言也故集斯大藏經律論傳記綱目指要以資多聞者舉揚應其機器耳況如來聖教若大海浩涉無涯待舉一因一緣何由便見也今於四百八十函則函函標其部號五千餘卷則卷卷分其品目便啟函開卷即見其緣起耳然所集者其利有五一宗師提唱者得隨宜開覺故何謂也向上玄樞應乎大器俯狥情性在乎順機故弘宗闡教以方就圓須假博聞待乎來問故集斯錄益真接化貴言有稽古道取信於人也二法師講演者資闡明訓徒故何謂也傳教者宜談妙義聽習者專諮實理一部微言必有所證或引經律論文或考疏鈔傳記略無所據義理難信故集斯錄緩急證其駕說使有端緒也三樂於注撰者助檢閱引文故何謂也作歌頌者讚揚妙道述疏鈔者發揮聖言臨文引據一事一緣貴出典章製不妄啟故集斯錄以待伸紙操毫而無凝思也四有緣看藏者易曉品義故何謂也出家佛子若曾聽經論或參問知識則一覽聖教其義了然既未然者不了法味則空益疲勞故集斯錄俾見大旨然後披文乃深入法藏也五無因披教者知藏乘要義故何謂也在家菩薩居仕宦者致君澤民職務駢冗處黎庶者家業縈繁公私逼迫以故無因披閱藏教設若有暇何處取經故集斯錄使人人知其法義家家有大藏因緣資乎種智而脫死生也然以斯五利而報恩亦有五也一國王恩者威德普覆令安然行道故何謂也恭念今上皇帝佛會菩薩現為明君慈育四生崇隆三寶詔談祖道序行續燈希世遭逢曠古未有如是聖恩云何可報經云欲報君恩當弘佛法故集斯錄使佛法惠命無窮則睿算國祚亦無窮也二外護恩者牆塹住持得如意唱道故何謂也竊思二十餘年三居禪剎承御寶親批蒙朝延降旨皆出貴公特達敷奏或安全保佑或以道吹噓至如宰相天下具瞻微賜顧接終身榮幸豈況揄揚讚道也其諸朝貴銘在定心斯須不忘深念報德經云大臣者國之重鎮常擊心祝願故集斯錄使佛法流通助澤民天下三父母恩者頓割深愛捨出家求道故何謂也緬惟生育又付明師授之以經書教之以仁義復令從釋訪道循方心契玄源身長出離其如此也何可報焉經云若不傳法度眾生畢竟無能報恩者故集斯錄使佛法僧播以答劬勞期乎佛記也四師長恩者攝授教約得參微契本故何謂也每想慈訓得度受業和尚也指心見性明眼宗師也交肩道伴則一瞬一揚知心益友則一言一句警悟死生資成解脫若斯厚德如何可報經云欲報師恩當說法度人故集斯錄使佛法種智不斷以答法乳也五檀越恩者隨乞供資助成聖道故何謂也且原游方十七載住持二十年三處焚修四事供給資身資道唯信唯檀上自越國大主大尉張公及內外朝賢遠近善友皆同心向道共成佛事如斯益我何可報之經云了悟心性通明佛法報信施恩也故集斯錄使佛法增盛同成佛果耳然五報者則報無所報無報可報也其五利者則利無所利無利可利也具正法眼者同為證焉尚書禮部准崇寧四年十月二十九日勅中書省送到汰雲禪寺住持傳法佛國禪師惟白狀昨徃泗塔下天台諸處名山禪誦因閱大藏經撮成綱目指要錄則伍阡餘卷卷摽指壹萬餘品目品品解義以廣神宗皇帝聖語云諸佛所說妙法之旨貴流通天下助揚今上皇帝紹述金輪聖化惟白今將所印大藏經綱目指要錄捌冊乞付印經院隨大藏經流行使佛法慧命傳布無窮祝延聖壽此外並無干求乞特賜敷奏申聞事仍連元狀并捌冊十月二十八手奉聖旨許入大藏其惟白賜空名度牒貳道奉勑如右牒到奉行前批內度牒降勑下禮部十一月一日午時付禮部施行仍聞合屬去處右告示法雲禪寺住持傳法佛國禪師惟白仰詳上項勑命指揮知委崇寧四年十一月日祠部員外郎葉祠部員外郎張侍郎劉尚書大藏經綱目指要錄述恭聞神宗皇帝熙寧元豐之政新天下法度利天下生民幾至措刑無為而治天下於是留神釋宗甞詔諭大丞相王公安石曰諸佛所說妙法也祖師所傳妙道也王公安石奏奉明詔誠如聖言以斯觀之則佛天子菩薩宰相出現世間而不疑也竊惟國王大臣如此者故每念如來之格訓默思有以報也頃遇今上皇帝嗣興大業躬集禪門續燈錄上進以明祖師所傳妙道也今復集大藏經綱目指要錄以顯諸佛所說妙法也庶彰神宗皇帝睿旨之張本上助吾皇紹述美化以延國祚矣崇寧四年乙酉歲上元日佛國禪師惟白謹述
