body:
  text: 東京法雲禪寺住持傳法佛國禪師惟白集推位讓國有虞陶唐吊民伐罪周發殷湯坐朝問道垂拱平章愛育黎首臣伏戎羗遐邇壹體率賓已上三十八函大集經總而言之則二十四部計一百四十二卷共一十四帙別而論之則六十卷十一品為其的也蓋譯有前後編無定次若據目錄以北涼天竺三藏曇無讖所譯為正部矣若以命題則經云久修梵行悉以大集復云知諸菩薩皆已大集又以大集眾所譯經成此一部聖教取意在斯大法體無極方相顯無盡等超倫無比天無有不至集聖凡同會經今古常規推十卷大集經一瓔珞品如來從耆闍崛山往古佛所住處聖眾大集思念成道已來經十六年即入佛境界神通三昧於色欲二界中間化大寶坊四天王忉利諸天各說偈讚佛如來陞師子座入無礙解脫三昧一一毛孔放大光明照十方界光中說偈聲遍十方佛界一一佛所各有無量菩薩來詣佛會各以香花散佛各入三昧或入光明或入妙香或入蓮花等諸三昧會中自在王菩薩問佛修菩薩行以何瓔珞而為莊嚴云何清淨云何壞愚癡云何修慈悲云何能斷疑綱云何修善業等佛云有戒瓔珞三昧瓔珞智慧瓔珞陀羅尼瓔珞以此四法而為莊嚴一一法自一法增至十法皆為莊嚴菩薩所修大行利有情也二自在王菩薩品佛說念光意光智光行光法光實光神通光無礙智光此入光明一一說八法次說大悲行十六法善惡對治三十二法為說如來大悲所行菩提之相昔成正覺受請轉于法輪也三如來自說三十二業行相復以偈言然如來善業無量無邊且以此開方便門使修行者易也四如來若象回顧云誰能守護此寶坊及供具待彌勒成佛後十六年來此說法神通自在菩薩云我能守護時有魔王言汝今置此何器中住答云凡言器者性是無常我身不變即於臍中現水光王佛界魔言汝有妙器堪能守護遂說八陀羅尼此言總持法門淨光如來所為頂光時受此妙法慧聚菩薩因地遇佛得法緣五寶女品手持寶珠白佛我實能於十方世界受持此大集經典書寫演說願此珠貫佛頂及諸菩薩髻即擲其珠便貫佛頂各各見珠中所現來世成佛等相佛言此寶女已於九萬六億佛所種善根來所生之處無不殊勝遂問云何實語云何法語佛說三十二淨語三十二寶心實義及因地所修諸行門六寶女問如來具足十力且佛是十力十力是佛耶及問四無畏十八不共法三十二相所修佛為廣說行相遂得不退轉若障礙菩提有三十二法速得菩提佛果亦有三十二法門七不眴菩薩品東方普賢如來所至寶坊中問佛以何三昧速證菩提佛言一切法自在三昧能得佛果所修三昧行相法門須菩提問答辯論不眴於自在如來所為法語比丘得此三昧從是已來以此三昧歷事無量諸佛聞法八海慧菩薩品下方神通如來所至寶坊中問淨印三昧佛說所修三昧法門即一切善法及菩提心等一切覺地諸法門九佛言欲速得淨印三昧當修一切淨法舍利弗及梵天與海慧辯說佛法如來云過去大力聲佛所法慧菩薩勇猛精進護持佛法會中六萬億菩薩同聲發言我等當弘護受持正法佛言汝等如何護法有云惜身命者不能有云貪利者不能有云二相者不能有云煩惱者不能彌勒云遠菩提心者不能護法各各說竟文殊云汝等如是等語皆是謬語何以故世尊坐於道樹不得一法汝等何言護法佛讚善哉善哉我實無法可得十海慧問大乘法佛言有一法攝取大乘便說一一法有二法利益大乘乃說二二法有三法難得大乘乃說三三法有四法障礙大乘乃說四四法復說金剛心句無量句義及一切法門寶坊中諸來聖眾聞者皆得無生法忍位十卷大集經十一佛告海慧當如本願過去佛時為輪王淨聲聞法出家為師子王護獼猴子海慧遂說魔業佛說破魔三昧魔眾嚴兵到佛所進退不得海慧神力置移東方佛界至彼佛土發菩提心以神力攝魔登師子座說此大集經法門不少一字及現如來大眾與彼佛眾相見作希有事化導無量人天之眾十二師子將軍子品其子生不能言以佛神力故到大寶坊中說偈讚佛與舍利弗論佛法正見及一切法門東方佛所金剛臍菩薩到佛會與無言菩薩論法化神力變此世界地悉金剛盡其神力不壞分毫佛讚無言夙善根故如是十三不可說菩薩品入定意已遂問佛菩提戒等種種法門無畏大士問如何是誑如來不可說云若言我是持戒他是破戒是誑如來我能修一切善法便是誑如來如其不能不見一法是見如來寶女與無畏論其法義降魔波旬此云惡者并說偈讚佛現其神力十四如來在妙嚴寶堂蓮花臺上東方佛所虛空藏菩薩在彼佛土聞虛空印法門說一切法皆以空為門至此說偈讚佛遂問佛如何行布施持戒忍辱與空等一切功德善法如何行得與空等佛即答之十五佛說功德與虛空等法不離如如念佛念法念僧念捨念戒念天說諸法行分別行相答前虛空藏所問十六速辯菩薩問何因緣故名虛空藏佛言譬喻長者有大庫藏無量珍寶積聚其中今此菩薩亦復如是過去光明王如來時有輪王名功德莊嚴有二子一名師子二名師子近出家得道佛令師子進現大神變於虛空中雨無量寶滿足一切所願佛即印其名又無數劫前佛所為灌頂王出家發菩提心虛空藏八萬四千諸三昧門成就如是廣大神通力十七虛空藏問大誓莊嚴大乘妙法佛以車轅車輻等為喻無量善法而為莊嚴寶德問淨行答以眼耳等無際為淨阿難問身證答以虛空印為印諸聲聞各以衣上虛空藏以神力攝往袈裟幢世界山王如來所說法梵天眾問如來為說善根出要寶手問不思議法答以六十四法為一百二十八法引攝十八魔波旬眾來至佛所聞說邪魔破佛法律罪報愁苦無量佛運慈悲攝令發心文殊與諸菩薩各說過魔事法波旬歡喜魔子魔眾有不同者虛空藏神力攝化諸天各說呪護法令如是經典流布無窮十九寶幢魔苦品舍利弗目連遇馬星說法將詣佛所出家波旬作無量魔相欲令退轉佛神力故皆不能也過去佛所夫人善見聞寶幢陀羅尼即轉女身波旬種種為害十大弟子入城持鉢波旬令作歌舞各為說偈說呪悉發無上道意二十四大弟子與波旬在王舍城中遊行歌舞無量人天悉生煩惱佛將入城人天皆來云不可入城恐魔眾為害如來神力化無量香花莊嚴城中入首楞嚴定此云健相示現八十種微妙相好光味仙人見是相已即問佛姓氏等佛即復問乃說人生所屬二十八宿所臨性行佛即破之令了生死即得授記佛復以神力於一一門現身降伏魔眾遂言魔眾從我入胎已來種種害我我不生瞋各悟無生法忍讓十卷大集經二十一如來調伏眾魔已東方阿閦佛西方彌陀佛及十方諸佛各與無量菩薩來入大寶坊大集會中圍遶如來諸天諸神諸鬼與諸如來各說神呪護持大集經典一切正法魔眾聞呪各發菩提心十方諸佛各還本土二十二虛空目分聲聞品目連舍利弗初出家說法諸弟子眾各生憍慢如來以神力拈花化寶光明花鬚中說偈遍十方會佛弟子各捨憍慢大集佛會花鬚往四方四佛所說偈四童子與四方眾皆來佛會願聽虛空目說為憍陳如說出家行法比丘修諸觀境解脫法門及滅後十二部經隨所說異宜弘正法諸龍眾至各各發願二十三世間目品佛放光明照十方世界一切眾集諸國王欲問十二月相無有知者詣佛所問佛說過去仙人與雌虎交生十二子因緣彌勒說偈佛即解說為憍陳如行行慧行為婆羅門說四無量心為無勝說三慈自說修菩薩行時一切處修慈悲行二十四聖目品明星問佛聲聞辟支所行佛一一說其相狀及聖智等法須以大慈悲為本乃善受生虛空目內空目外空目等法門諸大眾諸神眾諸王眾各願流通正法也二十五寶髻菩薩品東方淨住如來所至此寶坊中問佛所修淨行法即法行佛言四行一者波羅蜜行此云到彼岸二者助菩提行此云道三者神道行四者調眾生行一一行中說諸法相所行皆是念處觀境微細行之二十六佛說淨五根淨五力淨七覺支淨八正道淨莊嚴調伏一一廣說行相乃云過去為精進比丘受種種苦調伏眾生方成正覺二十七無盡意菩薩品東方普賢如來所至此界佛所說偈放光舍利弗問佛乃說所來國中不以文字語言唯諦觀於佛行念佛三昧舍利弗問云何名無盡誰與仁者字也何謂無盡法門答云初發菩提心已無盡無無盡菩薩心清淨無盡心行無盡四行無盡畢竟無盡布施持戒精進禪定智慧無盡一切善法悉亦無盡故二十八無盡意為舍利弗說精進禪定般若無盡如是諸行無盡成無盡慧得無盡智也二十九說四無量心四無礙智六神通四依法四攝法一切法等亦無盡廣說無盡盡也三十菩薩修習功德無盡智慧無盡四念處四正勤四如意五根五力七覺支八正道修行定慧總持辯才一道方便是名菩薩八十無盡含受一切佛法無盡說是無盡法門諸聖賢眾各以香花衣服以散無盡意人天等眾各各發弘誓願護持此之妙法國十卷大集經三十一日密分中護法品佛說六度妙行迦葉白佛破戒比丘不可受施佛言諸過惡侵犯僧物頻婆羅王白佛請說果報諸惡比丘受無量苦乍護一持戒者不可護無量破戒者說是法時東方佛所日密菩薩南方佛所香象王菩薩悉來此界三十二西方佛所光密菩薩北方佛所虛空密菩薩如是四方四佛各為四菩薩說法說呪至此忍界以偈讚佛各入禪定佛為憍陳如分別色欲形欲天欲欲欲一切凡夫以此四欲纏縛流轉生死為說一切諸觀境令觀不淨妄想惡覺悉如虛空諸修行者依如是學三十三佛為憍陳如重說四佛神呪蓮華空空行空淨欲等陀羅尼修此法門一切世間作不樂想不淨白骨想食想持鉢房舍等想一一觀想無一可樂自然入空解脫門十方佛攝此世界入在身中善根眾生歡喜波旬愁苦三十四日藏分護持正法品自三十四至四十卷盡與前日密分同本也耶舍別譯文廣耳有十卷大集經四十一降伏眾魔及驢辱先生過去因緣安置日月星辰二十八宿善惡祭祀法迎祥也四十二二十八宿吉凶造作用事晝夜合與不合一月三十日輪次直之應一切眾生所作為也四十三光味菩薩誡諸龍王護持佛法諸魔愁苦為說念佛三昧陀羅尼法門也四十四歸濟龍王為說諸善法乃布施等行相也四十五付囑諸龍王龍眾天上人間隨處守護佛法如塔演諸神呪令誦持者能守護佛法獲大利益等事四十六月藏分西方世界日月光如來所月藏菩薩來詣佛所說諸吉祥偈及月幢陀羅尼佛說六度行也四十七魔波旬及修羅眾來詣佛所不能惱亂自然信伏回心歸依也四十八彌勒問佛是王貴種何緣與修羅畜生類親佛言毘舍浮如來時我為兄他為八弟月藏遂問第一義佛言三界眾生皆著樂不發菩提心此云道若發此心即是第一義也思之四十九火光天子與諸天眾各各勸諫波旬眷屬回向佛法不須惱亂一切諸神四大天王等眾各說守護正法利益人間五十諸鬼神眾歸信已佛為說第一義清淨平等六度行之清淨十惡休之則一善得十種功德及說諸祕密神呪虞十卷大集經五十一清淨禪平等乃諸禪定觀境一一分別及一切世間智器出世間法器成就觀行三昧即法器也諸鬼神眾各說因地罪犯今發心護持弘法蘭若比丘眾也五十二諸魔說偈讚佛自在天日月天四天王天等各說護法者五十三佛為四天王說大力雄猛不可害輪大明呪亦各與授記阿修羅火味等不蒙付囑護法遂即生惱佛復囑之皆大歡喜爾時大集會中百億眾生萬億菩薩各各誓言流通正法弘持法藏諸龍諸阿修羅等各願養育四天下有情五十四佛勸諸阿修羅與諸龍眾行忍辱行不得鬪諍護持比丘為火味修羅說諸善法所修之行行者也五十五佛為月藏言我滅度後初五百年解脫堅固次五百年禪定堅固次五百年智慧堅固次五百年塔寺堅固次五百年鬪諍堅固乃付囑諸龍諸天修羅等眾及諸國王各護持我法令此閻浮國界一切弘法比丘一切眾生而獲安樂五十六說二十八宿所主世間一切有情物類佛為大梵天言一一國土付囑角宿等一一星育養幾國土佛面門放光照大千界悉見無量佛國四天下建立塔寺之處付授彌勒日藏月藏各以偈問佛即以偈答讖佛法盛衰及因地緣或遇惡王惡臣惡人壞佛法等緣五十七須彌藏分功德天問聲聞禪智菩薩禪智佛為微細說之地藏菩薩問功德天風雨不時與物為害如何護持長養眾物功德言過去與如來同發菩提心幢相如來授水風呪力陀羅尼但眾生惡毒招此旱潦物不滋養我亦護之五十八佛告功德天我與汝二人幢相佛所同發心今我得菩提汝得滿願功德天言我願未滿為此處多有毒龍龍女與人為害爾時須彌藏仙菩薩白佛我入毒龍宮中入龍嚬呻三昧入三昧已又說神呪諸龍降伏善住龍王等各願護持國土各說神呪地藏無盡意彌勒文殊諸菩薩眾各說神呪佛復為諸龍王眾種種說法五十九十方菩薩俱來問佛何因緣同眼耳同心意何故有癡有黠有慧有能飛有能三昧有定意有智慧有厚薄佛言有守口不能守身有守身不能守意者遂有五十校計微細黠罪皆從心起百八疑癡顛倒當墮愛裁識因緣種然百八愛百八點一一法自心意識眼耳鼻舌身意五陰中互相轉入色聲香味觸其間不知生不知滅生死欲習斷其惡欲成真觀定聖眾同聲白佛我等無欲佛云汝等愛三十二相不皆云我等勤苦為修此也佛云汝等何言無欲諸菩薩各各大慚稽首讚佛也六十佛為十方菩薩言坐禪數息不得定意若得定意不久但坐當滅當來生死意當斷本罪生死意佛言心所動得因緣合中有盛百八生死皆心意識眼耳等中又復校計百八本罪滅不滅百八罪入空中百八不捨百八清淨百八精進百八忍五十校計中一一校計說百八心未起時中有五百四十百八愛行眼耳等一一法有如是五百四十百八愛行右大集經六十卷如來在色欲二界中間化大寶坊大集十方聖眾人天魔梵龍鬼悉大集其中說此大集經法然後付囑護助比丘宣揚正法保持國土養育眾生其間或前譯後譯或同本不同乃佛法不可思議豈意識測量也若大機器者具無漏智細閱而依行則如來常出現世矣陶十卷地藏十輪經地則堅厚無涯藏則包含無盡以十佛輪轉十惡業故唐三藏玄奘法師譯也一爾時南方香雲香雨花雲花雨寶雲寶雨無量莊嚴具來入大集會中天人問何瑞如此佛云地藏菩薩將至于此即時說偈為供佛上如來說此大士十方諸佛國土隨意居之成就勝事讚其三昧功德欲增長此界有情善法來入此大集會說祕密呪二地藏以偈問佛謂此界眾生何故不畏苦業多造十惡佛為廣說所修十佛輪令此眾生轉其十惡業輪業俱無盡三天藏問佛修無依行答以十義一欲修定乏資緣二犯戒行惡行三妄執身心四心動躁五離間語鬪亂六惡語毀罵七雜穢虛誑八貪嫉他人九多瞋忿十邪見以此十緣不能成定復有十無依法一著事業二著談論三著睡眠四著營求五著艶色六著妙聲七著芬香八著美味九著細觸十著尋伺以此亦不能成又為說國王大臣不得破壞比丘然有破戒者亦勝清淨外道功力所修四地藏問此土有佛世無佛世作惡眾生入無間獄如何救護佛云此土眾生剛強難為調伏造十惡輪多入地獄乃說破戒比丘多於國王大臣前毀罵持戒比丘如是惡業當墮無間地獄復說敬袈裟因緣義五佛告地藏真善國王大臣婆羅門居士長者護佛法護比丘自然速離十惡業輪亦勸他離乃吉祥也天藏護國神呪復為金剛藏說有依行法十輪回法問妙義六惡剎利帝等親近破戒比丘非法器僧退失一切善法墮無間獄若真善剎利帝等親近佛法比丘成就種智也七佛說惡性眾生造種種業將受無量苦報會中百千萬億眾各各發露懺悔宿作邪見遂各於佛法生正見等八金剛藏問如何修進善業得不誤失佛言有十種輪若能修持遠離十惡業喻如輪王有諸寶輪能降伏一切王也九佛說遠離瞋恚邪見等十輪復說財施法施福田相十輪布施大甲冑輪淨戒安忍精進禪定般若等大甲冑輪十佛說福田相般若大甲冑輪大慈大悲大忍堅固大甲冑輪會中人天聞此法者皆得法眼付囑金剛藏等流通唐十卷十輪經八卷與前同本異譯但廣略小異若要三寶種姓熾盛久住世間利益有情依此法門也須彌藏經二卷大集經中須彌藏分同本弔十卷念佛三昧經五卷虛空孕經二卷虛空藏經一卷觀虛空藏經一卷虛空藏神呪經一卷已上五經與大集經虛空藏分同本各譯民十卷大集念佛三昧經大集經中虛空藏分同本此隋朝笈多譯名不空見一聖眾人天集會諸天願聞念佛三昧法門如來即現神力二過去寶聚如來所精進王二子一名師子意於如來所出家修梵行而證道果三佛弟子眾思念但聞其名不見解釋不空見即入念佛三昧諸菩薩聲聞各相問答說偈嘆此三昧神變不可思議也四彌勒現神變不空見與阿難廣說一切法要三昧五不空見說無量妙音聲無量如來功德具足第一無量辯才將說念佛三昧法門妙義六如來為不空見現大神力出金色手摩頂云汝今善為眾生說如來功德不空見以偈讚佛復發四十問如願得多聞自然海等七如來為說念一切佛三昧復說思惟佛三昧法門八佛說思惟佛三昧已會中無量人眾皆得法眼如來放光記如是眾各當成佛不空見復問慚愧三昧佛說過去佛所為善觀王行是行九行慚愧行修集一切善法圓滿念佛三昧法門十慈行如來所廣樹比丘輪王天主皆入念佛三昧此法門是一切佛菩薩成道逕路也伐九卷大集賢護經五卷般舟三昧經二卷拔陂菩薩經一卷已上三經與念佛三昧經同本但隨所見翻譯成廣略也其間不無小異至如般舟云見在定意意向十方佛即念佛思惟佛三昧也所云拔陂或云陀和或云拔波皆梵音差別此方直譯為賢護然此經前後七譯今或存或亡具如開元錄詳論罪十三卷阿差末經七卷無盡意菩薩經六卷已上二經大集經正部中無盡意菩薩分同本梵云阿差末此方翻為無盡意無量意然北涼西晉宋代各譯故立三題各異周十卷大哀經八卷譬喻王經二卷已上二經大集經中譬喻王別品同本大哀即最初自在王菩薩品其所問者則如來大悲行利樂有情成無上道以我佛如來大悲心行大哀憫三界眾生而為度脫故立是題也發十卷寶女所問經四卷大集經中寶女品同無言童子經二卷大集經中無言菩薩同奮迅王問經二卷自在王菩薩經二卷已上二經同本各譯於法得自在能奮迅故立名耳上自在王問佛如何於大乘速成菩提佛云有四法而能成就一者戒自在二者神通自在三者慧自在四者智自在廣說行相下佛說解脫自在於苦集滅道等法不了則顛倒了即一切法皆得自在故云王也殷十卷寶星陀羅尼經大集經寶幢分同本其間緣起則馬勝化舍利弗目連來投佛出家波旬為惱如來分衛王舍城門一一門中佛現十方佛悉來共作威光降伏波旬同音說呪普益末世眾生及諸國土令守護四部弟子使精修戒法令法久住其間月勝所說寶星陀羅尼誦持者女變男身其功最妙右諸經皆係大集經總部故略錄次序使見前後翻譯其品目義意止於正部中標列貴不繁碎俾覽者易曉其始末也華嚴本部并眷屬經總二十六部計百八十七卷共一十七帙蓋前後翻譯不同其義趣廣略貫通則同也今於諸部只標卷數品會於唐譯新經八十卷中一一撮其義類以照前後部帙古華嚴經五十卷七處八會共三十四品東晉天竺三藏佛陀跋陀羅等譯湯十卷古華嚴經一世間淨眼品一二世間淨眼二三盧舍那品四如來名號品四聖諦品光明覺品五菩薩明難品淨行品六賢首菩薩品昇須彌頂品妙勝殿說偈品七菩薩十住品梵行品八發心功德品明法品九夜摩天宮自在品說偈品十行品初分十十無盡藏品坐十卷古華嚴經十一昇兜率天宮一切寶殿品雲集讚佛品十二十回向品十三回向品二十四回向品三十五回向品四十六回向品五十七回向品六十八回向品七十九十地品一二十十地品二朝十卷古華嚴經二十一十地品三二十二十地品四二十三十明品十忍品二十四阿僧祇品壽命品住處品二十五不思議法品二二十七如來十身相海品佛小相光明功德品二十八普賢行品二十九寶王如來品性起品三十性起品二問十卷古華嚴經三十一至三十六卷離世間品三十七至四十卷入法界品道十卷古華嚴經四十一至五十卷入法界品右古華嚴經五十卷高僧支法領親至印土取梵文歸此大夏東晉安帝義熙十四年於揚州謝司空寺置華嚴護淨堂同天竺三藏佛陀跋陀羅翻譯堂前池中每日有二青衣童子出現掃西譯場其靈感有如此者其餘具如感應傳所載也大方廣佛華嚴經七處九會所說計八十卷共三十九品唐證聖元年乙未藏于闐國三藏實叉難陀奉詔就大遍空寺重譯則天皇帝每至法延遂御製序文中間祥瑞亦時應感如序云甘露流津預夢庚申之夕膏雨洒潤後覃王戍之辰此其略也餘則可知大曠兼無際竪窮橫極方正法自持軌物生解廣塵剎相含沖深包博佛覺斯玄妙照體圓明華萬行可樂資莊體用嚴飾法成佛智運融通經泉湧妙義花貫玄凝垂十卷華嚴經菩提場第一會六品十一卷經普賢菩薩說一世主妙嚴品如來在菩提樹下登金剛寶座於一切法成等正覺普賢菩薩眾執金剛神身眾神眾足行神眾道場神眾主城主地主山主林主藥主稼主河主海主水主火主風主空主方主夜主晝神眾阿修羅眾此云無酒迦樓羅眾此云金翅緊那羅眾此云凝神摩睺羅眾此云大腹行夜叉王眾大龍王眾鳩槃茶眾此云甕形乾闥婆眾此云尋香行日天子月天子帝釋夜摩天兜率天化樂天他化自在天大梵天光音天遍淨天廣果天大自在天各將天眾已上四十眾悉集道場與如來夙同願力故能普問法界也二道場眾海悉已雲集妙焰海十天王光明幢十天王名稱十天王光明十天王尸棄梵十天王自在十天王善化十天王知足十天王時分十天王因陀羅十天王日宮十天子月宮十天子各得法門各觀己眾及于十方佛神力故各說偈讚三持國乾闥婆王十眾增長鳩槃茶王十眾博叉龍王十眾多聞大夜叉王十眾摩睺羅伽王十眾光明天緊那羅王十眾速疾力迦樓王十眾宮殿主晝神十眾淨光主夜神十眾一切主方神十眾普照主空神十眾光照主方神十眾各有無量眷屬各入法門各觀已眾如來神力各說偈言四焰藏主火神十眾雲幢主水神十眾寶光主海神十眾迅流主河神十眾勝味主稼神十眾吉祥主藥神十眾如雲主林神十眾開花主山神十眾淨花主地神十眾光曜主城神十眾莊嚴道場十眾印手足行神十眾境界身眾神十眾妙色執金剛神十眾各觀已眾各得法門以佛神力各說偈讚五普賢菩薩入不思議解脫法門妙光菩薩大明菩薩通王菩薩普震菩薩明髻菩薩猛慧菩薩智印菩薩花髻菩薩圓滿光菩薩普音菩薩淨月菩薩光幢菩薩諸摩訶薩眾如來光中復出微塵數菩薩各各入無量解脫法門各各觀無量眾各各說無量妙偈六如來現相品諸菩薩及一切世間主作是思惟云何諸佛地佛境界佛加持佛所行佛力佛無畏佛三昧佛無能攝佛眼佛耳佛鼻佛舌佛身佛意佛身光佛光明佛聲佛智及一切世界海佛海解脫海等供具雲中自然出音說偈世尊知諸心念齒間放光明光中復說偈讚爾時一切世界海東西南北上下四維各有十億佛剎微塵數菩薩悉來雲集各於本方化蓮華藏師子坐念念中各出生無量殊勝諸菩薩光中同聲說偈如來欲令諸來眾獲如來無邊境界於眉間放無量光明現無量神變光中出微塵數菩薩眾時一切勝音菩薩光慧王慧光明普明慧奮迅慧海慧焰髻慧威德慧法界慧無礙慧諸菩薩等各說偈讚毘盧遮那此云遍一切處七普賢三昧品於如來前坐蓮華藏師子之座入一切諸佛毘盧遮那如來藏身三昧普入一切佛平等性示現微塵數世界海雲十方諸佛各摩其頂十方世界海皆有曾賢入此三昧從此三昧起一切如來毛孔光明說偈讚普賢菩薩世界成就品普賢以佛神力觀察世界海眾生業海欲海佛法輪海三世海願力海神變海普觀道場海為說一切世界海成壞不可思議復說十種事世界海依住形狀體性莊嚴清淨佛出現劫海住轉變差別無差別一一分別其行相一一頌其所以八華嚴世界品普賢說毘盧遮那往修諸行以大願風輪持花藏世界蓮華之上寶輪圍山金剛寶地香海圍遶眾寶嚴岸山內平地金剛所成香海雨間寶樹花果眾妙莊嚴河底莊嚴亦無量寶歎此世界有無量功德及世界種性體相形狀依住一一廣演行相各說偈言次說二十重花藏百佛剎皆所信所感也九妙華光香水海東次有香水海名離垢焰藏出大蓮華無量世界海以為眷屬圍遶次第而說十離垢焰藏香水海東次有香水海名變化微妙身次第百佛剎世界一一世界無量莊嚴拱十卷華嚴經十一毘盧遮那品過去勝音世界最初世界海有輪王名喜見善慧太子名大威光供養功德山須彌勝如來次善眼莊嚴如來次最勝功德海如來次蓮花眼如來於此四佛所修無量行得無量法故云耳普光明殿第二會經四卷共六品文殊師利說十二如來名號品普光明殿蓮華座上諸菩薩各各思惟爾時如來知心所念為現神變東方不動智佛文殊菩薩南方無礙智佛覺首菩薩西方滅暗智佛財首菩薩北方威儀智佛寶首菩薩東北方明相智佛功德首菩薩東南方究竟智佛目首菩薩西南方最勝智佛精進首菩薩西北方自在智佛法首菩薩下方梵智佛智首菩薩上方觀察智佛賢首菩薩以此十方十智佛九首菩薩各與眷屬悉集佛會文殊稱揚如來名號十方世界所稱不同各有百億十千名也四聖諦品文殊告眾云此娑婆世界所稱苦集滅道聖諦與十方世界各各差別無量名字不同十三光明覺品如來於兩足輪間放百億光明照三千大千百億四天下百億諸天百億大海百億須彌現百億菩薩出家百億如來成道轉法輪般涅槃爾時百億佛剎皆有文殊九首大士東方光照過十佛國百世界千世界大千世界百千世界百萬世界一億百億千億無量十方億世界一一光照爾時一切處文殊為一一眾說偈稱揚如來無邊功德海行願問明品文殊問心性是一報受不同既非眾生隨形化度四大無我好醜差別所悟一法示現無量福田等一果報各異佛教煩惱有益無益受持佛法不斷貪嗔智為上首讚揚施等一道出離報土差別九首菩薩各以偈答復問文殊云何是佛境界云何因入法知現度智說證廣以此十問亦以偈答云如來深境界其量等虛空一切眾生入而實無所入云云十四淨行品智首問文殊云何得無過失身語意業及不害不壞不退轉不動殊勝無染清淨智為先導等身語意業生處等十具足勝慧等十慧因力等十力蘊等十善巧成就七覺支三解脫六波羅蜜佛十力圓滿云何得八部諸天來守護云何與一切眾生為依為歸為趣為照為明乃至為無等等二十問文殊答曰菩薩居家知家性空乃至睡眠始寤當願眾生一切智覺周顧十方中間一百四十清淨大願則日用世出世間諸法當機任運作意一一成就殊勝妙行速得圓滿菩提道果十五賢首品文殊問曰清淨願行我已說之殊勝功德汝當分別賢首答曰善哉仁者到此有勝三昧名安樂乃至其福最勝過於彼計百九十頌罄盡圓宗妙趣方綱三昧趣諸神力說是法門已十方世界六種震動瑞應也忉利天第三會經三卷計六品法慧菩薩說十六昇須彌頂品如來神力不離樹下而往天宮帝釋在妙勝殿遙見佛來即與諸天莊嚴寶座躬請於佛以威力故一切音樂自然止息乃稱揚過去十佛曾來此殿是故此處最為吉祚十方世界悉亦如是須彌偈讚品如來願力故十方世界佛剎微塵數菩薩俱來集會其大菩薩名曰法慧及一切慧勝慧功德慧精進慧善慧智慧真實慧無上慧堅固慧所從來國各各不同其本佛名殊特月無盡月不動月風月水月解脫月無上月星宿月清淨月明了月各化蓮華藏師子座而坐十慧菩薩各觀十方各說妙偈稱揚如來無邊勝妙所修功德十住品法慧菩薩入無量方便三昧千佛剎微塵數佛所皆同一號十方諸佛同音讚歎各以手摩其頂從三昧起告諸佛子云菩薩有十種住所謂發心住治地住修行住生貴住具足方便住正心不退住童真住王子住灌頂住此十住中每住聞十種法勤學十法共成二百法門勸進行相六種震動說偈十七梵行品正念天子白法慧云依如來教染衣出家如何得梵行清淨至無上道答云應以十法為所緣所謂身身業口口業意意業佛法僧戒應如是觀如云身是梵行耶身業是梵行耶一一如此窮其根源了不可得知一切法即心自性成就慧身不由他悟發心功德品帝釋白法慧初發菩提心所得功德其量幾何答云佛子假使有人以一切樂具供養東西南北四維上下阿僧祇眾生經於一劫復教奉持五戒展轉千千萬萬億億樂具劫數亦復如是十善四果世界成壞解脫根性差別欲樂方便心業煩惱佛塔等所一念頃能成就此之大事盡其塵劫不能比量以初發菩提心不止如是稱其功德六種震動復說長偈重宣義也十八明法品精進慧白法慧云成就如是菩提心功德云何修習以幾法而速得圓滿成無上道答以十不放逸十種清淨十法歡喜十法安住十法速入十法所行清淨十法清淨願十法大願十無盡藏十法莊嚴及無量具足法自在法陀羅尼法成就如是等法故夜摩天宮第四會經三卷共四品功德林菩薩說十九昇夜摩天宮品如來不離菩提場忉利天而往彼天宮天王遙見佛來於寶莊嚴殿中化蓮華藏師子座無量珍寶莊嚴天王曲躬請佛即入昇坐天眾憶念善根佛所深種乃稱揚過去十佛曾來此殿以故毘盧遮那如來來入此中最為吉祥說偈讚歎十方世界亦如是現相也天宮偈讚品爾時十方佛剎微塵數國土外有微塵數菩薩來集會中其大菩薩名功德林及慧林勝林無畏林慚愧林精進林力林行林覺林智林所從十慧世界佛所來于此土佛號常住眼無勝眼無勝眼無住眼不動眼天眼解脫眼審諦眼明相眼最上眼紺青眼十佛皆悉來集各化寶座而坐十林菩薩各各觀察諸菩薩眾普及十方各說偈稱揚毘盧如來願行普周法界十住品功德林菩薩入善思惟三昧萬佛剎微塵數諸佛皆同一號同現其前讚言善哉善入如是三昧各以威力共加與無量智各伸手摩頂從三昧起告諸菩薩言菩薩行不可思議與法界虛空等然有十種今當宣說歡喜行饒益行無違逆行無屈撓行離癡亂行善現行無著行難得行善現行真實行遂一一分別解說其行相所行妙行難行能行也二十自無著行至真實行法相說是行門已六種震動十方世界悉亦如是復說偈言平十卷華嚴經二十一十無盡藏品功德林復告諸菩薩言佛子有十種藏所謂信藏戒藏慚藏愧藏聞藏施藏慧藏念藏持藏辯藏以此十藏說其行相一一無盡復說十無盡法而能成就此無盡藏稱菩薩行也兜率天宮第五會經十二卷計三品金剛幢菩薩說二十二昇兜率天品如來不離本坐而往天宮天王遙見佛來以神力故於妙寶殿化一百八十四種妙寶莊嚴之具皆功德智慧所生一百十八天眾出妙音聲稱揚讚歎隨所願行力故請佛就座各說偈稱揚過去十佛曾來故此吉祥二十三天宮偈讚品佛神力故十方各有萬佛剎微塵菩薩俱來集會其大菩薩名曰金剛幢及堅固幢勇猛幢光明幢智幢寶幢精進幢離垢幢星宿幢法幢所從來國名曰十妙其佛號無盡幢風幢解脫幢威儀幢明相幢常幢最勝幢自在幢梵幢觀察幢十佛各化蓮華藏師子座而坐現無量神變說無量法門與毘盧如來夙同願力十幢菩薩各觀十方各說妙偈稱揚如來所修回向無量行門十回向品爾時金剛幢大士入智光三昧十方佛剎微塵數佛皆同其號而現其前稱讚以善根力各伸手摩頂從三昧起告云佛子菩薩有十種回向所謂救護一切眾生離眾生相回向不壞回向等一切佛回向至一切處回向無盡功德藏回向平等善根回向隨順一切眾生回向真如相回向無著無縛回向法界無量回向已上十種回向一一分別解說其所修行相二十四不壞回向等一切佛至一切處回向法門二十五無盡功德藏及善根回向初分法門二十六善根回向施種種車眾寶等法門二十七善根回向施皮膚頂髻等如寶髻妙身二大士也二十八善根回向中若見如來出世以大音聲遍告十方令一切眾生得聞佛各得聞正法然說六十種施自上妙食至王位皆施一一施中一一願無盡一一引過去佛菩薩所施獲報為證如妙眼王菩薩施眼如是得果二十九隨順眾生回向法門義三十真如相回向所說行相法門章十卷華嚴經三十一無著無縛回向法門三十二法界無量回向初分三十三法界回向中以法施所修善根等法義然此十回向中所演行相法門無量其間一一回向各有偈言稱揚菩薩所行大行也他化自在天宮第六會經六卷止一品義金剛藏菩薩說三十四十地品如來在他化自在天宮摩尼寶殿上金剛藏并解脫月菩薩眾金剛藏即入智慧光明三昧諸佛共加如來智力各伸手摩頂勸說菩薩智地法門從三昧起告諸佛子云菩薩有十種地所謂歡喜離垢發光焰慧難勝現前不動善慧法雲說此十地名已默然在定諸菩薩各各心念何故不分別地位行相解脫月知諸心念殷勤三請諸菩薩同音共請如來放光加請謂之三加五請乃說歡喜地法門三十五離垢地淨戒法門發光地忍辱法門三十六焰慧地精進法門難勝地禪定法門三十七現前地智慧法門遠行地方便法門三十八不動地無盡願法門善慧地無量力法門三十九法雲地大智法門說受職法門十方受職菩薩悉大歡喜同來集會各各放光證其所說然十地中法門唯大機大器者可以受持讀誦普光明殿第七會經十三卷共十一品普賢菩薩說四十十定品如來於普光法堂入剎那際三昧十佛剎微塵數菩薩皆住灌頂位其名曰金剛慧并普眼等一百大士為其上首各與十佛剎微塵數菩薩俱皆與如來夙同善根爾時普眼問普賢三昧所修妙行佛言今在此會成就不可思議神變聞名者皆得三昧普眼復問今在何處佛云現在此道場普眼與眾觀察不見身坐復入三昧遍觀亦不能覩從三昧起白佛我求見普賢竟不能得佛言身語意業境界無量令眾渴仰殷勤頂禮普賢即以神力現其色身及蓮花座大眾心喜讚嘆佛告普賢當為菩薩稱揚三昧普賢即說十大三昧所謂普光大三昧妙光大三昧遍往諸佛國土大三昧清淨深心行大三昧智莊嚴藏大三昧智光明藏大三昧了知一切世界佛莊嚴大三昧眾生差別身大三昧法界自在大三昧無礙輪大三昧此十大三昧過去未來現在諸佛已說今說當說若能成就與如來等無有用分別普光妙光二三昧法門義趣愛十卷華嚴經四十一佛國土深心行莊嚴藏光明藏佛莊嚴五大三昧行相法門義相四十二差別身法界自在二三昧行相法門四十三無礙輪大三昧行相普眼聞如是法問云何故不名為佛答云入此境界乃名為佛行願無休乃名菩薩四十四十通品普賢復為諸菩薩說十種通所謂他心通天眼智通宿住隨念智通天耳智通佛剎智通言辭智通色身智通一切法智通滅盡三昧智通四劫智通若成就此十大智神通悉得一切三世無礙智神通一一分別其行相十忍品普賢復為諸菩薩說十種智忍所謂音聲忍順忍無生忍如幻忍如焰忍如夢忍如響忍如影忍如化忍如空忍一一解說忍中所修義趣復說妙偈如音聲忍偈略云聞一切佛所說妙法不驚不怖等四十五阿僧祇品心王菩薩白佛如來演說阿僧祇無量無邊無等不可數不可稱不可思不可量不可說不可說其義云何佛言汝今欲令諸世間入佛數量之義當為汝說自一百洛叉至為一不可說不可轉以盡古今大數止一剎那際佛復說偈大旨則身口意業世出世間一切諸法及日用動止皆不可說不可說至如塵毛境界亦不可說不可說壽量品心王為諸菩薩言釋迦佛彌陀佛金剛堅佛善勝光明佛法幢佛師子佛光明藏佛法光明蓮華佛神通光明月智佛此十佛世界一日一夜一劫展轉而超乃至過百萬阿僧祇世界最後世界一劫於賢勝如來國土中所壽量計前佛剎為一日一夜以見其壽量長短也菩薩住處品心王為佛言東方仙人山金剛勝菩薩南方勝峰山法慧菩薩西方金剛焰山無畏行菩薩北方香積山香象菩薩東北方清涼山文殊師利菩薩海中金剛山法起菩薩東南方支提山天冠菩薩西南方光明山勝賢菩薩西北方香風山香光菩薩大海中莊嚴窟等一一處皆有菩薩各有眷屬數眾於中止住而常說法利益無量唯有緣有智眼者見之四十六佛不思議法品爾時會中諸菩薩作是念諸佛國土本願種性佛出現佛身佛音聲佛智慧佛自在佛無礙佛解脫以此十問云何不思議如來知諸心念以神力光照智慧攝受令青蓮華藏菩薩住佛無畏入佛境界而告諸佛子答前所問說一百九十種十十法門一一如來不思議境界故四十七說十種廣大佛事則示現兜率入胎出胎王宮逾城修道成正覺轉法輪入涅槃等相說十十法門計一百法答前所問顯圓融妙義重重無盡也四十八如來十身相海品普賢告諸菩薩言今為汝等演說如來十身所有相海如來頂上有大人相乃至九十七左足指端佛神變處大人相如來示現之相或三十二或八萬四千此止九十七大人相并十華藏海微塵數大人相如來一一身分眾寶妙相以為莊嚴各有微塵數妙寶而為眷屬以表佛身莊嚴無盡也如來隨好光明功德品佛告寶手菩薩言佛子如來有隨好名圓滿王此隨好中出大光明名為熾盛七百萬阿僧祇光明而為眷屬我為菩薩時於兜率天放大光明名光幢王照十佛剎微塵數世界彼地獄眾生遇斯光者眾苦休息而生兜率天中有皷名甚可愛發音告諸天子言汝等心不放逸於如來所種諸善根鼓音中一一稱揚如來所有無量三昧功德光明一一誨諸天子速令親近遂化種種供具往瞻如來不即覩見却復觀察已下生淨飯王家鼓聲告云各當發菩提心四十九普賢行品普賢告諸菩薩言向所說但隨根器略說如來少分境界諸佛為見眾生無智作惡計我我所執著顛倒疑惑邪見分別結縛常共相應隨生死流遠如來道故出于世佛子我不見一法為大過失起一嗔心生百萬障門所謂不見菩提障不聞正法障等一百障法應勤修十種法十種清淨十種廣大智十種普入十種勝妙心十種佛法善巧智說是法已十方十不可說微塵數世界六種震動十佛剎微塵數菩薩來詣此土克滿十方各作是念我等一切皆名普賢於是普賢復說妙偈五十如來出現品爾時如來放大光明名如來出現照十方盡虛空界入如來性起妙德菩薩頂於是白佛說偈如來即於口中放光明名無礙畏入普賢口妙德問云何是如來出現之法願為我說身相言音心意境界所行之行成道轉法輪般涅槃見聞親近所生善根復說偈言普賢告妙德云此處不可思議遂說如來十種世現相十種如來身相皆不可思議故育十卷華嚴經五十一如來音聲如來心各十種相所喻云有聰智人見一塵中有大經卷量等三千大千及說偈稱揚五十二如來境界如來所行行如來成正覺如來轉法輪如來般涅槃如來見聞親近各十種法說六大譬喻說是法已六種震動無量莊嚴千萬億那由他佛剎微塵數菩薩從他方來詣此中充滿十方同音稱揚讚此法門故普光明殿第八會經七卷止一品普賢菩薩說五十三離世間品爾時如來妙悟皆滿十不可說百千億那由他佛剎微塵數菩薩悉集佛所其大菩薩名普賢普眼普化普慧普見普光普觀普照普幢普覺等十大士皆悉成就普賢願行爾時普賢入佛華三昧從三昧起普慧發二百問普賢以一答十何等為菩薩依為奇特想為行為善知識為勤精進為心得安隱為成就眾生為戒為自知受記為入菩薩為入如來為入眾生心行為入世界為入劫為說三世為入三世為發無疲厭心為差別智為陀羅尼為演說佛為發普賢心為普賢行法為起大悲為發菩提心因緣為於善知識起尊重心為清淨為波羅蜜為智隨覺為證知為力為平等為佛法實義句為說為特為辯才為自在為無著性為平等心為出生智慧為變化為力持等四十二問答四百二十種法門妙義五十四為得大欣慰為深入佛法為依止為無畏心為發無疑惑心為不思議為巧密語為巧分別智為入三昧為遍入為解脫門為神通為明為解脫為園林為宮殿為所樂為莊嚴為發不動心為不捨深大心為觀察為說法為清淨為印為智光明為無礙住等二十六問答二百六十法門五十五為無下劣心為如山增上心為入如海智為如寶住為發金剛大乘誓願心為大海起為究竟大事為不壞信為授記為善根回向為得智慧為發無邊廣大心為伏藏為律儀為自在等十五問答一百五十種法門妙義五十六為無礙用為眾生無礙用為剎無礙用為法無礙用為身無礙用為願無礙用為境界無礙用為智無礙用為神通無礙用為神力無礙用為力無礙用為境界為遊戲為力無畏為不共法為業為身為身業為語為淨修語為得守護為成辦大事為心為發心為周遍心無諸根為深心為增上深心為勤修為決定為決定解為決定解入眾生界等三十三問答三百三十種法門皆徹法圓融妙義五十七為習氣為取為修為成就佛法為退失為佛法道為離生道為決定法為出生佛法道為大丈夫名號為道為無量道為助道為修道為莊嚴道為足為手為腹為藏為心為被甲為器伏為首為眼為耳為鼻為舌為身為意為行為住為臥為坐為所住處為所行處為觀察為普觀察為奮迅為師子吼等三十九問答三百九十法門五十八為清淨施為清淨戒為清淨忍為清淨精進為清淨定為清淨慧為清淨慈為清淨悲為清淨喜為清淨捨為義為法為福德助道具為智慧助道具為明足為求法為明了法為修行法為魔為魔業為捨離魔業為見佛為佛業為慢業為智業為魔所攝持為法所攝持為住兜率所作業為兜率天宮沒等三十問答三百法門五十九為現處胎為現微細事為現初生為現微笑為示行七步為現童子地為現處內宮為現出家為示苦行為往道場為坐道場為道場奇特相為示降魔為成如來力為轉妙法輪為白淨法為示涅槃等十七問答一百七十法門普賢說此二千法門已十方諸佛同音讚言善哉仁者快說如是功德行處決定義華普賢復觀十方及于法界而說偈言逝多林第九會經二十一卷止一品如來神力故說六十入法界品如來在逝多林大莊嚴重閣菩薩五百人俱文殊普賢為上首十幢十威力十藏十眼十冠十髻十光十音十上十勝十自在王十覺等如上菩薩及與眷屬俱如來知其心念大悲為身為門為首即入師子嚬呻三昧威神力故遍作莊嚴十方世界各各有佛及菩薩眾各來詣此觀廣大神變無量境界舍利弗諸聲聞眾雖在會中不見不聞如來如是境界威神諸大菩薩各以佛神力故各說偈稱揚毘盧如來顯示如是法界法門妙境黎十卷華嚴經六十一普賢說此師子嚬呻三昧功力十種法門復說偈言如來欲令菩薩眾安住此三昧眉間放大光明普照法界逝多林中變種種神變種種法門種種三昧等相文殊覩此神變而說偈讚諸菩薩聞已各入如是三昧現無量境界文殊將諸大眾出善住閣漸往南方遊行人間舍利弗將六千眾隨從親近如象王回說十種法門各各悟入佛境界門六十二文殊勸諸比丘發菩提心即往南方至福城東大塔廟處古佛菩薩所種善根處人天普集為說普照法界修多羅城中無量人眾皆悉來詣其中五百優婆塞五百優婆夷五百童子五百童女至文殊所右遶頂禮爾時文殊觀察善財及諸人眾為說法要及說妙偈如象王回觀善財等皆發菩提心勸近善知識善財乃問云何學菩薩行云何修云何趣云何行云何淨云何入云何成就云何隨順云何憶念云何增廣云何令普賢行速得圓滿發如是等問文殊為說偈畢指往南方妙峯頂德雲比丘海門國海雲比丘海涯聚落善住比丘三善知識所各悟入法界法門六十三善財參彌伽長者解脫長者海幢比丘休捨優婆夷六十四善財參毘目仙人勝熱婆羅門六十五善財參慈行童女善見比丘戲沙童子具足優婆夷間智居士六十六善財參寶髻長者普眼長者無厭足王大光王不動優婆夷各授己法界法門也六十七善財參遍行外道鬻香長者婆施羅舡師無上勝長者師子嚬呻比丘尼六十八善財參婆須密女鞞瑟胘羅居士觀音菩薩正趣菩薩力天神安住地神婆珊婆演底主夜神六十九善財參普德淨光主夜神喜目觀察主夜神七十善財參普救眾生妙德主夜神所悟入門首十卷華嚴經七十一善財參寂靜音海主夜神守護一切城主夜神所悟法門七十二善財參開敷樹花主夜神七十三善財參大願精進主夜神七十四善財參毘嵐園中妙德神七十五善財參釋種瞿波女七十六善財參摩耶夫人夭王光女童子師遍反眾藝童子賢勝優婆夷沃田堅固長者妙月長者無勝軍長者最寂靜婆羅門七十七善財參德生童子有德童女指參慈氏至莊嚴閣前見從外歸問訊諮請法界法要七十八善財白彌勒言我聞仁者授一生記我已發菩提心未審如何學菩薩道修菩薩行重重問已彌勒乃讚善哉仁者菩提心難發汝今已發是欲為一切眾生成就佛道復說二百一十餘種菩提心成熟善財善根七十九善財白言唯願仁者開樓閣門令我得入彌勒彈指樓閣門開善財即入門即還閉乃見無量無邊阿僧祇莊嚴境界及見自身與彌勒并三世佛因地所修行菩薩行種姓國土見在無量佛剎佛示生化導等事爾時彌勒即攝神力入樓閣中彈指作聲告云起法性如是善財從三昧起白言聖者此解脫門名字何等告云名入三世一切境界不忘念智莊嚴藏此一生大士之所能得善財問此莊嚴事何處去曰來處去曰從何處來曰從智慧神力中來智慧神力中住無有去來亦無住處非集非常遠離一切如龍王降雨不從身出亦不從心生種種為善財說却云文殊是汝知識宜往叅見八十善財依彌勒教漸次經遊一百一十餘城到普門國住其門所一心思惟文殊思欲奉近文殊遙伸右手過一百一十由旬按善財頂云若離信根心劣憂悔功行不具退失精進再三宣說令入普賢所行道場及置善財自所住處文殊還攝不見於是善財得見三千大千世界微塵數善知識悉得受行其教欲見普賢即於此金剛藏菩提場毘盧遮那如來師子座前一切寶蓮華座上起等虛空界廣大心及現一切神變光明一一毛孔一一身念念中出生無量無邊佛境界同善根力普賢告云仁者見我此神通力不曰唯然已見乃云我於過去不可說劫為求一切智難行能行一切苦行集無量善根成此智力乃為善財重宣妙偈復為說佛功德海一滴之相以頌告之耳右華嚴經若五十卷謂之晉譯若八十卷者謂之唐翻其間品目義意則大同小異也李長者論釋則全彰理而泯事觀國師疏解則即現事而顯理故一塵一毫理事圓融一色一香佛境現前也此所以然者俾發函開卷便見緣起行相若窮頓圓妙義則疏論存焉臣十三卷信力入印法門經五卷一有大信力入佛境界印其自心造此法門也文殊問入初地法佛云欲清淨歡喜地修五種法也二歡喜地中得大無畏修五種法也三歡喜地中欲得安隱之處修五種法門也四文殊問如來無礙智如來教化眾生力普賢如問答之五如來自然智普見名稱差別依止身相頂相住持八因緣義如來德智經二卷智光嚴經一卷如來智德經一卷華嚴佛境界經一卷如來不思議經一卷已上五經與華嚴經中不思議法品同本各譯華嚴修慈分一卷彌勒大士問佛如何得速成菩提佛云當修慈心調伏眾生等義也金剛髻珠菩薩修行分一卷普思義菩薩問云何修行悟入三摩地佛云如無悟入是名悟入如我悟入菩提以無所得乃云過去有王名金剛髻珠於光明如來等佛所悟入而無所悟所入王即我也伏十三卷漸備經五卷與華嚴經十地品同本十住經一卷十住行道經已上二經華嚴經十住品同菩薩本業經一卷求佛本業經一卷已上二經華嚴經淨行品同莊嚴菩提心經以六度無盡行莊嚴自心成佛普賢所說經告諸佛子各觀不身及佛身所有境界菩薩十地經已上三經同本異譯皆華嚴眷屬所攝也兜沙經華嚴經中如來名號品同然十方佛來各坐交露帳中猶如兜沙應現若此也戎十二卷如來興顯經四卷華嚴經如來出現品同本十住經四卷華嚴經十地品同等目菩薩經三卷華嚴經中十定品同佛土功德經華嚴經中壽量品同羌十卷度世經六卷華嚴經中離世間品同羅摩伽經三卷華嚴經中入法界品同華嚴入法界品善財參摩耶夫人等九善知識所悟法界法門乃大周時三藏地婆羅訶譯出別行右四帙計四十八卷與華嚴經中品同各譯或華嚴眷屬所攝今但指其所歸俾看經者通照大部則曉其名題而不疑也大般涅槃經總六部計五十八卷共六帙正部四十卷則北涼天竺三藏曇無讖所譯宋元嘉中重定耳大寂體圓極無處不用般涅槃楚語也此云滅度或云圓常或云滅盡或云寂滅則常樂我淨四德經如前解義遐十卷大涅槃經一壽命品佛在拘尸那國力士生處二月十五日將涅槃時出大音聲遍告十方若有所疑今悉可問從其面門放大光明照十方界眾生見者聞者無不悲惱聲聞菩薩人天龍鬼四十餘眾各來廣陳最後供養悉皆不受悲泣無量也二純陀白言願受微供佛告云汝今於我欲求壽命色力安辯遂論其施者受者二無差別復以偈言更相讚美又與文殊廣論法義又復放光告純陀諸比丘眾汝等莫生悲惱但安住祕密藏中如伊字三點勸修無我想我定涅槃諸比丘再三請佛住世佛云我無上正法付囑迦葉當為汝等作大依止乃喻王病愚醫不能治良醫治之佛之出世如大智醫王或信不信三佛云汝等於戒律中有所疑者恣汝請問於是迦葉菩薩以偈問曰云何得長壽云何於此經云何得廣大如此致三十問佛即答之以牛乳添水為喻破戒比丘壞滅正法若行慈心必益壽命視諸有情如羅睺羅法性常住無有生滅過去為王護持戒說法比丘獲金剛身堅固不壞佛身非世間法正知正見即見佛身名字功德是大般涅槃受持流布得無量福四如來性品佛告迦葉涅槃有四相義一自正二正他三隨所問答四善解因緣義廣為分別即有女人抱兒來坐辨食蘇乳消不消及說示現納耶輸而有羅睺羅入胎示生東七步為人天最上南七步與一切眾生為福田西七步永斷老死北七步已度諸有四維各七步斷種種煩惱上七步不為物污下七步法雨滅地獄火乃至受樂出家苦行受乳詣樹受草登座降魔說法等緣五迦葉云如來唯有密語無有密藏喻如秋空滿月皆令得見種種喻已我為聲聞波斯匿王說半字義常存不變義涅槃解說義無量喻解脫義如來止於一義無二種語若一義者何有三歸以眾怖生死故若見真實即如來法身一義也六佛言我滅度後有四人出現世間謂須陀含等不依如是四人說破戒比丘喻旃陀羅此云嚴熾為王破戒者不當紹法王位次說依法者如來也不依人者謂聲聞人也依義者即菩薩也不依語者即世俗文華也依智者即如來也不依識者分別也依了義者真實智慧也不了義者聲聞乘也廣說此四依義乃如來悲憫末世比丘故作是說也七如我所說當依止如是四種人我滅度後七百年有四魔漸當出現沮壞我之正法若言如來生淨飯王家等事是魔說若謂久成正覺為教化眾生乃是佛說也若謂周行七步是不信是魔說也若謂方便示現七步是佛說也一切眾生皆有佛性等一一如是反之復之是魔說是佛說如前例之防護自身如龜藏六黠慧四諦四顛倒力士額珠等喻法一切因緣八佛云我說方等經亦如甘露亦如毒藥不得於二乘人前分別三歸雪山香草牛食純出醍醐廣演一乘佛性半字滿字月有圓缺二乘不見佛性菩薩見性不了唯如來了了見性十四音名為字義噁噁阿阿阿阿億伊伊伊伊郁郁優優嘢嘢烏炮菴阿迦佉伽㗖俄遮車闍饍喏吒侘荼祖拏多他陀彈那波頗婆滼摩蛇囉羅和奢沙娑呵𠻬魯流盧樓吸氣舌根隨鼻之聲長短起聲隨音解義皆固舌齒口業清淨也九如來涅槃猶如月隱種種譬喻一闡提者此云信不具不見佛性良醫八種藥喻仙陀婆鹽器水馬四法同名智臣善別喻如來四種密語謂常樂我淨我滅度後大乘經典如牧牛女賣乳展轉添水入到城中止有苦味末世比丘壞佛正法亦復如是也十文殊白佛純陀猶有疑心佛乃說偈本有今無本無今有三世有法無有是處乃說眾喻一切眾生皆有佛性者與佛何別大眾所問品爾時如來放大光明即受純陀供與諸聖眾等受安慰大眾佛說偈言以神變力令諸天人各各自見如來受我最後供養復為純陀說破戒義文殊說阿闍世王害母殺父與佛各說偈為答如云一切江河必有迴曲一切女人必有諂曲等諸偈義邇十卷大涅槃經十一現病品迦葉白言如來已除一切病苦何故云背痛佛云為比丘畜八不淨物故示現耳猶如虛空云何有病最為難治一謗大乘二五逆三闡提如是三病世間極重若遇良醫即漸獲安若不遇者死入地獄有五種人有病行處非如來也四果等是也聖行品一聖行二梵行三天行四嬰兒行五病行也行聖行者精修戒律過海浮囊分毫不可與者乍可熱鐵纏身不著信心衣乍可吞熱鐵丸不喫信心食等義喻佛菩薩所行聖戒聖定聖慧七覺等行十二當觀自身種種相處修四念處觀說四諦法功德天黑暗女為喻生死智者俱棄令觀生老病死因緣乃云過去善住王頂上生一肉塊後生出一子名頂生王為生愛著即墮天宮證別離怨憎苦等緣令人覺悟無常等十三說集滅道諦第一義諦真諦實諦行相種種喻之遂與文殊反復微請令達常樂我淨要義也十四我觀諸行悉皆無常諸法無我廣說是義為憍陳如等轉妙法輪世諸出世語得二十五種三昧破二十五種有愛及因中捨身於羅剎求半偈行是聖行超過彌勒早成正覺偈云諸行無常是生滅法生滅滅已寂滅為樂乃天帝釋化身為羅剎以驗聖行也十五梵行品佛言行七法具足梵行知法知義知民知自知眾知時知尊卑知法者知十二部經及四句偈諸惡莫作眾善奉行自淨其心是諸佛教及修四無量心是修梵行并偈也十六佛修慈行提婆達多教阿闍世王害如來是時入城乞食遣醉象來踏如來即以慈定舒手現五指師子自然調伏大石力士不動分毫以慈力擲在虛空化盧至化女人為調達為五百賊悉以慈心而為之佛修慈悲喜捨行極愛一子地難行一切苦行能行為曠野鬼起慈心化度令比丘出生等緣十七能如是知得何等利佛言得四無礙四無畏等法義第一義空重說本有今無本無今有偈義意皆梵行所修妙行之義也十八佛言世間所不知覺令念佛念法念僧念戒念天念施所謂念佛者思其十號一一分別六念皆然及說破戒比丘十九阿闍世然父後遍體生瘡自念此身已受花報智臣月稱問云大王今身痛耶心痛耶王曰非止身心痛也我造惡業今將奈何一切大臣各說請六師等來或醫或治最後耆婆云唯佛是最上醫也能治身治心勸往見佛空中出聲復勸王乃回心勅備嚴駕往見佛也二十佛遙見王悶絕僻地佛即入月慈三昧放光照王即時病除王謂耆婆曰佛真慈悲不見我罪與諸眷屬即到佛所佛為說法即悟無生嬰兒行品哆哆啝啝婆婆羅羅無所分別與造化氣合壹十卷大涅槃經二十一高貴德王菩薩品佛言修行如是大涅槃得十功德一者有五一不聞得聞二能為利益三斷惑心四慧心正直五知如來密藏復為廣說德王曰生已不生不生不生聞已不聞不聞不聞得已不得不得不得復有光明來照眾不知處佛勅文殊為說乃云東方滿月光佛所有菩薩名琉璃光今亦說大涅槃經有不聞聞有不聞不聞有聞不聞有聞聞次說到不到了因作因布施等緣二十二問聞所不聞十二分教大涅槃經佛為分別涅槃妙體令人信受過去釋迦佛出世說涅槃時我為貧人賣身肉一日供三兩滿一月得金錢五文住佛所聽得一偈云如來證涅槃永斷於生死若有至心聽常得無量樂誦此一偈身無痛苦即發菩提心記我字釋迦牟尼佛也二十三善護身心生三種惡覺廣說過患身相名一篋地等四毒蛇五陰旃陀羅六入空聚落六塵六大賊貪愛詐親友煩惱一道河戒定草木筏渡到涅槃岸得大自在身等緣二十四昔不得今得昔不聞今聞昔不見今見昔不到今到昔不知今知云何為身為心等一一解說第一義慈於身於心生決定想定為菩提器施受四義一施淨受不淨二受淨施不淨三施受俱淨四施受俱不淨修涅槃經典為佛菩提一一中修十事精持得金剛三昧二十五修習涅槃微妙經典有四法一親近善友二專心聽法三繫念思惟四如法修行人若有病須得良醫王若治國須用智臣佛性佛相僧相法相說諸法義復云昔在尼連河畔波旬請入涅槃我云未有神通智慧弟子後又來云已有弟子我告云且候三月乃說八功德其間破五陰成六念斷邪見等五成六事定不定等義二十六成就第九功德有五事一信二直心三戒四近善友五多聞解其義趣復說成就第十功德修三十七品法門白衣高座說法比丘作聽徒為利養故如是也當時說之今已見耳二十七師子吼菩薩品佛云汝等若疑有佛無佛有法無法有僧無僧乃至有報無報等師子吼白佛我有所問唯願聽許佛云如師子哮吼四顧欠呿嚬呻香象怖走陸者藏伏飛者墜落恣汝所問師子吼曰云何為佛性以何義故名佛性何故不見眾生所有佛性菩薩住何等以何眼不了了見佛性佛住何等以何眼了了見性佛云第一義空名佛性即是智慧十力四無畏等法為見佛性也二十八行細心不正心細行不正心細行正心不細行不正心如何可知佛說持戒破戒鴿在舍利弗影中及我影中乃知是究竟戒了因正因緣因此三因行相法門所謂作如是因獲如是果二十九佛說一切諸法皆有二因乃說八喻如我問波斯匿王四方四山來逼將害人民如何迴避王曰無迴避處唯持戒布施佛言如是如是生老病死來逼於人勸修戒定慧可免四山逼也佛因中為善見及為太子時修道成佛弟子名字令舍利弗與須達長者造立精舍住其中說法皆夙緣如是也三十六師外道生嫉妬心佛以慈悲方便化喻如言長者婦姙腹中是女佛云是男外道即將毒藥害其婦死佛即神力火中救出其子復為師子吼說双林示滅入大寂定時分化導乃云何等比丘能莊嚴娑羅覺花樹林等緣體十卷大涅槃經三十一佛言修奢摩他此云止毘婆舍那此云觀除煩惱成智慧然有二法一定二智師子吼重問佛即答之說三世業現報後報提婆達多刺目奪珠歌利割截身體復說善業惡業果報唯身戒心慧禪定可免苦也三十二眾生定有佛性決得菩提何更修入正道佛以恒河為喻習浮者不沒如王象眾盲共摩各雖說異未免是象但不得全體胎卯濕化四生各隨緣起業報闡提非法說法法說非法一切善法皆顯佛性諸禪觀及根力覺道慈悲喜捨等三十三迦葉菩薩品佛得八自在為大醫師何故善星却入地獄佛以三子為喻有善不善也善星種種毀佛無分毫信心雖入佛法中不得其利喻入大海不得其寶何故受他出家若不如是當紹王位得自在故壞無量善根故畜養二十年說涅槃名字無盡也三十四化香山中五萬仙人及三十萬力士說色無常等義以神力移石上天致掌吹作微塵阿闍世王殺父等緣起皆往音所化方便三十五闕諍執著斷善根何等是耶聰明黠慧善能分別遠離善友不如法住廣招因果報應各觀十二因緣行相三十六隨自意語闡提人有佛性善根無佛性或云善根人有佛性闡提人無佛性或二俱有或二俱無會四句義者即解隨意如大魚見光即浮光沒即沒調達等比丘暫浮還沒舍利弗等永浮也沒者謂入地獄也說煖頂忍世第一三界所斷煩惱三十七眾生佛性猶如虛空非過去現在未來如來佛性非佛性一切牆壁瓦石無情之物皆佛性依三世攝不依三世攝具足十法不與世諍一信心二戒淨三近善友四善思惟五具精進六存正念七具智慧八能正語九樂正法十證解脫一切不善法皆從煩惱生我如三世佛能觀五陰常無常虛假不實是故不與世間一切智者諍是故不為世法染污故三十八如何是清淨梵行佛言一切法是能修三十七助道法是梵行能修十事速得涅槃一無常想二苦想三無我想四厭食想五不可樂想六死想七多羅想八離想九滅想十無愛想復為解說十想中義味令悟性也三十九憍陳如品佛為說色受想行識無常滅苦因是獲得解脫若如是觀者名為沙門於大眾中作大師子吼是時有外道或毀佛或毀佛或讚佛或難佛或論義如尼先梵志云佛先責我不平佛今更不平何故以吉向己不吉向我佛云我不平破汝不平是故汝平我之不平即吉也我之不平破汝不平令汝得平即是我平何故同諸聖人得平等故反復論其作因作緣悟烟火喻投佛出家得道四十犢子梵志問佛世有善耶有不善耶佛云我為汝略說解脫是善嗔恚是不善等義亦反復難佛投佛出家得道納衣梵志問佛云一切惡法從煩惱生煩惱在先身在先耶若身在先煩惱何因而入若煩惱在先安在何處亦反復論義投佛出家佛問阿難所在憍陳如云今被六萬四千魔化如來像說一切法惑亂極苦文殊云何不問諸菩薩却問阿難佛云常為侍者給侍無諸過失所聞法要不遺一字今要付囑涅槃妙典乃說呪令文殊往救同來諸魔盡發菩提心佛令阿難去報須跋陀羅云此番善賢如來今日當入涅槃汝有所問宜往見佛須跋即至問佛業報論其實相會中菩薩聲聞人天聞是法皆得法忍出家得道右大涅槃經四十卷共十三品迦葉菩薩高貴德王菩薩師子吼菩薩憍陳如此四大士會中當機請問如來為開闡一乘佛性妙義則凡是有情本來具也實最後垂範至極之談其攝諸外道如法出家得果因緣報應靡不詳示然以正法付屬迦葉傳布開覺人天末後比丘持淨戒者則真佛子弘揚妙法若破戒者則魔眷屬壞亂聖教斯言有徵覽者得不愧心耳率八卷涅槃經後分二卷一陳如品須跋陀羅得果留佛住世不果所願先取涅槃有無量比丘眾哀泣佛即安慰遺教品佛告眾云吾滅度後當弘妙法阿難沒在憂海優波離云如來今日即有明日即無汝莫愁苦當問四事梵檀此云默擯治惡比丘以戒為師四念處住教安如是也阿難復問若有施佛塔物現在未來如何支用如來涅槃以何法則而得舍利如何造塔佛云如輪王法次第安排如來復於座上現其金相胸臆涌身虛空二十四反令眾觀察告云今日即見無復再覩應盡還源品爾時如來告眾云我今時至即入禪定自初禪二禪三禪往友二十七遭已復告眾入四禪定寂然無聲示涅槃相一切人天十方世界無不號泣者二機感荼毘品爾持人民帝釋阿難議論如輪土法金棺白㲲既安置已諸力土欲移棺入城不動分毫如來神力金棺自舉諸天諸主各陳供養爾時大迦葉與五百弟子從山中來至已悲泣無量如來平等慈悲金棺即開示其双趺相好無量人天以火就焚無有燃者聖火自焚示其神力聖軀廊潤品爾時帝釋將寶瓶取佛一牙上天建塔俱尸城內一切人民及諸國王各各來取佛舍利迦葉一一分俵使無諍境而各得利益大泥洹經六卷大涅槃前分同本耳賓十卷大悲經五卷一梵天品諸天聞佛入滅悉至佛所梵天問曰我云何住云何修佛為說修住法門皆得法忍商主品來詣佛所請佛住世佛言汝父請我入滅汝復留我告佛云我父邪見則是怨害留佛不充悲惱無量也帝釋品白佛云我云何住佛在世時護持於我佛滅度後修羅戰我當如之何佛云我有神力護助於汝佛勸修羅不須諍戰共弘佛法二羅睺羅品正為人天說法忽見衰相知佛入滅不忍斯見往東方妙勝佛所及上方商主佛會具陳上事我不忍斯見佛即勸歸看佛入滅以盡子道迦葉品佛告阿難不須悲惱我無上法寶及僧伽梨衣義翻合付與迦葉於鷄足山中四石來合護持候彌勒出現同將此衣廣度眾生正法品讖毘舍提提知迦及優波毱多等諸大士相繼出世傳正法眼舍利品供養舍利得幾所福一香一花一禮一遶得福無量三禮拜品佛告阿難若有聞佛名稱佛名者是人決定得入涅槃廣解其義復云過去有大商主入海舡破大魚來吞眾人號泣商主告云汝等當共一心稱南無佛魚聞佛名即生慈心生天得果末世比丘披袈裟者於賢劫中皆須證果謂世界欲成時淨居天人見大海水中現大蓮華有其千葉乃云必有千賢者出現也善根品佛言若有眾生於佛所發一善根得無量報何況集諸善根喻如寄一滴水在佛處經劫漸漸流入佛法大海布施福德品佛云若發一信心種一善根或一香為供或一花散佛以智眼觀見是人果報無量或願為輪王或願為帝釋悉如其願殖善根品佛云我以金華上定光佛我以寶錢上高行佛我以眾寶上釋迦佛我以赤檀末上帝沙佛我以偈讚沸沙佛一一佛所殖其善根四付囑正法品佛為阿難說因地修大悲行入地獄中度苦眾生今以佛法寶藏付囑於汝廣宣流布如長者商主國王遠出以諸庫藏付與大臣諸子守護勿令散也五教品阿難白佛我今云何修行佛正眼如何令佛正眼久住世間云何結集佛正眼佛云汝當結集法藏勿令正法眼隱沒末法有持戒朋黨正法朋黨破戒朋黨亂法朋黨餘即可知四童子三昧經三卷上阿難夢大樹摧折知不吉兆淨居天人及阿無婁陀各見佛入滅相生諸苦惱各各說偈佛為說一切世間和合之法必當散滅爾時東方佛所善思義童子至阿闍世王宮南方佛所寂靜轉童子至舍衛城大居士家西方佛所無攀緣童子至波羅奈城鬼宿居士家北方佛所神通德童子至毘耶城大將師子家此四童子於此四處各各化生各各說偈化彼國王及其父母眷屬來詣佛所也中四童子與國王父母眷屬至双林圍遶如來阿難白佛問童子所來佛說所從來國土佛號化度神通說法因地所修殊勝妙行聞我入滅化現來此利益人天也下阿難白佛唯願如來住壽一劫令此大士常得往來利益此土有情四童子各以偈報阿難亦以偈答爾時如來命阿難等各執手登座付囑法藏而取滅度是時人天聖眾無不大叫悲苦以謂人天眼滅故耳方等泥洹經二卷四童子經同本異譯右此二帙十八卷涅槃眷屬部也其錄義者異於大部不錄者與大部同也既小異大同則見其所標指義亦可知耳二十八林
