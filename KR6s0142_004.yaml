body:
  text: 東京法雲禪寺住持傳法佛國禪師惟白集歸王鳴鳳在樹白駒食場化被草木賴及萬方蓋此身髮四大五常恭惟鞠養豈敢毀傷女慕貞潔男效才良知過必改得能莫忘罔談彼短靡恃己長信使可覆已上總六十二函李秀方廣大莊嚴經十二卷共二十七品唐垂拱元年中天竺三藏地婆訶等奉詔譯則天皇帝御製序文歸十二卷方廣大莊嚴經一序品如來入佛莊嚴三昧頂上放光光中說偈淨居天子及諸天聞偈各從定起共議過去波頭摩佛勝幢佛等將欲示生皆現此瑞兜率宮品佛云我常天宮為諸天子演說一切善法所謂七覺八正等法義諸天皆得法喜也勝族品淨居天子化身來閻浮提作大論師告人民云十二年後有大人具足相好出現世間爾時在天宮觀方觀時觀國觀族諸天議各不同菩薩告云國中有六十四種殊異女人身具三十二德相最後身佛方來此國此人身中受胎也法門品為諸天子說下生之相一百八法門如來云信是法門淨心是法門覺是法門捨是法門等一切法門思而可知二降生品佛告諸天我以示形而往受生或云天形或云日月形或云妙神形或云師子形或云童子形乃云可示為象形諸天皆願隨佛下生永不捨離佛以神力先於王宮現八種瑞相處胎品氏宿合時日月圓淨弗沙星正與月合為白象形從天宮下入母胎聖后身心適悅向王言夢淨居諸天各為王說偈王大歡喜佛化寶莊嚴殿於母腹中現種種神變為菩薩人天說示生法門三誕生品佛將欲降生王宮先現三十二種瑞相王與眷屬兵衆圍繞聖后往園中攀樹安詳右脅誕生顧現四方周行七步菩薩龍天無量歡喜稱讚諸來相者皆云作輪王唯阿私陀仙從雪山來說三十二相八十種好相明當成正覺悲其老矣不見如是大事因緣奇特相也四天詞品王將太子謁天廟以祈吉祥天像俱起也莊嚴具品角軫宿合時為太子造寶莊嚴具王與眷屬各各所造殊異示書品太子年七歲將詣學堂毗奢蜜多自顧不能為師生大慚懼太子云六十四書以何書為致遂同十千童子唱諸字母出無量聲觀農務品太子漸長與諸釋種遊觀園中見執役人受其勞苦遂化閻浮樹現無量樂事諸仙天人林神各說偈言觀藝品太子長大釋種各議取妃大臣執杖女名耶輸欲納為妃乃云我家法女嫁有藝人王與太子諸釋種試藝未有不為天下先擲死象緣五音樂發悟品天龍八部謂太子久樂深宮恐不出家爾時宮中器具及諸女樂絃管自然出妙音聲說偈勸請出家夢品淨飯王得夢覺是太子出家之相遂遊四門見生老病死相遂逢出家相王得十夢淨居天人來為原之耶輸得二十夢太子亦自夢皆是出家相也六出家品太子思惟不告父王便去出家恐違於教即放光明照于宮中詣王所求請出家王即不許遂敕嚴衛守禁淨居天來化宮女醜狀及念睡眠不知不覺車匿牽馬天王捧足逾城諸天衛護而往雪山即以寶刀落髮易鹿皮衣令車匿牽馬自還王宮也七勸受品即受諸女人諸仙人所請遂往阿邏羅仙所學不用處定苦行品又住摩羅勒伽仙處學非非想處皆非究竟即自思惟圓修定慧乃示其苦行食麥食麻伏諸外道已及六年往尼連河品詣河洗衣浴竟即往牧牛女處受乳糜也八詣菩提場品浴身食乳氣力平全欲降伏魔怨徐徐而住菩提樹將登座時諸天衛護放光照天上地獄龍宮却思過去諸佛將成道時悉皆坐草吉祥天人漸將草近受草已出無量聲嚴菩提場品如來放光照十方界十方佛所各有菩薩來為莊嚴也九降魔品如來光明照入魔宮魔王眷屬生大愁苦各領兵衆來詣佛所或現一身多身或現雲雷山石蛇女等一切惡想如來唯以慈心攝伏成正覺品如來降魔已即次第入四禪定觀色等諸法相所因十二緣因苦集滅道因應自知已後夜明星現時佛聖智所應知所應得所應悟所應見所應證彼一切一念相應慧證大菩提成等正覺具足三明即踊身空中說偈云煩惱悉已斷諸漏皆空竭更不復受生是名盡苦際諸天子即以微妙天花而散佛上十方如來見其成道各以寶蓋而來覆之十讚歎品淨居天子及諸天子魔子各來散花說偈讚佛商人蒙記品如來成道七日不起于座但觀樹禪悅諸天子各將澡瓶水來浴佛魔波旬即來請佛入滅佛即慈化已即經行一樹下二商人牛不行驚怪即見如來成道多日不食遂辦食供佛四天王各奉一鉢受商人食已即為授記勸請品如來思惟我所悟法甚深微妙若為人說多不信受思惟是已放光照明諸梵天衆悉來勸請轉於法輪佛云世間惡法增長善法損減諸天再三勸請佛即以智眼觀諸衆生上中下根我當以隨機分別解說妙法也十一轉法輪品如來思惟欲度二仙七日前已死悲其不遇即思五跋陀羅此云賢漸次經行至鹿野苑十方佛所各有菩薩來請轉于法輪有一菩薩名法輪手執一寶輪奉上於佛即為五跋陀羅三轉十二行法輪分別一切善法復為彌勒菩薩說法輪體性名字及說三十二相乃因中行三十二行感也十二如來往火龍窟降火龍及迦葉三兄弟并徒衆出家皆得道果即將徒衆至王舍城開說法要覺悟國王大臣人民捨竹園地為說法處馬勝化舍利弗目連來出家佛將此大衆往見淨飯王也囑纍品佛言若有人聞如來如是境界自在神通遊戲之事是人得八種功德八妙座處八淨語八功德藏八圓滿八廣大福八淨心等一切法門如義王十卷普曜經八卷大莊嚴經同本各譯莊嚴經二卷與前同部就前録義俾易見也鳴十卷妙法蓮華經七卷一序品如來入無量義處三昧身心不動眉間放白毫相光逼照東方彌勒問瑞文殊為答將說法花故現斯已方便品如來從三昧安詳而起告舍利弗言吾為一大事出現于世等義二譬喻品長者門外羅列三車誘引諸子出於火宅信解品長者有子出遊他國跉𨂲辛苦五十餘年今日已歸猶不識認漸次引入看諸庫藏然後付與三藥草喻品布大慈雲普雨法雨大小根莖各受其潤授記品摩訶迦葉當得作佛號曰光明如來諸弟子衆各授其記也化城喻品大通智勝佛十劫坐道場時我為王子十六兄弟共請轉十二行法輪漸次接引四五百弟子授記品富樓那彌多羅尼子等各蒙授記學無學授記品羅睺羅等衆各蒙記成佛名號國土等事法師品若有人於此法華受持四句偈隨喜者皆得授記不得毀訾持法華者見寶塔品多寶佛塔涌現其前證說法華乃夙願故提婆達多品我於過去勤苦求法龍女獻珠即成佛果勸持品大樂說菩薩等衆誓於來世受持此妙法華經而為流布五安樂行品持法華者為安樂行處不近國王大臣女人等事從地涌出品無量菩薩從地涌出願受法華廣宣流布如來壽量品成佛已來經無量劫壽命住世亦復如是分別功德品持是法華聞是妙法所得功德不可算數喻所不及六隨喜功德品若有隨喜此法華經展轉而聞得福無量果報亦然法師功德品持此法華六根清淨皆與實相不相違背常不輕品如來因地為常不輕持此法華記人作佛故也如來神力品如來出廣長舌相放大光明普照一切世界作無量神變囑纍品如來右手摩無量菩薩摩訶薩頂云我今以此妙法付囑汝等當令流布藥王本事品此法華經是名真法我捨兩臂必當得佛為喜見故耳七妙音品東方淨華佛所來於此土禮觀如來聽說法華經也普門品無盡意問佛觀音所行所稱佛言功德無量弘誓如海隨類現身普利有情也陀羅尼品若有持此法華者我當以祕密呪而為護衛魔惱不能壞亂莊嚴王品淨藏淨眼二子承母教令作大神變化其父王不落邪見而成佛道普賢勸發品若有持是法華我乘白象現其人前令得圓滿所願功德如普賢也法華三昧經如來放光入法華三昧不見身相女人利行來問佛之所在大衆了不知處如來從三昧起坐蓮花座為王女利行說此三昧無量義經法華初分同本薩曇芬陀利經法華寶塔天授二品中別譯各少分義句也鳳十卷正法華經西晉慧帝龍安年中三藏竺法護創譯此本也在十卷添品法華經隋三藏笈多重譯此本也右正法華晉竺法護所譯也妙法蓮華秦什法師所譯也添品法華隋笈多所譯也宣師序云三經重沓文旨互陳斯之謂也唯什師譯者文理妙順方言密符聖意故盛行天下緇俗靡不同遵講唱而誦持也陳隋二帝國師智者加行菩薩示現悟入法華三昧九旬止談一妙灌頂尊者集為玄義文句行于世謂之天台教宗也唐基法師補處如來現身述法華玄贊燈前操筆八大金剛善神侍衛所謂夕製書講謂之慈恩教宗也然春蘭秋菊各播清香今有傳習者各黨其宗不本淵源互相破斥得不取哂有道者乎維摩經三卷上佛國品佛在毗耶城菩薩聲聞人天圍繞長者子寶積五百人各奉一蓋佛即受之遂問淨佛國土若心淨即佛主淨我佛國土常淨也方便品維摩居士示疾國王大臣人民悉來問疾即以方便化度為說妙法如云是身如幻是身不實是身無我等聞者皆獲聖果也弟子品佛弟子如舍利弗等皆不堪詣彼問疾菩薩品彌勒光嚴等亦皆不堪詣彼問疾何以故各各說其昔所由也中文殊品唯此大士往問疾因復問居士此室何以空耶曰諸佛國土亦復皆空曰空何所空曰空空故空往反問答無上妙義也不思議品舍利弗思惟無座居士云汝為法來為床坐來乃於東方須彌燈王佛所取三萬六千師子座來其座高廣也觀衆生品文殊問曰云何觀衆生答云如幻人觀幻人如熱時焰如水中月如鏡中面等義也居士空中天女忽然化生乃與舍利弗論義佛道品文殊問曰云何通達佛道答曰若行非道是為通達佛道云何非道答曰若行五無間入地獄作畜生等而不染污是為佛道也不二法門品維摩居士問諸仁者各當說入不二法門諸菩薩各自說已文殊復問居士如何說入不二法門居士默然文殊讚之真不二也下香積品舍利弗思食居士云若欲食者且待須臾令汝得未曾有食即入三昧以神力故往上方佛所取一鉢飯廣利人天皆得飽足七日香氣不歇菩薩品文殊與居士同詣佛所現大神變阿難等見是事已各云未曾有也見阿閦佛品佛問以何等觀如來居士如自觀身實相觀佛亦然我觀如來前際不生後際不滅今則不住不起于座也供養品天帝云我昔來不曾聞如是經典即以天妙寶花而散佛上囑纍品如來付囑彌勒等衆流布此之上乘經典樹十卷說無垢稱經六卷維摩經同本此文廣也唐三藏奘法師所譯然什師譯者已盛行於天下維摩經二卷與前同本頂王經二卷善思童子經同本次函見義意也白十卷善思童子經二卷佛持鉢入毗耶城在重閣上遙見佛來即以手中蓮華上佛記為淨月如來乃維摩居士子也其中大旨與維摩經同大悲芬陀利經八卷悲華經同本次函見録品義也駒十卷悲華經一轉法輪品佛在山中大衆圍繞彌勒水天師子意日光等諸大士忽起向東合掌云蓮華尊佛寶日光問以何因緣佛云東南方百億界外有佛今日在蓮華中成等正覺陀羅尼品佛說彼蓮華尊佛國土殊勝妙相并日月尊佛虛空印菩薩因地彌勒大樹王佛出世亦說此陀羅尼祕密神呪二過去善持劫輪王無諍念生子具足相好大臣寶海梵志為相師乃云必成無上道後長大出家得道成佛名寶藏如來寶海梵志過去化輪王千子四天王諸天來供養佛三大施品佛說過去寶藏如來出現時寶海梵志與輪王無量淨同其千子於佛廣陳大施授記品初寶藏佛授輪王為彌陀佛記大太子觀音為正法明王佛二子勢至名功德寶山佛三子文殊為普現佛四授四子為普賢如來五子蓮華尊佛六子自在王如來七子無垢香王佛八子普賢為自在相王佛次授會中十千人次第成佛九子為阿閦如來及國土莊嚴五輪王十子記為金華如來十一子為自在音王佛授五百王子記寶海梵志有八十子及諸弟子各與授記次授拘留孫佛俱那含佛迦葉佛釋迦佛彌勒佛師子月佛六次授五人同發菩提心記則此賢劫中堅音如來等佛次第授記出現七寶海梵志行大悲行記為大悲菩薩十方佛及菩薩來證八寶藏佛為大悲說助道法諸三昧門令行檀波羅蜜多行九寶藏為說淨戒忍辱精進禪定智慧等一切波羅蜜行十入定三昧品寶海梵志最後於寶藏如來所出家修道經無量劫無量佛深種善根當賢劫中人壽短促五濁惡世出現作佛名釋迦牟尼也食十卷金光明最勝王經唐法師義淨三藏譯中宗皇帝御製序一序品大衆同集如來放光說偈如來壽量品妙幢作念如來壽命何故短促佛知心念即放光明光中化四如來為說壽命無盡也二三身品虛空藏菩薩問佛法身報身化身佛廣為分別此三身中含容無量真實義及入十地漸斷諸障以登地位也金鼓品妙幢夢婆羅門捶一金鼓出無量聲說懺悔語言也三業障品帝釋問如何滅除業障得成菩提佛云須當精勤歸依三寶發露懺悔罪愆四陀羅尼品師子相菩薩問幾因緣成就菩提心佛云布施等諸善法十地行相法門乃說陀羅尼一切神呪五蓮華喻讚品佛告善女天我為汝妙幢夢金鼓出音讚佛功德及懺悔法即說偈言金勝陀羅尼品佛為善住等說諸佛名諸大士名及說金勝密呪重顯空性品佛說長偈演一切種性皆悉空也依空滿願品天女問云何行菩提正行佛云依於法界行菩提法修平等行觀察人天品四大天王常觀世間有持此金光明經者我當守護六護國品四大天王白佛若有國土受持金光明王我等護助使國無災變也七無染著品佛為舍利弗等說無染著陀羅尼呪誦持者獲福無量如意寶珠品佛告阿難云當知有陀羅尼如意寶珠遠離一切災厄遮止諸惡等相八辨才天女品大吉祥天女品增長財物品堅牢地神品藥叉大將品王法正論品已上皆為國土人民有受持金光明者各為說呪護助使各如其願心九善生王品諸天藥叉品各為護持受金光明者而為說呪授記品妙幢成佛號金寶山王如來及授金光明如來等記也除病品佛說過去有長者名持水有子名流水善能修合治衆生一切病苦流水品佛說流水長者救十千魚為十千天子各以寶珠報也十捨身品佛說十千天子因緣復告樹神云非但施水施食亦捨所愛之身乃說捨身飼虎會中人天聞是法已各增讚仰流布此法場十一卷金光明經八卷最勝王經同本伅真陀羅尼經三卷緊那羅王經同本也化十一卷緊那羅王經四卷一大衆集會天冠發二十五問佛一問答四法羅王將諸眷屬從大雪山來奏諸音樂琴瑟中出其妙聲說偈稱佛功德迦葉聞其音已不能制止身手動搖天冠一一難問復問王曰此聲此偈從何處出王答云云二王問寶住三昧佛言有八十法成此三昧所謂心寶戒寶施寶乃至世間寶出世間寶天冠復問何以化度王曰我以善調琴瑟出一切聲化諸有情所謂定聲慧聲喜聲捨聲等義王乃請佛與衆至雪山中受供七日與天冠問答三十二法門聞者皆得法忍三佛以神變光明普照化出菩薩說偈化度羅王諸子夫人婇女眷屬聞見是已皆發菩提心佛即記作佛號曰功德山光明如來也四佛受七日供已將欲還歸羅王即以神力化大寶車乘空送佛及大衆還靈山佛乃為說勝行法門又令說與阿闍世王等衆也佛為母說法經三卷上佛將法衆至天宮月上天子問行殊勝行度到彼岸一味慧守禁戒等佛為說四事法門中月上天子云如來慈念所生之親至此天宮安居三月如來身如來智慧如來神力等莫從摩耶聖后所生耶佛答所從來處非生非不生天子聞是法已即以無量天花散滿天宮及佛上月上天子與帝釋往復徵問其花所以也下目連謂佛來此天宮不在南閻浮提佛現廣大神變十方世界現今有佛說法度脫衆生者皆我身是也汝莫作他觀耳道神足極變化經四卷佛為母說法經同本被十卷寶雨經一如來頂上放光東方蓮華眼佛所止蓋菩薩來此見佛啓一百問如初問云何得施圓滿乃至云何得速證無上菩提二如來答忍圓滿十法及已次法門三如來方便善巧十法及已次法門四如來答得如於水十法及已次法門五如來答十方十法等法門六如來答廣大心十法等法門七如來答空性十方等法門八如來答善行阿蘭若念處等法門九如來答離慳貪嫉妬十種法等諸法門也十如來答善能捨離惡求利養乃至答速證菩提等一百問答一千法門中間止蓋菩薩或別請問或當機領解如云我解佛所說義如實了知一切有情貪火嗔火等又云如實知衆生意樂等義也草十卷寶雲經七卷前寶雨經同本阿惟越致遮經三卷上文殊入普明三昧舍利弗瞻仰以神力故漸往東方不退轉世界最勝光明蓮華佛會各相問答無量法門信受品奉法品八等品道跡品皆阿難問如來答此法門令信解受持也中不還品無著品聲聞品緣覺品果相品降魔品皆阿難請問如來應機而答此法也下如來品開化品師子女品歎法師品譏謗品囑纍品三菩薩遠方來阿難問其所以佛為分別及隨宜演說妙法開化人天也師子女五百人出家既各悟入此法遂囑流通皆是文殊阿難方便力故木十二卷廣博嚴淨經六卷一文殊神變往東方佛所也二阿難問佛答以堅信堅法為菩薩行等義三佛為阿難說四果聲聞菩薩等行相法門義四阿難復問堅信堅法佛為說偈會中四衆聞其偈已各各悟入法性法門五阿難問佛恐魔波旬聞說是經生於留難文殊即以神力攝化爾時有三男子手執千葉蓮花從東方華須彌王如來所至佛會第一男子白佛若作是說我是如來第二男子白佛若作是說我是世尊第三男子白佛若作是說我即是佛是時人天聞此說者悉皆撓動阿難請問佛以偈答謂求如來世尊佛聲者而得菩提不退轉位等義也六阿難白佛此自在三昧力若有信受此經者決定得不退轉師子女等白佛我等定光佛時已聞此經會中人天各願流通不退轉法輪經四卷阿惟越致廣博嚴淨二經同本入定不定印經中宗皇帝御製序文妙吉祥請問入定不定印法門佛云有五種行所謂羊車行象車行日月神力行聲聞神力行如來神力行前二行不決定後三行決定佛乃廣說定不定行相所修法門深明趣菩提退不退心以顯決定妙定定也不必定入定入印經定印經同賴十卷集一切福德三昧經三卷上大千界主白言如來不久當趣涅槃唯願哀念世間衆生如何得不失正慧不失正法不失於智不失見佛聞法佛云有三昧名集一切福德能成就故復有淨威大力士來觀佛神力佛令目連取在王宮時箭來乃說已成就百千萬億力無有過者復為解說集福德三昧行相法門中佛為淨威大力士說成就戒忍等行無量勝力法門義也下說行方便不墮正位為那羅延說離魔業行是菩薩行行一切衆生行是菩薩行乃至廣論一切諸善法門成就此福德三昧利益末世有情等集衆德三昧經三卷前經同本持心梵天經四卷思益梵天同本及十卷思益梵天經四卷一綱明菩薩云我見如來身超百千萬日月光明佛乃說無量光明名字若有衆生遇斯光者各獲利益佛即放光照十方界東方日月如來所思益菩薩來至佛所發二十問自堅固自心至不斷佛種佛即一問答四法綱明復陳正問佛為梵天分別二佛為梵天說如來成就五力法門能隨宜為衆生說法令其開悟三梵天白佛文殊於此無所說耶佛告文殊汝於此法可說少分文殊曰是法可說可演可論不佛云不可說不可演不可論文殊曰若如此說則不可示梵天復與文殊談論一切法義四天帝見如是說即散諸天花讚歎說諸法隨行等行師子吼法門乃為授記海喻建立流布此經也勝思惟梵天所問經六卷前經同本萬十卷持世經四卷一持世菩薩問云何知諸法實相分別一切章句能得念力轉身不斷念至菩提佛一一答四法門乃云我於過去高王佛所已聞此法及說淨施行處我於一日一念中捨千身布施求菩薩道入此法門分別五陰究竟諸法實相義二分別識陰及十八空等性相法門三分別十二入十二因緣四念處五根五力等也四分別八正道世出世間有為法門復說過去須彌王如來及一切佛所我修習此觀五陰等諸法門持人菩薩經四卷前經同本大乘方廣總持經佛從如注三昧起告彌勒云我將入滅有所疑者隨意咨問淨居諸天子同音白佛我等聞有法門名大乘方廣總持願佛慈悲為我等說佛即答之復說因地與彌陀如來於一切佛所同受持此之法門濟諸方等學經前經同本方九卷大方廣寶篋經三卷上文殊白言如來今日當說妙法須菩提白文殊云我請仁者說菩薩法文殊云汝今能知是佛法器及非器耶答云我居聲聞地豈知是器非器耶我請仁者說是佛法器非佛法器文殊云諸入正位者皆是非器廣說其義復現神變作大音聲往東方光相佛界作大佛事與彼菩薩論其法要及廣現神變也中舍利弗云我見文殊神變七日雨不止令止降伏波旬以鉢放地舉不動分毫迦葉云我昔在舍衛國城夏坐三月是時文殊初從東方寶相佛國而來此土三月不見後問在何處報我云一月在王后宮一月在淫女舍一月在童子學堂我惡此人即打槌欲擯出即見百千世界皆有文殊如來告我云爾欲擯那箇文殊我即懺悔王宮婇女皆發菩提心即同事攝化也下天帝釋尼乾外道皆詣文殊所問法當羅那與論議文殊若未離見綱而脫鐵綱無有是處未除愛水而得定水亦無有是處未滅嗔火而獲智火亦無有是處須菩提阿難等各各見論法義寶志等夙修善根今佛授其記也文殊師利現寶藏經三卷前經同本證契大乘經二卷上佛在伽耶山毗毗産主將諸眷屬詣佛所問衆生者是何義云何名衆生佛云是有情想衆和合故所謂地水火風空識界等復問以何為根本何所止住復何流運佛云無明為根本止住於愛隨業流運乃說三業三相及佛體無體無體即佛體諸天皆來佛所下東方最上佛所神通智菩薩現大神變來至佛所問如來地有幾法菩薩不能行非聲聞獨覺境界佛說入十斷障行相一切菩薩所不能行等義趣也大乘同性經二卷契經同本蓋十卷解深密經五卷一解甚深密意菩薩問勝義諦相法門二遍計依他國成無相法相法門三彌敕問瑜伽義分及奢摩耶觀行四如來成辦所作事法身與二乘同或差別以成就最上勝妙功德無量故云佛也五觀身自在問十地至如來地所修法門深密經五卷前經同本此十卷楞伽阿跋寶經四卷一一切佛語心品大慧菩薩在楞伽山頂啓一百八問復一百八句如生句不生句常句非常句等句復說生住異滅各二種相及七種性藏識境界第一義相偈答住復五無間性種種法門無盡妙義也二佛說如來藏性不同外道修所方便一切因緣妄想想心有無一異涅槃神力建立或化如幻名身句身俱不俱地位四果陰界行相法門一一問佛一一答微細妙義三佛為大慧說三種意生身及五無間業愛貪如緣母無明為父入處斷一根本名害父母斷諸法諸使名害羅漢斷諸陰和合名破僧斷現量七識不見覺心名出佛身血說因地相一切法有無相宗通說通相妄想相善語義智識相九種轉變相解脫義相續義婆羅門論義等一切法門大慧重問如來即為分別解說也四如來自性自覺覺他相性一切凡夫但知如來種種名不知如來義諸外道計執常無常菩薩聲聞滅正受義乃至問不食肉功德佛皆演說開喻緣起法門經二卷上佛說無明所緣殊勝行相殊勝因緣殊勝等起殊勝乃至第一無明論其無明與一切業識相應遂造一切惡因緣也下因緣等無間緣所緣緣增上緣此四緣中依增士緣說無明然無明等起殊勝轉異殊勝邪行殊勝相狀殊勝作業殊勝障礙殊勝隨縛殊勝對治殊勝一一解此無明十二緣四諦八正等殊勝行相一切法門顯緣起法門緣生分法本經前經同本解節經一卷相續解脫經已上二經與深密前分同本異譯身十卷入楞伽經阿跋多羅寶經梵語楞伽此云不可到同本此元魏留支譯髮十卷菩薩行神通變化經三卷上文殊問如來神通變化佛說十二行六度等一切善法中輪王為喻功德會中四衆及婆羅門各各聞是妙法尼乾子衆亦各請問下佛為樹提伽王說三十二相八十種好十八不共法王聞是已知如來無量殊勝妙相功德寶聚舍利弗與尼乾子論其法義大乘入楞伽經七卷唐久視元年三藏實叉難陀奉詔譯長安元年畢工則天皇后御製序與前二經同本故不録義顯一經三譯也四十卷大薩遮尼乾所說經十卷一文殊問方便奮迅法門佛云菩薩所行十二種法於布施中亦然二戒忍精進禪定般若如來功德境界各十二種法門次說一乘妙義大尼乾子詣嚴王國土遊行教化衆生乃謂王曰國無災害耶無鬪諍耶人民安耶比丘修淨行耶風雨順耶五穀稔耶人修十善耶一切法門三王問曰何等生法何等住持於何法上而有此名尼乾曰生謂衆生住器世間法上有五取陰名復為王說治國安民之要輪王修十善業七寶四兵智臣自然出現也四末世衆生顛倒邪命邪見輪王不現諸小王等不聞國正論不行正法災害無時相諍相鬪人民飢荒各相殘害五王不行放逸行法行王所行有十法一自性成就二眷屬有禮三智慧成就四常精進五尊重佛法六猛利時政七恩厚及民八能行正法九能忍苦諫十不邪言王若能行如是十法國內自無災害王聞是已奉食即說聰明利智黠慧世間多為過失六王曰頗有聰明辨智如大師否乾尼曰有瞿曇沙門具無量功德相好具無量智慧為天上人間共所尊敬七為王說佛有十自在一命自在二心自在三物自在四業自在五生自在六如意自在七信自在八願自在九智自在十法自在乃至三十七品一切菩提分法悉分別說八為王說如來神通智行能降諸魔及十力四無畏四無量根力覺道十力等一切諸功德聚王門大喜也九為王說如來四無礙十八不共法已王大欣悅即同詣佛所頂禮默然舍利弗云仁者為見佛來為聞法來答云我不為見佛來不為聞法來十舍利弗白佛尼乾子如此說法成就幾衆生佛云從無量劫來成就無數衆生而得菩提迦葉白佛云何故不自取菩提佛即分別其所以也大十卷大方等大雲經六卷一人天衆集大密藏菩薩發一百問佛為答之為衆生顛倒著相二佛說總持大海三昧大海如來法印復說十十法門或說二十法門或說三十二法門如來神變及說四百三昧如日光三昧月愛三昧三佛說三十六種陀羅尼如不動意不退地等及三十二種密語如斷受斷嗔等密語神通行藏等一一十法門如金剛智等也四佛說涅槃壽量再問四百三昧甚深難解佛為說呪語令誦此密語自然成就此三昧復說大海水潮三昧包納無量三昧而不失於信五天子天女龍鬼會中四衆各願佛滅度後我等流布此大雲經典六修習如是三昧住是三昧則了常樂我淨相也大雲輪請雨經二卷上佛將大衆到龍宮八萬四千龍王圍繞現無數海雲為供於佛乃說慈一法復說神呪下德輪蓋龍王及諸龍王各願於南閻淨提降注甘露佛為說神呪大雲經二卷方等經二卷已上二經與前本同五十一卷諸法無行經二卷上師子遊步菩薩問云何得大道等問佛以偈答之聞者皆悟法眼滅除罪障下佛為文殊論不動相乃云一切衆生得菩提是不動相三昧是不動相華慧菩薩問音聲慧法門文殊云貪聲嗔聲等聲與佛聲無別也寶如來三昧經二卷上佛入寶如來三昧震動諸天舍利弗問佛佛云汝問寶如來菩薩舍利弗即詣問之答以無應之應應也下舍利弗及菩薩衆各問法要羅閲國王詣佛所問法大悅請佛及文殊大衆入宮受供佛為說法及偈王與眷屬衆會皆大歡喜如來智印三昧經一卷如來入佛境界三昧聲聞菩薩皆不見如來繫念處舍利弗問佛云若入此三昧成就智印三昧諸法本無經三卷無極三昧經二卷慧印三昧經一卷已上三經與前三經同本異譯也常十二卷大灌頂經即十二經一護身呪經二護比丘神呪經三神王護比丘神呪經四百結神王護身呪經五神王守鎮左右呪經六四萬呪經七伏魔封印大神呪經八摩尼羅亶大神呪經九五方龍王攝疫毒呪十梵天神策經呪并長偈也十一隨願往生十方淨土經十二拔除過罪生死得度經已上十二經各是一緣誦久成功也恭十卷藥師本願功德經如來為文殊等衆說十二願一願我成佛時一切衆生如我得三十二相二願身如琉璃內外明徹三願不令衆生有所乏少四願悉令有情安住道場五願無諸疾苦各修梵行六願不犯禁戒皆悉清淨七願衆病逼者悉得滅除八願厭女身者便得男身九願墮邪見者便得正見十願有遭苦難皆得解脫十一願飢渴所惱妙飲食足十二願無衣服者花鬘滿足以此願行嚴淨佛土彼有日光月光二菩薩亦成就如是法寶藏如來說是法時會中聞者皆願生彼佛國土中藥師七佛經二卷本願經一卷已上二經前經同本文殊普超三昧經三卷上佛在靈山文殊龍首龍施等二十五大士讚佛功德各說通慧法門顯大乘相諸天子來奉食文殊白佛如來豈不念恩耶舍利弗等各念文殊與佛有何恩佛即放鉢至下方四十二恆沙界光明如來界空中而住佛令諸弟子取鉢各入三昧無有見者文殊伸手至光明佛土放光作佛事取鉢奉佛佛為衆說因中文殊為正慧比丘我作小兒名離垢臂入城見我以鉢餅漸引我至伽藍却以鉢餅令我上勝幢如來發菩提心今日成佛皆是文殊師利以餅引我與我為師故有如是大恩也中佛入王城三幼童子見其相好各解瓔珞奉佛各發大願佛即授記阿闍世王將諸眷屬來詣佛所問法求懺所作罪業下王告文殊為我決狐疑心文殊云恆沙諸佛亦不能決大王疑心王即悶倒迦葉殷勤撫喻文殊即為王說法于即悟無生法忍阿闍世王經二卷放鉢經一卷已上二經前經同本惟十卷月燈三昧經一月光童子至佛所發問佛言有一法速得菩提所謂平等心及因地所修無量三昧二童子因中於聲德如來智勇如來無所有起如來及諸如來所修是三昧三佛告童子有一法相應速得菩薩何謂一法佛云如實了知一切法無體性乃頌諸法體性平等如實知四童子問成就幾法得諸法體性平等無戲論三昧佛設施戒忍等法及說偈五童子問受持此三昧經得幾功德次第發問佛一一答並偈六佛告童子應須成就善巧住不放逸六度行中每一行說十法門七佛令童子修菩薩神通業本及說偈聲德如來所行也八佛告童子欲求是三昧須行財施及捨身阿難白佛行菩薩行截手足挑眼等苦相也九佛頌出因地所行施戒等難行苦行彌勒讚此三昧法門也十佛言童子須具足身戒能招相好及清淨身業清淨身行具足口戒具足意戒等一切戒等鞠十三卷大莊嚴法門經二卷上金色女問云何是菩提文殊云汝身即是菩提遂往佛所說五陰六入等法悉空無相不實下文殊金色女在城東門外演說法要國王人民龍天悉來隨喜大淨法門經前經同本如來莊嚴入佛境界經二卷上如來放光普照世界文殊問不生不滅義佛廣說義相有鼓出妙音聲為諸天子說無常苦空等義下佛告文殊曰如來者即是法身法身即是如來廣說一切諸善法門也佛境界智嚴經前經同本觀無量壽經阿闍世王囚父頻婆羅王復囚母韋提希夫人佛以神力令修西方淨業當日沒時如懸鼓面西方觀無量壽如來及觀音勢至二大士作十六觀境法門自然見彼佛國土殊勝功德彌陀經一卷稱讚淨土經已上二經與前本同然佛會中稱揚淨土殊勝境界功德也無所希望經如來放光舍利弗說偈若有衆生無所希望則獲妙利說菩薩動止儀範如象遊若龍步也象腋經前經同本佛為文殊說十六法門月燈三昧經大月燈三昧經第七卷同本異譯養十二卷觀彌勒上生經佛說彌勒處天宮有五百萬億寶宮一一有七重垣一一垣七寶所成一一寶出五百萬億光明一一光中有五百萬億蓮華一一華中有五百萬億寶色一一色中有五百萬億檀金光一一金光中有五百萬億天人出妙音聲執無量寶及天宮種種莊嚴事皆不可思議彌勒大成佛經佛說彌勒受胎降生出家得道龍華樹下成正覺轉法輪等緣彌勒來時經前經同本一切法高王經新出家比丘問云何食云何消施佛云有三法一入衆僧二作僧業三為僧利復為解說比丘衆各各又問如何是出家事諸天諸龍悉來聽法舍利弗一一為衆請問也諸法勇王經前經同本大威光仙人疑經佛與論議說其壽數及受胎種種相往復問難第一義法勝經前經同本樂瓔珞莊嚴經須菩提自佛言我夜夢云來日得聞所未聞法即持鉢入城遇女人辨論無量法義如云大德有乞食想無乞食想耶報云無乞食想云若無乞食想又何乞也種種徵詰論難妙義方便經前經同本豈十三卷六度集經七卷一如來因中行布施行須達拏太子飼虎毗達王割肉代鴿太子入海作小魚與大魚食代小魚命此十六緣捨身行布施行二太子好施父王擯出國居山梵志來乞二兒及妻一時施與受無量辛苦却得還國為和默王鹿王等十一緣行布施行三如來因中行戒行信佛法國禁當死乃云乍可為佛法死王即開悟為象王鸚鵡王為貧人兄弟三人遇荒年各殺妻食獨不殺與妻入山後妻與跛者通遂作計推入水不死為王彌蘭商人太子墓魄不言頂生王普明王等皆持淨戒因緣四如來因中行忍辱行睒子行孝梵志山中習道王問鹿不言被截手足為王被舊王奪國為獼猴同阿難俱為龍王為雀十五緣皆行忍辱行無量五如來因中精進行獼猴王鹿王馬王魚王龜王鸚鵡王鴿王蜜蜂王佛三笑小兒聞法殺身濟商人皆精進所行也六如來因中行禪定行修四禪八定專注一心無二及現生遊四門見沙門相現大神變等也七如來因中行智慧行無量無邊十一緣為證儒童時買花上佛等也太子須大拏經出六度經第一卷中睒子經二本出六度經第四卷中太子沐魄經二本出六度經第三卷中九色鹿經出六度經第五卷中然已上經皆是如來因中所行六度行乃難行能行也敢二十三卷無字寶篋經思惟梵天問佛何者一法而是如來所正覺者佛云無一法為正覺者然貪嗔癡等一切惡法已永滅故普光明藏經一卷無字法門經已上二經前經同本老女人經來至佛所問生老病死四大五陰從何所來復從何所去佛云喻如木中生火還燒於木還有去來否云云老母經一卷六英經已上二經前經同本長者子制經名制家中大富母慳不布施制將一日不食飯奉佛佛即受之因記得果也月光童子經父母日長者事外道同六師作計家中設火坑請佛月光勸父莫作此惡父亦不從佛已知之與諸大衆受供先現神變火坑變成花池污食化為美食勝妙也申日經一卷德護長者經二卷已上三經與月光同本各譯或廣或略耳大乘伽耶山頂經佛在伽耶山頂文殊云如是念者誰得菩提如何於菩提發心依菩提住佛云無住無心者住依如是得文殊問菩提心經一卷伽耶山頂經一卷象頭精舍經已上三經前經同本菩薩逝經一卷逝童子經已上二經與前長者子制經同乳光佛經阿難乞乳外道今去惡牛處帝釋化身在牛邊令牛子母慈心得乳牛犢聞佛名得生天犢子經前經同本轉女身經須達多妻名曰淨日娠身腹中有女從無垢稱佛所沒來生此中聞佛說法諸根寂靜才生與舍利弗論議遂說轉女身法門即蒙佛記得果無垢賢女經一卷腹中聽經一卷已上二經前經同本毀二十三卷無上依經二卷上阿難問佛滅後有人取舍利如芥大造塔如阿摩羅子大戴剎如針大造露盤如棗葉大造佛像如麥子大此之功德何者為勝佛即為校量也下佛言因中所修戒定慧解脫知見招感相好遂有舍利為人天無上依止甚希有經一卷未曾有經已上二經前經同本決定總持經無性行菩薩問佛十人同出家七年精勤不能得決定總持法門佛云汝等過去世謗毀佛法不肯聽受佛法由是所致不能疾得道果復問佛說光音如來出現世時緣也謗佛經前經同本寶積三昧經佛告文殊云我入此三昧如摩尼大寶瑩淨徹見無數佛剎若成此定智慧辨才流暢無窮也入法界體性經前經同本如來師子吼經佛令勝積菩薩去上方法上如來所聽師子吼經彼佛問汝從何來默然不對會中大衆各各請問皆作大師子吼聞者亦復如是耳大方廣師子吼經前經同本大乘百福相經文殊問何等為如來福德相佛以輪王福百千倍不及如來一分毫相乃說三十二相八十種好光明大乘莊嚴相經前經同本大乘四法經如來普告人天大衆曰汝等盡形壽不得捨離四法一不得捨菩提心二不得捨善知識三不得捨堪忍四不得捨阿練若如來復說偈言稱揚修行四法經前經同本銀色女經佛說因中在蓮華城中三度示生捨乳割肉等今得成佛前世三轉經前經同本採花上佛授決妙華經佛在世時有採花人違王敕命以花上佛即授記免難阿闍世王受決經前經同本稱讚大乘功德經德華女人問云何名惡知識佛云不令人發菩提心者是惡知識雖二乘四果等人心劣小對前亦是惡智識說妙法決定業障經前經同本正恭敬經阿難白佛云何敬法及敬法師佛止莫問莫言末法衆生不能恭敬法亦不能敬法師阿難殷勤再問佛說事師敬法微細儀則法也善恭敬經前經同本挍量功德經阿難白佛若有人歸依佛法僧三寶得幾福德即種種校量無能及此所得功德也最無比經前經同本傷二十九經如來示教勝軍王經王至佛所請問大義佛言王為國主治民應以正法勿以邪法應以法行莫隨非法若行正法聖賢護祐風雨順時寒暖應節成就善法超諸善趣當知四山來逼不須放逸但與民安樂佛為勝光天子說王法經一卷諫王經已上二經前經同本修多羅王經王至佛所佛告王曰夢中歡娛定無有實不須放逸作意貪染恐墮惡趣識去識來畢竟流浪王聞是已信受奉行轉有經前經同本文殊遊行經文殊一日次第往五百僧房見舍利弗入禪定乃問云汝入禪定為依身入為依心入為依過去入為依現在人為依未來入於禪定身心無有過法現及未來不可得如何入也尸利行經前經同本貝多樹下思惟十二因緣經佛告諸比丘我本得道時思惟生老病死無明等法子細觀察思惟根本也緣起聖道經前經同本龍施女經來至佛所聞佛說法即成男身皆前世曾遇佛今如此也龍施本起經前經同本八吉祥經佛言東方有佛名善說吉如來光明如來勝吉如來自在幢如來光明吉如來業住吉如來勇猛如來安住王如來是八吉祥也八佛名經一卷八神呪經一卷吉祥神呪經已上三經前經同本獨證自誓三昧經如來入是三昧光照十方忽化一大蓮華千葉華中有十方佛所化菩薩來問法要佛即隨機為說自誓三昧經前經同本稻芉經舍利弗云如來常說見緣起即見法見法即見佛如是因緣若何分別佛云無明生死若稻種子雨水增長生芽無盡相因相緣無有窮極也了本生死經前經同本浴像功德經清淨慧菩薩問云何如來得清淨身云何浴佛像得何功德佛言如來有法身報身化身等義答其所問摩訶剎頭經前經同本作佛像經優填王造立佛像佛說所得福報因緣形像福報經前經同本盂蘭盆經目連初成道時以天眼見母在地獄即往救度生天數珠功德經文殊問佛云若用鐵赤銅真珠寶等木槵子水精菩提子等各各功德倍增於前次第增其殊勝校量數珠經前經同本女十卷不空羂索變經一佛在落伽山中觀自在白言我說不空羂索母心王陀羅尼三昧若受持者得二十種功德及受持者一切法則儀範等因緣也二祕密心結即護身等一切神呪及受持法三祕密成就若持分界等一切神呪四祕密印蓮華心印及結印法一切神呪五羂索成就用絲等物及置壇法則也六摩尼寶索三昧用寶物如法像生蓮華一心思惟諸佛誦此神呪見殊勝也七不空王護魔三昧用物向方法則能成一切功德八三三昧心王母陀羅尼蓮華曼拏羅印三昧成就智嚴三昧等法則九曼拏羅像印三昧隨處用物如五色線等十奮怒王真言及諸神呪等法則慕十卷不空羂索神變經十一悉地王真言等祕語神呪十二廣博摩尼香王等呪十三普遍心印出世間等一切神呪十四不思議觀陀羅尼等呪也十五最上神變解脫壇等神呪十六一切菩薩敬禮解脫三昧等呪十七金剛密主問不空羂索神呪佛為說其功力觀音大士能成就故十八一字至十字呪成十地真言每一呪說十或二十種法門殊勝功德也十九護摩悉地三昧耶根本蓮華壇等法二十普遍解脫心陀羅尼等一切神呪或一字心也貞十卷不空羂索神變經二十一如意阿伽陀藥等三昧呪二十二無垢光神通解脫壇三昧耶像示現一切幻化三昧等神呪二十三大奮怒王入壇印及一切種族等壇印法則也二十四金剛密主重問不空羂索等呪一切龍天護持讀誦功德二十五廣大明王摩尼曼拏羅受持法則二十六不空大可畏明王大捨印三昧耶等呪二十七點藥成就二十八清淨蓮華明王等呪二十九蓮華明王金剛灌頂神呪等法三十承事供養受持不空羂索神呪儀則法門右不空羂索神變真言經三十卷乃如來將諸聖衆至海中寶陀落伽山中觀自在大士夙願力故向佛演斯神呪廣利人天也所謂不空者則菩薩現大神變示于千手一一手中各執器仗應其機也所謂羂索者以五色絲作絛圈圓重轉長垂兩頭如法示其密意也或誦一呪兩呪久而成功其隨心感應殊勝不可思議也在今出家者根性暗鈍者多故鮮有受持潔九經自在王呪經三卷前不空中譯出不空陀羅尼一卷神呪心經一卷不空羂索呪已上三經不空中出千手千眼神呪經二卷姥陀羅尼身經一卷大悲心陀羅尼已上三經同本異譯皆是觀音大士神變悲願力故觀音祕密藏神呪一卷如意摩尼陀羅尼二經同本各譯觀音神力故男十一卷孔雀經三卷娑底比丘蛇咬足痛阿難白佛乃說大孔雀神呪往救由是彌勒諸天諸龍等各說神呪孔雀王經一卷金色孔雀呪一卷大金色孔雀呪一卷孔雀王經已上四經前經同本如意輪陀羅尼一卷如意心陀羅尼二經同本文殊一字王呪經一卷文殊根本一字陀羅尼二經同本佛在淨居天上告衆云汝等當誦文殊一字王呪曰唵叱呬焰等也稱讚如來功德神呪一卷十二佛名神呪二經同本佛說十二如來名號彌勒說呪護持效七卷陀羅尼集經一大神力陀羅尼如來佛頂三昧呪二一切佛頂呪二十六印法數殊金輪等呪三般若心呪及金剛陀羅尼四十二面觀音呪五觀音六印等神呪法六諸菩薩法印等神呪七金剛藏大神力三昧法印呪然此經皆是如來會中天人普集說法外道等來論議因請問說此神呪以為降伏才九經陀羅尼集經八金剛阿密哩多菩薩自在神力呪印九金剛烏樞沙摩法印呪語乃火頭也十摩利支天功德天阿難迦葉等呪十一諸天助成法印日月星地龍神八部等神呪及法則十二諸佛大陀羅尼都會道場灌頂普集壇儀法則也十一面觀音神呪二經陀羅尼集第四卷中同本也摩利支天經陀羅尼集第十卷同六字神呪一卷佛母心陀羅尼一卷千轉陀羅尼已上三經與陀羅尼集同七俱胝佛母陀羅尼經二卷二經同本異譯亦云大心准提亦云准提大明呪誦者殊勝也良十七經觀自在隨心呪經五十神呪五十印法并壇儀用物等法佛頂尊勝陀羅尼經五卷同本各譯其呪靈驗無量一向出生菩薩經佛坐堂閣目連舍利各運神通遍告人天悉來集會佛乃為說入無邊門陀羅尼八字呪及偈一一說四法成就此神呪使誦持者易成功力微密持經一卷呵離陀經一卷破魔陀羅尼一卷訶離陀鄰經一卷舍利弗陀羅尼一卷無邊門經已上七經出生菩薩經同本但有廣略妙臂印經一卷勝幢印經二經同本同卷各譯也雜呪一卷二十三呪知十九經尊勝菩薩經一卷無涯際經二經同本金剛上味經一卷金剛場陀羅尼二經同本師子奮迅經一卷華聚經一卷華積經已上三經同本六字呪王經一卷六字神呪二經同本虛空藏問佛經一卷如來方便經二經同本持句神呪一卷陀鄰尼鉢經一卷燈王如來經三經同本善法方便經一卷金剛祕密經一卷護命法門經三經同本無垢淨光經一卷請觀世音經二經同本已上皆神呪也過十七經百寶經文殊問佛何緣現世間佛云哀憫十方有情出現隨浴一百法門如示生現身現行現坐等法門也溫室浴衆僧經佛為耆域說溫室僧法用七淨物除七垢得七福火水澡豆蘇膏楊枝淳灰內衣乃謂七物也須賴經久修梵行示現舍衛城中為極貧者名曰須賴帝釋化身種種凌辱悉皆忍受及現衆寶亦不取之菩薩生地經長者子差摩竭問修菩薩行佛答以立忍辱為本次說諸法要也私訶昧經長者子名私訶昧將五百童子同到佛所問何緣如是相好功德如來即為答之云云四不可經佛觀見兄弟四人各逃無常一入海一入山一入空一入市皆不免之於是佛說四不可老令少不可得病無痛不可得要不死不可得要長生不可得決定於佛法中悟道見性了無常菩薩修行經長者子威施等詣佛所問如何得證菩提佛令修菩薩行也成具光明經長者善明請佛受供因問如何得具足相好佛為說定意成具光明法門誡身口意等一切法也寶網經長者子寶綱夢佛相好即詣請佛乃受供已為說法要悟無生忍菩薩行五十緣身經文殊問佛如何成就相好佛云前世行五十事法捨所重珍寶捨所愛婇女為人說法行於忍辱從佛聞法勇猛精進等法門梵志女經佛入城持鉢女名首意請佛受供乃問曾聞轉正法輪如何即是佛云三轉十二行法門也如來藏經佛告衆云我以佛眼觀衆生煩惱中有如來眼如來智如來身如來藏如來性常無污染德相具足儼然不動遂說八種喻福田經天帝問佛為說五福田一出家二割愛三毀形四事衆五求法復說偈云毀形守志節割愛辭所親出家弘聖道願度一切人等法門佛語經佛告衆云佛語非佛語如是非語即是佛語如來身口意清淨如是說色受等語非佛語不說色受等語即是佛語等法門金色王經佛告諸比丘揣食宜均過去為金色王行菩薩行利益人民遇十二年荒計其國中所有分慧飢民末後止有一食王施與辟支佛空中即現神變滿空下米國內因茲大富遂獲安樂演道俗業經五百長者至佛所問在家出家佛云在家治財有三上財中財下財出家有事聲聞緣覺大乘等法門百佛名經舍利弗問現在十方佛號欲令世間一切衆生受持獲福滅罪佛乃稱揚現在一百佛名如月光佛阿閦佛彌陀佛等也必六經十二卷稱揚諸佛功德經三卷上舍利弗問現在有幾佛說法度人佛說東方寶海如來以次世界中現在如來五十也中南方月燈明如來已次三十八如來現在說法下西方彌陀佛等三如來北方嚴王如來等六如來上方金寶光如來等二十七如來各各現在說法度人稱其功德須真天子經四卷一須真天子問佛如何得不妄信而志大乘如來答三十二法門義二須真白文殊云佛為我說三十二法唯願仁者為我解說答云心自審信不隨他語降伏諸欲等三菩薩從一切欲而起道意復問如何答云於愛欲中與欲從事而成道業得證菩提四天子問如何得權慧自在入俗教化文殊以長偈答復問如何是道類答云我所處是道類其法要妙覽者知之摩訶摩耶經二卷上佛上忉利歡喜園中安居三月文殊報摩耶云佛在此處摩耶云若我所生悉達願乳自流入口言已乳汁直貫口摩耶即往佛所子母相見問法佛為種種稱揚妙義三月滿已即下天宮還閻浮也下波斯匿王衆圍繞於佛即為說法阿難白佛有比丘為利養故不慕佛法即達多六群惡比丘等波旬來請佛入滅也觀音授決經華德菩薩問如何修行佛云當修如幻三昧復云現今文殊等諸大士皆成此三昧西方佛國有二菩薩名觀音勢至亦得此三昧佛即放光照尋二佛所即授其記普光功德山如來善住功德寶王如來在師子佛所學經佛在祇園外道殺一女謀佛分金不平自告所以波斯匿王詣佛具陳上事佛說因中兄弟三人小者名學聰明智慧二兄見嫉遂投他國出家為國王師治國豐樂四大臣及夫人為謀乃入山中國內災害又復還國說治國法誡王也除災患經維耶離國疫氣疾作死人不少國王大臣共議如何消穰各各論議不可得同或有用牲牢或有請外道唯智臣才明白言大王佛具大威德若請得來國中自安王令才明詣請佛至災患頓消佛為王及人民說法及因中所修改九卷首楞嚴三昧經二卷上堅意菩薩問頗有三昧疾證菩提否佛云有三昧名首楞嚴若能修者疾成正覺下舍利弗白言如是三昧遠離魔境佛云汝今欲見魔境否唯然佛即放光一切魔境皆現佛即以三昧力降之即隱海龍王經四卷一龍王至佛所讚佛乃問云何得棄諸惡趣等佛隨問為答每問成四法圓諸法行二佛說無盡藏為總持法義趣利益龍衆也三龍王問法歡喜請佛入龍宮供養佛即至宮中說法利樂眷屬四佛為龍王說免金翅鳥難以如來衣為護四金翅鳥王來至佛所云奪我所食佛言汝等過去金仁佛時為四比丘破戒食有是報業當別施汝等食也藥王藥上經如來放光入二大士頂即於佛前各說神呪佛稱其功德即記淨藏淨眼二如來號不思議光經如來持鉢過空處見棄小兒即近之兒說偈言佛即答之往反五十訓起隨佛至祇園放大光明佛乃立字名不思議光天帝來奉衣波斯匿王問佛不思議光有如是神變何故生淫女家被棄捐耳佛說過去尸棄佛時罵四淨戒比丘有是過也觀普賢行法經佛令大衆修普現色身三昧觀普賢行法除去業障或一日或二日或七日二七日或三七日一心觀想普賢自然乘六牙白象來現其前所作業障自然消滅得普現色身三昧也得七卷十住斷結經一最勝問佛入何三昧放大光明過於日月佛云隨宜入百千億三昧從初發心乃至成佛以施為引道入於初地故此為引道品也留化品二地修戒成就觀空品三地行忍力成就色入品四地行精進成就漸次斷法法門二了空品五地禪定行相也根門品六地中行相也廣受品七地中方便行所修斷結一切法門行相三童真品八地中淨修行相定意品九地中能修習定意三昧各受職位神通自在也四成道品十地中修神通妙道廣度衆生滅心品觀無常義了身內外心得自在所作具足五神足品成就施戒等行而運神足遊佛國土作諸佛事恭敬品何等大士聞法恭敬勇猛不退勇猛品勇猛破壞邪見不滯生死怖畏六碎身品入是碎身定具足十種如住所謂界如如住方如如住生如如住法如如住等義也身入品還自觀身身持身入悉能分別入身入持得自在身辨才品大智辨才分別字體演出總持諸佛祕藏也權智品思惟修習第十權智定慧三昧觀無量身口意行七化衆生品從一佛國至一佛國隨機化度有情衆生也三道滅度品不見羅漢辟支菩薩佛道若三道滅度即證真道乘無相品了知一相即是無相達無相者即真實相能七卷十住斷結經三卷八等慈品入等慈三昧觀三千大千世界一身多身入一佛國出一佛國化度有情作希有事法界品如來舌相放光遍照三千大千世界彌勒諸大士在會為說法門要義行相九道智品如來神德道智自在為諸天子及衆會說諸法門中陰受六道等相狀善惡報應法也身口意品汝等常念修身口意觀諸法行如幻如化如夢等義十夢中成道品妙識如來入寂定意彼土衆生根性已熟如來在彼一切衆生夢中為說法要令其覺悟一切法皆如是耳菩薩證品若有行一行修一善持一法吾入三昧為他作證令其成就解慧品佛告最勝解知衆生無衆生想隨其所問其一答四法也三毒品佛告濡首若人修淨不淨觀當分別三毒起滅根本耳泥洹品泥洹無性亦無有字如何欲於空中求空泥洹等法義梵堂品身行清淨口行志誠心念定意淨修梵行乃堂也然此十住斷結十卷其間法門微妙略録品目以亦其大旨耳諸佛要集經二卷上如來在帝樹名室燕坐三月以神力故往普光世界天王如來所集十方佛共說諸佛要集經運載衆行故發金剛心終始不壞修六度十信十住十行十回向十地一切諸善法門乃過現未一切諸佛要集法門也下文殊運神力至天王佛所名邊有出離意女入普月離光明三昧佛問仁者何處來文殊云我在忍界聞十方佛俱來此界說諸佛要集經故來聽耳天王佛即以神力移文殊向鐵圍山頂文殊盡其神力不能歸便在山頂為諸天子說法天王佛即攝神力文殊即在佛前見出離意女三昧不動天王佛敕出此女定文殊盡其神變不能出此女定天王佛即以神力攝師子象頂佛所棄陰蓋菩薩來彈指女子出定文殊遂與論議皆不能及天王佛遂說過去寶成如來所發心求菩提道也智論中云綱明未曾有經二卷上佛令目連去喚羅雲來出家耶輸陀羅百般障難不令千子來佛作化人云汝障夙緣否以五花同上定光如來耶輸感悟即遣至佛所出家波斯匿王聞已即詣佛請問佛為羅雲衆會說法引野干為夫人說法為證下佛為王說女人提遣欲燒身道人辨才謂言但知懺罪不必燒身前心作罪如雲覆月後心起善如炬破暗乃王后前緣波斯匿王夫人來聽法四名女失却身上珠乃過去為四比丘諂僞供施今日受報夫人即過去禔適道人辨才即目連也皆夙緣所致莫八卷瓔珞經一普稱品普照菩薩問何謂菩薩法瓔珞身乃至口蜜心非二十餘問佛說十德瓔珞其體身口意法瓔珞莊嚴識定品戒品瓔珞法門功德香薰識定瓔珞道樹品佛云無量劫中一行一坐一念修淨瓔珞并修大慈大悲瓔珞得坐道樹成等正覺二龍王浴大子品佛云我修無量瓔珞行生時諸天諸龍來為我浴各以偈讚法門品佛云我今為說八萬瓔珞法門十無礙功德深入所聞妙義三識界品問識境界佛云識非有識從法生識智識非智法識非法勸助品如來舌相放光告云我修無量瓔珞行於一切諸惡語言不生得無口過今得四十種界報如來品佛言十無盡藏法門若能修習當觀五苦利益衆生四音響品佛云我說一偈聲音普遍十方佛土無不聞者因緣品佛云若有誦持定眼識定耳識者得十種功德心品佛令衆會入心定三昧即面見十方世界各觀身觀心四諦品佛為文殊說四聖諦法門成道品佛告無畏云過去識成佛未來識成佛現在識成佛耶何以故過去未來非識現在亦然也五生佛品如來不以國土為國土衆生為衆生皆法智所生故本末品如來入本淨三昧令一切衆生悉見過去未來現在三世本末因緣有識無識品佛言解第一義不分別彼識此識是謂有識無識非識也無量品佛設教有量無量東西南北四維設教所度有情悉無有量六無量遙品佛云修三禪本行自致成佛乃說偈言復現神力隨行品時有梵天從他方佛剎來經過三禪復無所畏白佛請問七佛答梵天偈中演修三禪法門本行妙義光明品佛言若有受持大梵天所問句義法門便得身相不二毛孔現法界光明無相品云何有相云何無相佛云清淨法身所修畢竟無相八無識品佛告淨觀大士若人宣傳此經得二十種瓔珞功德所謂總持種族善權等瓔珞迦葉勸行品佛云汝等誰能於我前說有行無行法門即放光照十方界佛所各有菩薩眷屬來至佛所迦葉請問衆等奉行行無行品無頂相菩薩即於佛前說云解子本元是謂有行無行諸菩薩各說所行無行也忘八卷瓔珞經六卷九有受品觀空無形於一切法亦不有受亦不無受而得解脫無著品佛告衆云汝等欲得金剛智不壞疾證菩提從一佛國至一佛國作於佛事當學如來無著之行淨智無垢品東方一意如來遣弟子至佛所問法佛云修習大乘除去亂想習學定意乃具六度無斷品佛云從初發心修行五法乃至成佛心無間斷真實勇猛決定智也十賢聖集品審諦大士等各於佛前各說法門我堪任說修習等法義也及文殊反復問答三道三乘品佛為舍利弗說三道三乘法十方國土亦各演說如是法門十一舍利品佛言一切法空相若有人受持此三道三乘經及供養舍利此二種福未審何先佛與須菩提校量不及持經譬喻品五千正士聞說瓔珞三身深義一時起去舍利弗問此有何罪耶佛云譬喻不及因地不信佛法故三世法相品佛云入三世定意三昧能知三昧三世法門十二清淨品佛云六度無極諸佛所行一切諸法悉皆清淨也桓因品帝釋問若一切法皆悉清淨如空無有如何覺了一切諸法佛即喻如幻化人本行品天人瓔珞首問頗有不進修便成佛否佛云或有彈指之頃求菩薩心即成菩提或不經一日或不一夜便即成佛以初發心修進不同十三聞法品文殊白言云何名聞法聞如空等空無所聞聞法者為有言教乃得聞法為無言教乃得聞法如來默然文殊三請欲令利益會中人天及未來世佛乃答云一切諸佛所轉法輪亦非有轉也淨居天品佛與文殊論聞法轉不轉義天子至問我等修何福業今得天報如此佛云汝還憶過去名字否答云不記未知此身常無常也十四十方法界品蓮藏及諸大士知佛不久滅度各各請佛說法隨所見問佛以一偈總答之諸菩薩聞已各各歡喜十智品彌勒問修習何法得成正覺佛云有十種明智一時頓成等正覺應時品云何執持威儀應時之行具足大法瓔珞佛云修十種慧而速成就十不思議品云何入五道中周旋往來佛云修十不思議法門乃可應機利益無我品心智大士問云何分別身觀解無我想佛云當修十法解無我也等乘品淨眼大士問為修何法滅大乘跡佛以偈答聞已得無生忍三界品佛云大士所行不從欲界色界無色界有漏無漏法謂皆不可得故右瓔珞經十四卷四十餘品止於品下注明品意以通大旨若細而推之則長文偈中所演佛菩薩瓔珞法門無量妙義具知見者可以究覽超日明三昧經二卷上普明大士問頗有三昧速成正覺否佛云有超日明三昧若修習者速得成佛遂說修習法門或二或三乃至十法長行短偈廣演妙義下離垢目問何謂超日明三昧佛云其明無量超過日光何以故日能照現在物不照鐵圍亦不能照人心但能照有形不能照無形此三昧普能照及遠近三世暗冥及二乘五道衆生心悉皆晝夜照明無有罣礙故云耳罔八卷賢劫經一三昧品喜王大士問修何三昧得成正覺佛云修諸法本三昧何謂也佛云行六法成此三昧謂身口意心言行一一相應也行品佛說十六字法知衆生之行無度行等法門也四事品佛云有四法疾成斯定謂慈悲喜捨等四施戒忍進等四一一四法而能成就法師品佛云過去雷音吼如來所有一法師名無量德曾聞如是三昧化國王太子人民及往諸佛國土供養品喜王大士聞是定意三昧即脫衣奉佛歡喜無量佛復云過去金龍佛所有法師名寶音行是三昧時有輪王悅音聞此三昧就法師學此法門其法師者今彌陀佛是輪王者阿閦佛是千子者賢劫中千佛是也二施度無極品佛為喜王演六度行法施度無極也習行品佛為喜王說修習行六度無極自利利他也無際品佛為喜王說六度行施度悉無際也三聞持品佛云聞是布施持是戒行受是忍辱發是精進習是禪定明是智慧等六度也神通品佛以神通力行是六度施度無極引因中所作神力化度有情三十二相品佛告喜王云我往修六度無極感此三十二相超越人天之上也四順時品佛云順時行施度無極謂施時持戒時忍辱時精進時禪定時智慧時出家時苦行時成道時降魔時說法時持鉢時一一時無極三十七品佛云一心行此六度一中具六六六三十六一心所總成施度無極無有限量蓋始初發心無有量也故行行皆如是耳五寂然品佛云行三十七品十二因緣只在一心寂然間已無極也十種品佛云行六度成十種力也四無所畏品佛云行六度成四無所畏也十八不共法品佛云行六度殊妙成十八不共法也方便品佛云行六度行須得善巧方便也六八等品佛云信是八等不隨八邪一一行中修六度無極破貪嗔癡慢每一中有二萬一千合八萬四千塵勞煩惱要破此塵勞善能修習善法成八萬四千法門也千佛名品喜王問佛今此會中大士有得此定意入八萬四千三昧耶佛云非獨此會大士將來賢劫中千如來亦一一入此三昧施度無極復說千如來名號次第七千佛興立品佛說千佛出興時節國土父母姓字出家得道化度傳法付囑等緣八千佛發意品佛說此賢劫千佛過去遇千如來發心如我夙為醫工以衣奉佛詔我同各釋迦也歎古品佛云過去精進如來出現時有輪王名曰德華聞佛說定意三昧義與千子往聽受是法王者無量光如來千子者千佛也復云無量施如來出現時有輪王名普廣意與千子往佛所聽是法門不曉其義佛侍者名曰無指為王解說王即曉定意義趣王者定光如來侍者即維衛佛千子者今賢劫千佛復說過去未來劫中或有佛或無佛是知佛世難值佛法難聞令一切有情受持千佛名也談十卷大法炬經一緣起品如來放光天子威光請問阿難重請如來即說過去放光如來說此陀羅尼字義伏魔品佛云放光如來說此神呪降伏一切魔軍令發菩提心二授魔記品佛云放光如來授諸魔衆菩提記月上菩薩緣三乘行品佛云放光如來為人天衆說三乘法法性品佛云放光如來為無畏大士等說法性猶如虛空菩薩行品佛云放光如來說諸菩薩住於佛法三相好品佛云放光如來說修菩薩行今得成佛具足無量相好光徹無涯四四念處品佛云放光如來說所感相好以四念處所修為根本五聖諦品佛云放光如來為梵天說此法門忍校量品佛云放光如來為梵天說行忍行功德法門三乘品佛云放光如來為衆說三乘法六三法藏品佛云放光如來說人言教藏天言教藏非天非人教藏法師相品佛言若有法師受持此三法藏則口業成就具足智慧辨才得三十二相了十四音字義圓滿功德相好謗法果報品佛云放光如來說若有人不信此三種法藏其果報惡業現也七智成就品佛云放光如來說若人持此三法藏具足神通迦慧力忍成就品佛云放光如來說忍多修菩薩忍及諸果所修忍皆依止如來大力忍方能成就一切諸忍智力證涅槃品佛云放光如來說此陀羅尼復說遇寶觀如來八佛云放光如來說涅槃十四音字義分別百義方便勸證品佛云放光如來說一切語言音聲皆第一義也九佛云放光如來說若有人入是法門一切法門皆得明了法師行相品佛云放光如來說若法師登高座說此法門時不自大心不染著即真法師也十遮謗品佛云放光如來說若有不信此法毀謗謂非佛語得無量惡報持經功德品佛云放光如來說若有受持此經得無量無邊功得成就為他悔過品佛云放光如來說若謗此經已却復悔過披露投誠即得善報六度品佛云放光如來說所行六度妙行彼十卷大法炬經十一佛云放光如來行精進行求證品淨行子須達多諸放光如來所聞四諦法門妙義菩薩證三昧品佛云爾時會中大士聞放光如來說四諦法門各各自證念佛三昧召諸大士品佛云放光如來眉間放光照及十方世界菩薩聲聞龍天國王人民悉來集會十二問等覺品佛云一切衆生唯知言佛不知佛者是何義何名佛能自覺悟亦覺悟他覺行圓滿故名佛也因緣品天帝問何因何緣菩薩悉集會祭光王園中放光如來云過去各於此中種善根故十三供養法師品佛云諸天子聞是三法藏陀羅尼思念欲於如來所廣陳供養及未來法師十四入海神變品佛云放光如來捨師子奮迅三昧放一光明入海境界化諸龍衆為龍說法果須彌山品佛云放光如來受龍供已即上天宮為帝釋諸天演說妙法十五天伏修羅品佛云放光如來為修羅說法令不與諸天鬪戰各以慈心相向修羅本業品佛云放光如來說修羅本所修習惡業惡行以嗔為根本故雜類本業品佛云放光如來說諸畜類業行果報捨身受身彼心所作業故無相品佛云放光如來為天帝云我所說如是句義畢竟皆不可得一切諸趣悉無相故勸修行品佛云放光如來說依此三法藏門字義修習而得解脫三字法門品佛云放光如來阿字者人言教迦字者天言教耶字者非人非天教也十六將護法師品佛云放光如來說若有人流通此三業法藏即以神力護持使無撓害放光佛本事品佛云放光如來過去為香上菩薩遇寶幢如來出現放光灌頂往佛所受是三藏法門香上者即我身是也教證法品佛云放光如來復為會中人天分別三字三藏義令各受持各自思惟各自證三昧也十七無住品佛云爾時會中或云諸法無有住處或言皆住或云無住放光如來即為解說說聽功德品佛云放光如來言若有說是法門聽是法門皆得無量功德證相品佛云放光如來說此法門攝無數億衆入大宮殿三昧十八如化品佛云天帝留放光如來久住天宮即為說一切法皆如幻化耳緣生法品佛云放光如來為會中說因緣所生法相因相緣不斷也十九信解品佛云放光如來云此法門為信者說不為不信者說具足辨才離惡友品佛云放光如來說若能離諸惡友親近善友即於此法藏信解受持辨田讚施品佛云放光如來說種其福田辨其所施也二十付菩薩品佛云放光如來囑諸大士為彼信者宣說成就佛法故付天帝品佛云放光如來令諸天於一切處宣說如是三種法藏使佛種不斷法師護品佛云放光如來為天帝云若有法師宣說三教藏三字義三句法當如法莊嚴高座種種供養護持勿令生惱也右大法炬經二十卷乃世尊為阿難及人天衆重說過去放光如來出現所演三藏三字義陀羅尼法門使現在法衆知過去佛家風也短十卷大威德經一如來為阿難及人天衆說過去諸佛已曾顯示法門一者神通二者根本復云一者欲具足二者見具足應知生應知滅應知入處五破壞五力五語五生趣五衆陰人相有一不具足不得出家如眼邪齒疏等相也二佛說有根勝有根堅諸衆生所報相狀好惡復說如來名號十相十具足十身十智十心一一法皆十法以無盡故耳三佛說無二無三則一分別一因緣而成諸法復為諸天諸龍說諸神呪若誦持者則能成就一切善法四佛告衆汝等應知一入應知二入應知三入應知四入應知眼等應知四聖諦復說定光佛時利益童子與污魔論議等因緣五佛云此大神呪能令衆生出生辨才若有受持最為殊勝一一呪皆有無量功德過現未佛皆說此神呪成就佛法六波斯匿王有臣財主能知算數來詣佛所論一法數佛即說及無量名字皆如來因中隨方隨機應現稱呼不同七佛言是一不欲為一切世間廣說何者六根六塵等法皆世間言說乃說神呪種種名字種種法門八佛云一猛健從凡夫地於有情中若能回向菩提心則為一切衆生所歸依處復說因中說猛健心成菩薩行無不為天龍夜叉歸依恭敬九佛云有五種所入所謂入畜生入地獄入修羅入天入人復說應機而現過去燈明如來所比丘聞法及長者妻如糞坑等緣也十佛云知此言辭不隨他智然有五時所謂行時坐時去時來時步時五儉五種五力五涅槃一一說五法門及說因地所修因緣妙義靡十卷大威德經十一佛說五種痛五暗五無間五速疾五羅剎五波浪五乏少乃至一切法也十二佛說阿字那字門義應知四十道別離九十九減少二十一方便及無言辭法數可撿細看見義十三佛言世間法所謂五陰十八界十二因緣一切法提河王詣佛所說頭上白髮偈佛云豈止一人頭上白髮也十四佛說初相行我遊行我相故若干出入息五相當有七十七患何者瞋貪等相為死生輪回過患根本也十五佛說四種食住處為食穢相為食行步為食行淨為食復說食想食過善一切食法門妙義十六佛說大燈明如來弟子衆名字是時法中有比丘著是四種食想或入地獄一切佛法比丘亦復如是十七佛說有四種食承事尊重或為安隱或不安隱或為吉祥或不吉祥復說諸祕密神呪及過所見所聞所行法門也十八佛說若不聽沙門入城復有淨心者佛世難值聽佛弟子入城皆食有和合有不和合佛出現世有如是因緣皆衆生根殊也十九佛云我今為汝等作譬喻顯其食過喻女人穢污之欲無厭復現神力示其從天來母胎時諸天子悉來集會等相也二十佛云彼臺閣中有十千數妙淨食為菩薩時示現之事豈況而今已成正覺其利生功德無量無邊無等也恃七卷佛名經如來為人天衆云若有受持過現未三世諸佛名號者得福無量復云東方阿閦佛火光佛等七卷皆佛名號唯第七卷初略說諸佛壽量劫分國土報應以顯諸佛神力故也己八卷佛名經五卷通前十二卷皆佛菩薩名號莊嚴劫千佛經人中尊佛師子步佛等千佛名賢劫千佛經拘留孫佛拘那含佛等千佛名星宿劫千佛經龍威佛華嚴佛王中王佛等一千佛名號長十卷五千五百佛名經八卷佛說此五千五百佛號若有人持一佛號或一瞻或一禮或焚一香或獻一花皆得無量福壽不思議功德經二卷上佛說東方妙尊音王如來等一切佛號下佛說南方樹根花王如來等一切佛號若有世間一切衆生稱念者罪滅福生獲不思議功德信十卷華手經一序品如來在竹林園迦葉自石室佛即分半座同坐神力品如來現神力攝四衆諸天悉來集會令目連重嚴高座為衆決疑綱明品東方一寶佛所綱明菩薩來此土以花上佛佛與彌勒示衆以手摩花一一菩薩手中有一一花一一佛手中亦有一一花如相品東方寶力佛所力行菩薩亦來此土亦以花上佛佛亦與彌勒示衆願此花令一切衆生深種善根不信品佛云末世衆生不修身不修心不持戒不信如是花手經典也二念處品佛云依四念處住於聖法中發心即轉法輪品東方無相佛與諸菩薩授記來此土見佛舍利弗問云曾請一切佛轉妙法輪稱斯名也現變品無相佛至此土已現大神變如來品轉法輪菩薩有大神力能移此界世界往來不覺然不能動如來衣之一角功德品佛云若人受持此經所得功德譬喻不及發心品東方須彌佛所德聚菩薩持花至如來所奉上於佛佛授彌勒示衆會中各發菩提心也三無憂品佛云過去安王佛所為輪王子名無憂出家得道中說品佛云是中有佛有菩薩皆來此土以花奉佛總相品如上所有世界一一佛一一菩薩一一奉花一一上佛一一示衆耳四上清淨品自上清淨剎以至無量佛剎佛菩薩持花至佛而作佛事散花品過恆河沙世界外有自在佛所莊嚴菩薩以花遙散此土佛上無所罣礙說偈稱揚佛功得五衆相品自衆相剎至檀香剎中間一一剎一一佛菩薩悉亦如是諸方品南西北四維上下一一方一一界一一佛一一菩薩悉如東方六三昧品如來見十方佛菩薩咸來即於座上入首楞嚴三昧及佛妙金剛三昧淨居天說偈求法品如來從不動變三昧起告舍利弗云求法須要多聞說菩薩所修四法乃至十法因中為妙德太子遇安王佛出家即我身是歎德品佛言舍利弗汝能問佛道深妙淨行功德一念相應通達一切諸法驗行品佛言一者能捨二者求法三者不逆甚深法以此驗菩薩心七得念品佛云過去德王明佛時善根王子得念出家成道王者我身是得念者堅意菩薩是正見品佛云其謂正見無高無下觀耳鼻舌身意諸法等於涅槃歎教品佛云若護持正法了達真論繼佛種故如來為喜也破壞品舍利弗云若人於此經解說四句助成佛道得幾所福若有人破壞正法得幾所罪佛為分別說之八衆雜品佛為說四救法多怖畏者如來能救入邪徑者聖道能救諸惡業者念處能救在八難者菩薩能救及說四安四調和法一一四也緣衆妙品佛云有四法能致一切最勝妙法發大乘心求法不倦修治塔寺起大悲行是為四也逆順品佛言若人於此正法心無違逆得無量福報功德若有違逆者招諸苦報須信順法也九不退轉品佛云四法修不退轉至無上菩提也為法品佛言若人求如是法如法而行以法化導解說是法及諸法也歎會品今此大會行淨人會為師子會無所畏會大龍會殊特會無比會也上堅德品爾時會中堅意菩薩聞其法門以衣上佛即於衣中現大神變乃過去寶光如來時輪王上堅德以衣上佛爾時王者即堅意是也十法門品佛告堅意法無名無思無慮無相無作無憶無念無文字無顯示無言說復說阿字法門及因地所修無量妙行妙義囑纍品佛言我滅度後若有人以花作會供養此經得無量殊勝功德也使四卷方等陀羅尼經四卷一文殊請問佛說諸魔諸比丘過去現在因緣復說諸神呪令誦持獲福二佛為雷音菩薩文殊阿難說諸法要授五百弟子諸天餓鬼魔王等一切法門三佛告文殊若我在世及滅度後有來求陀羅尼者得十種夢王七日行法者即為授之乃解說十夢境七日受持儀則四文殊問佛若四衆破戒當隨地獄如何懺滅不受此苦戒復再圓佛說呪曰離婆離婆諦仇呵仇呵帝陀羅離帝尼呵離帝毗摩離帝莎呵如是神呪持者能滅一切諸惡律儀罪僧伽吒經四卷一一切勇菩薩問云何利益衆生佛云有僧伽吒法門復說其功力有謗此法生地獄一切聖衆將說此法二佛云過去淨月王受持僧伽吒法門而滅五逆罪如來即現神變諸天諸菩薩各各云王舍城如來今日必說微妙法門故現斯瑞也三藥王菩薩問何緣出世佛云欲令衆生多聞故出現於世及多因緣果報故或因地或神變或十方咸集也四藥上菩薩問如何方便令一切衆生得聞正法佛云我說生老病死苦衆生不聽會中五千比丘皆起問佛我等亦有死耶佛為說法各各悟無常力莊嚴經三卷上如來入力莊嚴三昧光照諸天十方佛土文殊會中二十童子各至佛所作禮復各往十方佛所而為恭敬中佛令阿難召諸比丘即入影現三昧文殊復問佛即挍量功德智輪童子問如來智自在智不思議等十智法門佛即一一解說答其義也下佛與智輪童子問答對辨其旨趣淵微非識情測度在悟心見性者可以明了如云衆生即是佛便印其說也大方廣圓覺修多羅了義經大覺心廣博猶如虛空方軌生妙解任持圓性廣塵沙大用密應頓機圓心體周遍滿足無餘覺虛明靈照無所分別修多羅顯彰佛理契合群機了義經決擇義味詮指究竟如來在大光明藏與文殊普賢普眼金剛藏彌勒清淨慧威德自在辨音淨諸業障普覺圓覺賢善首此十二大菩薩密說頓悟頓證頓解頓修諸禪觀境法門妙趣右此圓覺則如來直指頓機而明本覺妙性本來圓也大唐圭峰密禪師悟入斯旨乃述大疏略疏大鈔略鈔修證儀以稱揚流通也相國裴公美作序而普告大衆然師歷于寒暑二十四載斯疏方就其間一言三復然後著筆存心若是豈率爾耶故今三百餘年盛行天下禪律靡不宗尚也可十卷觀佛三昧海經一六譬品淨飯王白言佛是吾子吾為佛父見佛色相光明愈顯但見其外不見其內我云何觀佛色相知佛常行尺度佛云一師子入胎喻二旃檀喻三金翅喻四伽陀樹喻五波利質多喻六修羅女喻乃劫初光音天人海中浴遺精西成也序觀地品淨飯王曰云何觀佛境界佛為王說其相好觀相品佛為父王說如來頂相及諸莊嚴無量功德也二佛為父王說降魔時放白毫光相諸魔競來以慈心三昧而為攝化也三佛為父王說如來眼耳鼻舌身等一切德相殊妙無比四佛為父王說如來為一切衆生放常光相長利益一切有情五觀佛心品佛告父王佛心如紅蓮華此心中放光照及地獄受苦衆生悉得解脫及說地獄苦相也六觀四無量心品佛為父王說佛心時即放光明照十方界一一光中有化佛相皆心所現乃經劫行慈悲喜捨心得如是報也七威議品如來起行足步虛空王見歡喜亦隨佛行佛舉足時千輪相現如來行至曠野化長者子諸鬼神示現四威儀八觀馬王藏相品佛告阿難云何當觀如來陰馬藏相謂諸女疑心故示現耳九本行品佛說三十二相八十種好諸功德聚放光照十方佛界觀像品彌勒問云佛滅度後一切衆生如何觀於佛像佛云若觀像者如觀我見在身無異也十念七佛品佛云若觀像心成就當觀過去佛像念七佛名號觀十方佛品佛云東西南北四維上下皆有佛名衆生持念者成念佛三昧佛密行品佛云若人成就念佛三昧即得身口意清淨不起邪見不行污行也覆十卷佛報恩經七卷一序品阿難持鉢見外道謗佛云生七日喪母捨父出家等事為大不孝之人以此白佛如來放光照十方世界一一佛所菩薩來至佛會聽說報恩法門孝養品佛說為須闍提太子父王失位去投他國途中絶糧日割肉三斤以活父王夫人得到別國帝釋化身來活助我二對治品佛說為輪王刻身挂千燈供養說佛法師菩提心品喜王菩薩問云何知恩報恩佛云若要報恩發菩提心亦勸他發如是心也三論品佛在忉利為母說法優填王思念於佛議論刻像為忍辱父子出眼出髓合藥治父王病摩耶為鹿女為王夫人生一蓮華埋向池中後花中生五百葉一一葉有一童子後出家成辟支佛道各現神變焚身四惡友品佛云調達非今日與我為害過去為惡友太子我為善友太子入海求珠害我等一切因地中為害因緣也五慈品佛為舍利等現神力已說過去為大光明王人來乞頭即施與救五百賊出家因緣六優波離品阿難白佛優波離下賤之人佛聽出家令國王大臣不生恭敬尊貴比丘而生慢易佛說因地果報也七親近品佛說為長者子殺賊伴令衆安隱為堅誓師子身毛金色獵人著佛袈裟被害不起惡念及說諸緣起報應菩薩本行經三卷上佛為貧人見五百長者作施場乃問開施何為云求佛菩提乃捨身求佛法天帝釋現身成就善根中佛為須達說布施果報多施少報少施多報供養百千白衣不如供養一淨行乃至供百千諸佛不如供一無心道人如是等因緣也下佛在毗耶離城一切疫鬼悉皆遠去佛還摩竭疫鬼復來如是往反七遭為人除病復說過去為尸毗王割肉等一切因緣右三昧海經則淨飯王觀世尊勝相妙好所行殊特也報恩經則如來無數劫中行其孝道報父母也本行經則佛過現行菩薩行義旨照然奉佛弟子棄允麟與室中隆十八娘及弟子莫詢等共淨一拾貫文省雕斯經板一卷廣流聖教各為所生父母願超淨界者
