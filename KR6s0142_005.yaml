body:
  text: 東京法雲禪寺住持傳法佛國禪師惟白集器欲難量墨悲絲染詩讚羔羊景行維賢剋念作聖德建名立形端表正空谷傳聲虛堂習聽禍因惡積福緣善慶尺璧非寶寸陰是競資父事君曰嚴與敬孝當竭力忠則盡命已上總六十八函器十卷觀察諸法行經四卷一喜王菩薩問云何得入三摩地佛云決定觀察諸法行所謂如說如作如作如說身淨語淨意淨求於利益作朋友心不為求欲不捨於悲不為取法五百三十餘句法門合諸法行及偈二勤相應品佛言應覺諸法不依不出不滅不作不生及十六字法門諸陀羅尼此云總持及說偈言井過去佛所曾聞如是諸法行一切法門三喜王與會中三萬菩薩聞說末世佛法破壞各各淚雨發願護助佛法各說偈言佛說過去佛所三萬王子發願即此大士也四佛說過去輪王如來所寶月輪王子法上聞是法門及今喜王菩薩是也法集經六卷一佛會所有無所發菩薩發二十問奮迅慧每問答十如問云何知如來生云何是如來真實身等二答能知空所對法十二因緣世出世一切法義趣三答八解脫九次第十逼處六神通無漏根等諸法妙義四答如來十力及對治法門五答心念處十念諸法門義六爾時大慧觀音堅意文殊等諸菩薩各以所見問佛佛即隨問答之皆所修所行法義復告阿難云無所發菩薩過去佛所曾行是法也欲三經廣顯三昧經四卷一得普心智品龍王至佛所發問佛答云有一法速起道意不捨眾生所謂一行復說三十二事得普心智也清淨道品龍王云若此法門明賢所由得道清淨佛云菩薩行有八直正道當勤受持及行六度無極也二佛為龍王演說妙法即入諸善法知道無求無習無不習即請如來入宮受供佛將諸大眾詣龍宮說無欲行法門化諸龍眾三龍眾各云今值佛法已生深信各說偈讚佛復說轉法輪因緣決諸疑難與須菩提廣論法義令諸龍眾各聞所未聞也四龍王問不起法忍當云何得佛云忍不生色受想行識是不起忍龍子問法空生誥問佛乃微笑為龍王封拜如定光授記我也菩薩處胎經七卷一天宮品佛說離天宮來王宮受生遊步品佛說在胎中舉一步過無數佛剎四諦品佛說胎中亦修此法成無上道以多修習法力故也二佛樹品佛化七寶樹遍滿世界現諸神變三世等品佛若入滅誰度眾生佛若不滅今在何界佛讚喜見菩薩能作師子吼佛與眾生但假名耳本無生滅相故三想無想品佛告彌勒今當識想受無識無想無受也不住品佛言過現未五陰清淨不住不不住色相不住不不住八種身品佛說見地薄地淨聲聞地獨覺地辟支佛地菩薩地佛地現大神力全身舍利品佛云我所行功德捨身受身非一非二今當略說常無常品諸菩薩讚如來降神不可出一入一變化無方或碎身或全身四隨喜品頂王菩薩從東方來至佛所隨喜此神力五道尋識品佛在胎中示現一切諸識如花識果識報識等佛行無差別品佛在胎中示現神力令諸菩薩皆如佛相定不定品常笑菩薩問佛即現神變如來示相定亦不定也五入六道品佛在胎中示現與一切種類常笑隨機感故轉法輪品佛在胎中示現與四眾轉妙法輪五神通品佛在胎中現五神通破外道所習識住處品普慈菩薩問今此識法住無所住為識致身為身致識善權品佛示現權變無窮無盡不可測量故六無明品佛示現無明結令有情依此修習苦行品佛言曾為諸天諸宿伴黨故現苦行四道和合品佛告遍光菩薩云聲聞辟支菩薩佛此四一體無二意品蓮華菩薩問此四道所趣為有意耶為無意耶意是果非果耶是見非見耶等定意品持空菩薩問云何菩薩度苦眾生佛云令聞苦聲捨世間法也光影品佛在胎中示現光影令在會四眾皆同佛之金色七破邪見品佛在胎中示現入正定三昧顯過去在雪山同諸仙修苦行時献花定光佛授記變化品文殊接化世界來此界佛胎中亦無礙無障八齋品智積菩薩問如來為說八聖賢齋法即八戒是也五樂品佛說帝釋諸天與修羅戰手執樂器緊陀羅品佛說過去因地也香神地神品佛說本因緣起也人品法印菩薩問何者是人人從何生佛云四大洲中皆非人種彌陀佛國阿閦佛國我今現前大士乃人種也此外盡非人種何以故從無始來乃至成佛中間並不作惡常修身口意淨業是人也行品法印讚云快說人種不可思議或修淨行或修淨行或修天行法住品佛囑彌勒我滅度後流通此菩薩處胎經典利樂一切有情令修妙行施燈功德經佛說若有人以燈光照佛塔廟而為供養及照一階道乃至十階道得無量福德果報耳難三經央掘魔羅經四卷一受邪師教殺千人取指為鬘將害其母佛即往化魔羅見即逐云住住大沙門當今稅一指佛答云住住央掘魔羅此云世間境我是等正覺往反辯擊投佛出家佛令向母悔過即來佛所鬚髮自落天帝來上天衣即不為受也二魔羅與諸天諸大弟子及文殊論議說頌往反徵詰自謂強梁三魔羅成大比丘即得神通問云何住解脫際佛云汝與文殊往東方佛所而問此義遂往展轉而指至十方佛所皆問此義一一佛不答即指魔羅文殊歸如來所而為宣說此妙義也四佛與魔羅文殊廣論法義天帝來問欲受持此經波斯匿王將四兵來戰魔羅見己在佛所出家即問所以佛云南方大精進如來示現為魔羅北方寶積如來現為文殊爾時會中聞者皆悉歸仰讚歎無所有菩薩經四卷一心念云佛云何無所著云何得菩提佛知心念即為說偈因以偈往復也二佛為難調伏害人者說法即得無礙解成偈答佛天帝來問此難調伏害人者何故有此智慧佛云五百生作蛇唯只害人害物曾為法師故有智慧耳三佛記難調伏為利上如來復說過去為比丘通利教法將領徒眾見益上比丘生嗔恨心不止遂墮蛇中及入地獄今遇我得解脫道四頻婆羅王女及城中女眾隨花到佛所見佛相好并見無所有菩薩相各發上品心因轉女身為男身王至佛所見是事已生希有心佛說過去此女眾發心因緣明度五十校計經二卷上佛告諸菩薩有能校計不能行有能行不能校計此校計有五十種法如癡百八疑百八顛倒百八欲百八墮百八愛栽識著種共十百八校計法數也下佛說生死百八校計等法門然此經乃漢安息國三藏所譯也當時漢梵語未全方言未順所云校計者即謂思惟耳量五卷祕密藏經二卷上東方大法音世界寶杖如來所莊嚴王菩薩至佛所問祕密藏法門佛云如來祕密藏則一切智心堅固守護不捨不退下佛云菩薩有四障法應當覺知毀謗正法祕悋惜法懷增上慢修無色定是為四也已次法門或說二法或說四法莊嚴王與迦葉擊揚如來祕密藏法門正要義中陰經二卷上佛說五弘誓一當生之時六種震動二周行七步十方佛來助三不成正覺不起于坐四諸魔競來必不怯弱五入於中陰教化眾生是為五也如來神力思惟中陰極微細乃放光照十方佛各說處中陰而能教化眾生也下佛以神力令此界上至非想下至地獄皆同金色光照復為菩薩人天說如來妙覺中陰識非想非非想識極是微細聞者得道月上女經二卷上月上生而端正世間無比國王大臣皆欲強奪如來神力助發夙世善根與舍利弗論議施無礙辯人天共集歡喜下舍利弗及諸大弟子同月上至佛所文殊諸菩薩各與論議佛化千蓮華帳月上奉佛記為月上如來於佛法中出家現得道果悉讚仰也文殊問經二卷上文殊問戒願般若習氣來去義旨及世間戒佛廣為分別解說其義趣深遠也下文殊問佛滅後諸弟子於如來言教分諸部類乃至僧祇毘尼及問如來法身為復以身為法以法為身佛答其妙義深旨也大法鼓經二卷上佛在靈山波斯匿王擊鼓吹唄來詣佛所佛告人天吾將為說大法鼓經迦葉問言佛云喻波斯匿王戰鬪之時擊其大鼓四兵交戰得勝者賞我諸弟子修習佛道之時與四魔大戰擊動大法鼓得勝者以法繒冠首賞之下佛為迦葉說大法鼓經以謂惡魔來破持戒之人宜須擊法鼓戰退迦葉乃發願乍入地獄不忍聞破戒之音種種發大願力也墨五經密嚴經三卷上如來入自智證境神通變現一切佛國土唯密嚴佛土超諸佛土上方亦過者金剛藏菩薩問菩提者是何句義佛即答之妙身生品如實見菩薩問如何得意生身及神通力入於密嚴無我法門諸菩薩各各相問各各為答中大光菩薩聞說密嚴微妙功德白金剛藏云一切世界色像是誰安立及問解脫等義復為螺髻梵天說受胎分相心所取境而成身當修觀行合密嚴佛土解脫寂滅殊勝境界也下金剛藏大神變光照及自識境界說阿賴耶識猶如雪山有一惡獸詐現諸相食一切諸獸阿賴耶識亦復如是能起我我所一切執見壞諸眾生法身慧命由是不能入密嚴佛國土殊勝境界造像功德經二卷上佛在天宮王思念佛以旃檀往彼刻作佛像佛自天宮下躡寶堦蓮華色比丘尼化輪王儀仗先見佛佛責之下佛說造像所得功德及來世男子女人或木或泥或畫等作佛像者諦觀佛相好志心思十力四無所畏所作功德等事善惡業報經二卷上淨信菩薩問末世災害修行多諸魔障如何即是佛勅地藏為說云宜細占察善惡吉凶果報用木作輪四平正圓以十善對十惡撥轉占其善惡業緣下地藏為淨信說修進大乘法門令過去所作惡業消除而成道果也蓮華面經二卷上佛入拔提河浴告阿難云我更三月入滅天龍八部悉皆集會悲惱佛說末世比丘過惡破戒所作罪相下諸天子及諸神眾各各流淚說偈讚佛悲惱無涯佛告云我滅度後國王興崇正法後有外道子名蓮華面破壞正法及鉢等法物悲三經五佛頂經四卷一佛說一字頂王超勝頂王光聚頂王勝頂輪王佛眼大明呪及說畫像一切持誦恭敬法則儀範二佛為金剛密跡首說修五佛頂呪三昧法門及諸神呪一字頂王呪稱揚其功德力無量無邊然此密呪至簡當也三佛說受持五頂王呪結印法及如來呪心印壇印等印四佛說五頂王修證悉地法門及諸密呪皆如來大慈普利有情寶樓閣經三卷上佛在王舍城有大華花從地漏出花中出聲說陀羅尼菩薩發問佛云此名大寶樓閣妙陀羅尼佛令密跡將杵叩地妙寶樓閣忽然涌現閣中有三如來所謂寶花王如來金剛超勝王如來淨光明王如來佛開閣門同坐說過去三仙人聞陀羅尼於此地沒生三竹竹中生男子坐樓閣中說陀羅尼此云總持而成正覺此三如來是也淨居天子為說呪即我身是也中佛說持心呪及置壇用物等法下佛說結印法運手安手屈指用臂等一字心呪經佛在淨居天放光普照十方光中忽然作聲我是一字輪王心呪其光復入如來頂云我是如來智慧一字心呪呪曰部林絲十卷大佛頂如來密因修證了義諸菩薩萬行首楞嚴經大藏性廓周普容法界佛覺定妙圓應機示相頂最勝超倫高不可極如來智實無涯名稱自在密因定慧双融識情難測修證因圓塵劫果滿剎那了義究竟寂滅顯明勝性諸菩薩海會相入覺明普照萬行一心本具廣利有情首楞嚴妙定湛然堅固不動經唯此言說詮明性和一如來頂上放百寶光化佛說呪令文殊往摩隥伽此云本性家救護阿難歸至佛會七處徵心皆非真實佛咄云此非汝心等義二佛為波斯匿王說不生不滅性為阿難辯八還見文殊只一無二文殊指月為喻以顯妄見眾生顛倒說五陰虛妄空生執著三佛說十八界七大性各各周遍本如來藏妙真如性眾生識情分別乃至執著不悟無常阿難聞已說偈讚佛功德四佛說金風空水四輪所起三因三緣五濁演若迷頭六根所得功德多少一六七義佛勅羅睺羅擊鍾果地法與因地法相應五佛說解結摩阿難頂十方佛同音讚歎佛即說偈尋取花巾綰結以示大眾令各說於佛法中如何悟入法門憍陳如等二十四大士各說己所悟入圓通六觀音大士說悟入圓通法門佛勅文殊說偈辯其二十五大士所悟偏圓阿難復問如何修證如來說三決定義令其有情悉斷其因不受果也七佛說四種律儀及誦呪壇儀法則復說四百二十七句白傘蓋呪誦持者功德無量阿難復問修進佛云眾生世間顛倒相續無休八佛說修進五十七位法門文殊請問名題復說斷十習因六交報業相十二類生輪轉生死六道循復無息也九佛說修四禪八定諸大所報却回紫金光凭七寶几告大眾云汝等當知微細魔事五陰中一陰十種成五十也十佛說想陰行陰識陰區宇各有十魔五種妄想微細心識中惑念皆是三摩提奢摩他中用心現境取著成魔不取成善也右楞嚴經者迺我佛將欲示滅而談此典直顯如來藏性深明堅固妙定所謂法華後陣涅槃先鋒也四百年前南天竺國僧伽藍藏中一夜出十道光明騰照此方三藏般剌密諦見斯瑞已潛將涉海而至唐朝值則天權國未暇流通復回廣州依制旨寺遇相國房公融出鎮遂成飜譯以藉潤綴方言後西洛興福寺慤法師夢文殊騎師子入口作于玄贊荊渚振法師金陵節法師資中允法師各隨所悟造疏釋義炎宋四葉仁宗皇帝金輪統化曠古未有也佛祖妙道盛乎斯時長水璿法師裁四師科注成一家疏義內翰錢公易聞奏相國王公隨作序由是天下至今源源而講唱其如前後禪律諸宗或解或注或集或指殆盈三十餘家亦各隨方闡揚皆助吾皇聖治成其美化也染二經毘盧遮那成佛經七卷一祕密主金剛手二大士問菩提心義一切智智佛云尋求自心以本性清淨故二佛為祕密主諸菩薩說神呪祕語及諸偈阿多迦字法門等義及功力也三佛說成就世間曼茶羅尊所印法門諸神呪等及偈言四佛言以定慧指智慧拳旋復交羅結成妙印誦此祕密神呪五佛說字輪神呪能成一切呪及說偈長文中演其呪功力殊勝無量六佛說學處方便修十善業百字成就諸法門偈妙義七佛說偈文神呪雖然廣多在志誠誦一句一呪久成其功也童子請問經三卷上佛會中童子蘇婆呼問修行持呪不速成就為有魔耶不如法耶一一問其不如法事金剛菩薩大藥又將答其所問分別其義中童子聞說是法諸障難事悉已除滅復說誦呪用水用心等儀則下為童子說八正道諸天諸神各有神呪也詩三經金剛頂念誦經四卷一大唐南天竺三藏金剛智於金剛頂瑜伽分中略出成四卷助修習瑜伽定者易成就也二如來入諸三昧一一三昧中顯如來心一一心中說祕密神呪三佛說受持金剛瑜伽法印立壇畫像用物法則規式佛成道未久而演斯耳四一切如來所遊戲笑金剛智心大精進智力一切法門及一切神呪若誦持者護自身國土也蘇悉地羯磨法三卷上唐中印土三藏善無畏於金剛蓮華部略出此祕密神呪及供養法令人誦持中明王手印及諸印法并神呪細而結成印誦呪其功力成就下佛部金剛部蓮華部中各用物及線或青或黃等皆不離自身牟梨曼陀羅呪經佛說若人受持此呪殊勝無量如多雨呪白芥子投龍穴中雨即止或呪安息香呪風即風止呪鬼即鬼去受說一切祕呪其功力不可思也讚十九經七佛神呪經四卷一維衛佛式棄佛隨葉佛拘留孫佛拘那含牟尼佛迦葉佛釋迦牟尼佛各說神呪救度眾生二佛說曠野鬼神等呪三首羅天憫念眾生等神呪四文殊觀音諸菩薩各說四弘誓願四攝法等一切法義廣度一切眾生也大吉祥神呪經四卷七佛神呪護持國土及諸眾生若有受持依法立壇結印專心誦持殊勝難量文殊法寶藏陀羅尼經佛放光入文殊頂密跡主請問佛說緣起及說文殊普賢諸菩薩神呪也止風雨陀羅尼如來出竹林園路遇大風雨佛說十方止雨止風止雹等呪及受持法則耳七寶呪佛說一神呪語鼓聲音王呪彌陀佛國說此神呪八名普密呪一功德寶藏二莊嚴象取三勇猛四勝諦雲五成熾然六微妙色七嚴飾八金剛若得聞者獲福也六字呪消宿食除病苦拔苦呪雨神呪有殊勝功力護童子呪大梵天王詣佛說此神呪使一切童兒不被鬼神惑六門呪誦此呪者得成菩提觀音普賢呪過去月光佛所聞此呪語今對如來重說利益有情阿吒大將上佛呪大將對佛說此神呪護持國界一切眾生諸佛心呪此呪即是一切佛心大普賢呪持者誦者除病除鬼玄師呪對佛說此呪解冤賊劫等持世呪佛為妙月說此神呪能護世護身摩尼羅亶經佛說此經此呪遣一切邪鬼安宅呪佛為離車長者五十人等說此經此呪令在家者依此法則誦持以安住宅招吉慶祥應也羔二十六經千佛因緣經跋陀波羅問佛以何因緣賢劫中次第作佛佛云過去寶焰王如來出世有光德輪王千子於中蓮華德問善稱比丘云何名佛法僧即為解說千子聞已為千梵天為千聖王千比丘千梵志千婆羅門等次第修行作賢刼千佛魔逆經文殊為諸菩薩說五體悔一切過法門若能如是悔過不墮邪鬼即得道意本起經佛買花上定光如來布髮掩泥金剛頂經文殊說金剛焰五字等一切神呪菩提心經迦葉夢大蓮花花中見月輪相白佛佛云汝將得大利復問得何大利佛云一切智心菩提心能利大有情故云大利也莊嚴王經佛為王及金剛諸菩薩等說一切功德莊嚴王法門復說觀自在神呪隨求得大自在呪佛為梵天說此神呪智炬呪東方智炬如來說此神呪與人作大明炬佛集會呪如來彈指十方佛同集同音說呪賢首經佛為瓶沙王夫人說速疾離女身一法所謂自證菩提也佛地經佛為妙生菩薩說五種法攝大覺地所謂清淨法界大圓鏡智平等性智妙觀察智成所作智復為解說其義教誡經佛臨滅度教誡諸比丘持戒習靜修善精進行道不得放逸莫貪利養莫求名聞等百千佛呪佛云若人寫此呪安一塔中如造百千佛塔莊嚴王呪佛云三萬如來同音宣說此神呪香王呪若誦持者無願不滿滅十方冥呪佛為善悅童子說十方佛名令持誦禮念佛印三昧經佛坐三昧放光文殊等俱不見所以及其名字文殊涅槃經佛說文殊無量神變及成佛化土涅槃等緣如意輪呪觀自在說此神呪有誦持者無不如意除罪障呪文殊請問佛說此大力呪能除罪苦最勝心呪虛空藏說此呪善夜經佛說此呪能破一切黑闇得其明了心明經梵志婦施佛一鉢米汁即轉女身記為心明如來鹿母經如來因中為鹿產二子獵人將去即以身代之月明菩薩經佛為說在家布施法聞已悟解面燃經面燃大士來至阿難所求其出離乃為白佛遂置斛食說其神力等法羊二十二經最上王經佛說此經若有人受持及聞者得無量福商主天子經天子至佛所問法要佛勅文殊為說一切智智得達法彼岸德光太子經佛為賴吒和羅說法要義復云過去為德光太子於吉義如來所修行是法出家汝等當依如是修行出家耳三摩地經諸菩薩各現神變諸天集會如來復現光明賢護發問佛云有三昧名寂照神變三摩地法也大意經佛因中為長者子名大意入海求明月殊被海神所奪因緣堅固女經至佛所發菩提心佛說其因云過去千女同名堅固星宿劫中成佛大乘四法經文殊為善勝天子眾廣說四法義門也流轉諸有經佛為摩竭陀國王說一切眾生虛妄流浪六道灌臘經佛為人天說四月八七月十五日浴佛等法使人天求其福利斷肉經佛說因中為師子為素馱婆王食肉至今日成佛果授記經佛為國王夫人差摩婆帝說法授記成佛造塔經佛為觀音諸王諸天說造塔所得功德殊勝利益妙色王經佛因中為妙色王捨身求法藥叉為說四句義法印經佛為海龍王說四句義名為法印行常生滅等也八佛名經佛為長者子善作說八方八佛名號令受持滅罪生福也師子莊嚴王經問佛若何所修得如是報佛云過去修八曼茶壇法得如是禮佛法經佛告離垢慧菩薩云若禮佛時先願云我禮十方佛五體投地願離五蓋得五力具五通成五眼等願有德女經來至佛所問云在鹿林時說何法佛為說十二因緣聞已即得道果繞佛塔經佛說繞塔所得功德不增不減經舍利弗問眾生界眾生海為有增耶有減耶佛云若作增減是大邪見法身流轉皆如來藏性耳七佛名經佛說東方七佛名號受持者所生功德無量吉祥法住經佛將涅拌為阿難曰吾轉法輪利樂有情汝等護持不令滅沒乃說展轉五百年解脫神通智慧塔寺鬪諍次第堅固也景二十三經金剛三昧經佛從金剛三昧起為解脫菩薩心王等廣說此三昧境趣其旨深玄亦注其義者行於世間淨行法門經佛為毘佉母五百優婆夷說修淨行法門佛及輪王相好皆修淨行所招因中如是所修內習六波羅密經佛說現前六根中微細調伏自然清淨成六度行門也飼餓虎經為薩埵王太子時捨身緣慈心不食肉經佛說彌勒因中為光明仙人遇佛修大慈三昧不食兔肉誓不起殺心從是已來身相端嚴金光也樹提伽經因風吹白㲲王來見富貴過國佛說過去為商主供養病道人即我身也天王太子經問云世間人所求實有求人不佛云譬如影響相隨過去佛經佛云過去佛將諸弟子入城懷姙女人見願我腹中生兒亦如相好果如所願即將詣佛所出家成道則我身是也十二頭陀經一蘭若二乞食三一食四節食五次第乞六中不食七弊衣八三衣九塚間十樹下十一露地十二長坐等金剛三昧不滅不壞經佛入諸三昧彌勒發問佛云有百三昧得入金剛三昧所謂性空王乃至法印王三昧佛因中亦如是修長者法志妻經佛入城持鉢見佛相好發於道意佛為說法轉女為男薩羅國經國中豐樂王及大臣人民放逸佛往化之為說法各發道意法滅盡經佛欲入滅為阿難言法欲滅時魔作比丘作於非法設有持戒弘法者亦被憎疾今日已見是事耳長壽王經佛因中為王各長壽太子名長生被貪王所奪國王父子俱逃遇婆羅門捉與貪王見殺長生太子不忍報伉恐違父王慈訓師子月佛本生經婆須密多比丘養干獼猴身皆金色過去定光佛曾為授戒婆須密當來作佛號師子月如來也十吉祥經佛說東方十佛名號若求佛道者持此名最為吉祥回向經佛為人天說修慈身行修慈口行修慈意行一一回向菩提雖是小善即成大果菴提遮經父請佛至舍受供以殘食令化女將與提遮即出與文殊舍利弗論議乃云此女能作大師子吼有如是辯也三品弟子經佛說上中下三等持戒修行發心向道各有勝劣故耳法常住經佛云法者常在有佛無佛法住如故會中聞者獲無生忍八大人覺經一覺世無常二覺多欲三覺心不足四覺懈怠五覺愚癡六覺貪怨七覺欲過患八覺生死常如是覺是大人覺也四輩經佛言我滅度後四眾弟子護持我正法各守慎身口意令三業清淨也當來變經佛言當來世比丘不守禁戒習俗人法貪著利養名聞不慕弘道當知法滅如是也右大乘經二百單一帙實如來說中道玄門理趣在於斯矣其次經律論則隨機而說也行十卷菩薩地持經一種性品佛云須得十法具足一持二相三翼四淨心五住六生七攝八地九行十安住持此十法住菩薩地分別多義種性六度行也發菩提心品住菩薩地發等覺心自利他品持菩薩淨戒自利利他廣攝化群品耳二真實義品佛說實法性事法性以從久遠劫來入無我法及微細妄想力品佛說聖力法力俱生力能修菩薩地三成熟品佛說一性二人三分別四方便五人相六自性此六成熟方能修行無上菩提心佛云斷二種障得二種智煩惱永盡是名無上菩提力種性品佛云已說菩薩學處今當說菩薩善學修解求一切法為人說一切法四施品佛云一自性施二一切施三難施四一切門施五善人施六一切行施七除煩惱施八樂施九清淨施能行此九種施修菩薩行若勤行之即成妙行五戒品佛說九種義菩薩持犯開遮輕重罪垢律儀善法饒益等戒六忍品精進品禪品惠品佛於一一品中說九種義各廣演所修行相七四攝品佛說布施愛語利行同事攝化二行演九種義也供養習近無量品佛云若人供養於佛習近知識行四無量心是菩薩行也菩薩品佛云若菩薩知慚知愧發上品心是真修行也八功德品佛云菩薩地修持大乘淨戒所獲殊勝淨妙功德及廣說法要九淨心品佛云有七義一無畏二巧便三不厭四不求五不貪六廣大七平等復解說其義多有法相皆菩薩地所修十生品佛云一息苦生二隨類生三勝生四增上生五最生攝品佛云一頓攝二增上攝三取攝四久攝五不久攝六後攝也地品佛云如來地菩薩地性地行地淨心地決定地也行品佛立波羅密二菩提分三神力四成熟眾生此四行也經中菩薩地行相無量略撮一義兩義以見分段維二經菩薩善戒經九卷前經同本異譯淨諸業障經無垢光比丘持鉢遇婬女呪術力共行欲事歸以自責投佛佛問汝有心耶曰我無心也佛云汝既無心云何言犯云云賢三經梵網經二卷上毘盧遮那如來坐大蓮花師子寶座說心地法門十善戒菩薩戒一切戒法義令人受持也下爾時如來於此心地法門品略說一毫戒相十無盡藏戒品乃說偈言復說十重四十八輕所犯罪及懺悔法義十善戒經佛說除去十惡業修習十善業及三歸戒法一切法義優婆塞戒經七卷一善生長者至佛所問云外道令禮六方未知如何佛云我法中亦有六方所謂六波羅蜜汝勤行之二佛告善生令發願修佛相好一切法門義三佛為善生說四攝法四佛為善生說六波羅蜜義五佛為善生說捨去慳貪等六佛為善生說三歸依五戒相等義門七佛為善生說作惡殺生等業報克六經佛藏經三卷上舍利弗云如來於無相法中善說諸法實相佛即說其義令念佛念法念僧念戒念天念施中佛說破戒持戒過惡淨法品中演清淨行相往古品中明過去莊嚴如來法中比丘眾或持戒或破戒果報善惡也下淨見品佛說過去作無數輪王經無數劫事無數佛皆不得記以有所得故至定光佛時以五花無生心施乃得授記復說邪見破戒比丘是世間佛法中大賊佛慈苦口垂訓正為今日出家人菩薩戒經彌勒說修淨戒相法菩薩瓔珞經二卷上佛說菩薩瓔珞本業法門所謂修十住十行十回向十地等名字唐梵双語也下佛解說四十二位聖賢因果觀行戒相開遮令末世比丘精進受持遂付囑阿難大眾廣宣流布菩薩戒羯磨文二本彌勒說在家出家受三聚淨戒法門義相善戒經優波離問佛云凡欲受菩薩戒先受五戒十戒潔淨身器懺悔過咎投誠乃可受也念六經文殊淨律經寂頓音天子云寶英如來土中有何超異仁者樂住彼中文殊云不興貪欲亦不滅不起嗔恚亦無所盡不達愚癡亦無所際不造塵勞亦無所壞等寂調音經一卷清淨毘尼經已上二經前經同本內戒經佛為文殊及人天眾說自歸依及諸微細戒法令比丘依而行之十善業道經佛在龍宮為龍王說十善業清淨戒法令信受奉行五法懺悔文十方三世佛五眼照世間三大無不知明達罪福相我等從無數劫來不遇知識造一切罪犯戒謗法斷善根等罪一一雨淚投誠洗雪懺悔法律三昧經佛為四眾說此法律三昧十二種自燒法義此等不可度脫也優婆塞五戒經佛為在家菩薩說此戒經微妙教訓依行獲利無量大乘三聚懺悔經佛告舍利弗若人發心住聲聞辟支大乘地先當憶念十方現在佛為我作證作眼作智作勝懺悔發露無始時來所作一切罪咸乞消除懺滅菩薩藏經佛告舍利弗若人欲懺罪業求證菩提先歸依十方佛稱其名號一一發露懺除先罪今不復更作是罪文殊悔過經文殊為齊光菩薩說懺悔過去所作一切惡業宜以口自發言陳露無量劫來到于今日所作一切惡行惡業願皆除滅跋陀羅經答文殊云若欲求菩薩道當晝夜稽首十方諸佛作禮悔過諸所作惡今日已往當忍忍之當禮禮之也及說諸業相今一一披誠懺悔舍利弗悔過經前身有罪今何懺之佛云若人懺除先罪改往修來當發誓願懺悔善法日生惡業自滅菩薩受齋經佛說受齋日解齋日及用心受齋法門當禮念彌陀佛號十齋日常行是法則成行也右大乘律五帙菩薩聲聞人天龍鬼等戒法及懺悔禮誦軌儀一一具足聖人利他無盡行也大智度論一百卷龍樹尊者造羅什法師譯以謂佛法大海智為能度信為能入故造斯論釋其般若令信入也作十卷大智度論一釋般若初分緣起行相自佛初生王宮出家成道轉法輪涅槃舍利弗出家長爪梵志論義出家證果等一切法義二釋般若如是我聞等義迦葉結集阿難六過佛十號及住處辯諸論部類所起謂佛在世教法無錯滅後異見三釋般若中王舍城耆闍山佛因何在彼成正覺說法釋摩訶比丘僧共名一處一時一心一戒一見一道一解脫及四眾義相等法四釋般若中菩薩眾如來過去修菩薩行及所行妙行也五釋般若中摩訶薩埵義菩薩功德空無相無願六釋般若中幻焰水月空花響婆城夢影鏡像化等十喻意無礙品則如來於一切冤親非冤非親俱無罣礙等義也七釋般若中佛土願則如來因中所行妙行所發大願莊嚴報土清淨八釋般若中如來放光瑞相此以常光遍照三千及東方九釋般若中如來光明照十方佛界一一界中見光相已問其所以也十釋般若中十方菩薩來集佛所散花問訊求聽妙法各隨方坐也聖十卷大智度論十一釋般若中舍利弗因緣及檀波羅蜜義初分十二釋檀度義如來因中所行有來乞者悉從其願也十三釋般若淨戒波羅蜜義以如來因中所持戒行為證十四釋戒波羅蜜以謂寧失身命不毀小戒等因緣十五釋般若中忍波羅蜜如來因中所行忍辱難忍妙行十六釋般若中精進波羅蜜如來因中勇猛為法所行十七釋般若中禪波羅蜜如來因中修習成大定三昧十八釋般若中智波羅蜜如來因中所悟大智光明十九釋般若中三十七菩提分法則如來因中三無數劫精勤修習此也二十釋般若中三三昧空無相無願四禪定八定相等一切定義德十卷大智度論二十一釋般若中八背捨義九相義如脹壞血塗膿爛青噉散骨燒等相二十二釋般若中念佛念法念僧念戒念施念捨念天念死等二十三釋般若中十想義無常苦無我食不淨不可樂死不淨斷離慾盡等想法此他心世苦集滅道盡無生如實等十智義法門二十四釋般若中十力義如來因中所修習二十五釋般若中四無所畏四無礙義二十六釋般若中十八不共法義廣引如來因中修習緣二十七釋般若中大慈大悲大喜大捨四無量義二十八釋般若中六神通義以謂從靜定所生二十九釋般若中布施隨喜心過上則般若為上菩薩所有少施少戒少忍少精進等悉皆回向超諸禪定亦如來因中所修如是等行利益有情三十釋般若中善根供養儀則少善根供養一切諸佛一切功德悉得成就稱讚名號品中則一念頃至恒沙等佛土問法稱讚諸如來所有殊勝功德耳建十卷大智度論三十一釋般若中二十空義論中十八空也三十二釋般若中因緣次第緣所緣緣增上緣廣解諸緣義三十三釋般若中到彼岸義三十四釋般若中見一切佛世界義信持般若無三毒義欲人學般若故三十五釋般若中報應品義則四天王各以鉢上佛三十六釋般若中習相應品義論聲聞辟支等地相應不相應等義三十七釋般若中相應品義與過現未三世合與不合等義三十八釋般若中往生品義謂學般若人何處沒來生此間也三十九釋般若中往生品餘義謂學般若人得四禪八定來往遊戲其中等義四十釋般若中往生品餘義得法眼淨隨行法無相也名十卷大智度論四十一釋般若中三假品義內外中間三處俱假耳勸學品義則精勤修習六度及一切善法四十二釋般若中集散品義則須菩提云我於諸法集散不集散如是思惟也四十三釋般若中集散品餘義廣論也四十四釋般若中行相品幻人無作品句義品此三品廣解其義趣四十五釋般若中摩訶薩品斷見品莊嚴品此三品義趣也四十六釋般若中乘乘品無縛無脫品摩訶衍品玄義也四十七釋般若中摩訶衍餘義也四十八釋般若中身受心法四念處義四十九釋般若中發趣品謂發趣無上菩提五十釋般若中出到品乘是乘者從何處出到何處住等妙義立十卷大智度論五十一釋般若中勝出品含受品此二品要義五十二釋般若中會宗品十無品所謂眾生無色無受想行識無色性無識性無前際無中際無後際無菩薩無六度無廣解其十無妙義五十三釋般若中無生品義五十四釋般若中天主品義五十五釋般若中幻人聽法品散花品義五十六釋般若中顧視品學般若人視之如佛滅淨品為天帝勉修羅鬪戰也五十七釋般若中寶塔品校量品述誠品義五十八釋般若中勸受持品梵志品阿難稱譽品論其三品義五十九釋般若中校量舍利品義六十釋般若中校量法施品義趣法門形十卷大智度論六十一釋般若中隨喜回向品義六十二釋般若中照明品義六十三釋般若中信謗品義六十四釋般若中歎淨品義六十五釋般若中無作相品諸波羅品六十六釋般若中歎信品義六十七釋般若中歎信品餘義也六十八釋般若中魔事品義六十九釋般若中兩不和合品七十釋般若中佛母品問相品二品要義謂般若三世佛母也端十卷大智度論七十一釋般若中大事起品譬喻品善知識品一切智品要義七十二釋般若中大如品義七十三釋般若中阿惟跋致此云不退品義七十四釋般若中轉不轉品義趣七十五釋般若中燈喻品夢中入三昧品恒伽提婆品七十六釋般若中學空不證品義七十七釋般若中夢中不證品同學品等學品義旨七十八釋般若中願樂品義七十九釋般若中稱揚品義八十釋般若中無盡方便品義表十卷大智度論八十一釋般若中六度品義八十二釋般若中大方便品義八十三釋般若中學般若人能作大方便也八十四釋般若中三慧品義八十五釋般若中道樹品菩薩行品種善根品義趣八十六釋般若中遍學品義八十七釋般若中次第學品一心具萬行品義八十八釋般若中六喻品幻化等品四攝品義八十九釋般若中四攝品餘義善達品解佛三十二相八十種好微細義相九十釋般若中實際品義須菩提白佛若眾生畢竟不可得菩薩為誰故行般若佛云為實際故須菩提云實際眾生際異者佛云實際眾生際不異是故菩薩為利益眾生行於般若乃至建立實際於實際建立自性於自性也正十卷大智度論九十一釋般若中照明品義九十二釋般若中淨佛國土品義九十三釋般若中佛國品餘九十四釋般若中畢定品四諦品義旨九十五釋般若中七喻品平等品義意九十六釋般若中涅槃如化品義趣也九十七釋般若中薩陀波崙品九十八釋般若中薩陀波崙品餘義九十九釋般若中曇無竭品一百釋般若中曇無竭品餘義梵云薩陀波崙此云常啼也梵云曇無竭此云法誦也餘可知右大智度論一百卷佛滅度五百年後龍樹尊者傳心印外造此論釋大般若經自初分緣起至曇無竭八十九品一一解其義趣讚揚般若也據梵本全譯合有千卷什法師以謂秦人識弱又復好略故十分中存一耳十地論天親菩薩造釋華嚴經十地品中義魏代三藏菩提流支譯侍中崔光作序空十二卷十地論一釋十地品序分三昧分金剛藏菩薩入智慧光明三昧解脫月及聖凡同集請問已上諸義也二如來放光三加五請從三昧起說十地法門三釋觀喜地布施行大願大捨義四釋離垢地持淨戒波羅蜜義五釋發光地忍辱波羅蜜義六釋焰慧地精進波羅多行義七釋難勝地禪波羅蜜多義八釋現前地般若波羅蜜多義九釋遠行地方便波羅蜜義十釋不動地願波羅蜜義十一釋善慧地力波羅蜜多義十二釋法雲地智波羅蜜義然此論解十地行相法門義旨至精至當至微至妙諸宗凡注述十地法門皆取此義也谷三經彌勒所問經九卷寶積經第四十二會同本也寶積經論四卷大部中第四十三會同本各譯寶髻四法經論太寶積經第四十七會同本異譯也傳三經佛地經論七卷一親光菩薩造釋佛地經則如來勝相名稱出現修因感果之緣悉解其義趣二解如來功德殊勝等相義三解如來顯示聖教為妙生菩薩所說義四解如來淨法界中一切智變化成就義五解如來大圓鏡智一智一切智等義六解如來妙觀察智顯示受用世間隨有情類義七解如來清淨法中一切法空廣論四智於法界中成如來身到佛地至正覺也金剛般若論二卷無著菩薩受彌勒八十偈約七種義句十八住義釋金剛般若經能斷也金剛經頌三藏義淨奉詔單譯金剛般若八十偈令行聲五論金剛般若論三卷能斷金剛論三卷不壞假名論二卷已上三論天親無著功德施三菩薩約彌勒頌釋金剛般若各譯流通也法華論婆藪尊者造解法華經初分優波提舍義文殊問菩提論二卷上文殊在伽耶山頂問菩提所證佛答此義天親造論釋菩提義趣下論菩提功德菩薩發心求菩提所行差別有疾證菩提有疾得菩提在所修也虛十二卷法華論二卷前論同本各譯勝思惟梵天經論四卷一天親造釋梵天問文殊為法王子是何義其問答玄妙故作論解也二世間珍寶有種種功德以顯勝相故論其義三住於福田能消供養不能消者論其義四菩薩自在心攝取三有等妙義也轉法輪經論天親造轉法輪者以法運轉故名為輪譬如以銅為體則名銅輪以木為體則名木輪以法為體則名法輪餘義可知無量壽經論釋彌陀經中五念門一禮拜門二讚歎門三作願門四觀察門五回向門修習此五門則生彼土見彼佛也三具足經論佛為無垢光菩薩說施具足戒具足聞具足天親遂作論解此三具足義趣也遺教經論天親造釋佛所說遺教經建立菩薩行成就一切殊勝功德決定證清淨自性無我也涅槃論釋純陀大眾師子吼迦葉憍陳如等所問佛入滅正法住世義本有今無論偈云本有今無本無今有三世有法無有是處婆藪槃豆作論釋此一偈在智明者細詳之耳瑜伽師地論彌勒菩薩說三藏奘法師譯梵云瑜伽師地此云相應義定演十七地妙理如卷次中列名也堂十卷瑜伽師地論一五識身相應地謂眼耳鼻舌身識自性所依所緣助伴作業等義也意地自性謂心意識一切種子義也二意地中種子行相因體上計我我所也三意地中業識與色聚相應受胎覽緣出生果報皆與業相無差種子故也四有尋有伺地修習見天界諸勝相地獄諸苦相等義五有尋有伺地中修四禪靜慮等定相義也六有尋有伺等地中不如理作意十六因果異論勝淨吉祥等義七有尋有伺等地中宿因所造一切善惡業邊無邊論等義八有尋有伺等地中煩惱雜染業雜染生雜染由此三種計執諸惡一切行相等義九有尋有伺等地中與果門損益門等義十有尋有伺等地中欲界色界無色界諸行為緣所生污染起貪嗔邪見戒禁取等果報隨業發現差別不同等義也然其無尋唯伺地無尋無伺地此二地義相只於有伺有尋地中相兼論之不別議也習十卷瑜伽師地論十一三摩呬多地說靜慮解脫等持等至一切諸禪定相十二三摩呬多地中修習作意思惟厭壞所緣捨諸煩惱也十三三摩呬多地中定境行相也非三摩呬多地謂前所修對治三界非定相也然梵云三摩呬多此云等引也有心地即無想定也無心地即滅盡定也其間廣論相也十四聞所成地論聞性種子薰習以成善惡等義十五聞所成地中聞讚譽毀辱等為實義次說聞聖教修助道法等義定相十六思所成地自性清淨思擇所知思擇諸法獨處閑靜審諦思惟如其所聞究達諸法道理唯依於義成其定境趣也十七思所成地中勇猛精進修習不放逸義也十八思所成地中勝頻生出離道不懼後世及死戒慧薰修具足定相也十九思所成地中最善語非不愛語諦非不諦語法非非法語等義二十修所成地謂修處所修因緣修瑜伽定修果報等義相聽十卷瑜伽師地論二十一聲聞地於此分別種姓地起入地補特伽羅等義也二十二聲聞地中分別出離地離欲世間出於世間義二十三聲聞地中分別出離地密護根門防守正念二十四聲聞地中分別出離地常勤修習瑜伽經行宴坐以淨其心也二十五聲聞地中分別出離地安住禁戒具足多聞二十六聲聞地中修瑜伽處分別根門利鈍修習定相名數法義也二十七聲聞地中修瑜伽處分別緣起緣性唯法唯事唯因唯果二十八聲聞地中修瑜伽處增上戒學增上定增上慧等義也二十九聲聞地中修瑜伽習行四念處除去顛倒三十聲聞地中瑜伽第三處習修四念住安住自心而成妙定而得解脫等相也禍十卷瑜伽師地論三十一聲聞地中觀察緣起思擇十二支相分義也三十二聲聞地中如修業時於修作意如應安立等義三十三聲聞地中已得作意我當往世間趣及出世間趣等三十四聲聞地中已成辦世出世間趣乃至如來說此地相應法門也獨覺地有五義一獨覺種姓二獨覺道三獨覺習四獨覺住五獨覺行於此五法一一分別義相以明瑜伽相應定境三十五菩薩地種姓品具攝大乘相義三十六菩薩地自利他品分別三因三果也真實義品了知諸法真實性也三十七菩薩地中威力品聖威力法威力俱生威力也成熟品自性差別方便補特伽羅此云數取趣悉成熟也三十八菩薩地菩提品以如理如量二智斷煩惱所知二障以成菩提智也三十九菩薩地施品自性施一切施等義四十菩薩地戒品自性戒一切戒難行戒一切諸淨戒相等義因十卷瑜伽師地論四十一菩薩地安住淨戒律儀或違犯污染應當了知四十二菩薩地難行戒相義也忍品自性忍難行忍等義精進品自性精進一切難精進乃至九精進也四十三菩薩地靜慮品自性靜慮一切難靜慮也慧品自性慧一切難慧也然六度中皆論九義如偈云自性一切難一切門善士一切種遂求二世樂清淨如是九種相是名略說慧論中微細解說此偈義四十四菩薩地供養親近無量品供於三寶近於善友修於無量也菩提分法品分別慚愧自性依處一切法義應須猛利也四十五菩薩地中菩提分法修正四依求義不求文也四十六菩薩地菩提分中分別一切諸行無常皆苦諸法無我等義四十七菩薩地菩薩相品哀愍愛語勇猛慧施解深義能行此五法見菩薩相也四十八菩薩地住品增上戒住極喜住能成就世出世一切義利故云住也四十九菩薩地中地品一性地二滕解地三淨意樂地四行正行地五決定地六決定行地七究竟地分別境上心住地法義成就瑜伽定境五十菩薩地中行品波羅蜜行法行神通行成熟有情行建立品依如來住到如來地相好十力四無所畏及發菩提心也正覺品有餘依地有三施設一地施設安立二靜施設安立三依施設安立等相也無餘依地此地中亦有三相一地施設安立二寂滅施設安立三寂滅異門施設安立惡十卷瑜伽師地論五十一決擇五識身相應地意地前說種子此分別其義也五十二決擇身意地中諸心心所生等無間緣義也五十三決擇身意地中十不善業道也五十四決擇身意地中安立識蘊差別所依雜染由生住異相等義也五十五決擇身意地中四無色蘊立一心相也五十六決擇身意地中分位建立無想定滅盡定及無想此三種自性等義五十七決擇身意地中分別處非處善巧等義五十八決擇尋伺地法王能損害能饒益諸眾生等一切義相五十九決擇尋伺地中十煩惱幾能發業幾不能發業義六十決擇尋伺地中五緣殺生一意樂二方便三無垢四邪執五內其事等也積十卷瑜伽師地論六十一決擇尋伺地中引出愛王被比丘呵責不生嗔惱以都不見故也六十二決擇三摩呬多地補特伽羅隨煩惱義也六十三決擇呬多地中五種定相違法等持相違厚重過失等義也決擇非三摩呬多地中修四禪定相用心法義也有心地決擇分世俗道理勝義道理所依能依俱有清淨五種建立也無心地決擇分謂緣闕作意闕未得相違斷滅已生由此七故心不得生等義六十四決擇聞慧地身語意清淨起大悲成就無上法此五處觀察六十五決擇思慧地中事有非有果因乘此四思議等也六十六決擇思慧地三苦性義六十七決擇修慧地中十六種修行法義如云作意修應作意修乃至非修法修也六十八決擇聲聞地中諸行寂滅是滅諦煩惱滅得有餘依滅得無餘等也六十九決擇聲聞地中學犯出離止息羯磨此五制立等也七十決擇聲聞地中諸智光明有五勝利十五種德義也福十卷瑜伽師地論七十一決擇聲聞地中分別七種義七種喜義七十二決擇菩薩地十種發心入於正位種種法義住菩薩地七十三決擇菩薩地中安立諦攝等義七十四決擇菩薩地中無性知蜜意所行通達隨入差別瑜伽法義定境七十五決擇菩薩地中毘奈耶三聚律儀戒如佛所化也七十六決擇菩薩地中心意識祕密善巧引深蜜經中義為證七十七決擇菩薩地中分別解說瑜伽所攝義七十八決擇菩薩地中解說如實大乘引深密經中十地法門義為證此法也七十九決擇菩薩地中平等差別清淨與不清淨等一切義相八十決擇菩薩地中正位安立所學具足法住超度大乘等也決擇有餘依無餘依二地涅槃不涅槃及諸果位相分一一問一一答一一論其定境行相法義也緣十卷瑜伽師地論八十一攝釋分上分別契經文義名身句身字身語行相機請復說解有十二種義假安立諸根義名如眼耳等相也八十二攝釋分下善建立一切法離諸過具大義故法門八十三攝異門上師弟子隨聖教應作不應作也八十四攝異門下諸欲無常虛偽不實當知此中虛故無我也偽故不實也如是等義八十五攝事分中契經事行擇第一論二十四處契經所契義也八十六擇攝分中九智三相義門八十七擇攝分中二智勝利二見差別共與不共一切法義八十八擇攝分中分別正智邪智等義八十九擇攝分中分別自性所依所緣助伴隨轉苦樂不苦不樂三法門義九十擇攝分中分別重業輕業增進業不增進業思所造業非故所造業定所受業不定所受業異熟業一切業相義也善十卷瑜伽師地論九十一攝事分中契經事處擇攝於其欲界或已離欲或未離欲等義九十二聞前契經三因緣上品貪行康強端正習貪也九十三契經事緣起食諦界如偈云立等二諦等以觸為緣等有滅等食等最後如理等應知建立緣起差別前中後三際義也九十四緣起食諦界中於一切緣觸受有中九十五緣起食諦界中增上如理及不如理義九十六緣起食諦界中住自性界習增長界九十七契經事菩提分法擇攝念住正斷神足根力覺道義九十八菩提分法中破諸外道自立為師求利養恭敬自利等義九十九調伏事總擇攝分論如來所顯所說三藏聖教義相一百調伏事中依毘奈耶勤學五遍知非身非語非心等一切義也右瑜伽師地論一百卷佛滅度後九百年無著天親二大士往知足天請慈氏如來下中印土說此論明一十七地定境妙義顯揚正法也奘法師詣天竺那爛陀寺戒賢法師所稟授以歸神夏譯出流通慈恩基法師述科疏解釋今宇內頗有講者亦罕造其源蓋文理深粹義相交羅非無漏性者莫能演授耳慶十卷顯揚聖教論二十卷一無著菩薩造奘法師譯攝事品所謂五法攝菩薩藏心心所有色不相應無為八種識義相也二攝事品中論世俗諦勝義諦苦集滅道共六諦名句文身了義心及心法所行諸妙殊勝境界義門也三攝事品中分別七種義通達也四攝事品中如頌云無量諸解脫勝處與遍處無諍妙願智無礙解神通論解此偈五攝淨義品此論於諸論中最為殊勝能治內心病等也六攝淨義品中分別勝義諦名相分別真如正智等五法義七攝淨義品中計諸極微常住論汝為觀察不觀察也八攝淨義品中分別四聖行無上乘大菩提功德論諸法義等也九攝淨義品中分別十六種異論法義十攝淨義品中學十二種分別自差別至問答差別大要與瑜伽義通也尺十卷顯揚聖教論十一攝淨義品中論體處所莊嚴負墮出離多所作法等七義妙趣也十二攝淨義品中諸經體性文是所依義是能依等法門十三攝淨義品中說法師安處聽法者令生恭敬不顛倒聞十四成善巧品蘊界處緣起法處非處根諦等七種善巧妙義十五成無常品了無常苦空無我等義也成苦品成立無常相已成立苦相十六成空品空有三相自相甚深相差別相十八種義相成無性品以無我故成無性遍計依他圓成三性也成現觀品上中下三品有漏無漏過現未三世等而作觀察十七成現觀品中言加行解脫見道所斷等義也成瑜伽品發起般若瑜伽勝行也成不思議品方便思惟現觀入不思議處也十八攝勝決擇品以十種相發起最勝決擇如心差別相建立由依所緣力立眼耳鼻舌身意及一切行相等法十九決擇品中分別此中諸煩惱雜染勝決擇義也二十決擇品中決擇補特伽羅勝決擇當知由根等差別建立五種如經中所說璧四論阿毘曇集論七卷一無著造奘師譯此云對法也集諸法義成此論也三法品蘊處界三也解其建立根境所對識情妄染成善種子成惡種子等義二蘊處界因緣污染三世有漏無漏界係世間無記也三蘊處界假實根境差別相攝相應成就三品中微細解其義趣成就善巧殊勝等義四中諦品苦集道滅四聖諦謂有情生所依故諸煩惱及煩惱增上所生諸業皆名集因苦果相緣五中諦品中分別滅道諦義甚深勝義圓滿莊嚴等也六中法品決擇十二分聖教契頌記諷說緣喻事生方希論等義也一一解說及論諸法藏中得品決擇有二種義一建立補特伽羅二建立現觀伽羅及七種差別病行乃六趣出離即三乘人也七中得品分中建立現觀法義實不行究竟聲聞獨覺菩薩現觀論議品議有六自性因果業相應轉等六義論有七種論體論處論依論莊嚴論負論出離論多所作法復有言論尚論諍論毀論順論教論等義顯揚聖教頌前論解此頌耳王法正理論彌勒大士說出愛王至如來所云比丘責我外道讚我都不嗔喜不見是事故如來因為王說正理治身治國治民然此論助國聖化為妙也瑜伽論最勝子諸菩薩等造此論解瑜伽所現境義謂佛說諸經皆談此義以瑜伽為宗也廣解其義一百卷止此一卷義也意者令法久住利益有情又謂正法隱沒者令顯出已顯揚者令增盛也三摩呬多者勝定也等引定也非十卷雜集論十六卷一三法品謂蘊處界三也與前論同頌此安慧菩薩所造遂成二論大意一同廣略有異也二三法品義三三法品義四三法品義五三法品義六中諦品決擇分七中諦品決擇分八中諦品決擇分九中諦品決擇分十中諦品決擇分以此品名照前部中義可見寶二論雜集論六卷十一中法品決擇十二分聖教十二中法品義分也十三中得品建立觀境決擇分十四中得品決擇義分也十五中論品決擇自性義分十六中論品餘義然此論解釋無著所造集論義使人通會中論龍樹造五百偈以中為名中則照其實論則盡其言實非名即不悟以之為中顯其中道義也青目造論解其義什法師譯僧叡作序也一觀破因緣品十八偈論不生不滅不常不斷不一不異不來不出以此八法破諸邪見謂有人言萬物從自在天生或云韋糅天生或云和合生或云時生或云世間性生或云變化生或云自然生或云微塵生皆墮無因故說十二因緣也觀去來品二十五偈論因緣來去義不決定也觀六情品八偈論眼耳鼻舌身意情也觀五陰品九偈論色受想行識也觀六種品八偈論地水火風空色也觀染品十偈論貪嗔癡慢等也二觀相品三十五偈論生住異滅相也觀作者品十偈論所用有作法有果報也觀本住品十二偈論諸根苦樂有本住無本住也破燃可燃品十六偈論五陰受燃可燃俱不成也破本際品八偈論眾生往來生死本際不可得也破苦品十偈論苦惱自作他作自他俱作及無因作也破行品九偈論一切諸行皆是空無眾生虛誑妄取相也破合品八偈論眼見可見見者三法無有合時見是眼可見者是色見者我也三觀有無品十一偈論諸法有性有力無有定性無自性也觀縛解品十六偈論生死不可得故無縛無解也觀業品二十三偈說一切眾生皆隨業而生受報也觀法品十二偈論諸法畢竟空無生成實相法也觀時品六偈論過去現在未來三世時分因也觀因果品二十四偈論眾因和合現有果生是從因緣和合中生觀成壞品二十偈論一切世間事現有敗壞相若有成若無成若有壞若無壞等義相也四觀如來品十六偈論一切世中尊名一切智人號法王何等是如來也觀顛倒品二十四偈論因淨不淨顛倒憶想分別生貪嗔等義也觀四諦品四十偈論破顛倒通達四諦得四沙門果也觀涅槃品二十四偈論斷諸煩惱滅五陰盡名為涅槃也觀十二因緣品九偈論觀聲聞法入於第一義也觀邪見品三十一偈論過去有為無為未來有作無作現在有常無常皆妄生執計今此引歸正見也已上五百餘偈義寸十卷般若燈論十五卷一中論同本也此分別明菩薩造以灯喻無分別智照法性平等寂照之體也顯自所證深般若中道義也品目中論一同文義廣略耳觀緣品論諸法因緣生從因緣滅也二觀緣品中義分三觀去來品此中不來不去緣起差別四觀六根品眼耳等也觀五陰品受想等也五觀染染品貪嗔等也觀三相品生住滅等也六觀作者業品善不善無記業觀取者品諸根妄取一切塵境也七觀薪火品第一義中有取者猶如薪火燃可燃等也八觀生死品了知生死無自體也觀苦品第一義中有諸陰由苦故觀行品一切諸法諸行無常也和合品根塵識三和合名為觸也九觀有無品有為無為不斷不常也觀縛解品繫縛解脫俱無自性也十觀業品解業無自體第一義中定有諸行諸入生死與業合若無者不見諸行與業果合如石女兒陰五論般若燈論五卷十一觀法品解諸行我我所四大聚諸根也觀時品第一義中有時法自體為了因也十二觀因緣和合品若無因者果即不生也觀成壞品顯示諸法無成壞故觀成壞之相也十三觀如來品解第一義即如來身如來智也十四觀顛倒品諸煩惱從顛倒起無自性故觀四諦品苦集滅道四聖諦合中道也十五觀涅槃品諸染煩惱盡滅名涅槃也觀世諦緣起品覺了緣起名聲稱高遠故名佛也觀邪見品分別有為無為非有為無為非非有為非非無為也百論二卷上佛滅後八百年提婆尊者造百論摧邪顯正婆藪開士解釋什法師譯僧肇為序捨罪福品設內外為難外則外道邪見內則佛法正見破其外道亡因喪果不畏罪不修福雖持戒心不清淨也破神品外道執神為主不離死生也內則大覺性本來圓明故也破一品外道存神為一內則神已不可得何處存一故以此論破之也下破異品外云一既不存必有異也內云一已不存何有異可得也破情品外云執定有我所法現前也內云破其情塵意合正見也破塵品外云有情瓶可取令見諸物也內云非獨色是瓶瓶非現見也破有因果品外云種種果生時種種因不失內云果不見因因不見果也破無因果品外云生有故一當成也內云生無生不生也破常品外云有因法破無因法常也內云若強以為常與無常同也破空品外云有故可破無故不可破一切法空不名破一切法也內云破如可破汝著破故以有無法欲破是破汝不知耶破成故一切法空故等也廣百論本聖天菩薩造前後兩論皆釋此頌也十八空論龍樹尊者造解十八空以謂空無分別云何得有十八種耶為人法二無我是一切法通相約諸法種類不同開為十八般若經中開為二十或有經中合為十七或十六空也十二門論龍樹尊者造此論開十二門所云十二眾數之稱也門者開通出入無滯之謂也觀因緣門萬法所因推本緣會也觀有果無果門重推萬法無生而生也觀有相無相門推上三相有相無相無無相也觀緣門推因推緣而成四緣也觀門推前三門三相無生也觀十異門推其無無之相不一不異也觀有無門三相非相四相非非非一非異故非有非無也觀性品既知有無推其性非性也觀因果門無性既無因變易處則無得也觀作門無因無果則為無作也觀三時門既無作則無因故三時不可得也觀生門作為有造生為有起時中既無誰為生者也已上十二門智者見斯可知也是十卷廣百論釋一護法菩薩釋百論義大意與前論同破常品世間邪執謂法常住故此論破也二論真常真樂真我真淨等也三破我品執我我所心心數法此破去令見法身湛然也四破時品謂三世法悉不可得五破異執說剎那暫時住體故六破見品種種妄見不了如來智見無礙悟他心也七破根境品眼等諸根各取自境不真悟性八破邊執品除去非真句義邊執垢穢不依他成而得成立故此破也九破有為相品生住滅三相皆有為故破之十教誡弟子品重顯密義以顯真宗佛弟子眾當如是建立宗旨競十卷十住毘婆沙論十七卷一龍樹尊者造此論廣破小乘法令修菩薩行安住十地自利利他速登佛覺地也序品陳作論之意今直超諸位便入十住也初地品歡喜地中所修行相略說諸地法門然初地為基本也二地相品初地菩薩有何相貌釋願品欲登地位必發大願三願品義中除去諸惡願淨佛土發菩提心品其義意可知也四調伏心品調順其心不得妄失菩提阿惟越致相品於有情中行平等心也五易行品發大心丈夫志幹直造正覺也除業品於諸佛所誠心念佛懺悔往罪六分別功德品一日一夜一念念佛得福德恒沙分別布施品隨喜回向功德及諸施行法門七分別法施品既行財施必行法施也歸命相品在家人行財施勝出家人若出家行法施勝在家人也五戒品在家人可受是戒也知家過患品在家人若知家過必自捨家入道行菩薩行也八入寺品在家菩薩捨家入寺也苦行品在家出家共行法則也九四法品不敬法師祕惜法施障聽法者我慢自高除此四法修大行也念佛品在家出家菩薩當修念佛三昧此論行相也十四十不共法品分別地中四十種不共聲聞人天等法也難一切智人品金剛三昧唯一切智人有餘人無此三昧故以此為難也資二論十住婆沙論七卷十一善知不足品諸法未生未出未成未定未分別是中如來智慧得力故也云云十二讚偈品語業言詞讚佛功德念佛三昧品諸偈讚佛成念佛三昧十三喻品此中修進超聲聞等位喻所不及也略行品已略說初地行相當以說二地法十四二地業道品住此地自然不行惡法也十善業殊勝四禪定清淨等法義十五分別聲聞辟支佛品令何等人至聲聞辟支佛地解其所以也大乘品發大心行大行受大法乘大乘也十六護戒品修一切淨戒無所違犯安住離垢地也十七解頭陀品行其苦行也助尸羅果品多知多聞等為助也讚戒品戒德圓滿清淨成殊勝功德也戒報品持戒報果無量無邊功德也菩提資糧論六卷一龍樹尊者造論本比丘自在解義謂欲證佛菩提須有加行資糧始可得證也已說布施淨戒忍辱為資糧也二精進禪定般若方便願力智慧十力六神通等為資糧也三現諸神變種種利樂一切世間有情以為菩提資糧義也四百千萬劫作大福聚如須彌山以為資糧五通明一切工巧伎術利俗諦法以為資糧六四念住四無量心等法一一修習圓滿殊勝為其菩提資糧得成正覺也父十三卷大乘莊嚴論一無著菩薩造唐天竺三藏波羅蜜多譯右庶子李百藥奉勅作序其文美麗稱揚佛法也緣起品能達義智可以莊嚴大乘經論也成宗品佛說大乘真實為宗也歸依品大乘能攝三歸依法也種性品各有差別勝性相類貌惡功德各各不同也二發心品菩提智種也二利品自利利他也真實品第一義實相也神通品變化妙境利有情也成熟品信淨心捨等一切善成熟三菩提品得一切種智圓滿一切難行行也四明信品信相差別所謂過現未內外正信也五述求品信求三藏教法求染淨求唯識唯心光也六弘法品以求法得法能為人演說謂弘法也七隨法品菩薩能隨法修行其行也教授品依如來修多羅法教授也業伴品教授起善業方便為伴以成莊嚴行也八度攝品行六度行自度度他自攝攝他於此行中各有差別自性業因果相應也九供養品供養如來大師也親近品奉覲善知識也梵住品四無量成莊嚴也十覺分品菩薩覺羞恥覺慚愧覺修習止觀覺離障覺過失覺證知也十一分別覺分中義相也十二功德品菩薩行六度行所得功德十三行住品菩薩修諸行位顯示相狀安住十地敬佛品菩薩禮佛讚佛一切偈語成三業圓明也事十卷大乘莊嚴論一馬鳴菩薩造此論略說一義便引教中緣起為證顯大乘相莊嚴佛功德也引諸婆羅門笑商人優婆塞禮佛塔寺因緣二聽法者有大利益增廣智慧引師子國人偷國王珠詣佛所不殺等一切因緣三堅持淨戒唯人宗仰引草繫比丘因緣四欲得供養應斷諸使引老母不輸稅果詣王所指三羅漢皆我子我生也五親近有智身心俱淨引比丘乞食長者家鬼走因緣六無實功德不堪受信心施引王禮塔塔碎問故不是佛塔也七有漏無漏教習有異引目連教二弟子久不獲勝法八治身病心病唯有佛語引承眾淚醫王子眼明因緣為證九智者應斷嗔恚引拘睒彌比丘鬪諍分為二部等因緣十讚佛得大果報有一法師讚迦葉佛生天如來出現時得果也君三論大乘莊嚴論五卷十一少智人見佛尚發心何況有智慧人也引波斯匿王請佛安居取牛乳等緣十二不惜身命以求於法引尸毘王割肉濟鷹緣十三供養佛塔功德甚大引波斯匿王到佛所聞香等因緣十四佛出世最為希有雖是女人亦得解脫引佛姨母因緣十五國土廣大知其苦惱捨離而去引佛因中為王等緣順中論二卷龍勝菩薩造此論入大般若波羅蜜門顯中道以順中觀論義明不生不滅不斷不常不一不異不來不去佛已說因緣斷諸戲論法故我稽首禮說法中師勝中觀論般若燈論亦以此偈為作論之先唱引意義也攝大乘論三卷此論前後三譯今止於唐譯錄義曰十卷攝大乘論釋天親菩薩造釋無著所造大乘論然有四譯今止錄唐譯嚴三論攝大乘論釋五卷同前帙共十五卷真諦所譯也基法師愷法師各有序遷法師曾講也攝大乘論本三卷上能攝蘊積包含攝藏名攝也其義廓周體性該博名大也所行功德能至能證名乘也窮源盡理清徹朗暢名論也總標綱要分諸佛世尊有十相殊勝語一所知依殊勝語二所知相殊勝語三入所知相殊勝語四入因果殊勝語五修差別殊勝語六戒殊勝語七增上心殊勝語八增上慧殊勝語九彼果斷殊勝語十聲聞乘中不見說大乘中處處見說真佛說也所知依分如來於大乘經說無始時來一切種子依阿賴耶識此云藏識由此得有諸趣一切有生雜染法於此攝藏為果性此識於彼攝藏為因性故說名阿賴耶中所知相分一依他起相二遍計相三圓成實相依阿賴耶識現諸身諸識諸趣也入所知相分誰能悟入所應知相大乘多聞薰習相續由善根力所住持故能入也彼入因果分由施戒忍精進禪定智慧故入唯識也何以故六度為彼果故云入也云云下彼修差別云何可見菩薩修十地安立治十種無明及諸障法也增上戒分攝善法戒律儀戒饒益有情戒建立一切殊勝戒也增上心分大乘光明集福定王賢守健行等以顯阿賴耶心相也增上慧分無分別智若自性若所依若因緣若所緣若助伴乃至若究竟也果斷分無住涅槃已捨雜染不捨生死二轉依為相也攝大乘論二卷同本異譯與十卷攝大乘論釋論釋前三卷論本也隋笈多所譯行也敬十卷攝大乘論釋一無著菩薩造論本天親菩薩造此論釋義大唐三藏玄奘法師重譯也釋綱要分中論佛教勝相二釋所知依分論其識情也三釋所知分中雜染相續不相應也四釋所知相分遍計依他圓成三相也五釋所知相分中三性自性顯現也六釋所知相分多聞依阿賴耶識所攝也七釋彼入因果分六度行相為果也彼修差別分十地昇進不同也八釋增上戒分謂菩薩三聚戒也九增上心學分釋大乘光明等相也釋增上慧學分加行無分別智也釋果斷分無住涅槃已捨雜染也十釋彼果智分諸佛自性身受用身變化身法身甚深最甚深於大乘中顯示甚深之相也孝十卷攝大乘論釋無性菩薩造與前論本品分一同各譯也右攝大乘論本三卷釋論兩解二十卷傳入中國陳真諦譯成十八卷元魏佛扇多譯本二卷隋笈多三藏譯十卷唐三藏奘法師譯二十三卷共七部總五十三卷也然皆論佛教勝相分別識情章分一同大意無別其間攝義引緣小差耳今止於奘法師所譯一本一釋十三卷內標其義分俾見其源其派可知矣當四論佛性論四卷一天親菩薩造此論明佛說一切眾生皆有佛性令以生尊重心故緣起分如來為除五過失故說眾生悉有佛性一令離下劣心二離慢下品人三離虛妄執四離毀謗真法五令離我執既自知有佛性五過自除也破小乘執聞佛說法不了空性謂闡提人不得涅槃也破此執故破外道執外道不知有佛性執自然性也且火不能轉為水以此喻破也破大乘執菩薩聞法有不了中道第一義執一切有法皆由俗諦一切無法皆由真諦破此也二顯體分三因如品佛性體有三因三性一應得因應得菩提故二加行因由此心得菩提分法三圓滿因由此心得因圓果滿故三性品一無相性二無生性三無真性此三性攝如來性由遍計依他圓成三性所顯現也如來藏品所攝藏隱覆藏能攝藏顯如如智如如境或現或不現藏中本具如來功德智也自體相品佛性有十種自體相因相果相事能相總攝相等也分明因品佛性有四因能除四障得如來性義一信大乘二無分別般若三破空三昧四行大悲也果相品行前四因為清淨佛性對治四倒如來法身四相功德波羅蜜是其果也事能品於生死苦生厭離於涅槃求樂願也以此二事為能故三總攝品攝因攝果是如來性清淨法身清淨因佛智德生因佛恩德因以此三因信樂大乘修習般若禪定也分別品分別如來性有因地如果地如俗如即真如真如即俗如也階位品不淨位眾生界也淨位菩薩地也最清淨位佛地也遍滿品應凡夫聖人及諸如來無分別性平等通達相並隨道理遍滿也但前三位一顛倒二無顛倒三究竟以此義故為差耳四無變異品佛性本無變異隨染淨緣前後中際轉依故變異也若畏說空法不入佛性也佛性即空法空無變異也無差別品佛性已至極清淨約有四義立四名就四人顯四德一切佛法不相離一切處皆如非妄想倒法本性寂靜故以此四法義可見也決定藏論三卷上如來藏決定說五識地心地及阿賴耶識種子若離此根識無執持義也中分別阿賴耶識種子相因相緣下分別五陰相入觸等法皆從賴耶識種子心起也辯中邊論頌彌勒大士說三藏奘法師譯中邊分別論二卷上天親造立七種義明中道也一相二障三真實四對治五修住六得果七無上乘也分別相中除虛妄分別能執所執非空不空顯中道義也障品除煩惱障取捨障平等障重障惑障也真實品根本真實相真實因果真實細麁真實等十真實也下對治修住品三十七品對治四念處修住見道位也修住品修習一切善法得入諸果位次第位也無上乘品一修行無上二境界無上三集起無上修行者謂修十波羅蜜中道義故所證境界及所化境集無量功德起諸善法也竭五論中邊論三卷前論同本寶性論四卷一佛說一切眾生性中本具佛法僧三寶也論頌及解教化品中金剛句義也二佛法僧寶妙法身功德殊勝義也三明一切眾本具如來藏性謂佛性法身真如悉遍滿一切處故四煩惱所纏品謂此纏縛眾生三寶眾生三寶性不能現前喻中萎花貧女輪王破屋巖蜜糖等為喻也為何義故說此論真如佛性一切智者境界故身轉清淨成菩提品前說有垢真如今說無垢真如無漏法界得淨妙身也如來功德品真如法身一切功德如摩尼寶也自然不休息佛業品如來教化眾生業自然而行常不休息常作佛事也校量信功德品有智慧人於彼法中能生信心依彼信者所得功德無邊無量殊勝也大乘成業論天親造此論解身口意三業所造所作或善或惡至於成佛與不成佛皆由此業成就論前論同本因明正理門論本大域龍樹菩薩造凡立一法說一義立宗立因有能破能立所成能成簡持義相違義簡別義比量義現量義立喻義隨自意樂明此正理破邪見也力九論因明正理門論前論同本因明入正理論能破與能立及似唯悟他現量與比量及似唯自悟以此一頌成此一論明宗因量也唯識二十頌天親見契經中說三界唯心作此論解其頌義以暢玄旨故云二十論也唯識三十頌天親造護法菩薩等約此頌成唯識論初二十四頌明唯識相也次一頌明唯識性也後五頌明唯識行位也唯識論前論同本大乘唯識論同本各譯轉識論轉為眾生轉為法身一切所緣不出此二種相也能緣即阿賴耶識果報識六識一切有為法依止種子也顯識論一切三界但唯有識一顯識二分別識也與前轉識論同本出無相論中皆真諦所譯也成唯識寶生論五卷中宗皇帝龍興三教序三藏義淨譯也忠十卷成唯識論一天親菩薩將入滅時作三十頌後二十八家解其義又復十六家皆不能盡其美意護法菩薩安慧等十師解成一百卷三藏奘法師撮其要樞譯成十卷沈玄明作後序慈恩基法師述科疏解義造此論謂謬妄習人空法空不了煩惱所知障今除我法二執斷二種障生其正解證二空理於唯識如實知深妙也二解兩頌半明阿賴耶識異熟一切種子作意受想思觸處執受無記能變所變能藏所藏與雜染互相緣也三明阿陀那此云我識如瀑流種子難見難降微細不可了始終明第八識相若或依教則無邊定也若約悟性則頓現也四解三頌半能變識相恒審思量勝餘識故我癡我見我慢我愛四煩惱常俱隨其所生所繫除羅漢果入滅盡定五前已明八識七識今此明能變識差別有六種隨根境所謂眼耳鼻舌身五藏皆依意識妄取六塵境也六解三頌半明信愧無貪嗔癡勤安不放逸行捨不害三性清淨無垢善住心相深忍樂欲心淨為性也七明根本識一切唯識一切位一切境相智轉所依若於此了四智相應於唯識理決定悟入便證現量境界也八明十依處及諸習氣發業潤生煩惱十二支能令生死相續遍計依他圓成三性心心所執一切唯識性等義九現前立少物謂是唯識性以有所得故非實住唯識若時於所緣智都無所得爾時住唯識離二取相故無得不思議是出世間智捨二麁重故便證得轉依此三頌明唯識見道不見道由此說十地相二愚三障所斷所證也十即此無漏界不思議善常安樂解脫身大牟尼名法此謂成佛偈明轉四識為四智及四涅槃一清淨自性二有餘依二無餘依四無住處清淨法身成變化身受用身證二轉依果相於斯若悟證唯識妙性矣右唯識頌本及唯識顯識轉識大乘寶生成唯識等論皆同本異譯或廣或略也此乃天親菩薩指求法高士明八識相分悟妙性現前得解脫身透死生矣但微細難入造心易退故講習者似乎牛毛而達者未見幾于麟角誠可憫哉則七論大丈夫論二卷上提婆尊者造此論若修福修悲修智名大丈夫若不如此非大丈夫也或修一法名善丈夫耳施勝品施勝昧品施主體品施主乞者增長品勝解施主品增長品恭敬乞者品施慳品財物施品捨一切品捨陰受陰品捨身命品現悲品法施品已上十四品皆論大丈夫能為大施大悲也下菩提心品功德勝品勝解脫品饒益他品勝施他苦品愛悲品覺悟儜丈夫品大丈夫品說悲品施悲淨品愛悲勝品智悲解脫品發願品等同發願品勝發願品已上十五品皆論大丈夫大菩提心大智大願勝妙法義也入大乘論二卷上堅慧菩薩造此論謂薄福之人於大乘法不生疑心若生疑心必應聽法若聞法已即得開悟心地也下論十地位中法門謂菩薩妙行甚深微細然論旨欲令有情於大乘法悟入妙理疾證菩提大乘掌珍論二卷上清辯菩薩造此論廣破諸邪宗令於如來大乘法易證真空速入法性以此如掌中之珍可愛樂故即便見故示之不遠故也下已悟入有為性空復悟入無為性空及令入無分別慧無分別行等義也大乘起信論馬鳴菩薩造此論起大乘信根作五分說一因緣分說八種義明作論意令有情於大乘法起信歸正見也二立義分一法二義法謂心也義謂體相用三大也三釋分一顯示正義依一心法有心真如門心生滅門也二對治邪執謂一切邪執皆依我見若離我見邪執自無也三信成就發心直心深心大悲心也四修行信心分謂信根本所樂一切智心修六度妙行及止觀境界也五勸修利益分若人依此論起信心修習決定至究竟位證如來無上正真之道也寶行王正論佛為寶行王說此一卷頌明為國王須行正理治化生民及安自身不行放逸尊師重道聚清淨功德弘揚佛法也大乘五蘊論天親造此論色蘊四大所成也受蘊領納苦樂不苦不樂三也想蘊取種種境界也行蘊諸心所法不相應也貪等不息也識蘊於所緣境了別為性亦名心意採集所攝也廣五蘊論安慧大士造義與前同也盡八論三無性論二卷上謂一切法不出三性一分別性二依他性三真實性論此三性法義以破諸邪宗也下明如理如量二智境界等一切義也發菩提心論二卷上天親造此論令菩薩行者發大菩提心發大願行起大方便求大智慧興大悲種悟如來大法行大施持大戒修大忍一一行此大行契本來大心成大果也下精進禪定智慧如實義空無相功德分別菩提心所修如前廣大妙行法義以成正覺也起信論實叉難陀所譯也若賢首國師所見所悟作科疏流通者真諦所譯也前已標分義旨一同方便心論明造論品明負處品辯心品相應品此四品中義破諸邪宗所執方便接引入佛法大乘正見也如實論反質難中無道理難道理難墮負處三品中明計執常無常因緣心所法義破邪見滯著也無想思塵論陳那菩薩造此論令六識外塵境起時思量分別析為隣虛漸入無相合虛空也觀所緣緣論陳那造此論明眼耳等五識以外境為所緣意識為能緣今論俱非無實體故此非理等義也觀所緣論護法菩薩造釋前陳那所造論也旨義一同命十六論迴諍論龍樹尊者造此論明一切法本因緣言語所執世間相皆空迴外道邪執諍論何以故諸法既空何可諍也邪心自正耳緣生論聖者鬱楞迦造先明從一生三從三生六一謂無智無明也三謂身口意也六謂眼耳鼻舌身意也轉生名色二也復生六入也展轉生諸渴愛煩惱苦樂因果一切世間諸法皆相因相緣而生故有是法也六門教授論無著論本天親釋義本習世定及出世定故求解脫人積集勝行令心善住名之為定一師資圓滿二所緣圓滿三作意圓滿此三圓滿也一有尋有伺二無尋有伺三無尋無伺此三定也已上共成六門以此習成定壹輸盧迦論龍樹尊者造大旨與如實論義通貫也一切法無自體自性空無常也謂諸習學道者於如來法海中生懈倦故造斯論知四聖眾於此義中得利益故十二因緣論淨意菩薩造此論明十二支自煩惱業苦三法中起展轉輪回不息除去無明根本也外道破四宗論外道僧佉論師謂覺我一也執一為宗毘世師論師謂覺我異也執異為宗尼揵子論師謂覺我俱執一切法俱為宗也若提子論師謂覺我不俱執一切法不俱為宗也提婆尊者作論破此四宗令入中道也提婆破外道涅槃論方論師風論師韋陀論師裸形論師苦行論師淨眼論師無因論師時論師服水論師力論師等二十種外道隨所見執為涅槃提婆作此論破之令覺悟觀總持論頌陳那造此頌明名聲義智連屬能詮所論以總性相方得解了佛法中正趣正見義也解捲論於藤起蛇知見藤則無境若見藤分已藤知如蛇知論釋此偈明強分別非實有法除其執著也取因假設論假施設事而宣法要欲令有情方便趣入真如作意遠離邪宗永斷煩惱取因假設也手杖論有情自無慧解便生邪執由此沈淪嶮惡道中今作此論喻手中執杖不落邪徑過嶮處故也百字論提婆造此論破我見有相無相一異外道邪見令歸佛法不滯偏執成中道正見也掌中論於繩作蛇解見繩知無境若了彼分時知如蛇解謬陳那釋此頌明相似之事未能了彼差別相止觀門論頌天親將諸修不淨觀及諸禪定觀境義成此頌令修觀定者易習耳大乘法界無差別論堅意菩薩造此論明法界性如來藏性真如善性眾生界如來法身不生不滅不來不去無差無別一體無二也大乘百法明門論天親菩薩於本分事中略出三藏奘法師譯論文云如世尊言一切法無我一切法有五一心法說八謂眼識等也二心所有法有五十種也遍行別境善煩惱隨煩惱不定等五位中分也三色法有十種謂眼耳聲香等也四心不相應行法有二十四也得命根眾同分異生性無想定滅盡定名文句身等也五無為法有六義也謂虛空擇滅非擇滅不動滅想受滅真如等六也無我有二也謂人無我也法無我也已上計一百法慈恩有科疏耳右大乘經律論總六百三十八部計二千七百四十五卷共二百五十六帙隨其所見撮于綱目若即而推之經則華嚴圓覺金剛法華楞嚴維摩心經彌勒上生下生金光明涅槃後分盂蘭盆律則梵網菩薩戒論則瑜伽起信唯識因明百法如上經律論各有科疏解釋流通天下其餘不言可知三十四尾傅言
