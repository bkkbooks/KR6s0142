如是般若是無邊佛言如是般若猶如虛空無邊際故如是般若是平等是遠離是無足迹是佛十力是無所畏佛言如是難屈伏故一一是問一一是答二百九十八難聞功德品時天帝念言若人曾親近諸佛聞是般若功德名字書寫受持如理思惟為他人説若人聞是般若不信不樂心不清淨是人未曾承事佛菩薩衆亦不知云何是般若布施乃至佛菩提亦不信解內空等法若人成就善法當學般若天帝白佛修行般若云何住色云何住受想行識云何習色云何習受想行識佛云若於色不習不住是為住習何以故所住習色等法不可得故例之若於真如非住非不住非習非不習是為住習真如何以故真如前後中際不可得故諸法為例二百九十九行般若時不行佛十力甚深性是行般若不行四無所畏甚深性是行般若又此一例關諸法義三百舍利子白佛我樂説譬喻若人夢中修布施等求佛菩提當知此人漸次不久成就何況菩薩覺時修布施等而不速成正覺佛言如是如是然譬喻亦多不可具録佛言若自行布施等教他行布施若自修布施等教他修布施等善現白佛菩薩云何修行般若速得圓滿佛言修行般若不見色若增若減是行般若速得圓滿一切諸法準此例調十卷大般若經三百一菩薩修行般若時於布施等不起不思議想是菩薩修行般若速得圓滿依此例三百二善現白佛如是般若是清淨聚佛言如是色清淨故般若清淨等例若有受持如是般若常不遠離布施等一切善法佛滅度後五百歲此般若漸次流布東南方以至西北方等國王大臣而為外護普利有情等三百三魔事品善現白佛若有人為證無上菩提修諸行時留難魔事佛言菩薩樂説法要辨不即生是為魔事所修般若布施等法難得圓滿菩薩樂修勝行辨乃卒生是為魔事嚬呻欠呿忽然戲笑互相輕蔑身心擾亂心生異解欻有事起不得滋味便棄捨去皆是魔事捨此經典求學餘經餘是枝葉不能引發一切智智此是根實餘經即得二乘四果不得無上佛果如至海岸返觀牛迹等喻皆為魔事書寫此經衆辨競起所謂樂説布施乃至無上菩提何以故甚深般若無樂説相難思議故無思慮故無生滅故無染淨故無定亂故無名言故不可説不可得故善現白佛甚深般若可書寫不佛言不可書寫何以故此般若甚深經中色自性無所有不可得等法例之三百四能説法者於六度善巧聽者不能善巧兩不和合不獲説聽書寫修習是為魔事聽者有方便善巧説者無方便善巧説者已得陀羅尼聽者未得説者離貪聽者未離説者恭敬聽者不恭敬説者一身無纍聽者多將衆人説者不為財利聽者為財利反後皆是兩不和合是為魔事復次有諸惡魔化作比丘及種種形像來作般若障難書寫受持讀誦説聽皆不和合是為魔事三百五佛母品譬如女人生育諸子若五若十二十三十四十五十或百或千其母得病諸子各各勤求醫療使無病惱各作是念我母慈悲生育我等教示事務我等豈得不報母恩如來亦復如是常以佛眼觀視護念甚深般若何以故般若生育我等一切佛法能示世間諸法實相十方如來般若等法皆由般若得生一切內空等法亦由此生出現世間利益等三百六如來應正等覺依甚深般若如實知色等法何以故別無相狀無作用無戲論無所得如實知真如法性三百七佛言甚深般若由不緣色而生於識是為不見色故名示色相例諸法三百八甚深般若能示諸佛世間自性空相名諸佛母亦能示諸佛世間實相云何般若能示諸佛世間自性空相佛云般若能示諸佛色世間自性空相乃至諸佛無上正等菩提世間無性自性空相由如是義名諸佛母又復色等法純空相復純無相皆得名諸佛母不思議等品善現白佛甚深般若為大事故出現於世為不思議故為不可稱故為無數量故為無等等故出現於世佛言如是如是如汝所説善現復白佛云如來性智不思議稱量等等為更有餘法佛言非但如來色亦不可思議不可稱量等等乃至無上菩提亦復如是三百九善現白佛何因緣故色不可施設不可稱量不可思議無數量無等等性佛云色不可施設思議稱量數量平等不平等性例一切法三百十善現於意云何色不可思議不可稱量無數量無等等無自性中色不可得等辦事品善現白佛甚深般若為大事不可思議稱量數等故出現世間佛言為成辦布施等法出現乃至為成辦佛菩提出現世間復云甚深般若不取著色故出現世間能成辦事乃至佛菩提等例之陽十卷大般若經三百十一善現我亦不見色可取可著我亦不見有法能取能著我亦不見由是有取有著由不見故不取由不取故不著例一切法衆喻品善現白佛若菩薩聞是般若深生信解思惟修習從何處沒來生此間佛云或從覩史天來或從諸天來或信或不信或先世聞布施淨戒等法則信或不曾聞布施淨戒等法則不信三百十二不以布施等法攝他有情不以內空法攝他有情若不隨順修行般若如是等人隨二乘地故於般若不能攝他隨順等三百十三若菩薩乘補特伽羅從發心來無方便善巧修行般若布施等法作如是念我能行布施等法彼受我施等不名修學般若真善友品善現白佛初業菩薩云何修行般若等法若真善知識為説般若等法時汝善男子應作是念我所修布施等法普為一切有情回向菩提例一切法三百十四菩薩雖知諸法自性皆空如夢幻等發趣無上菩提為令世間得安樂故菩薩所修一一發趣無上菩提一一令世間得歸依故等三百十五善現色究竟中無如是分別謂此是色受想等法亦如此例善現譬如巨海大小河中高顯可居周回水斷説各洲渚如是色前後際斷諸法一一如是前後際斷三百十六善現一切法皆以空為趣彼於是趣不可超越何以故空中趣不可得故一切法皆以無願為趣無作無生無滅無染無淨無所有以幻以夢響像光影陽焰等為趣如前例之趣智品善現白佛信解如是般若當何所趣佛言當趣一切智智善現復白佛趣一切智智者能與一切有情為所歸趣故佛言如是如是三百十七菩薩所擐甲胄不屬布施何以故布施畢竟無所有故非菩薩非甲胄故諸法例之三百十八善現白佛如佛所説菩薩相續隨順趣向臨入一切智智行般若者是為行色不為行受想行識為行眼處不為行耳鼻舌身意處等法行與不行不行而行一切智智即色等法色等法即一切智智乃至一切法真如即一真如無二無別例之真如品諸天散花佛上各作是説色即是一切智智一切智智即是色乃至一切法皆與一切智智相即為例見義三百十九佛告諸天子言如是如是如汝所言色即是一切智智一切智智即是色乃至諸法三百二十佛言諸天子世間有情多行攝取行起我我所執謂色是我是我所乃至佛菩提是我是我所雲十卷大般若經三百二十一諸天子若菩薩攝取三摩地門此云正心行處故行為棄捨三摩地門不能修般若等法不能證內空外空等法例三百二十二佛正説真如相時三千世界六種震動復以香花奉散於佛及善現上而白佛言世尊未曾有也善現由真如故隨如來生善現告諸天子言當知上座善現不由色故隨如來生不由真如故隨如來生不離故隨如來生不離真如故隨如來生乃至諸法皆如是例三百二十三舍利子白佛何因緣故菩薩修空無相無願解脫門不攝受般若無方便善巧便證實際取聲聞獨覺果若有方便善巧不證實際便趣無上菩提云云三百二十四布施於無上正等菩提有退屈不舍利子言不也離布施於無上正等菩提有退屈不舍利子言不也一一如是問如是答菩薩住品善現白佛若菩薩欲得無上菩提當於何住應云何住佛言當於一切有情住平等心不應住不平等心當於一切有情起平等心不應起不平等心乃至當於一切有情起大慈大悲大喜大捨等心不應起等三百二十五菩薩欲得無上菩提應自起無忘失法亦勸他起無忘失法恆正稱揚無忘失法歡喜讚歎起無忘失法者將此為例於色處無障無礙於色處不攝受於色處不可攝乃至菩提等例不退轉品善現白佛有何狀貌行相知菩薩住不退轉佛言能觀一切法無行無狀無相是為不退轉於色不退轉名不退轉乃至於佛正覺不退轉名不退轉三百二十六菩薩成就柔潤可愛可樂身語意業於諸有情心無罣礙如是諸行狀相是為不退轉慈悲喜捨身語意業如是狀相是為不退轉等諸法之義三百二十七於布施想退轉名不退轉於淨戒安忍等想退轉名不退轉例諸法三百二十八巧方便品善現白佛不退轉位菩薩成就廣大勝功德聚唯願如來為説甚深處令安住其中能修布施速得圓滿能修一切等速得圓滿三百二十九菩薩於如是甚深處依深般若相應理趣審諦思惟稱量觀察應作是言我如甚深般若所説而住所説而學等法三百三十佛言如是如是不可説義無增無減布施亦無增無減淨戒等法一一例之佛言諸法真如是無上正等菩提善現白佛云何謂諸法真如佛言色真如是正等菩提乃至菩薩摩訶薩真如是正等菩提願行品佛言善現菩薩修行布施見諸有情衣食乏及作是思惟云何救濟不顧身命勤行布施修行淨戒見煩惱熾盛更相殺害修行安忍見更相忿嗔毀罵陵辱修行精進見懈怠懶墮棄捨三乘修行靜慮見貪欲嗔恚昏沈睡眠修行般若見愚癡惡慧正見俱失修一一行見一一事一一發願一一救度圓滿行願共成佛果騰十卷大般若經三百三十一菩薩修六度行見諸有情繫屬主宰不得自在我當勤求方便令得自在通前法義殑伽天品爾時會中有一天女名曰殑伽從坐而起白佛言我當修行六度妙行嚴淨佛土利樂有情將成佛時亦如今佛世宣説般若即以天妙金花散佛及衆佛即微笑記曰汝將來成佛號曰金花如來悉如其願三百三十二善學品菩薩云何習三摩地入空三摩地云何習近入空無相無願三摩地乃至習近四念住等法一一問答三百三十三善現有魔執持但聞名字忘失執著所謂蘊魔死魔天魔煩惱魔是人未能修習布施等法便不了色乃至不了無上平等菩提例諸法三百三十四善現白佛菩薩若如是行則不行色乃至不行菩提等三百三十五善現假假南贍部洲皆得人身便教修菩薩行證無上菩提所得福聚不如有人於大衆中宣説般若所得功德一一四大洲有情類一一校量福聚不如宣説般若何以故般若出生一切善法故斷分別品善現白佛一切作意皆自性離自性空云何菩薩不離般若相應作意及一切智智佛言知一切法及諸作意皆自性離自性空如是離空非聲聞作非獨覺作三百三十六世尊為即五眼空虛非有不自在性不堅實性能行般若不不也善現云世尊為離五眼空虛非有不自在性不堅實性能行般若不不也乃至無上菩提如是例可見三百三十七巧便學品天帝白佛如是般若最極甚深難見難覺不可尋思超尋思境聰慧微妙智者所證一切分別畢竟離故佛言如是如是三百三十八阿難白佛云菩薩何共住佛言菩薩共住相視當如大師展轉念彼是我等真善知識與我為伴共乘一船我等與彼學處學時及所學法亦無有異如學布施等三百三十九菩薩為念住盡故學是學一切智智不為四正斷等盡故學是學一切智智乃至不為菩提三百四十佛言如汝所説不為布施等盡故學是一切智智不為離故不為滅故不為無生故不為無滅故不為本來寂靜故不為自性涅槃故是學一切智智一一例之善現布施真如盡滅斷不不也菩薩於真如如是學是學一切智智致十卷大般若經三百四十一願喻品時天帝作念言若菩薩般若等尚超一切有情之上況得無上菩提安住內空等法尚超一切有情之上況得無上正等菩提三百四十二善現般若畢竟離內空等法乃至一切法非畢竟離般若無分別淨戒等法亦無分別乃至色等法無分別堅等讚品舍利子白善現行般若時為行堅實法為行無堅實法答云為行無堅實法不為行堅實法何以故般若無堅實布施等一切法皆無堅實一一法例之三百四十三佛言諸天子色離故有情離受想行識離故有情離如是例一切法三百四十四佛言諸天子地界離故空無相無願解脫離如前例諸法三百四十五佛言諸天子極喜地離故布施等法離例三百四十六佛告善現何因緣故菩薩於般若心不沈沒答云一切無所有故心不沈沒一切法遠離故心不沈沒囑纍品天帝白佛我如是説如是讚如是記為順如來法語律語於法隨法無顛倒記不佛言如汝所説無顛倒記天帝白言善現所説無不皆依空無相無願諸有所説無不皆依四念住四正斷四正勤等一切諸法三百四十七慶喜若男子女人於此般若讀誦通利如理思惟為他人説分別開示令其易了則為受持三世如來無上菩提付囑阿難勿令忘失十方界中廣宣流布無盡品善現白佛此甚深般若為無盡不佛言實為無盡猶如虛空不可盡故云何應引般若佛言色無盡故應引般若乃至無上菩提無盡故應引般若三百四十八布施虛空無盡故應引般若如前例諸法義三百四十九相引攝品善現白佛云何菩薩安住布施引攝淨戒佛言以無攝受無慳吝心修布施時與諸有情回向無上菩提住慈身語意業是安住布施引攝淨戒例一切義三百五十云何安住靜慮引攝安忍佛言安住靜慮修學安忍觀色如聚沫觀受如浮泡觀想如陽焰觀行如芭蕉觀識如幻事作如是觀時於五取蘊作不堅固想常現在前復作是念諸法皆空無我我所色是誰色受是誰受想是誰想行是誰行識是誰識六度互相引攝起諸禪定神通一切諸法如前思之雨十卷大般若經三百五十一多問不二品善現白佛若菩薩成就如是善巧方便發心已來經幾時耶已曾親近供養幾佛已曾植幾善根佛云已經無數百千俱胝那庾多劫事殑伽沙等佛修布施等法無有不圓滿者讚此般若攝受諸法種種譬喻一切諸法若無般若不得名為波羅蜜多善現云此甚深般若於何等法無取無捨佛言於色無取無捨乃至於正等菩提無取無捨却復一一問又復答云般若不思惟色無取無捨乃至不思惟正等菩提無取無捨等三百五十二佛言甚深般若於色不思惟一切相亦不思惟一切所緣如是不思惟乃至佛菩提亦如是例三百五十三佛言若菩薩思惟色思惟受想行識則染著欲界色界無色界若染著欲界色界無色界則不能具足修菩薩行證得無上菩提若不思惟色等則不染著三界則能具足修菩薩行證菩提三百五十四佛言菩薩作如是念甚深般若遍能攝受布施等法乃至佛菩提等例三百五十五佛言若菩薩行深般若時不觀色若常若無常若樂若苦若我若無我若淨若不淨若寂靜若不寂靜若遠離若不遠離乃至菩提如是例三百五十六佛言菩薩常作是念我不應住眼界不應住耳鼻舌身意界何以故眼界非能住非所住耳鼻舌身意界非能住非所住是菩薩能與布施六度等法常共相應不相捨離乃至佛菩提依如此例三百五十七佛言過去未來現在諸佛不以四念住護念是菩薩摩訶薩不以四正斷護念是菩薩摩訶薩三百五十八云何布施實際相云何淨戒等法實際相佛言菩薩如實了知而於中學於一切知實了知略廣之相無布施際是名布施實際相例之三百五十九善現白佛云何應知一切法略廣之相佛言如實了知一切法不合不散善現云何等法不合不散佛云色不合不散乃至佛菩提不合不散諸法例之三百六十佛言菩薩行般若時於色學不增不減乃至於菩提學不增不減露十卷大般若經三百六十一佛言菩薩行般若時應觀諸法自相皆空故學如是應於色不起作諸行若有若無故學乃至諸法如是例三百六十二佛言菩薩修行般若時雖於諸法常樂決擇而不得色亦不得受想等法乃至佛菩提等三百六十三善現白佛為住勝義證無上道耶不也為住顛倒證無上道耶不也若不住勝義顛倒證得菩提則世尊不證得無上正等菩提耶不也佛言我雖證得菩提不住有為界亦不住無為界內空等諸法如所化者欲行般若甚深義行無常義苦義空義無我義乃至不應行貪欲義非義以至色等義非義等例實説品善現白佛如是般若極為甚深諸菩薩不得有情亦復不得有情施設而為有情求無上道譬如有人欲於無色無見無對無依空中種樹彼極為難等種種演説法義三百六十四佛言若由此真如施設地界即由此真如施設火水風界若由此真如施設水火風界即由此真如施設空識界若由此真如施設空識界即由此真如施設無明等法次第如是相因例之三百六十五佛言一切法皆以空為自性一切法皆以無相無願真如法界法性等為自性善現白佛若一切法皆以無自性為性者初發無上正覺心成就何等善巧方便能行布施等行巧便行品善現白佛如來常説行菩薩行何等名為菩薩行何處行菩薩行佛言常色空行菩薩行乃至菩提空行菩薩行等例三百六十六佛言菩薩行般若時不以二故攝受布施等法何以故一切愚夫皆依二故一切善法不得增長諸菩薩行不二故而得增長遍學道品善現白佛菩薩具最勝覺受行如是深法於中不求果報佛言於中不求果報自性無動故善現云於何等自性無動佛言能於色自性無動乃至無上菩提無性自性無動三百六十七善現白佛有性法無性法能為現證不不也佛言離四句非有非無絶諸戲論以何為戲論佛言觀色若常若無常是為戲論乃至觀佛菩提若常若無常是為戲論三百六十八佛言菩薩行般若時應觀色常無常不可戲論故不應戲論乃至佛菩提亦如是例三百六十九佛言菩薩行般若時應觀大慈若常若無常不可戲論故不應戲論諸法同例三百七十善現白佛若一切諸法非相應非不相應無合無散無色無見無對一相所謂無相佛言如是如汝所説若色非相應非不相應無合無散等乃至一切法如是例結十卷大般若經三百七十一佛言修遣無明亦遣此修是修般若行般若時若念有無明有遣此修非修般若何以故非有想者能修般若是故修遣無明亦遣此修是修般若乃至諸法思之例之三百七十二佛言由此因緣當知一切法有二想者定無布施亦無淨戒等法無道無果亦無現觀下至順忍彼尚非有況有色遍知諸法準例三漸次品善現白佛住有想者若無順忍無道無果等法豈能證得一切智智佛言如是如是善現云行般若時為有有想有無想不為有色想色斷想次第修般若次修六念法作漸次業修漸次學行漸次行諸法皆依如是修謂三漸次例之三百七十三佛言云何修隨法念隨佛念隨僧念隨戒念隨捨念隨天念佛言若修隨法念者行般若時不應思惟善法不善法無記法世間出世間法有愛染無愛染法有諍無諍法唯聖法非聖法一一不應思惟若如是修作漸次業修漸次學行漸次行則得圓滿念住等一切善法六念法中依如是例之無得無相品善現白佛若一切法皆以無自性為自性菩薩見何義利為利有情求無上菩提佛言諸有情類具類常見住有所得若無所得即是得菩提等三百七十四佛言所住內空不離般若皆為般若之所攝受外空等法依此次第例之三百七十五佛言菩薩行般若時為欲圓滿一切陀羅尼門故即於一切陀羅尼尼門中攝受布施等法諸法為例三百七十六佛言菩薩修行般若時若住內空時住無漏心而住內空若住外空時住無漏心雖住內空外空而無二想依如是例三百七十七佛言菩薩行深般若時能於一切無相無覺無得無影無作法中圓滿精進善現答言以離相無漏之心而修入諸禪定三百七十八佛言不執無忘失法不執著性一一不執著諸法則無作法中圓滿般若亦能圓滿諸餘功德無雜法義品善現白佛云何於一切無雜無相自相空中能圓滿布施等法行佛言行深般若時安住夢幻等法皆無自性一相無相則能圓滿布施淨戒安忍等一切善法依如是例三百七十九諸功德相品善現白佛云何夢幻等法皆空而可安立是善是非善等法佛言有情顛倒執著造身語意不善業為彼宣説正法汝等當知色是空無我我所乃至佛菩提是空無我我所等一切法例三百八十善現白佛云何名行深般若時所有甚奇希有之法佛言菩薩往十方世界若諸有情應以布施攝益者以布施而攝益之諸法是例我以佛眼遍觀十方殑伽沙世界菩薩或天中或人中或修羅中或地獄中或鬼趣中或傍生中各隨機宜作希有事等義為十卷大般若經三百八十一善現白佛云何名為四無所畏四無礙解十八不共法三十二相八十種好佛一一依問答之三百八十二如來化作一佛是佛復化作百千衆彼化佛教所化衆或令修布施或令修淨戒等法三百八十三善現白佛若真如法界真如實際無轉越者色與法界真如實際為有異耶佛云色無異一一相即如色不異法界真如實際法界真如實際不異於色諸法如是諸法平等品善現白佛修般若時於一切法善達實相佛言如變化者不行於貪不行於嗔不行於癡不行於色等法三百八十四佛言若一切法如變化者諸所變化皆無實色受想行識亦無實等三百八十五善現云何修行般若時能學布施等法方便善巧妙願力智佛言修般若時如實知布施無增無減無染無淨無自性不可得而能修習是修般若三百八十六佛言四念住非法界亦不離四念住別有法界法界即四念住四念住即法界例之不動品善現白佛若諸有情及有情施設皆畢竟不可得者菩薩為誰修般若佛言以實際為量修行般若何以故以有情即是實際故諸法例三百八十七佛言修行般若時依本空性教授教誡諸有情類令勤精進修諸善法勿思惟二及不二相諸法等例三百八十八佛言當知此中無我可得亦無有情命者生者等可得無色等可得三百八十九佛言以色不異本性空本性空不異色色即是本性空本性空即是色乃至佛菩提法皆不異即等例三百九十善現白佛若一切法皆本性空本性空中都無差別菩薩為何等住發起無上正等覺心佛言無二行相非二行相亦無分別等諸法例之霜十卷大般若經三百九十一成熟有情品佛言修行般若方便善巧安住苦聖諦時不得苦聖諦不得能住不得所住不得所為亦不遠離如是諸法而住苦聖諦是菩薩圓滿修菩薩道等例三百九十二善現白佛云何修行般若時由此方便善巧力故雖觀諸法皆無自性都非實有而依世俗發趣無上菩提宣説正解佛言都不見有少實法可於中住愚夫迷謬顛倒執著色蘊受蘊等法三百九十三嚴淨佛土品善現作念何法名為菩薩道安住此道能擐大功德鎧利一切有情佛言當知布施是菩薩道當知淨戒及一切法等是菩薩道三百九十四佛言菩薩以神通願力盛滿三千大千世界上妙七寶施佛法僧施已歡喜持如是善根與諸有情平等所求嚴淨佛土復以奏諸音樂亦如是嚴淨佛土一一布施一一回向一一嚴淨佛土淨士方便品善現白佛菩薩為住正性定聚為住不定聚耶佛言皆住正性定聚非不定聚復云為住何等正性定聚為聲聞菩薩佛耶佛言皆住佛乘正性定聚不住聲聞菩薩定聚等義三百九十五善現白佛何等為菩薩菩提資糧佛云一切善法皆是菩薩菩提資糧無性自性品善現白佛若如是法是菩薩法復何等法是佛法耶佛言如汝所問即菩薩法即是佛法謂於一切法覺一切相由此當得一切相智一切道相智等三百九十六佛言明鏡等中所現諸像為有實事可依造業由所造業或墮地獄餓鬼傍生人天等不不也善逝種種為喻皆如夢幻勝義瑜珈品善現白佛諸法實者無染無淨不見實者亦無染無淨何以故以一切法皆用無自性為自性佛言我説一切法平等性為清淨法等三百九十七善現白佛若一切法平等性中諸差別相皆不可得則諸異生預流等果與如來等覺應無差別佛言如是無動法性品善現云若諸法平等法性皆本性空於有無法非能所作云何菩薩修般若時不動勝義而作所應作事饒益有情佛言如是如是雖無動作而令有情遠離我想有情想等遠離色想等想三百九十八常啼菩薩品善現白佛云何教授教誡初業菩薩令其信解諸法自性畢竟皆空佛言豈一切法先有後無然一切法非有非無無自性無他性先既非有後亦非無自性常空無所怖畏當如是教授教誡初業菩薩令其信解復次善現欲求般若當如常啼菩薩今在大雲雷音佛所修行梵行善現白佛常啼菩薩云何求般若佛言不惜身命不顧珍財不循名譽不希恭敬居阿練若空中有聲咄云汝當東行決定得聞甚深般若汝當行時莫辭疲倦不得左右顧視勿觀前後勿破威儀勿壞身相勿動於色勿動受想行識勿動眼耳鼻舌身意處等法三百九十九天帝釋化現試驗即復本形在常啼前曲躬讚言善哉大士我實不用血髓但來相試今有所願我當相與常啼云我願無上菩提頗能與斯願不天帝云此非我力唯有諸佛大聖法王能與斯願除無上覺更求餘願我當與之常啼云甚深般若亦我所願頗能惠不天帝又復慚然我於此願亦不能與常啼遂與長者女及其父母同往妙香城中法涌菩薩所法涌菩薩品法涌白常啼言一切如來所有法身無所從來亦無所去何以故諸法實相皆不動故四百法涌告常啼云譬如光影種種形相變轉差別如是光影為從何來去從何所常啼云光影非實云何可言有來去處法涌言如是如是如汝所説展轉譬喻如來本無來去相以候定中七年而起為説甚深般若波羅蜜多等法義結勸付囑品爾時如來告阿難言汝愛敬我我此般若汝當殷勤流布利樂有情無令忘失此般若常在世間右鷲峯山中如來為般若第一會主舍利子善現尊者慶喜滿慈子彌勒菩薩天帝釋當機擊揚計四百卷自初分緣起至結勸付囑共七十九品皆約法義立名唯憍尸迦殑伽天從人也然所略大概則逐卷録其義例其間或前帙後帙或前卷後卷但見一科起處照於前後卷帙則八十科義類連環可知且諸法行相此會已備後十五會乃佛慈為物品目法義多同但博約矣鷲峯山第二會般若八十五品計七十八卷大品光讚放光三經舊本三藏玄奘重譯金十卷大般若經四百一緣起品如來入等持王三昧不起于坐復入師子遊戲三昧如來即熙怡微笑放光照十方界四百二歡喜品十方聖衆諸天集會舍利子歡喜踊躍從坐而起請問般若妙義四百三觀照品舍利子白佛諸果位覺與此般若波羅蜜多無差別相四百四與般若相應人於何處沒來生此間此間若沒當生何處四百五修行般若別發宿住隨念智證通等神力四百六善現品佛告善現汝以辨才為諸菩薩宣説般若等四百七色增語是菩薩摩訶薩不不也四百八地界增語是菩薩摩訶薩不不也離生品欲知色受想等法當學般若波羅四百九勝軍品善現云我於夢響等五薀等法若增若減義四百十行相品三摩地不異菩薩幻喻品設有問言幻士能學般若我云何答無等等品般若是妙是微妙是無等是無等等舌相品如來現廣長舌相遍覆大千放大光明生十卷大般若經四百十一譬喻品無句義是菩薩句義等法斷諸見品宣説法要令諸有情斷我見有情見命見等四百十二到彼岸品修行布施等法與一切智智相應乘大乘品菩薩乘是大乘為一切有情等四百十三無縛解品菩薩摩訶薩被大乘鎧成就一切善法無縛無解等四百十四三摩地品大乘相者謂三摩地般若智力成就百千等四百十五念住等品大乘相者謂四神足修念住等法成一切智力等義四百十六修治品住阿練若常不捨離求佛菩提超聲聞獨覺等地四百十七出住品如是大乘何所住者一切諸法皆無所住四百十八超勝品以種姓法非實有是非有性故此大乘是尊是勝是上是妙超勝一切天人等法四百十九無所有品我者生者見者等諸法無所有猶如虛空四百二十隨順品此大乘法隨順般若悉無違越諸佛菩薩無不攝入般若波羅蜜多麗十卷大般若經四百二十一無邊際品色無邊故當知菩薩亦無邊乃至佛菩提亦無邊等四百二十二布施等法悉皆性空無所有不可得等義四百二十三行般若者於色無受無取無住無著等法四百二十四遠離品如我解仁者所説義我及見者等法畢竟不生四百二十五帝釋品三千世界所有諸天悉皆集會等四百二十六宣説般若欲令易解然其義趣轉覺深妙信受品為何等有情樂説何法信受般若非一生聞等四百二十七散花品諸天散花願聞般若天帝乃問菩薩所學當於何求等授記品諸天讚歎佛言當知我往昔燃燈佛時於衆花王都四衢道首獻五蓮華布髮掩泥聞上妙般若以無所得蒙記四百二十八攝受品如是般若為希有調伏令不高心回向一切智智窣堵波品此云方墳佛告天帝受持般若一切災害皆不能侵隨所在處天人恭敬勝造窣堵波福聚等量四百二十九福生品於此般若至心聽聞廣宣流布所獲福聚超過一切所作功德品諸天共白天帝受持般若令佛法僧眼不斷一切惡法自然損減為大明呪神呪上呪等等呪外道品時有外道為求佛過來詣佛所帝釋誦念般若自然敬禮而退等四百三十天來品般若所香有其妙光異香必知諸天龍等來至其所觀禮讀誦書寫設利羅品滿贍部洲佛設利羅若書寫般若於此二分福聚不可為比何以故佛設利羅由此般若而得出生故水十卷大般若經四百三十一經文品佛言教贍部洲有情類皆住十善業道所得福聚不如書寫般若四百三十二佛言教贍部洲有情皆發無上正等覺心所獲福利不如將此般若巧妙文義度宜流布為他人説四百三十三隨喜回向品隨其所修諸福業事如實了知悉皆回向等四百三十四大師品如是般若能作照明若能禮敬如敬大師等四百三十五地獄品善現有菩薩雖曾見佛若百若多百千修行六度於此甚深般若便生毀謗輕慢感匱法罪經百千大劫隨大地獄無有出期云云四百三十六清淨品是法清淨最為甚深何以故諸法畢竟淨故等義四百三十七標幟品修行般若不行色等法能擐功德大鎧標幟名言皆不可得不可得品色等一切諸法本性空故皆不可得四百三十八東北方品得聞般若經典法門一經耳者已於諸佛所深種善根末法流傳向東北方四百三十九如是般若誰能信解供養多佛事多善友聞我説此妙法喜樂受持今於我前發弘誓願四百四十魔事品學般若人魔事卒生種種現境當須覺知不為魔撓不和合品若書寫受持説聽般若師資二緣難得和合故此云耳玉十卷大般若經四百四十一書寫修習思惟般若有人來讚説諸天勝事歡喜四百四十二佛母品生育聖賢故名佛母甚深般若不示現色等法故四百四十三示相品一切法相如來覺為無相變礙見色相如來覺為無相之相四百四十四成辦事品般若為大事故出現世間為能成辦一切諸善法故四百四十五船等喻品行六度等無其善巧墮聲聞等地若以般若舟船濟渡得到菩提彼岸四百四十六初業品初業菩薩不即諸法不離於法求學般若證佛菩提皆以空無相等為趣四百四十七調伏貪等品誰於如是般若能生淨信遠離貪嗔癡為性為相為狀為貌真如品一切諸法皆與空相應隨如來生隨如來真如生等四百四十八佛讚善哉聞説如是諸法真如不可得相不退轉品如何相狀名不退轉如是義科名不退轉等四百四十九轉不轉品如是不退轉但名不退轉為退轉邪轉不退轉乃名轉轉觀於諸法無以住相退轉不退轉也四百五十甚深義品色亦甚深受想行識亦甚深乃至菩薩行亦甚深無上正等覺心亦甚深也出十卷大般若經四百五十一夢行品晝與夢中修三摩地增益悉無差別夢行般若亦名修習三摩地願行品菩薩所作利益所行般若皆拔濟有情殑伽天品散花佛上發弘誓願佛即記為金花如來四百五十二習近品修行般若云何習近空無相等法云何入空無相等法若能善學空無相得入佛位四百五十三增上慢品惡魔變化當須自覺平等性中莫生勝負等四百五十四菩薩所持一切善根無如般若四百五十五同學品天帝辨才宣説般若以佛神力得如是辨願與有情同學是法四百五十六同性品修學般若增長一切波羅蜜多以般若一法含藏一切諸法皆同性故分別品於一切法不生分別是學般若四百五十七堅非堅品般若堅亦非堅於一切法離亦非離不堅不離能學般若實語品三世諸佛依此般若成道是真實語無盡品般若無盡一切法亦無盡等例四百五十八愛樂品聽聞甚深般若當知是人佛所種善根故四百五十九相攝品般若一法攝取布施等一切法方得一切善法成就四百六十巧便品巧方便力發菩提心恆沙佛所以種善根成一切智證等覺位崑十卷大般若經四百六十一應於般若常勤修學具大勢力得大自在四百六十二行般若時法相皆空應觀色等悉皆如是四百六十三何因緣故名為般若得到彼岸故得此名耳樹喻品空中種樹甚為難事學般若人又復為難久種善根故學四百六十四菩薩行品何故名為行菩薩行諸法空處行生死故是行菩薩行親近品不近諸佛及諸善友無由得成一切智智證無上覺四百六十五遍學品不由如來道滿遍學得入菩薩正性四百六十六漸次品無自性中起諸善行作漸次業修漸次學行漸次行等四百六十七無相品行般若時能以離相無漏之心於一切法不取不著不離等四百六十八無雜品夢響等法如實了知成就無漏道支圓一切聖法得成菩提四百六十九衆德相品如來種相悉已具明觀察二空知一切法如夢幻等都非實義四百七十如來八十種隨好功德妙相於此一一分別解脫岡十卷大般若經四百七十一若真法界真如實際無轉無越色受等法亦無異也四百七十二善達品實知行相生無所來滅無所去俱不可得則能善達一切諸法實相四百七十三不見法界離諸有不見諸法離法界四百七十四實際品化作四衆應無果證分別顛倒了無取相是名實際等義四百七十五無闕品修行般若一切法性皆不可取於布施等法悉無所闕云云四百七十六道士品布施等法是菩薩道世出世間一切諸法亦菩薩道四百七十七正定品正性定聚與不定聚非住非不住是菩薩乘無所住四百七十八佛法品即菩薩是其佛法即此佛法是菩薩法一切法皆以無性為性如是諸法無性故所以無事云云右鷲峯山中第二會所説般若計七十八卷八十三品其義意品目與前多同但如來應機廣略耳次六會後卷中標録三十二尾
