body:
  text: 東京法雲禪寺住持傳法佛國禪師惟白集天地玄黃宇宙洪荒日月盈昃辰宿列張寒來暑往秋收冬藏閏餘成歲律呂調陽雲騰致雨露結為霜金生麗水玉出崑岡已上總四十八函大般若經總部四處十六會所説傳此方入藏者七百一十卷前六百卷唐三藏玄奘法師在玉華宮重譯西明寺僧玄則述十六序冠十六會明其旨也太宗皇帝御製聖教序高宗皇帝作聖記然此經諸佛之智母菩薩之慧父斷煩惱之寶刀度愛河之舟揖利生之極致成道之正因表其尊故標衆經之首也大智體空廓稱性遍周般若靈智不測妙慧明徹波羅蜜多功行超進到于彼岸經詮表實照貫攝常軌天十卷大般若經一緣起品如來鷲峯山中聖衆集時在師子座入等持王三昧又復不起于坐入師子遊戲等持三昧於一一身一一毛孔一一支節放大光明照十方界六種震動東方最後世界寶性如來普光菩薩南方無憂德如來離憂菩薩西方寶焰如來行慧菩薩二北方勝帝如來勝授菩薩東北方勝德如來勇猛菩薩東南方蓮華如來蓮華手菩薩西南方日輪如來光明菩薩西北方寶蓋如來寶勝菩薩下方蓮華如來蓮華勝菩薩上方喜德如來喜授菩薩一一最後世界一一佛所一一上首菩薩見斯光已各問其由一一佛各説緣起各遣持花來聽般若三學觀品舍利子問云何菩薩於一切法等覺一切相學般若佛云以無住為方便安住般若乃至無捨無犯無護無取無勤等學般若安住般若四佛告舍利子菩薩摩訶薩修行般若已能成辦如是功德爾時三千大千世界四大天王各以四鉢奉上於佛一切諸天悉皆歡喜五相應品舍利子問如何學般若便得相應佛云與色空與受想行識空與般若相應乃至諸佛正等菩提空與般若相應等六復次舍利弗菩薩摩訶薩修行般若不著眼觸非有不著眼觸常不著非常等例七復次舍利子諸菩薩摩訶薩修行般若時不為布施故修行般若不為淨戒安忍精進靜慮修行般若不為內空等修行般若八轉生品舍利子問學般若人何處沒來此間生此間沒生於何處佛云或從佛國土來或從知足天來或人間來此處生此處若沒却生佛國土及知足天上九復次舍利子有菩薩摩訶薩修行般若時能引發六神通波羅蜜何等為六一天眼二天耳三他心四宿命五如意六漏盡等十讚勝功德品佛十大弟子各從坐起讚此般若是大是妙是第一是尊是高是最是極是上是無上是上上是等是無等是等等是無生是無滅是無染是無淨是空等法相舌相品爾時世尊現廣長舌相遍覆三千大千世界舌上放無量光明照十方殑伽沙佛界一一佛界一一菩薩覩斯光已各各白佛一一隨答地十卷大般若經十一教誡教授品佛告善現汝以辨才為菩薩宣説般若相應之法令於般若修學究竟人天大衆各各心疑以佛神力宣説法要善現白佛何名般若何名菩薩我不見一法名為般若菩薩於此二名亦不見有云何令我説佛告善現菩薩般若但有名耳乃至內外中間不可得一切諸法亦復如是若修行般若不應觀色若常若無常若苦若樂若我若無我若淨若不淨若空若不空若有相若無相若有願若無願若寂靜若不寂靜若遠離若不遠離若有漏若無漏若有為若無為若生若滅若善若非善若有罪若無罪若有煩惱若無煩惱若世間若出世間若雜染若不雜染若屬生死若屬涅槃若在內外中間若可得若不可得十二因緣常無常等十三四無畏常無常等十四復次善現無明中有菩薩不不也世尊即無明異無明有菩薩不不也菩薩中有無明不菩薩離無明不十五四諦中有無明不不也世尊即無明異無明有不等十六佛十力中有無明不不也世尊等十七十地中有無明及即異有離乃至佛無上菩提等一切諸法例之十八眼界增語是菩薩摩訶薩不乃至常增語淨增語是菩薩摩訶薩不十九地界增語是菩薩摩訶薩不等例二十內空增語是菩薩摩訶薩不內外乃至一切諸法增語等例玄十卷大般若經二十一八解脫增語等為例二十二佛十力增語等為例二十三預流果增語等二十四復次善現汝觀何義言即眼處增語非菩薩摩訶薩善現答言若眼處若耳鼻舌身意處尚畢竟不可得性非有故況有眼處增語乃至耳鼻舌身意處增語此增語既非有故如何可言即眼處增語是菩薩摩訶薩等二十五眼界若有為若無為增語非菩薩等例二十六即眼觸增語非菩薩摩訶薩二十七即地界若淨若不淨增語二十八即無明增語等為例二十九即內空若有願若無願增語等三十四念住若雜染若清淨增語是菩薩摩訶薩黃十卷大般若經三十一八解脫若淨若不淨增語三十二一切陀羅尼門此至總持若有煩惱若無煩惱增語三十三佛十力若有願若無願增語三十四三十二大士相若有煩惱若無煩惱增語三十五預流果若淨若不淨增語三十六諸佛無上正等菩提若有為若無為增語是菩薩摩訶薩不復次善現汝先所言我不見有可名菩薩摩訶薩者如是如是如汝所説諸法不見諸法諸法不見法界法界不見諸法法界不見法界法界不見色界色界不見色界法界法界不見受想行識界受想行識界不見法界乃至法界不見諸佛無上正等菩提等界義例勸學品善現白佛菩薩欲圓滿布施當學般若欲圓滿淨戒安忍精進靜處等當學般若欲遍知色界乃至眼處遍知正等菩提等當學般若波羅蜜無住品善現白佛我於菩薩般若不得不見云何令我教誡我於色受想行識不得不見若集若散云何可言此是色等是色等名皆無所住亦非不住何以故色等名義既無所有故色等名皆無所住亦非不住三十七五眼六通不得不見等義例法三十八般若行相品修行般若應作是觀何者是般若何名般若誰之般若將何為用般若無所有不可得布施乃至一切法無所有不可得等三十九修行般若時如實知色等自性是修般若色空故色生成辦不可得一一例之善現白佛無方便善巧修行般若時若行色若行色相非行般若乃至若行色常無常等非行般若等義例之四十有方便善巧修行般若時不見眼界相不見耳鼻舌身意界相是修般若波羅蜜多乃至不見諸佛正覺菩提是修般若宇十卷大般若經四十一有方便善巧修般若時不行布施不行布施相是行般若四十二譬喻品善現白佛若有問言幻士能學般若成辦一切智智幻士能學靜慮精進安忍淨戒布施成辦一切智智不乃至幻士能修學十八不共法成辦一切智智我得此問當云何答佛告善現我還問汝隨汝意答於意云何色與幻有異不受想行識與幻有異不答言不也何以故色不異幻幻不異色色即是幻幻即是色受想行識亦復如是八十科義一一如是問一一如是答之四十三修行般若時應以一切智智心觀四念住常無常等義例之四十四善友若能以無所得為方便説修靜慮常無常相不可得等四十五惡友以有所得為方便魔來詐現父母及苾芻僧來為言於色説常無常相於行識説常無常相等四十六菩薩品善現白佛所言菩薩是何句義佛言無句義是菩薩句義如空中鳥迹如幻事如夢境如陽焰如光影如空花如響如尋香城如真如如法界如法住等句義無所有不可得菩薩句義亦無所有亦不可得如布施無所有不可得菩薩句義亦如是無所有不可得等四十七摩訶薩品善現白佛何緣菩薩名摩訶薩佛告善現於大有情中定為上首從初發心以至成佛金剛喻心決定不壞修學一切佛法皆無所得為方便安住布施淨戒等法四十八菩薩修行布施時以一切智智心而修布施以無所得為方便與一切有情回向菩提於身命都無所吝如是名為菩薩擐布施大功德鎧諸法如是例之四十九舍利子問滿慈子云何名菩薩利樂有情乘於大乘答云菩薩行般若時以一切智智為上首用無所得為方便乘布施波羅蜜多不得布施不得施者不得受者不得所施物不得所遮法等大乘鎧品善現白佛云何名菩薩擐大乘鎧佛言擐布施擐淨戒安忍精進靜處般若鎧是名擐大乘鎧一一法如是廣利有情名大乘鎧五十善現白佛如我解佛所説義菩薩不擐功德鎧是名大乘鎧何以故色色相空受想行識受想行識相空眼處眼處相空耳鼻舌身意耳鼻舌身意相空等宙十卷大般若經五十一布施等無縛無脫何以故布施等性空故無縛無脫乃至性遠離性相空故性寂靜故性無願故性無生故性無滅故性無染故性無淨故一一例之辨大乘品善現白佛云何當知菩薩大乘相發趣大乘大乘從何出至何處於何處住誰乘是大乘佛云大乘相者布施波羅蜜多是淨戒安忍精進靜慮般若等法辨是大乘相等法五十二大乘相者健行三摩地乃至寶印師子遊戲妙月法涌月幢相決定金剛喻如是百千三摩地善現一一問其名佛一一為答其義意五十三善現白佛菩薩修行般若時以無所得為方便於內外具身受心法觀熾然精進具念正知調伏貪愛佛云修行般若時以無所得為方便審觀自身行時知行住時知住坐時知坐臥時知臥如如威儀具念正知調伏貪愛是為菩薩修行般若已次一一觀身俯仰屈伸瞬息如十想等義如前作觀是名修行般若五十四菩薩住難勝地應遠離十法如遠居家慳家尼女家惱忿諍讚毀顛倒不善我慢猶豫貪嗔等法一一地中一一有遠離法或十或六或十五或二十法方能成就般若也五十五云何當知菩薩已圓滿第十法雲地佛云菩薩與諸如來應言無異已知圓滿布施乃至靜慮等法一一如是例之五十六當知地界無所有不可得故乘是大乘者亦不可得所以者何畢竟淨故水火風等法一一如是例之讚大乘品善現白佛言大乘者超勝一切世間阿素洛等最尊最妙同於虛空普能含受無量無邊無來無去無住前後中際皆不可得三世平等故名大乘佛言如是如是如汝所説無量功德當知即是布施即是淨戒即是菩提等五十七若真如實有性者則此大乘非尊非妙不超一切世間天人阿素洛等以真如非實有性故此大乘是尊是妙超勝一切世間天人阿素洛等以為例例一切諸法義五十八復次善現我乃見者無所有故當知內空亦無所有內空無所有故當知外空亦無所有諸法次第例之五十九空解脫門無來無去亦復不住無相無願解脫門亦復如是何以故本性無來去故已次諸法一一例之六十過去布施過去布施空現在布施現在布施空未來布施未來布施空何以故空尚不可得何況過去現在未來中有布施波羅蜜多淨戒等諸法亦然洪十卷大般若經六十一前後中際三世平等異生不可得所以者何平等中平等性尚不可得何況有過現未異生可得隨順品滿慈子白佛先令善現宣説般若而今何故乃説大乘善現復白佛我説大乘將無違越般若佛云汝説大乘於般若中悉皆隨順無所違越何以故一切善法一切菩提分法皆攝入般若故何謂善法云云無所得品善現白佛前後中際菩薩不可得摩訶薩不可得色無邊故當知菩薩亦無邊受想行識亦復如是六十二耳界無所有不可得故前後中際菩薩亦不可得如是例之六十三陀羅尼門無所有不可得故前後中際菩薩亦不可得如前例之六十四眼界眼界性空何以故眼界性空中眼界無所有不可得故菩薩摩訶薩亦無所有不可得故六十五眼界性空故眼界於眼界無所有不可得眼界於色界無所有不可得色界性空故色界於色界無所有不可得例之前後諸法六十六異生地法性空故異生地於異生地法無所有不可得異生地於種姓地法無所有不可得種姓地性空故種姓地法無所有六十七如空解脫門唯容攝於十方三世無所從來無所至去亦無所住空解脫門中無名名中無空解脫門非合非離但假施設何以故以空解脫門與名俱自性空故自性空中若解脫門若名俱不可得無所有例之六十八布施非我亦無散失淨戒等非我無有散失等例之六十九布施無染亦無散失淨戒等無染亦無散失等例之七十五眼本性空故若法本性空則不可施設若生若滅若住若異由此緣故畢竟不生則不可名五眼六神通本性空故如前例之修行般若時亦不見色異畢竟不生何以故色與畢竟無二無二分無別無斷故荒十卷大般若經七十一觀行品善現白佛修行般若觀諸法時於色不受不取不執不著亦不施設為色等修行般若不見色何以故色性空故不生滅故諸法例之布施不生則非布施所以者何布施與不生無二無二分故何以故不生法非一非二非多非異是故布施不生則非布施乃至無上菩提一一例之七十二善現白佛云何觀諸法佛云菩薩修行般若時觀色非常非無常受想行識如是例之七十三舍利問善現何緣故説色等不生則非色等答云色色性空此性空中無生無色由此緣故我作是説色不生則非色七十四舍利子問善現何緣故説色等入不二無妄法數耶答云色不異無生無滅無生無滅不異色色即是無生無滅無生無滅即是色由此緣故我作是説色入不二無妄法數無生品善現白佛修行般若觀諸法時見我無生畢竟淨故如是例之舍利子問善現仁者以生法證生法以無生法證無生法耶不也以生法證無生法無生法證生法耶不也然則都無有得有現觀耶答云但假施設耳七十五布施是已生法我不欲令生何以故自性空故色性空故不依內不依外不依中問不可得淨道品善現白佛菩薩修行六度應淨色應淨受想行識應淨眼界等七十六菩薩聞説般若心無疑惑亦不迷悶何以故色非有故當知作意亦非有一切善法悉亦如是例之七十七天帝品諸天大集帝釋問善現菩薩云何學般若云何住答云先發菩提心離聲聞地以一切智心用無所得為方便思惟色無常思惟色苦空無相無願寂靜遠離如病如癰如箭如瘡如熱惱敗壞衰朽變動速滅可厭有災有橫有疫有癘不安穩不可保信無生無滅無染無淨無作無為等例七十八思惟地界無常等例七十九憍尸迦學般若時不應住此是色何以故以有所得為方便故例八十修行般若時不應住無忘失法若常若無常諸法次第例之日十卷大般若經八十一一切諸法既不應住如何住般若答云諸佛之心若何所住如來之心都無所住所以者何如來之心不住色不可得故乃至布施及不住一切智智雖住般若而於色非住非不住何以故以無二相故諸天子品爾時諸天子作是念諸藥叉等言詞呪句尚可而知尊者所説竟不能解善現答云我於此不説一字汝等不聞當何所解何以故甚深般若説者聽者解者如夢如幻諸天子曰其意趣甚深轉甚深微細甚微細難可測度善現告曰當知色非甚深非微細何以故色甚深微細性不可得故八十二當知布施如幻如化如夢中見如是例諸法受教品諸大弟子聲聞菩薩同時發問善現所説般若如是甚深難見難覺非所尋思微妙第一答云菩薩住不退地能深信受何以故如是等人終不以空分別色亦不以色分別空不空等例八十三終不以空分別布施亦不以布施分別空不空等例八十四終不以空分別極喜地亦不以極喜地分別空不空等一切法散花品帝釋與諸天子聞其法雨各化微妙香花奉散如來菩薩等衆三千世界花悉充滿佛神力故結成花臺善現念言今此花殊妙定非草木水陸所生必是諸天從心化出天帝云實非草木所生亦非從心化出善現云是花不生即非花也帝釋云是花不生為餘法爾善現云非但是花不生餘法亦爾何謂也色亦不生此既不生則非色受想行識亦不生此既不生等例八十五學般若品帝釋心念尊者智慧甚深不壞假名而説法性佛即印之如汝所念帝釋即白佛善現於何等法不壞假名而説法性佛云色但假名不離法性善現不壞如是假名而説色法性所以者何色法性無壞無不壞是故所説亦無壞無不壞等法例八十六苦聖諦苦聖諦性空故菩薩摩訶薩不見苦聖諦例一切法等八十七菩薩能於布施波羅蜜多學無二分故能於安忍淨戒等學無二分故是故菩薩能學無量無數不思議清淨佛法何以故無二分故等八十八菩薩如是學時不為色攝受壞滅故學不為受想行識壞滅故學佛言如是如是諸法以此為例八十九行般若時不見鼻界若生若滅若取若捨若染若淨若集若散若增若滅何以故以鼻界性故無所有不可得故如是學般若能成辦一切智智以無所學無所成辦故求般若品天帝問舍利子菩薩般若當何求答云當於善現所説中求帝釋謂善現云今舍利子所説是誰神力誰為依處答云如來神力如來為依處帝釋云一切法無依處如何可言善現告云如是如是一切法無依處如來亦無依處但隨順説為依處非離色如來可得如來真如可得如來法性可得非色中如來可得非如來中色可得真如如來法性如來可得諸法如是例九十非離耳界如來可得真如如來可得法性如來可得真如如來真如可得法性如來法性可得鼻界等一切諸法細而思之例之以見義意月十卷大般若經九十一非離八解脫如來可得真如如來可得法性如來可得真如如來真如可得等例九十二如來於色非相應非不相應如來於色真如真如於色真如法性於色法性等如來於離色非相應非不相應等如前例之九十三如來於四靜慮非相應非不相應如來於四靜慮真如非相應非不相應如來於四靜慮法性非相應非不相應等義例之九十四善現白天帝云汝先所問般若當於何求不應於色求不應於受想行識等求不應離受想行識等求所以者何若色若受想行識等若離色若離受想行識等若菩薩若般若若求如是一切皆非相應非不相應非有色非無色非有對非無對咸同一相所謂無相何以故菩薩般若非色非受想行識等非離色非離受想行識等所以者何一切皆無所有性不可得故是故所行般若不應於色求不應於受想行識求不離色求不離受想等求九十五不應於一切陀羅尼門求不應離一切陀羅尼門求九十六不應於布施求不應離布施真如求一切法皆有真如為例九十七不應於鼻界法性求不應離鼻界法性求等例九十八歎衆德品天帝白善現菩薩行般若是大是無量是無邊四果聲聞菩薩等衆於其中學成等正覺答云如是如是皆於中學證得菩提色大故所學般若亦大何以故以色蘊前後中際皆不可得故説為大由彼大故菩薩所學般若亦大等九十九預流無量故菩薩所學般若亦無量何以故預流等量不可得故故説無量譬如虛空量不可得預流等量亦復如是是故菩薩般若亦無量次至無邊一一例亦如是攝受品帝釋諸天各各高聲唱言善哉善哉尊者善現為我等開示微妙正法所謂般若我等於彼敬事如佛如是般若甚深無法可得所謂此中無色可得無受想行識可得等非即色非離色可得等一切法例之一百如來照知四衆諸天皆集和合同為證明謂帝釋云四衆諸天若男女等不離一切智心以無所得於此般若精勤受持讀誦如理思惟演説流布一切諸魔不能為害何以故善住色空無相無願善住受想行識無相無願不可以空而得空便不可無相得無相便不可無願得無願何以故以色蘊等自性皆空能惱所惱及惱害事不可得故帝釋諸天皆悉讚歎一切佛法般若智慧出現世間我等思惟受持盈十卷大般若經百一天帝白佛般若甚為希有若有攝受般若則為攝受布施安忍淨戒精進靜慮等則為攝受內空外空等一切法百二佛言憍尸迦是菩薩自修無忘失法教他修無忘失法讚説無忘失法歡喜讚嘆修無忘失法者自修恆住捨性教他修恆住捨性百三校量功德品天帝白佛若人書寫供養般若復有供養佛舍利寶塔於此二福何者為勝佛言天帝如來得一切智智及身相好於何等法修習而得天帝答言於般若波羅蜜多修習而得佛言如是如是我依般若修習而得百四佛言天帝如來昔為菩薩位時常勤修習般若及布施淨戒安忍精進靜慮如來昔為菩薩位時常勤修習內空等法百五爾時於此三千大千世界所有四天王天三十三天一切諸天子共白天帝言大仙應受如是般若應持應讀應誦如是般若應勤精進修學應如理思惟應恭敬如是般若等百六諸天子各以天花衣服瓔珞香鬘等涌身虛空而散佛上各各白言願此般若久住南贍部洲利益衆生何以故般若甚深微妙故等百七世尊以無二為方便回向一切智智修習佛十力四無所畏四無礙解四無量心十八不共法何以故以無生無二為方便故百八當知以眼界無二為方便無生為方便無所得為方便回向一切智智修習八解脫八勝處九次第十遍處等法義百九當知以無明無二為方便無生為方便無所得為方便回向一切智智修習布施淨戒安忍精進靜慮等法百十當知以布施波羅蜜多無二為方便無生為方便無所得為方便回向一切智智修習八解脫八勝處九次第十遍處等昃十卷大般若經百十一慶喜當知以佛十力無二無生無所得為方便回向一切智智修習布施等百十二當知以獨覺菩提無二無生無所得為方便回向一切智智修習布施等百十三世尊云何以眼處無二無生無所得為方便回向一切智智修習四靜慮四無量四無色定佛告慶喜眼處眼處性空何以故以眼處性空與四靜慮等無二無二分故云何以眼處耳處等一一問一一答之百十四云何以身界無二無生無所得為方便安住內空等以身界性空與內空等無二無二分故思而例之百十五云何以眼界無二無生無所得等修習四念處等法義例百十六云何以舌界無二無生等修習無忘失法等例百十七云何以地界無二無生等安住真如法界法性等百十八云何以內空無二無生等安住真如法界法性等百十九云何以真如無二無生等修習佛十力四無畏等法百二十云何以布施淨戒安忍精進靜慮無二無生等修習佛十力四無所畏四無礙解十八不共法等辰十卷大般若經百二十一云何以八解脫無二無生等回向一切智智修習無忘失法百二十二云何以空解脫門無二無生等修習無妄失法百二十三云何以佛十力無二無生等修習一切智道相智等法百二十四云何以一切陀羅尼門無二無生等修習布施等百二十五云何以獨覺菩提無二無生等修習布施淨戒安忍等法例之百二十六慶喜當知譬如大地以種散中衆緣和合則得生長應知大地與種生長為所依止為能建立如是般若與所回向一切智智及布施等為所依止為能建立令得生長故此般若於此布施等法為尊為導故我但廣稱讚般若例之百二十七帝釋白佛若有受持此甚深般若我等諸天敬心擁護佛云如是如是若有供養般若身心無倦身樂心樂身輕心輕身調柔心調柔身安隱心安隱繫心般若於寢息中夢見佛為説布施等法分別布施等法義舍利子為天帝言如是般若既不可取無色無見無對一相所謂無相汝云何取所以者何如是般若無取無捨無增無減無聚無散無益無損無染無淨如是般若不與諸佛法不捨異生法不與菩薩法不捨異生法一一如是例之帝釋讚云如是如是如是般若實不可取又復依前答之何以故甚深般若不隨二相無二相故佛讚善哉如汝所説不隨二行何以故甚深般若無二相故例之百二十八供養佛設利羅不如寫此般若少分何以故佛設利羅由此般若薰修生故由此般若布施等圓淨故由此般若內空等法得圓淨故百二十九法性有二一者有為二者無為云何有為法性謂如實知我者有情智命者智八十科皆云智也云何無為法性謂如實知我性空無有情性空無八十科義一一性空無佛告天帝我於此般若成等正覺過現未十方三世如來亦由此般若成等正覺乃至一切聖賢皆由般若百三十男子女人敬此般若當如敬佛何以故般若即是如來如來即是般若般若不異如來如來不異般若乃至一切聖賢皆即般若佛為天帝挍量功德南贍部洲皆修十善業道不如寫此般若波羅蜜多流布宿十卷大般若經百三十一置南贍部東勝身西牛貨北俱盧教四大洲諸有情類皆修十善業道是人因緣得福多不答言甚多佛言若人寫此如是甚深般若受持流布所獲福聚甚多於前何以故如是般若祕密藏中廣説一切無漏之法聲聞種性補特伽羅修學此法速入聲聞正性離生得入預流等果速入獨覺菩提菩薩正性漸次修行證無上道如是般若祕密藏中廣説無漏法者所謂布施波羅蜜多等八十科義憍尸迦教一有情類住預流果所獲福聚勝彼四大洲有情類修十善業道何以故十善業道不免地獄傍生鬼趣預流果永脫三惡趣苦何況教令住一來不還阿羅漢果若人教四大洲有情類皆住四果不如教一有情住獨覺菩提何以故所有功德勝四果百千萬倍若有教四大洲有情皆住獨覺菩提不如教一有情令趣無上菩提則令世間佛眼不斷所以者何由有菩薩便有預流等果便有如來應正等覺便有佛法僧三寶世間歸依種種供養菩薩若有書寫流布般若所得福聚勝彼無量無邊何以故如是般若祕密藏中廣説世出世間勝善法故由此般若所説世間便有帝釋諸天便有剎帝利人族婆羅門等便有布施淨戒等法義一一法例之前起南贍部洲以至四大洲乃至小千中千大千世界十方各殑伽沙世界一切世界一一置而例至于後卷中百三十二若人教三千大千世界有情類皆住預流等果所獲福聚不如有人教一有情令其安住獨覺菩提所得功德百三十三若有教四大洲有情類皆令修學四靜慮四無量四無色定所得福聚不如書寫如是甚深般若流布等福百三十四若人教小千界有情類皆修四靜慮等不如寫甚深般若所得福聚百三十五若人教十方各殑伽沙等世界諸有情類皆住獨覺菩提所獲福聚不如教一有情令趣無上菩提則令佛眼不斷所以者何如前諸法例之百三十六天帝白佛云何名説相似般若及相似淨戒等佛言若人説有所得般若等是名説相似般若等天帝復白佛言云何説有所得名相似般若佛云若人為發無上菩提心者説色若常若無常説受想行識若常若無常説色若苦若樂説受想行識若苦若樂等百三十七若人為發無上菩提心者説八解脫若常若無常等百三十八若人為發無上菩提心者説舌界若常若無常等百三十九若為發無上菩提心者説一切智若常若無常百四十若人為發無上菩提心者説布施淨戒安忍精進靜慮般若等若常若無常列十卷大般若經百四十一天帝白佛云何説有所得安忍名説相似安忍佛言為發無上菩提心者説色若常若無常百四十二為發心者説八解脫若常若無常等百四十三為發心者説身界若常若無常百四十四説預流向預流果等若常若無常等百四十五為發心者説真如若常若無常等法義例之百四十六天帝白佛云何名説真正般若佛云説無所得般若是名宣説真正般若天帝復問云何説無所得般若是名宣説真正般若佛云若人為發無上菩提心者修行般若不應觀色若常若無常何以故色色自性空是色自性空即非自性若非自性即是般若於此般若色不可得彼常無常亦不可得所以者何此中尚無色可得何況有彼常無常若如是修是修般若乃至八十科例百四十七為發菩提心者應修般若不應觀意界法界常無常百四十八為發心者應修般若不應觀八解脫若常若無常百四十九為發心者應修般若不應觀獨覺菩提若常若無常百五十為發菩提心者修靜慮波羅蜜多作如是言汝修靜慮波羅蜜多不應觀舌界常無常張十卷大般若經百五十一為發心者作如是言汝修靜慮波羅蜜多不應觀若聖諦常無常百五十二汝修靜慮不應觀一切陀羅尼門若常若無常百五十三汝修精進不應觀鼻界若常若無常百五十四汝修精進不應觀真如若常若無常百五十五汝修精進不應觀一切智若常若無常百五十六汝修安忍不應觀眼界若常若無常百五十七汝修安忍不應觀布施等若常若無常百五十八汝修安忍不應觀五眼若常若無常百五十九汝修淨戒不應觀色若常若無常等例百六十云何為説真正淨戒為發菩提心者作如是言汝善男子應修淨戒不應觀地界若常若無常依此為例寒十卷大般若經百六十一為發菩提心者説淨戒時汝修淨戒不應觀八解脫若常無常百六十二汝修淨戒不應觀一切菩薩摩訶薩行若常若無常百六十三汝修布施不應觀身界若常若無常百六十四汝修布施不應觀四靜慮若常若無常百六十五汝修布施不應觀預流向預流果若常若無常等百六十六憍尸迦置南贍部洲諸有情類若人教東勝身西牛貨北俱盧諸有情類皆令住不還果由此因緣得福多不甚多善逝佛云若人於此般若無量法門巧妙文義為他廣説令其易解復作是言來善男子汝當於此甚深般若至心受持讀誦如理思惟隨此法門應勤修學所得功德甚多於前何以故不還果等依此般若所流出故準此一例關於諸法也置四大洲小千界中千界大千界殑伽沙界一切世界次第校量百六十七若人教贍部洲諸有情類皆住菩薩不退轉地所得福聚不如於此般若無量法門巧妙文義為他人説百六十八若人教四大洲諸有情類皆趣無上菩